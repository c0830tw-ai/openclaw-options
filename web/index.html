}

function CalendarView({ data }) {
  const [monthOffset, setMonthOffset] = React.useState(0);
  const today = new Date();
  const target = new Date(today.getFullYear(), today.getMonth() + monthOffset, 1);
  const yr = target.getFullYear(), mo = target.getMonth();
  const daysInMonth = new Date(yr, mo + 1, 0).getDate();
  const firstDow = new Date(yr, mo, 1).getDay();   // 0=Sun

  // ж”¶йӣҶ markers from latest data
  const markers = {};   // 'YYYY-MM-DD' вҶ’ [{type, label, color}, ...]
  const addMarker = (date, type, label, color) => {
    if (!markers[date]) markers[date] = [];
    markers[date].push({ type, label, color });
  };

  // Events (upcoming)
  (data?.upcoming_events || []).forEach(ev => {
    const c = ev.impact === 'high' ? '#fb923c' : '#fbbf24';
    addMarker(ev.date, ev.type, ev.name, c);
  });

  // Past events with TX impact (from event_history)
  const pastEvents = data?.event_history?.events || [];
  pastEvents.forEach(ev => {
    const t = ev.tx_change_T_pct;
    // йЎҜзӨә TX% и®ҠеӢ•зӮә labelпјҢиүІжҢүж–№еҗ‘
    const c = t == null ? '#64748b' :
              t >= 1   ? '#86efac' :
              t <= -1  ? '#fca5a5' :
                         '#94a3b8';
    const label = t != null ? `${t >= 0 ? '+' : ''}${t.toFixed(1)}% ${ev.name}` : ev.name;
    addMarker(ev.date, `past_${ev.type}`, label, c);
  });

  // TXO жңҲйҒёзөҗз®—пјҲеҫһ data.settlement_date жҲ–иҝ‘жңҲпјү
  const fmt8to10 = s => s && s.length === 8 ? `${s.slice(0,4)}-${s.slice(4,6)}-${s.slice(6,8)}` : s;
  // far month
  if (data?.far_month?.settlement_date) {
    addMarker(fmt8to10(data.far_month.settlement_date), 'monthly', 'йҒ жңҲ TXO зөҗз®—', '#fca5a5');
  }
  // йҖұдёүйҖұйҒё
  if (data?.weekly_wed?.settlement_date) {
    addMarker(fmt8to10(data.weekly_wed.settlement_date), 'weekly_wed', 'йҖұдёүйҖұйҒёзөҗз®—', '#86efac');
  }
  if (data?.weekly_fri?.settlement_date) {
    addMarker(fmt8to10(data.weekly_fri.settlement_date), 'weekly_fri', 'йҖұдә”йҖұйҒёзөҗз®—', '#60a5fa');
  }
  // иҝ‘жңҲпјҲcurrent TXO monthпјүвҖ” з”Ё 3rd Wed of month иҝ‘дјј
  // current month settlement
  const _3rdWed = (y, m) => {
    const first = new Date(y, m, 1).getDay(); // 0=Sun
    let firstWed = (3 - first + 7) % 7 + 1;   // Wed = 3
    return firstWed + 14;
  };
  // mark current TXO month settlement (current viewing month)
  addMarker(`${yr}-${String(mo+1).padStart(2,'0')}-${String(_3rdWed(yr, mo)).padStart(2,'0')}`,
            'monthly', 'TXO жңҲйҒёзөҗз®—', '#fca5a5');

  // жёІжҹ“
  const cells = [];
  // padding for first row
  for (let i = 0; i < firstDow; i++) cells.push({ pad: true, key: `pad-${i}` });
  for (let d = 1; d <= daysInMonth; d++) {
    const ds = `${yr}-${String(mo+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const dow = new Date(yr, mo, d).getDay();
    const isToday = ds === today.toISOString().slice(0, 10);
    const isWeekend = dow === 0 || dow === 6;
    cells.push({ ds, d, dow, isToday, isWeekend, marks: markers[ds] || [], key: ds });
  }

  const monthLabel = `${yr} е№ҙ ${mo + 1} жңҲ`;
  return (
    <div style={{
      background:'#0a0e1c', border:'1px solid #1e2535',
      borderRadius:'6px', padding:'8px 12px', margin:'8px 0',
      fontSize:'11px', color:'#cbd5e1',
    }}>
      <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'6px'}}>
        <span style={{fontWeight:700, color:'#94a3b8'}}>рҹ“… иЎҢдәӢжӣҶ</span>
        <div style={{display:'flex', gap:'4px', alignItems:'center'}}>
          <button onClick={() => setMonthOffset(monthOffset - 1)}
                  style={{background:'transparent', border:'1px solid #334155', color:'#94a3b8',
                          padding:'1px 8px', borderRadius:'3px', cursor:'pointer', fontSize:'10px'}}>вҖ№</button>
          <span style={{fontSize:'12px', minWidth:'80px', textAlign:'center', color:'#cbd5e1'}}>{monthLabel}</span>
          <button onClick={() => setMonthOffset(monthOffset + 1)}
                  style={{background:'transparent', border:'1px solid #334155', color:'#94a3b8',
                          padding:'1px 8px', borderRadius:'3px', cursor:'pointer', fontSize:'10px'}}>вҖә</button>
          <button onClick={() => setMonthOffset(0)}
                  style={{background:'transparent', border:'1px solid #334155', color:'#94a3b8',
                          padding:'1px 8px', borderRadius:'3px', cursor:'pointer', fontSize:'10px',
                          marginLeft:'4px'}}>д»Ҡ</button>
        </div>
      </div>

      {/* Day-of-week header */}
      <div style={{display:'grid', gridTemplateColumns:'repeat(7, 1fr)', gap:'2px', marginBottom:'2px'}}>
        {['ж—Ҙ', 'дёҖ', 'дәҢ', 'дёү', 'еӣӣ', 'дә”', 'е…ӯ'].map(d => (
          <div key={d} style={{fontSize:'9px', color:'#64748b', textAlign:'center', padding:'2px 0'}}>{d}</div>
        ))}
      </div>

      {/* Calendar grid */}
      <div style={{display:'grid', gridTemplateColumns:'repeat(7, 1fr)', gap:'2px'}}>
        {cells.map(c => {
          if (c.pad) return <div key={c.key} />;
          const bg = c.isToday ? '#0f1828' : c.isWeekend ? '#070b15' : 'transparent';
          const dimColor = c.isWeekend ? '#475569' : '#cbd5e1';
          return (
            <div key={c.key} className="calendar-cell" style={{
              background: bg,
              border: c.isToday ? '1px solid #60a5fa' : '1px solid #1e2535',
              borderRadius: '3px',
            }}>
              <div style={{fontSize:'10px', color: dimColor, fontWeight: c.isToday ? 700 : 400}}>
                {c.d}
                {c.isToday && <span style={{fontSize:'8px', color:'#60a5fa', marginLeft:'2px'}}>д»Ҡ</span>}
              </div>
              {c.marks.length > 0 && (
                <div style={{marginTop:'2px', display:'flex', flexDirection:'column', gap:'1px'}}>
                  {c.marks.slice(0, 3).map((mk, i) => (
                    <div key={i} className="mark-text" title={mk.label} style={{
                      fontSize:'8px', color: mk.color,
                      borderLeft: `2px solid ${mk.color}`, paddingLeft:'3px',
                      whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis',
                    }}>
                      {mk.label.slice(0, 8)}
                    </div>
                  ))}
                </div>
              )}
            </div>
          );
        })}
      </div>

      {/* ең–дҫӢ */}
      <div style={{display:'flex', gap:'10px', flexWrap:'wrap', marginTop:'6px',
                    fontSize:'9px', color:'#64748b'}}>
        <span><span style={{color:'#fca5a5'}}>в”Ғ</span> TXO жңҲйҒёзөҗз®—</span>
        <span><span style={{color:'#86efac'}}>в”Ғ</span> йҖұдёүйҖұйҒё</span>
        <span><span style={{color:'#60a5fa'}}>в”Ғ</span> йҖұдә”йҖұйҒё</span>
        <span><span style={{color:'#fb923c'}}>в”Ғ</span> жңӘдҫҶй«ҳеҪұйҹҝдәӢд»¶</span>
        <span><span style={{color:'#86efac'}}>+%</span> / <span style={{color:'#fca5a5'}}>-%</span> йҒҺеҺ»дәӢд»¶ TX и®ҠеӢ•</span>
      </div>
    </div>
  );
}

function IVPercentile({ data }) {
  const ivp = data?.iv_percentile;
  if (!ivp || !ivp.enough_data) return null;
  const pct = ivp.percentile;
  const color = pct >= 85 ? '#fb923c' :
                pct >= 70 ? '#fbbf24' :
                pct >= 30 ? '#94a3b8' :
                pct >= 15 ? '#60a5fa' : '#a78bfa';
  // bar visualization
  const bars = [];
  for (let i = 0; i < 10; i++) {
    const lo = i * 10, hi = (i + 1) * 10;
    const filled = pct >= hi || (pct > lo && pct < hi);
    bars.push(
      <div key={i} style={{
        flex: 1, height: '8px', borderRadius: '1px',
        background: pct > lo && pct < hi ? color : (pct >= hi ? `${color}66` : '#1e2535'),
      }} />
    );
  }
  return (
    <div style={{
      background:'#0a0e1c', border:`1px solid ${color}33`,
      borderRadius:'6px', padding:'8px 12px', margin:'8px 0',
      fontSize:'11px', color:'#cbd5e1',
    }}>
      <div style={{display:'flex', justifyContent:'space-between', alignItems:'baseline', marginBottom:'4px'}}>
        <span style={{fontWeight:700, color:'#94a3b8'}}>рҹ“Ҡ IV зҷҫеҲҶдҪҚпјҲйҒҺеҺ» {ivp.lookback_days}dпјү</span>
        <span style={{fontSize:'9px', color:'#64748b'}}>n={ivp.history_n}</span>
      </div>
      <div style={{display:'flex', alignItems:'baseline', gap:'12px', marginBottom:'4px'}}>
        <span className="hero-num" style={{color}}>
          {ivp.current_iv_pct.toFixed(1)}%
        </span>
        <span className="primary-num" style={{color}}>
          @ {pct.toFixed(0)} pctile
        </span>
        <span style={{fontSize:'11px', color, padding:'1px 6px',
                      background:`${color}20`, border:`1px solid ${color}`, borderRadius:'3px'}}>
          {ivp.label}
        </span>
        <span style={{flex:1, fontSize:'10px', color:'#94a3b8', textAlign:'right'}}>
          {ivp.view}
        </span>
      </div>
      {/* 10 ж®өж°ҙе№і bar */}
      <div style={{display:'flex', gap:'2px'}}>{bars}</div>
      {/* min/median/max жЁҷе°ә */}
      <div style={{display:'flex', justifyContent:'space-between', fontSize:'9px', color:'#64748b', marginTop:'2px'}}>
        <span>жңҖдҪҺ {ivp.min_pct.toFixed(1)}%</span>
        <span>дёӯдҪҚ {ivp.median_pct.toFixed(1)}%</span>
        <span>жңҖй«ҳ {ivp.max_pct.toFixed(1)}%</span>
      </div>
    </div>
  );
}

function StressTest({ data }) {
  const [open, setOpen] = React.useState(false);
  const t = data?.portfolio_greeks?.totals;
  if (!t) return null;

  // 6 еҖӢй җиЁӯжғ…еўғпјҲдҫқжӯ·еҸІдәӢд»¶ + What-if з¶“й©—пјү
  const SCENARIOS = [
    { label: 'й»‘еӨ©йөқеҙ©и·Ң',     emoji: 'рҹҰў', tx: -15, iv: 30,  d: 1,
      note: '2008/2020 зҙҡе–®ж—ҘеӨ§и·Ң + IV жҡҙиЎқ' },
    { label: 'дәӢд»¶зӘҒзҷј',       emoji: 'вҡЎ', tx: -5,  iv: 15,  d: 1,
      note: 'зӘҒзҷјең°з·Ј / ж”ҝзӯ–ж„ҸеӨ–' },
    { label: 'жі•иӘӘ miss',      emoji: 'рҹ“ү', tx: -8,  iv: -10, d: 1,
      note: 'иІЎе ұе·®ж–јй җжңҹпјҢTX и·ҢдҪҶ IV crush' },
    { label: 'FOMC ж„ҸеӨ–',      emoji: 'рҹҸҰ', tx: -3,  iv: 20,  d: 1,
      note: 'й·№жҙҫж„ҸеӨ–пјҡTX и»ҹ + IV spike' },
    { label: 'зӣӨж•ҙжјӮз§»',       emoji: 'рҹҳҙ', tx: 0,   iv: -5,  d: 14,
      note: 'е…©йҖұж©«зӣӨ + IV з·©йҷҚпјҲtheta зҙ”жҲҗжң¬жңҹпјү' },
    { label: 'зүӣеёӮ melt-up',   emoji: 'рҹҡҖ', tx: 10,  iv: -10, d: 7,
      note: 'дёҖйҖұжҖҘжјІ + IV crush' },
  ];

  const fmtS = n => n == null ? 'вҖ”' : (n > 0 ? '+' : '') + Math.round(n).toLocaleString();
  const colN = n => n > 0 ? '#86efac' : n < 0 ? '#fca5a5' : '#94a3b8';

  const calc = (s) => {
    const dpl = (t.delta_ntd_per_1pct_tx || 0) * s.tx;
    const tpl = (t.theta_ntd_per_day      || 0) * s.d;
    const vpl = (t.vega_ntd_per_pct_iv    || 0) * s.iv;
    return { delta_pl: dpl, theta_pl: tpl, vega_pl: vpl, total: dpl + tpl + vpl };
  };

  const results = SCENARIOS.map(s => ({ ...s, ...calc(s) }))
                            .sort((a, b) => a.total - b.total);   // жңҖе·®е…ҲзңӢ

  return (
    <div style={{
      background: '#0a0e1c', border: '1px solid #1e2535',
      borderRadius: '6px', padding: '6px 12px', margin: '8px 0',
      fontSize: '11px', color: '#cbd5e1',
    }}>
      <div onClick={() => setOpen(!open)} style={{
        display:'flex', justifyContent:'space-between', alignItems:'center',
        cursor:'pointer', userSelect:'none',
      }}>
        <span style={{fontWeight:700, color:'#94a3b8'}}>
          рҹ’Ҙ Stress Test жғ…еўғеә«
        </span>
        <span style={{fontSize:'9px', color:'#64748b'}}>
          {results.length} жғ…еўғгҖҖ{open ? 'в–І ж”¶иө·' : 'в–ј еұ•й–Ӣи©Ұз®—'}
        </span>
      </div>

      {open && (
        <>
          <div style={{display:'flex', flexWrap:'wrap', gap:'6px', marginTop:'6px'}}>
            {results.map((s, i) => (
              <div key={i} style={{
                flex:'1 1 200px', minWidth:'180px',
                padding:'8px 10px',
                borderLeft: `3px solid ${colN(s.total)}`,
                background:'#070b15', borderRadius:'4px',
              }}>
                <div style={{display:'flex', justifyContent:'space-between', alignItems:'baseline'}}>
                  <span style={{fontSize:'12px', fontWeight:700}}>
                    {s.emoji} {s.label}
                  </span>

function PortfolioGreeks({ data }) {

  const colN = n => n > 0 ? '#86efac' : n < 0 ? '#fca5a5' : '#94a3b8';

  // Mini sparkline for theta history
  const Sparkline = ({ values, w = 80, h = 18, color = '#64748b' }) => {
    if (!values || values.length < 2) return null;
    const min = Math.min(...values), max = Math.max(...values);
    const range = max - min || 1;
    const pts = values.map((v, i) => {
      const x = (i / (values.length - 1)) * w;
      const y = h - ((v - min) / range) * h;
      return `${x.toFixed(1)},${y.toFixed(1)}`;
    }).join(' ');
    const zeroY = h - ((0 - min) / range) * h;
    return (
      <svg width={w} height={h} style={{verticalAlign:'middle'}}>
        {(min < 0 && max > 0) && (
          <line x1="0" y1={zeroY} x2={w} y2={zeroY} stroke="#1e2535" strokeWidth="0.5" />
        )}
        <polyline fill="none" stroke={color} strokeWidth="1.2" points={pts} />

    );

function DrawdownPanel({ data }) {
  const dd = data?.drawdown;
  if (!dd) return null;
  const cur = dd.current_dd_pct || 0;
  const sev = dd.severity || 'ok';
  const color = sev === 'critical' ? '#dc2626' :
                sev === 'high'     ? '#fb923c' :
                sev === 'medium'   ? '#fbbf24' :
                sev === 'low'      ? '#94a3b8' : '#4ade80';

  // Mini sparkline of equity DD% (last 30 days)
  const series = dd.series || [];
  const Sparkline = () => {
    if (series.length < 2) return null;
    const vals = series.map(s => s.dd_pct);
    const min = Math.min(...vals, -2);   // floor at -2 to keep some scale
    const max = Math.max(...vals, 0);
    const range = max - min || 1;
    const w = 120, h = 24;
    const pts = vals.map((v, i) => {
      const x = (i / (vals.length - 1)) * w;
      const y = h - ((v - min) / range) * h;
      return `${x.toFixed(1)},${y.toFixed(1)}`;
    }).join(' ');
    const zeroY = h - ((0 - min) / range) * h;
    return (
      <svg width={w} height={h} style={{verticalAlign:'middle'}}>
        <line x1="0" y1={zeroY} x2={w} y2={zeroY} stroke="#1e2535" strokeWidth="0.5" />
        <polyline fill="none" stroke={color} strokeWidth="1.2" points={pts} />

function IVHeatmap({ data }) {
  const [open, setOpen] = React.useState(false);
  const [metric, setMetric] = React.useState('iv');     // 'iv' / 'theta' / 'vega'
  const [side, setSide] = React.useState('put');        // theta/vega й ҲжҢҮе®ҡ put or call
  const tx = data?.market?.tx_futures;
  if (!tx) return null;

  // е»ә columnsпјҲжҜҸжңҲд»Ҫ/йҖұйҒёпјү
  const cols = [];
  if (data.weekly_wed) cols.push({
    label: `йҖұдёү ${data.weekly_wed.series || ''}`,
    dte:   data.weekly_wed.dte_trading || 5,
    iv:    data.weekly_wed.iv_used || 0.20,
    skew:  data.weekly_wed.skew || [],
  });
  if (data.weekly_fri) cols.push({
    label: `йҖұдә” ${data.weekly_fri.series || ''}`,
    dte:   data.weekly_fri.dte_trading || 8,
    iv:    data.weekly_fri.iv_used || 0.20,
    skew:  data.weekly_fri.skew || [],
  });
  cols.push({
    label: `иҝ‘жңҲ ${data.txo_month || ''}`,
    dte:   data.dte_trading || 30,
    iv:    data.iv_used || 0.20,
    skew:  [],
  });
  if (data.far_month) cols.push({
    label: `йҒ жңҲ ${data.far_month.txo_month || ''}`,
    dte:   data.far_month.dte_trading || 60,
    iv:    data.far_month.iv_used || 0.20,
    skew:  [],
  });

  // strike rows
  const atm = Math.round(tx / 100) * 100;
  const strikes = [];
  for (let i = 8; i >= -8; i--) strikes.push(atm - i * 100);   // top = highest strike
  // strikes[0] = atm + 800пјҲcall OTMпјү, strikes[16] = atm - 800пјҲput OTMпјү

  // IV per col
  const interpIV = (col, K) => {
    const skew = (col.skew || []).slice().sort((a, b) => a.strike - b.strike);
    if (skew.length === 0) return col.iv;
    if (K <= skew[0].strike) return skew[0].iv;
    if (K >= skew[skew.length - 1].strike) return skew[skew.length - 1].iv;
    for (let i = 0; i < skew.length - 1; i++) {
      const a = skew[i], b = skew[i + 1];
      if (K >= a.strike && K <= b.strike && b.strike > a.strike) {
        const t = (K - a.strike) / (b.strike - a.strike);
        return a.iv + t * (b.iv - a.iv);
      }
    }
    return col.iv;
  };

  // иЁҲз®— cell value дҫқ metric
  const cellValue = (col, K) => {
    const iv = interpIV(col, K);
    if (metric === 'iv') return iv * 100;
    const T = Math.max(1, col.dte) / 365;
    const isPut = side === 'put';
    const g = _bsGreeks(tx, K, T, iv, isPut);
    if (metric === 'theta') return g.theta_per_day * 50;   // NT$/day per contract
    if (metric === 'vega')  return g.vega_per_pct  * 50;   // NT$/1%IV per contract
    return 0;
  };

  const matrix = strikes.map(K => cols.map(c => cellValue(c, K)));
  const allVals = matrix.flat();
  let minV = Math.min(...allVals);
  let maxV = Math.max(...allVals);

  // For theta/vega: include 0 in scale to make sign visible
  if (metric !== 'iv') {
    if (minV > 0) minV = 0;
    if (maxV < 0) maxV = 0;
  }

  const fmtCell = (v) => {
    if (metric === 'iv') return v.toFixed(1);
    if (Math.abs(v) >= 1000) return Math.round(v).toLocaleString();
    return v.toFixed(0);
  };

  // йЎҸиүІеҮҪејҸ
  const cellColor = (v) => {
    if (metric === 'iv') {
      const t = (v - minV) / (maxV - minV || 1);
      if (t < 0.5) {
        const u = t * 2;
        return `rgba(${96+u*155},${165+u*26},${250+u*-214},0.5)`;
      } else {
        const u = (t - 0.5) * 2;
        return `rgba(251,${191+u*-45},${36+u*24},${0.5+u*0.3})`;
      }
    }
    // theta / vega: зҙ…и—Қе…©жҘөпјҲиІ зҙ…гҖҒжӯЈз¶ /и—ҚпјүпјҢ0 = зҒ°
    const range = Math.max(Math.abs(minV), Math.abs(maxV)) || 1;
    const t = v / range;   // -1 to 1
    if (t < 0) {
      const u = -t;   // 0..1
      return `rgba(252,165,165,${0.2 + u * 0.6})`;   // зҙ…иүІеј·еәҰ
    }
    const u = t;
    return `rgba(134,239,172,${0.2 + u * 0.6})`;   // з¶ иүІеј·еәҰ
  };

  // жҢҒеҖү
  const holdings = ((data?.portfolio_greeks?.legs) || []).reduce((m, L) => {
    if (L.right === 'put' || L.right === 'call') {
      const k = Math.round(L.strike / 100) * 100;
      m[k] = (m[k] || 0) + (L.qty_signed || 0);
    }
    return m;
  }, {});

  return (
    <div style={{
      background:'#0a0e1c', border:'1px solid #1e2535',
      borderRadius:'6px', padding:'8px 12px', margin:'8px 0',
      fontSize:'11px', color:'#cbd5e1',
    }}>
      <div onClick={() => setOpen(!open)} style={{
        display:'flex', justifyContent:'space-between', alignItems:'center',
        cursor:'pointer', userSelect:'none',
      }}>
        <span style={{fontWeight:700, color:'#94a3b8'}}>
          рҹҢЎпёҸ Greeks зҶұең–пјҲstrike Г— жңҲд»Ҫпјү
        </span>
        <span style={{fontSize:'9px', color:'#64748b'}}>
          {metric.toUpperCase()}{metric !== 'iv' ? ` В· ${side}` : ''}гҖҖ{open ? 'в–І' : 'в–ј'}
        </span>
      </div>

      {open && (
        <>
          {/* Metric toggle */}
          <div style={{display:'flex', gap:'4px', marginTop:'6px', flexWrap:'wrap'}}>
            {['iv', 'theta', 'vega'].map(m => (
              <button key={m} onClick={(e) => {e.stopPropagation(); setMetric(m);}} style={{
                background: metric === m ? '#0f1828' : 'transparent',
                border: metric === m ? '1px solid #60a5fa' : '1px solid #334155',
                color: metric === m ? '#60a5fa' : '#94a3b8',
                padding:'2px 10px', borderRadius:'3px', cursor:'pointer', fontSize:'10px',
              }}>{m === 'iv' ? 'IV %' : m === 'theta' ? 'Оё NT/еӨ©' : 'ОҪ NT/1%IV'}</button>
            ))}
            {metric !== 'iv' && (
              <>
                <span style={{padding:'2px 4px', color:'#64748b', fontSize:'10px'}}>|</span>
                {['put', 'call'].map(s => (
                  <button key={s} onClick={(e) => {e.stopPropagation(); setSide(s);}} style={{
                    background: side === s ? '#0f1828' : 'transparent',
                    border: side === s ? `1px solid ${s === 'put' ? '#fca5a5' : '#86efac'}` : '1px solid #334155',
                    color: side === s ? (s === 'put' ? '#fca5a5' : '#86efac') : '#94a3b8',
                    padding:'2px 10px', borderRadius:'3px', cursor:'pointer', fontSize:'10px',
                  }}>{s === 'put' ? 'Put' : 'Call'}</button>
                ))}
              </>
            )}
          </div>
          <div style={{overflowX:'auto', marginTop:'6px'}}>
            <table style={{width:'100%', borderCollapse:'collapse', fontSize:'10px', minWidth:'320px'}}>
              <thead>
                <tr style={{color:'#94a3b8'}}>
                  <th style={{padding:'4px 6px', textAlign:'left'}}>еұҘзҙ„</th>
                  {cols.map((c, i) => (
                    <th key={i} style={{padding:'4px 6px', textAlign:'center'}}>
                      <div>{c.label}</div>
                      <div style={{fontSize:'8px', color:'#64748b', fontWeight:400}}>
                        {c.dte}d В· ATM {(c.iv * 100).toFixed(1)}%
                      </div>
                    </th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {strikes.map((K, ri) => {
                  const isAtm = K === atm;
                  const held = holdings[K];
                  return (
                    <tr key={K} style={{borderBottom:'1px solid #1e2535'}}>
                      <td style={{padding:'3px 6px', fontWeight: isAtm ? 700 : 400,
                                   color: isAtm ? '#fbbf24' : '#cbd5e1'}}>
                        {K}
                        {held ? <span style={{marginLeft:'4px',
                                                color: held > 0 ? '#86efac' : '#fca5a5'}}>
                          вҳ…{held > 0 ? '+' : ''}{held}
                        </span> : null}
                        {isAtm && <span style={{marginLeft:'4px', fontSize:'8px', color:'#fbbf24'}}>ATM</span>}
                      </td>
                      {cols.map((c, ci) => {
                        const v = matrix[ri][ci];
                        return (
                          <td key={ci} style={{
                            padding:'3px 6px', textAlign:'center',
                            background: cellColor(v),
                            color: '#0a0e1c', fontWeight:600,
                          }}>
                            {fmtCell(v)}
                          </td>
                        );
                      })}
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>

          {/* color legend */}
          <div style={{display:'flex', alignItems:'center', gap:'4px', marginTop:'6px', justifyContent:'center'}}>
            <span style={{fontSize:'9px', color:'#64748b'}}>
              {metric === 'iv' ? `дҪҺ ${minV.toFixed(1)}%` : fmtCell(minV)}
            </span>
            <div style={{display:'flex', height:'8px', flex:'1 1 200px', maxWidth:'200px'}}>
              {Array.from({length: 20}, (_, i) => {
                const v = minV + (i / 19) * (maxV - minV);
                return <div key={i} style={{flex:1, background: cellColor(v)}} />;
              })}
            </div>
            <span style={{fontSize:'9px', color:'#64748b'}}>
              {metric === 'iv' ? `й«ҳ ${maxV.toFixed(1)}%` : fmtCell(maxV)}
            </span>
          </div>

          <div style={{fontSize:'9px', color:'#64748b', marginTop:'4px'}}>
            {metric === 'iv'
              ? 'е–®е…ғж ј IV%пјӣйҖұйҒёжңү skew е…§жҸ’пјҢжңҲйҒёз”Ё ATM IV е№іж”Ө'
              : metric === 'theta'
                ? `е–®е…ғж ј Оё NT$/еӨ© per ${side === 'put' ? 'Put' : 'Call'} 1 еҸЈпјҲиІ =й•·йғЁдҪҚиҖ—жҗҚпјӣBS дј°з®—пјү`
                : `е–®е…ғж ј ОҪ NT$ per 1% IV per ${side === 'put' ? 'Put' : 'Call'} 1 еҸЈпјҲBS дј°з®—пјү`}
            гҖӮвҳ… жҢҒеҖүеұҘзҙ„пјҢTX ж•ҙзҷҫиЎҢпјҲ{atm}пјүжЁҷ ATM
          </div>
        </>
      )}
    </div>
  );
}

function IVSmile({ data }) {
  const tx = data?.market?.tx_futures;
  const skewWed = (data?.weekly_wed?.skew || []).slice().sort((a,b) => a.strike - b.strike);
  const skewFri = (data?.weekly_fri?.skew || []).slice().sort((a,b) => a.strike - b.strike);
  if (!tx || (skewWed.length < 3 && skewFri.length < 3)) return null;

  // жҢҒеҖүеұҘзҙ„
  const holdings = ((data?.portfolio_greeks?.legs) || [])
    .filter(L => L.right === 'put' || L.right === 'call')
    .map(L => ({ strike: L.strike, qty: L.qty_signed, right: L.right }));

  const allStrikes = [...skewWed.map(s => s.strike), ...skewFri.map(s => s.strike)];
  const xMin = Math.min(...allStrikes, tx - 200);
  const xMax = Math.max(...allStrikes, tx + 200);
  const allIvs = [...skewWed.map(s => s.iv), ...skewFri.map(s => s.iv)];
  const yMin = Math.min(...allIvs) * 100 - 1;
  const yMax = Math.max(...allIvs) * 100 + 1;
  const xRange = xMax - xMin;
  const yRange = yMax - yMin || 1;

  const W = 320, H = 160;
  const padL = 36, padR = 12, padT = 12, padB = 22;
  const innerW = W - padL - padR, innerH = H - padT - padB;
  const px = (s) => padL + ((s - xMin) / xRange) * innerW;
  const py = (iv_pct) => padT + ((yMax - iv_pct) / yRange) * innerH;

  const polyOf = (skew, color) => {
    if (skew.length < 2) return null;
    const pts = skew.map(s => `${px(s.strike).toFixed(1)},${py(s.iv * 100).toFixed(1)}`).join(' ');
    return <polyline fill="none" stroke={color} strokeWidth="1.5" points={pts} />;
  };

  return (
    <div style={{
      background:'#0a0e1c', border:'1px solid #1e2535',
      borderRadius:'6px', padding:'8px 12px', margin:'8px 0',
      fontSize:'11px', color:'#cbd5e1',
    }}>
      <div style={{display:'flex', justifyContent:'space-between', alignItems:'baseline', marginBottom:'4px'}}>
        <span style={{fontWeight:700, color:'#94a3b8'}}>рҹҳҠ IV Smile</span>
        <span style={{fontSize:'9px', color:'#64748b'}}>
          ATM TX {Math.round(tx).toLocaleString()}
        </span>
      </div>
      <svg viewBox={`0 0 ${W} ${H}`} preserveAspectRatio="none"
           style={{width:'100%', height:`${H}px`, display:'block'}}>
        {/* Y axis labels */}
        <text x="2" y={padT + 6} fontSize="9" fill="#64748b">{yMax.toFixed(0)}%</text>
        <text x="2" y={H - padB} fontSize="9" fill="#64748b">{yMin.toFixed(0)}%</text>
        {/* Border */}
        <rect x={padL} y={padT} width={innerW} height={innerH} fill="none" stroke="#1e2535" strokeWidth="0.5" />
        {/* ATM vertical line */}
        <line x1={px(tx)} y1={padT} x2={px(tx)} y2={padT + innerH}
              stroke="#fbbf24" strokeWidth="0.8" strokeDasharray="3,3" />
        <text x={px(tx) + 2} y={padT + 10} fontSize="9" fill="#fbbf24">ATM</text>
        {/* Smile curves */}
        {polyOf(skewWed, '#86efac')}
        {polyOf(skewFri, '#7dd3fc')}
        {/* Holding markers */}
        {holdings.map((h, i) => {
          // жүҫ skew е…§жҸ’зҡ„ IV жЁҷдҪҚзҪ®
          const skew = skewWed.length >= 2 ? skewWed : skewFri;
          if (skew.length < 2) return null;
          let iv = skew[0].iv;
          if (h.strike <= skew[0].strike) iv = skew[0].iv;
          else if (h.strike >= skew[skew.length-1].strike) iv = skew[skew.length-1].iv;
          else for (let j = 0; j < skew.length - 1; j++) {
            const a = skew[j], b = skew[j+1];
            if (h.strike >= a.strike && h.strike <= b.strike && b.strike > a.strike) {
              iv = a.iv + (h.strike - a.strike)/(b.strike - a.strike) * (b.iv - a.iv);
              break;
            }
          }
          const cx = px(h.strike), cy = py(iv * 100);
          const color = h.qty > 0 ? '#86efac' : '#fca5a5';
          return (
            <g key={i}>
              <circle cx={cx} cy={cy} r="3.5" fill={color} stroke="#0a0e1c" strokeWidth="1" />
              <text x={cx} y={cy - 6} fontSize="8" fill={color} textAnchor="middle">
                {h.qty > 0 ? '+' : ''}{h.qty}
              </text>
            </g>
          );
        })}
        {/* X axis labels */}
        <text x={padL} y={H - 6} fontSize="9" fill="#64748b">{Math.round(xMin).toLocaleString()}</text>
        <text x={padL + innerW} y={H - 6} fontSize="9" fill="#64748b" textAnchor="end">{Math.round(xMax).toLocaleString()}</text>
      </svg>
      <div style={{display:'flex', gap:'12px', flexWrap:'wrap', fontSize:'9px', color:'#94a3b8',
                    marginTop:'2px', justifyContent:'center'}}>
        {skewWed.length >= 2 && (
          <span><span style={{display:'inline-block', width:'12px', height:'2px',
                              background:'#86efac', marginRight:'4px', verticalAlign:'middle'}} />
                йҖұдёүйҖұйҒё (n={skewWed.length})</span>
        )}
        {skewFri.length >= 2 && (
          <span><span style={{display:'inline-block', width:'12px', height:'2px',
                              background:'#7dd3fc', marginRight:'4px', verticalAlign:'middle'}} />
                йҖұдә”йҖұйҒё (n={skewFri.length})</span>
        )}
        {holdings.length > 0 && (
          <span><span style={{display:'inline-block', width:'8px', height:'8px',
                              background:'#86efac', borderRadius:'50%', marginRight:'4px',
                              verticalAlign:'middle'}} />
                жҢҒеҖү {holdings.length} и…і</span>
        )}
      </div>
      <div style={{fontSize:'9px', color:'#64748b', marginTop:'2px'}}>
        е·ҰдёӢеӮҫж–ң = put й«ҳ volпјҲе…ёеһӢеҸ°иӮЎ skewпјүпјӣеҸідёҠеҮ№ = call й«ҳ volпјӣе°ҚзЁұ = U еһӢ smile
      </div>
    </div>
  );
}

function TxoChainGrid({ data }) {
  const [open, setOpen] = React.useState(false);
  const tx  = data?.market?.tx_futures;
  const dte = data?.dte_trading || 30;
  const iv  = data?.iv_used || 0.20;
  if (!tx) return null;

  const T = dte / 365;
  const sqrtT = Math.sqrt(T);
  const atm = Math.round(tx / 100) * 100;

  // з”Ёиҝ‘жңҲ / йҖұйҒё skew е…§жҸ’ IVпјҲfallback еҲ° ATM IVпјү
  const skew = (data?.weekly_wed?.skew || data?.weekly_fri?.skew || []).slice().sort((a,b) => a.strike - b.strike);
  const interpIV = (K) => {
    if (skew.length === 0) return iv;
    if (K <= skew[0].strike) return skew[0].iv;
    if (K >= skew[skew.length - 1].strike) return skew[skew.length - 1].iv;
    for (let i = 0; i < skew.length - 1; i++) {
      const a = skew[i], b = skew[i + 1];
      if (K >= a.strike && K <= b.strike && b.strike > a.strike) {
        const t = (K - a.strike) / (b.strike - a.strike);
        return a.iv + t * (b.iv - a.iv);
      }
    }
    return iv;
  };

  // жҢҒеҖү mapping
  const legs = (data?.portfolio_greeks?.legs) || [];
  const holdings = {};
  for (const L of legs) {
    if ((L.right === 'put' || L.right === 'call') && L.strike) {
      holdings[`${L.right}_${L.strike}`] = (holdings[`${L.right}_${L.strike}`] || 0) + (L.qty_signed || 0);
    }
  }

  const N = 10;
  const putStrikes  = []; for (let i = N; i >= 1; i--) putStrikes.push(atm - i * 100);
  const callStrikes = []; for (let i = 1; i <= N; i++) callStrikes.push(atm + i * 100);

  const computeRow = (K, isPut) => {
    const ivK = interpIV(K);
    const d1 = (Math.log(tx / K) + 0.5 * ivK * ivK * T) / (ivK * sqrtT);
    const d2 = d1 - ivK * sqrtT;
    const delta = isPut ? (_normCdf(d1) - 1) : _normCdf(d1);
    const price = isPut
      ? K * _normCdf(-d2) - tx * _normCdf(-d1)
      : tx * _normCdf(d1) - K * _normCdf(d2);
    const held = holdings[`${isPut ? 'put' : 'call'}_${K}`] || 0;
    return { K, delta, price, ivK, held };
  };

  const Row = ({ row, isPut }) => {
    const c = isPut ? '#fca5a5' : '#86efac';
    const heldStr = row.held ? `${row.held > 0 ? '+' : ''}${row.held}еҸЈ` : '';
    const heldColor = row.held > 0 ? '#86efac' : row.held < 0 ? '#fca5a5' : '';
    return (
      <tr style={{
        background: row.held ? '#0f1828' : 'transparent',
        borderBottom: '1px solid #1e2535',
      }}>
        <td style={{padding:'2px 6px', color:'#cbd5e1', fontWeight: row.held ? 700 : 400}}>
          {row.K} {row.held ? 'вҳ…' : ''}
        </td>
        <td style={{padding:'2px 6px', textAlign:'right', color: c}}>
          {row.delta.toFixed(2)}
        </td>
        <td style={{padding:'2px 6px', textAlign:'right', color:'#cbd5e1'}}>
          {Math.round(row.price)}
        </td>
        <td style={{padding:'2px 6px', textAlign:'right', color:'#64748b', fontSize:'9px'}}>
          {(row.ivK * 100).toFixed(1)}%
        </td>
        <td style={{padding:'2px 6px', textAlign:'right', color: heldColor, fontSize:'10px', minWidth:'40px'}}>
          {heldStr}
        </td>
      </tr>
    );
  };

  return (
    <div style={{
      background:'#0a0e1c', border:'1px solid #1e2535',
      borderRadius:'6px', padding:'8px 12px', margin:'8px 0',
      fontSize:'11px', color:'#cbd5e1',
    }}>
      <div onClick={() => setOpen(!open)} style={{
        display:'flex', justifyContent:'space-between', alignItems:'center',
        cursor:'pointer', userSelect:'none',
      }}>
        <span style={{fontWeight:700, color:'#94a3b8'}}>
          рҹ”— TXO еұҘзҙ„йҸҲпјҲATM Вұ{N} жӘ”пјү
        </span>
        <span style={{fontSize:'9px', color:'#64748b'}}>
          ATM {atm} В· DTE {dte}d В· {open ? 'в–І' : 'в–ј'}
        </span>
      </div>

      {open && (
        <>
          <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:'8px', marginTop:'6px'}}>
            <div>
              <div style={{fontSize:'10px', color:'#fca5a5', fontWeight:700, marginBottom:'2px'}}>
                рҹ“ү OTM PutпјҲеұҘзҙ„ &lt; TXпјү
              </div>
              <table style={{width:'100%', borderCollapse:'collapse', fontSize:'10px'}}>
                <thead>
                  <tr style={{color:'#64748b', textAlign:'right', fontSize:'9px'}}>
                    <th style={{textAlign:'left', padding:'2px 6px'}}>еұҘзҙ„</th>
                    <th>О”</th><th>еғ№</th><th>IV</th><th>жҢҒеҖү</th>
                  </tr>
                </thead>
                <tbody>
                  {putStrikes.map(K => <Row key={K} row={computeRow(K, true)} isPut={true} />)}
                </tbody>
              </table>
            </div>
            <div>
              <div style={{fontSize:'10px', color:'#86efac', fontWeight:700, marginBottom:'2px'}}>
                рҹ“Ҳ OTM CallпјҲеұҘзҙ„ &gt; TXпјү
              </div>
              <table style={{width:'100%', borderCollapse:'collapse', fontSize:'10px'}}>
                <thead>
                  <tr style={{color:'#64748b', textAlign:'right', fontSize:'9px'}}>
                    <th style={{textAlign:'left', padding:'2px 6px'}}>еұҘзҙ„</th>
                    <th>О”</th><th>еғ№</th><th>IV</th><th>жҢҒеҖү</th>
                  </tr>
                </thead>
                <tbody>
                  {callStrikes.map(K => <Row key={K} row={computeRow(K, false)} isPut={false} />)}
                </tbody>
              </table>
            </div>
          </div>
          <div style={{textAlign:'center', fontSize:'10px', color:'#fbbf24', marginTop:'6px',
                        padding:'4px', background:'#0f1828', borderRadius:'3px'}}>
            в”Җв”Җв”Җ ATM TX {tx?.toFixed(0)} в”Җв”Җв”Җ
          </div>
          <div style={{fontSize:'9px', color:'#64748b', marginTop:'4px'}}>
            BS дј°еғ№пјҲз”Ё skew е…§жҸ’зҡ„ IVпјҢйқһзңҹеҜҰ quoteпјүпјӣвҳ… жЁҷиЁҳжҢҒеҖү
          </div>
        </>
      )}
    </div>
  );
}

function PutRefsBar({ price, refs }) {
  if (!price || !refs) return null;
  const items = [];
  if (refs.bb_d_low   != null) items.push({ name:'ж—ҘдёӢ',  v:refs.bb_d_low,   c:'#10b981' });
  if (refs.bb_60m_low != null) items.push({ name:'60MдёӢ', v:refs.bb_60m_low, c:'#22c55e' });
  if (refs.bb_30m_low != null) items.push({ name:'30MдёӢ', v:refs.bb_30m_low, c:'#86efac' });
  if (refs.ma10       != null) items.push({ name:'10ж—Ҙ',  v:refs.ma10,        c:'#94a3b8' });
  if (refs.bb_30m_mid != null) items.push({ name:'30Mдёӯ', v:refs.bb_30m_mid, c:'#fbbf24' });
  if (refs.bb_60m_mid != null) items.push({ name:'60Mдёӯ', v:refs.bb_60m_mid, c:'#fb923c' });
  if (refs.bb_d_mid   != null) items.push({ name:'ж—Ҙдёӯ',  v:refs.bb_d_mid,   c:'#f97316' });
  if (items.length === 0) return null;
  items.forEach(i => { i.pct = (i.v - price) / price * 100; });
  items.push({ name:'зҸҫеғ№', v:price, pct:0, c:'#fde047', big:true });

  const pcts = items.map(i => i.pct);
  const minP = Math.min(...pcts), maxP = Math.max(...pcts);
  const pad = ((maxP - minP) || 2) * 0.2;
  const aMin = minP - pad, aMax = maxP + pad;
  const x = p => ((p - aMin) / (aMax - aMin)) * 100;

  // жЁҷзұӨйҳІж’һпјҡеҗҢ side+row е…§иӢҘ x и·қйӣў < LABEL_W иҰ–зӮәйҮҚз–ҠпјҢеҫҖдёӢдёҖеҖӢ row жҺЁ
  const LABEL_W = 16; // дј°жҜҸеҖӢжЁҷзұӨзҙ„дҪ”е®№еҷЁ 16%
  const sorted = [...items].map(it => ({...it, xp: x(it.pct)})).sort((a,b) => a.xp - b.xp);
  sorted.forEach((it, idx) => {
    const preferred = idx % 2 === 0 ? ['above','below'] : ['below','above'];
    let placed = false;
    for (let row = 0; row < 6 && !placed; row++) {
      for (const side of preferred) {
        const overlap = sorted.some(o => o !== it && o.side != null
          && o.side === side && o.row === row
          && Math.abs(o.xp - it.xp) < LABEL_W);
        if (!overlap) { it.side = side; it.row = row; placed = true; break; }
      }
    }
    if (!placed) { it.side = 'above'; it.row = 0; }
  });
  const maxRow = Math.max(...sorted.map(it => it.row));
  const ROW_H = 22;            // жҜҸ row й«ҳеәҰпјҲpxпјү
  const AXIS_GAP = 10;         // дёӯи»ёеҲ°з¬¬дёҖеҖӢ row зҡ„и·қйӣў
  const halfH = AXIS_GAP + (maxRow + 1) * ROW_H + 4;
  const totalH = halfH * 2;

  const fmtV = v => Number.isInteger(v) ? v.toLocaleString() : Math.round(v).toLocaleString();

  return (
    <div style={{padding:'8px 12px 12px', marginTop:'6px', background:'#070b15', borderRadius:4, borderLeft:'3px solid #60a5fa'}}>
      <div style={{display:'flex', alignItems:'baseline', gap:8, marginBottom:4}}>
        <span style={{color:'#60a5fa', fontWeight:700, fontSize:12}}>рҹ“ү Put йҖІе ҙеҸғиҖғз·ҡ</span>
        <span style={{color:'#64748b', fontSize:10}}>TX {fmtV(price)} В· и¶Ҡиҝ‘зҸҫеғ№и¶ҠеҒҸз©ә</span>
      </div>
      <div style={{position:'relative', height: totalH, marginTop:4, marginBottom:4}}>
        <div style={{position:'absolute', left:0, right:0, top:'50%', height:1, background:'#1e293b'}} />
        <div style={{position:'absolute', left:`${x(0)}%`, top:`calc(50% - 8px)`, height:'16px', width:1, background:'#475569'}} />
        {sorted.map((it, idx) => {
          const isAbove = it.side === 'above';
          const offset = AXIS_GAP + it.row * ROW_H;
          const labelStyle = {
            position:'absolute',
            [isAbove ? 'bottom' : 'top']: `calc(50% + ${offset}px)`,
            textAlign:'center', whiteSpace:'nowrap',
            transform:'translateX(-50%)', left:'50%'
          };
          // йҖЈжҺҘз·ҡпјҡеҫһең“й»һе»¶дјёеҲ° labelпјҢж–№дҫҝиҫЁиӘҚеұ¬ж–је“ӘеҖӢй»һ
          const connectorStyle = {
            position:'absolute',
            left:'50%',
            width:1,
            background:`${it.c}55`,
            [isAbove ? 'bottom' : 'top']: `calc(50% + ${it.big ? 5 : 4}px)`,
            height: `${offset - (it.big ? 5 : 4)}px`,
            transform:'translateX(-50%)'
          };
          return (
            <div key={idx} style={{position:'absolute', left:`${it.xp}%`, top:0, bottom:0, transform:'translateX(-50%)'}}>
              {it.row > 0 && <div style={connectorStyle} />}
              <div style={labelStyle}>
                <div style={{fontSize:9, color:it.c, fontWeight: it.big?700:500, lineHeight:1.2}}>{it.name}</div>
                <div style={{fontSize:8, color:'#64748b', lineHeight:1.2}}>
                  {fmtV(it.v)}{!it.big && <span style={{color:it.pct>=0?'#fca5a5':'#86efac', marginLeft:2}}>({it.pct>=0?'+':''}{it.pct.toFixed(2)}%)</span>}
                </div>
              </div>
              <div style={{width:it.big?10:7, height:it.big?10:7, borderRadius:'50%', background:it.c,
                           boxShadow: it.big ? `0 0 0 2px ${it.c}40` : 'none',
                           position:'absolute', top:'50%', left:'50%', transform:'translate(-50%,-50%)'}}/>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function RangeThermometer({ label, accent, price, ind, tx, putStrike, callStrike, futNear, futNearMonth, isStock = false }) {
  if (!price || !ind) return null;
  const items = [];
  if (ind.bb_lower != null) items.push({ name:'BBвҶ“',  v:ind.bb_lower, pct:(ind.bb_lower-price)/price*100, c:'#22c55e' });
  if (ind.ma20     != null) items.push({ name:'MA20', v:ind.ma20,     pct:(ind.ma20    -price)/price*100, c:'#94a3b8' });
  if (ind.bb_upper != null) items.push({ name:'BBвҶ‘',  v:ind.bb_upper, pct:(ind.bb_upper-price)/price*100, c:'#ef4444' });
  // strikes жҳҜ TX й»һдҪҚпјҢз”Ё tx з•¶еҹәжә–
  if (putStrike  != null && tx) items.push({ name:'Put',  v:putStrike,  pct:(putStrike -tx)/tx*100, c:'#86efac' });
  if (callStrike != null && tx) items.push({ name:'Call', v:callStrike, pct:(callStrike-tx)/tx*100, c:'#fbbf24' });
  // жңҹиІЁиҝ‘жңҲпјҲи·ҹзҸҫиӮЎеҗҢе–®дҪҚпјҢзӣҙжҺҘжӢҝ price жҜ”пјү
  if (futNear != null) {
    const futLabel = futNearMonth ? `жңҹ${String(futNearMonth).slice(4,6)}` : 'жңҹиҝ‘';
    items.push({ name: futLabel, v: futNear, pct: (futNear - price) / price * 100, c: '#38bdf8' });
  }
  items.push({ name:'зҸҫеғ№', v:price, pct:0, c:'#fbbf24', big:true });
  if (items.length <= 1) return null;

  const pcts = items.map(i => i.pct);
  const minP = Math.min(...pcts), maxP = Math.max(...pcts);
  const pad = ((maxP - minP) || 4) * 0.15;
  const aMin = minP - pad, aMax = maxP + pad;
  const x = p => ((p - aMin) / (aMax - aMin)) * 100;

  // жЁҷзұӨйҳІж’һпјҡеҗҢ side+row е…§иӢҘ x и·қйӣў < LABEL_W иҰ–зӮәйҮҚз–ҠпјҢеҫҖдёӢдёҖеҖӢ row жҺЁ
  const LABEL_W = 14;
  const sorted = [...items].map(it => ({...it, xp: x(it.pct)})).sort((a,b) => a.xp - b.xp);
  sorted.forEach((it, idx) => {
    const preferred = idx % 2 === 0 ? ['above','below'] : ['below','above'];
    let placed = false;
    for (let row = 0; row < 6 && !placed; row++) {
      for (const side of preferred) {
        const overlap = sorted.some(o => o !== it && o.side != null
          && o.side === side && o.row === row
          && Math.abs(o.xp - it.xp) < LABEL_W);
        if (!overlap) { it.side = side; it.row = row; placed = true; break; }
      }
    }
    if (!placed) { it.side = 'above'; it.row = 0; }
  });
  const maxRow = Math.max(...sorted.map(it => it.row));
  const ROW_H = 24;
  const AXIS_GAP = 12;
  const halfH = AXIS_GAP + (maxRow + 1) * ROW_H + 4;
  const totalH = halfH * 2;
  const fmtV = v => Number.isInteger(v) ? v.toLocaleString() : v.toFixed(2);

  return (
    <div style={{padding:'10px 14px 14px', borderLeft:`3px solid ${accent}`, marginBottom:'10px', background:'#070b15', borderRadius:4}}>
      <div style={{display:'flex', alignItems:'baseline', gap:8, marginBottom:6}}>
        <span style={{color: accent, fontWeight:700, fontSize:13}}>{label}</span>
        <span style={{color:'#94a3b8', fontSize:12}}>зҸҫеғ№ {fmtV(price)}</span>
        {tx && !isStock && <span style={{color:'#475569', fontSize:10, marginLeft:'auto'}}>strike vs TX {Math.round(tx).toLocaleString()}</span>}
        {tx &&  isStock && <span style={{color:'#475569', fontSize:10, marginLeft:'auto'}}>strike vs TX {Math.round(tx).toLocaleString()}</span>}
      </div>
      <div style={{position:'relative', height: totalH, marginTop:6, marginBottom:6}}>
        <div style={{position:'absolute', left:0, right:0, top:'50%', height:2, background:'#1e293b', borderRadius:1}} />
        <div style={{position:'absolute', left:`${x(0)}%`, top:`calc(50% - 8px)`, height:'16px', width:1, background:'#475569'}} />
        {sorted.map((it, idx) => {
          const isAbove = it.side === 'above';
          const offset = AXIS_GAP + it.row * ROW_H;
          const labelStyle = {
            position:'absolute',
            [isAbove ? 'bottom' : 'top']: `calc(50% + ${offset}px)`,
            textAlign:'center', whiteSpace:'nowrap',
            transform:'translateX(-50%)', left:'50%'
          };
          const connectorStyle = {
            position:'absolute',
            left:'50%',
            width:1,
            background:`${it.c}55`,
            [isAbove ? 'bottom' : 'top']: `calc(50% + ${it.big ? 6 : 5}px)`,
            height: `${offset - (it.big ? 6 : 5)}px`,
            transform:'translateX(-50%)'
          };
          return (
            <div key={idx} style={{position:'absolute', left:`${it.xp}%`, top:0, bottom:0, transform:'translateX(-50%)'}}>
              {it.row > 0 && <div style={connectorStyle} />}
              <div style={labelStyle}>
                <div style={{fontSize:10, color:it.c, fontWeight: it.big ? 700 : 500, lineHeight:1.2}}>{it.name}</div>
                <div style={{fontSize:9, color:'#94a3b8', lineHeight:1.2}}>
                  {fmtV(it.v)}
                  {!it.big && <span style={{color:it.pct>=0?'#fca5a5':'#86efac', marginLeft:3}}>({it.pct>=0?'+':''}{it.pct.toFixed(1)}%)</span>}
                </div>
              </div>
              <div style={{width: it.big?12:9, height: it.big?12:9, borderRadius:'50%', background:it.c,
                           boxShadow: it.big ? `0 0 0 3px ${it.c}40` : 'none', position:'absolute', top:'50%', left:'50%', transform:'translate(-50%,-50%)'}}/>
            </div>
          );
        })}
      </div>
      {/* HV / ADX ж‘ҳиҰҒ */}
      <div style={{display:'flex', gap:14, fontSize:11, color:'#64748b', marginTop:4}}>
        {ind.hv != null && <span>HV <span style={{color:'#cbd5e1', fontWeight:600}}>{(ind.hv*100).toFixed(1)}%</span></span>}
        {ind.adx != null && <span>ADX <span style={{color:'#cbd5e1', fontWeight:600}}>{ind.adx.toFixed(1)}</span></span>}
        {ind.atr != null && <span>ATR <span style={{color:'#cbd5e1', fontWeight:600}}>{Math.round(ind.atr).toLocaleString()}</span></span>}
      </div>
    </div>
  );
}

function TrimAddSOP({ s }) {
  if (!s || s.price == null) return <div style={{padding:'12px', color:'#94a3b8', fontSize:11}}>иіҮж–ҷдёҚи¶іпјҲйңҖ 60 ж—Ҙ Kпјү</div>;

  const mode         = s.trim_mode || 'single';   // single / tiered / single_full / signal_full
  const trimDist     = s.trim_threshold ? ((s.trim_threshold - s.price) / s.price) * 100 : null;
  const trimDist2    = s.trim_threshold_2 ? ((s.trim_threshold_2 - s.price) / s.price) * 100 : null;
  const addDist      = s.add_level ? ((s.add_level - s.price) / s.price) * 100 : null;
  // trim еӨ§е°Ҹпјҡtiered з¬¬дёҖйҡҺз”Ё 50%гҖҒе…¶д»–з”Ё trim_size_pct
  const trimSize1Pct = mode === 'tiered' ? (s.trim_size_pct || 50) : (s.trim_size_pct || 100);
  const trimLots1    = s.lots_held * trimSize1Pct / 100;
  const trimReleased = s.lot_size * trimLots1 * s.price;
  const fullNotional = s.lot_size * s.lots_held * s.price;
  const pnlPerLot    = s.cost_basis ? (s.price - s.cost_basis) * s.lot_size : null;
  const totalPnl     = pnlPerLot != null ? pnlPerLot * s.lots_held : null;

  // еӢ•дҪңеҲӨе®ҡ
  const tier2Triggered = s.trim_triggered_2 === true;

  const trimNow        = tier2Triggered || tier1Triggered;

function WeeklyICSOP({ data }) {
  // Weekly Iron Condor SOP вҖ” 8/8 regime йғҪжӯЈе ұй…¬пјҢе№ҙеҢ– +5-25%
  const tx     = data?.market?.tx_futures;
  const wedDte = data?.weekly_wed?.dte;
  const wedIv  = data?.weekly_wed?.iv_used ?? data?.iv_used;
  const wedMonth = data?.weekly_wed?.txo_month;
  const ivPctile = data?.iv_percentile?.current_pct;

  if (!tx || wedDte == null) {
    return <div style={{padding:'12px', color:'#94a3b8', fontSize:11}}>зӯүеҫ…йҖұдёүйҖұйҒёиіҮж–ҷвҖҰ</div>;
  }

  // BS-derived еұҘзҙ„еғ№пјҲshort delta 0.20гҖҒlong delta 0.10пјү
  const Z = { 0.10: 1.282, 0.20: 0.842 };
  const sigma = wedIv || 0.25;
  const T = Math.max(wedDte, 1) / 252;
  const sigT = sigma * Math.sqrt(T);
  const drift = sigma * sigma * T / 2;
  const roundS = v => Math.round(v / 100) * 100;
  const K_sc = roundS(tx * Math.exp(Z[0.20] * sigT + drift));   // short call Оҙ +0.20
  const K_bc = roundS(tx * Math.exp(Z[0.10] * sigT + drift));   // long call Оҙ +0.10
  const K_sp = roundS(tx * Math.exp(-Z[0.20] * sigT + drift));  // short put Оҙ -0.20
  const K_bp = roundS(tx * Math.exp(-Z[0.10] * sigT + drift));  // long put Оҙ -0.10
  // BS premium дј°з®—пјҲз°ЎеҢ–пјү
  const N = x => 0.5 * (1 + (function(t){
    const a1 =  0.254829592, a2 = -0.284496736, a3 =  1.421413741;
    const a4 = -1.453152027, a5 =  1.061405429, p = 0.3275911;
    const sign = t >= 0 ? 1 : -1;
    t = Math.abs(t) / Math.sqrt(2);
    const k = 1.0 / (1.0 + p*t);
    const y = 1.0 - (((((a5*k + a4)*k) + a3)*k + a2)*k + a1)*k * Math.exp(-t*t);
    return sign * y;
  })(x));
  const bsCall = (S, K) => {
    const d1 = (Math.log(S/K) + drift) / sigT;
    const d2 = d1 - sigT;
    return S*N(d1) - K*N(d2);
  };
  const bsPut = (S, K) => {
    const d1 = (Math.log(S/K) + drift) / sigT;
    const d2 = d1 - sigT;
    return K*N(-d2) - S*N(-d1);
  };
  const sc = bsCall(tx, K_sc), bc = bsCall(tx, K_bc);
  const sp = bsPut(tx, K_sp), bp = bsPut(tx, K_bp);
  const credit = (sc - bc) + (sp - bp);
  const widthCall = K_bc - K_sc;
  const widthPut = K_sp - K_bp;
  const maxWidth = Math.max(widthCall, widthPut);
  const maxLoss = maxWidth - credit;
  const creditNT = credit * 50;
  const maxLossNT = maxLoss * 50;

  // зӢҖж…ӢеҲӨе®ҡ
  const isBuildDay = wedDte >= 4 && wedDte <= 6;   // е»әе–®з”ңиңңй»һ 4-5 еӨ©
  const isCloseoutDay = wedDte <= 1;
  const ivBranch = ivPctile == null
    ? null
    : ivPctile > 60 ? 'high' : ivPctile >= 40 ? 'mid' : 'low';
  const ivAction = ivBranch === 'high' ? 'е»ә 2-3 еҸЈпјҲй«ҳ vol иіәжӣҙеӨҡпјү'
                : ivBranch === 'mid'  ? 'е»ә 1-2 еҸЈ'
                : ivBranch === 'low'  ? 'вҡ  и·ійҒҺпјҲIV еӨӘдҪҺпјү'
                : 'й җиЁӯ 1 еҸЈпјҲжІ’ PR иіҮж–ҷпјү';

  const Row = ({ label, value, hint, color }) => (
    <div style={{display:'flex', justifyContent:'space-between', padding:'3px 0',
                 borderBottom:'1px dashed #1e293b', fontSize:11}}>
      <span style={{color:'#94a3b8'}}>{label}</span>
      <span style={{color: color || '#e2e8f0', fontWeight: 600}}>
        {value}
        {hint && <span style={{color:'#64748b', fontSize:10, marginLeft:6}}>{hint}</span>}
      </span>
    </div>
  );

  return (
    <div style={{padding:'4px 0'}}>
      {/* жЁҷйЎҢ + зӢҖж…Ӣ */}
      <div style={{fontSize:11, color:'#94a3b8', marginBottom:8, paddingLeft:4}}>
        <b style={{color:'#e2e8f0'}}>йҖұйҒё {wedMonth} (йҖұдёүзөҗз®—)</b>
        <span style={{marginLeft:8, color:'#64748b'}}>иҰҸеүҮпјҡ8/8 regime жӯЈе ұй…¬гҖҒSharpe 7.75</span>
      </div>

      {/* еӢ•дҪңеӨ§еӯ— */}
      <div style={{
        padding:'12px 16px', marginBottom:12, borderRadius:6,
        background: isCloseoutDay ? '#2a0e0e' : isBuildDay ? '#0a1f0e' : '#0a0f1a',
        borderLeft: `4px solid ${isCloseoutDay ? '#ef4444' : isBuildDay ? '#22c55e' : '#475569'}`,
        display:'flex', justifyContent:'space-between', alignItems:'center'
      }}>
        <div>
          <div style={{fontSize:11, color:'#64748b', marginBottom:2}}>з•¶еүҚзӢҖж…Ӣ</div>
          <div style={{fontSize:15, fontWeight:700,
                       color: isCloseoutDay ? '#ef4444' : isBuildDay ? '#22c55e' : '#475569'}}>
            {isCloseoutDay ? `рҹ”ҙ е№іеҖүж—Ҙ (DTE ${wedDte})`
            : isBuildDay   ? `рҹҹў е»әе–®з”ңиңңй»һ (DTE ${wedDte})`
            :                 `вҡӘ жҢҒжңүдёӯ (DTE ${wedDte})`}
          </div>
        </div>
        <div style={{textAlign:'right'}}>
          <div style={{fontSize:11, color:'#64748b'}}>TX В· IV</div>
          <div style={{fontSize:13, color: '#e2e8f0', fontWeight:600}}>
            {tx?.toFixed(0)} В· {(sigma*100).toFixed(1)}%
          </div>
          {ivPctile != null && (
            <div style={{fontSize:10, color: ivBranch === 'high' ? '#ef4444' :
                                              ivBranch === 'mid' ? '#fbbf24' : '#86efac'}}>
              PR {ivPctile.toFixed(0)}
            </div>
          )}
        </div>
      </div>

      {/* IC зөҗж§Ӣ */}
      <div style={{padding:'10px 14px', marginBottom:10, background:'#070b15',
                   borderRadius:4, borderLeft:'3px solid #fbbf24'}}>
        <div style={{fontSize:12, fontWeight:600, color:'#e2e8f0', marginBottom:6}}>
          рҹ“җ жң¬йҖұ IC зөҗж§ӢпјҲжҜҸеҸЈ 50 е…ғ/й»һпјү
        </div>
        <div style={{fontSize:10, color:'#64748b', marginBottom:4}}>Call з«ҜпјҲдёҠж–№пјүпјҡ</div>
        <Row label="рҹ”ҙ иіЈ short call (Оҙ +0.20)" value={K_sc.toLocaleString()}
             hint={`+${sc.toFixed(0)} pts`} color="#fca5a5" />
        <Row label="рҹҹў иІ· long call (Оҙ +0.10)" value={K_bc.toLocaleString()}
             hint={`-${bc.toFixed(0)} pts`} color="#86efac" />
        <div style={{fontSize:10, color:'#64748b', margin:'8px 0 4px'}}>Put з«ҜпјҲдёӢж–№пјүпјҡ</div>
        <Row label="рҹ”ҙ иіЈ short put (Оҙ -0.20)" value={K_sp.toLocaleString()}
             hint={`+${sp.toFixed(0)} pts`} color="#fca5a5" />
        <Row label="рҹҹў иІ· long put (Оҙ -0.10)" value={K_bp.toLocaleString()}
             hint={`-${bp.toFixed(0)} pts`} color="#86efac" />
      </div>

      {/* й җдј° P&L */}
      <div style={{padding:'10px 14px', marginBottom:10, background:'#070b15',
                   borderRadius:4, borderLeft:'3px solid #22c55e'}}>
        <div style={{fontSize:12, fontWeight:600, color:'#e2e8f0', marginBottom:6}}>рҹ’° й җдј°</div>
        <Row label="Credit (жҜҸеҸЈж”¶)" value={`${credit.toFixed(0)} pts`}
             hint={`~$${creditNT.toLocaleString(undefined, {maximumFractionDigits: 0})}`}
             color="#86efac" />
        <Row label="Max profit" value={`${credit.toFixed(0)} pts`}
             hint={`~$${creditNT.toLocaleString(undefined, {maximumFractionDigits: 0})}пјҲжҢҒжңүеҲ°зөҗз®—пјү`}
             color="#86efac" />
        <Row label="Max loss (жҜҸеҸЈ)" value={`${maxLoss.toFixed(0)} pts`}
             hint={`~$${maxLossNT.toLocaleString(undefined, {maximumFractionDigits: 0})}`}
             color="#fca5a5" />
        <Row label="еӢқзҺҮпјҲеӣһжё¬ 5 е№ҙпјү" value="72%" hint="DD е…ЁйғЁ < -1.7%" />
      </div>

      {/* IV йҒҺжҝҫе»әиӯ° */}
      <div style={{padding:'10px 14px', marginBottom:10, background:'#070b15',

          рҹ“Ҡ IV PR йҒҺжҝҫ вҶ’ е»әиӯ°еҸЈж•ё
        </div>
        <ul style={{margin:'4px 0 0 0', paddingLeft:18, fontSize:11, color:'#94a3b8'}}>

function MonthlyStrategySOP({ data, mode = 'near' }) {
  // mode: 'near' = иҝ‘жңҲпјҲй җиЁӯпјү / 'far' = ж¬ЎжңҲ
  const isFar  = mode === 'far';
  const src    = isFar ? (data?.far_month || {}) : data;
  // еұҘзҙ„еғ№иҰҒз”Ёи©ІжңҲе°ҚжҮүзҡ„ TX жңҹиІЁеғ№пјҲиҝ‘жңҲз”Ё tx_futuresгҖҒж¬ЎжңҲз”Ё tx_farпјү
  const tx     = isFar ? (data?.market?.tx_far ?? data?.market?.tx_futures)
                       : data?.market?.tx_futures;
  const dte    = isFar ? src.dte         : data?.dte;
  const dteT   = isFar ? src.dte_trading : data?.dte_trading;
  const ivPctile = isFar ? null : data?.iv_percentile?.current_pct;
  const ivVal    = isFar ? src.iv_used   : data?.iv_used;
  const monthLabel = isFar ? src.txo_month : data?.txo_month;
  const iv       = ivVal != null ? (ivVal * 100).toFixed(1) : null;

  // Step 1пјҡеҲӨж–·д»ҠеӨ©жҳҜдёҚжҳҜгҖҢзөҗз®—зҝҢж—ҘгҖҚеҸҜе»әеҖүжҷӮж©ҹ
  const isBuildDay = dte != null && dte >= 25 && dte <= 32;  // жңҲйҒёзөҗз®—еҫҢ ~30 еӨ©
  // Step 2пјҡIV PR еҲҶж”ҜеҲӨж–·пјҲPR зӮәдё»гҖҒзө•е°Қ IV зӮә fallback for ж¬ЎжңҲпјү
  // й«ҳ IV жҷӮ short legs ж”¶еҫ—еӨҡпјҲиіЈ vol еҲ’з®—пјүгҖҒlong legs д»ҳеҫ—еӨҡпјҲиІ· vol дёҚеҲ’з®—пјү
  const ivHighByPR  = ivPctile != null && ivPctile > 60;
  const ivHighByAbs = ivPctile == null && ivVal != null && ivVal > 0.30;  // ж¬ЎжңҲ fallback
  const isHighIV    = ivHighByPR || ivHighByAbs;
  const ivBranch    = isHighIV ? 'high'
                    : ivPctile == null ? 'mid'   // жІ’ PR жҷӮй җиЁӯз…§иЎЁ
                    : ivPctile >= 30 ? 'mid'
                    : 'low';
  // Step 4пјҡиӯ·ж¬„зӢҖж…ӢпјҲдҫқз•¶еүҚ TX еҚіжҷӮиЁҲз®—пјү
  const roundStrike = (v) => v != null ? Math.round(v / 100) * 100 : null;
  const callGuardLevel = roundStrike(tx != null ? tx * 1.029 : null);    // +2.9% from TXпјҲзҹӯ call strike - 300пјү
  const putGuardLevel  = roundStrike(tx != null ? tx * 0.910 : null);    // -9.0% from TXпјҲзҹӯ put strike - 500пјү
  const callGuard = tx != null && callGuardLevel != null && tx >= callGuardLevel;
  const putGuard  = tx != null && putGuardLevel  != null && tx <= putGuardLevel;
  const ivAlert   = ivVal != null && ivVal > 0.35;
  // Step 5пјҡзөҗз®—еүҚ 1 еӨ©е№іеҖү
  const isCloseoutDay = dte != null && dte <= 1;

  const StepBox = ({ num, title, status, children }) => (
    <div style={{
      background: '#0a0f1a', border: '1px solid #1e293b', borderLeft: `3px solid ${
        status === 'now' ? '#22c55e' :
        status === 'warn' ? '#f97316' :
        status === 'alert' ? '#ef4444' : '#475569'}`,
      padding: '10px 14px', marginBottom: '8px', borderRadius: 4
    }}>
      <div style={{display:'flex', alignItems:'baseline', marginBottom:6}}>
        <span style={{
          background: status === 'now' ? '#22c55e' :
                      status === 'warn' ? '#f97316' :
                      status === 'alert' ? '#ef4444' : '#1e293b',
          color: status ? '#0a0f1a' : '#94a3b8',
          width: 20, height: 20, borderRadius: 4,
          display: 'inline-flex', alignItems: 'center', justifyContent: 'center',
          fontSize: 11, fontWeight: 700, marginRight: 8

      {/* жңҲд»ҪжЁҷзұӨ */}
      <div style={{fontSize:11, color:'#94a3b8', marginBottom:8, paddingLeft:4}}>
        <b style={{color:'#e2e8f0'}}>{isFar ? 'ж¬ЎжңҲ' : 'иҝ‘жңҲ'} {monthLabel ? `(${String(monthLabel).slice(0,4)}/${String(monthLabel).slice(4,6)})` : ''}</b>

        </span>
      </div>
      {/* з•¶еүҚзӢҖж…Ӣеҝ«йҖҹж‘ҳиҰҒ */}
      <div style={{
        display:'flex', gap:12, padding:'10px 14px', marginBottom:12,
        background:'#070b15', borderRadius:4, fontSize:11, color:'#94a3b8',
        borderLeft: `3px solid ${isFar ? '#a78bfa' : '#60a5fa'}`
      }}>
        <span>рҹ“… DTE <b style={{color:'#e2e8f0'}}>{dte ?? 'вҖ”'}</b>{dteT != null ? `пјҲ${dteT} дәӨжҳ“ж—Ҙпјү` : ''}</span>
        <span>рҹ“Ҡ IV <b style={{color:iv ? '#fbbf24' : '#94a3b8'}}>{iv ?? 'вҖ”'}%</b></span>
        {ivPctile != null && (
          <span>IV PR <b style={{color:
            ivPctile > 60 ? '#ef4444' :
            ivPctile >= 30 ? '#fbbf24' : '#22c55e'}}>{ivPctile.toFixed(0)}</b></span>
        )}
        <span>рҹ“Ҳ TX <b style={{color:'#e2e8f0'}}>{tx?.toFixed(0) ?? 'вҖ”'}</b></span>
      </div>

      <StepBox num="1" title="е»әеҖүжҷӮж©ҹпјҡзөҗз®—зҝҢж—ҘпјҲйҖұеӣӣпјү10:30-12:00"
               status={isBuildDay ? 'now' : null}>
        жҜҸжңҲ TXO зөҗз®—пјҲз¬¬дёүйҖұдёүпјүзҝҢж—Ҙ 10:30-12:00 й–Ӣе§Ӣе»әеҖүгҖӮ
        {dte != null && (
          <div style={{marginTop:4, color: isBuildDay ? '#86efac' : '#64748b'}}>
            зӣ®еүҚ DTE = {dte} еӨ© {isBuildDay ? 'вҶ’ вң“ еңЁе»әеҖүиҰ–зӘ—е…§' : `вҶ’ ${dte < 25 ? 'еӨӘжҺҘиҝ‘зөҗз®—' : 'еӨӘж—©'}пјҢзӯүдёӢж¬Ўзөҗз®—зҝҢж—Ҙ`}
          </div>
        )}
      </StepBox>

      <StepBox num="2" title="IV йҒҺжҝҫпјҲй«ҳдҪҺ IV зөҗж§ӢдёҚеҗҢпјү"
               status={ivBranch === 'high' ? 'warn' : ivBranch ? 'now' : null}>
        <ul style={{margin:'4px 0', paddingLeft:18}}>
          <li><b style={{color: ivBranch === 'low'  ? '#22c55e' : '#64748b'}}>дҪҺ IV (PR &lt; 30%)</b>пјҡз…§иЎЁеҹ·иЎҢ 4-legпјҲиІ· vol дҫҝе®ңпјү</li>
          <li><b style={{color: ivBranch === 'mid'  ? '#22c55e' : '#64748b'}}>дёӯ IV (PR 30-60%)</b>пјҡз…§иЎЁеҹ·иЎҢ</li>
          <li>
            <b style={{color: ivBranch === 'high' ? '#ef4444' : '#64748b'}}>й«ҳ IV (PR &gt; 60% жҲ– IV &gt; 30%)</b>пјҡ
            вҡ пёҸ <b>жҡ«з·© long putпјҲиІ· vol еӨӘиІҙпјү</b>пјҢжҺЎд»ҘдёӢд»»дёҖпјҡ
            <ul style={{paddingLeft:18, marginTop:2, color:'#94a3b8'}}>
              <li>еҲҶж®өе»әпјҡе…ҲиіЈ short call + short putпјҲж”¶й«ҳ IV ж¬ҠеҲ©йҮ‘пјүпјҢзӯү IV crush еҶҚиЈң long put</li>
              <li>з”Ё bear put spread жӣҝд»Јзҙ” long putпјҲиІ· + иіЈдҪҺеұҘзҙ„пјҢж·ЁжҲҗжң¬з ҚеҚҠпјү</li>
              <li>жҲ–д№ҫи„Ҷзӯү IV PR &lt; 50% еҶҚе»әе–®</li>
            </ul>
          </li>
        </ul>
        <div style={{marginTop:4, color: ivBranch === 'high' ? '#fb923c' : '#86efac'}}>
          з•¶еүҚ IV = {iv ?? 'вҖ”'}%{ivPctile != null ? ` (PR ${ivPctile.toFixed(0)})` : ''} вҶ’ {
            ivBranch === 'high' ? 'вҡ  й«ҳ IVпјҡжҡ«з·© long putгҖҒе„Әе…ҲиіЈзҹӯи…і' :
            ivBranch === 'low'  ? 'вң“ дҪҺ IVпјҡз…§иЎЁеҹ·иЎҢпјҲиІ· vol дҫҝе®ңпјү' :
            'вң“ дёӯ IVпјҡз…§иЎЁеҹ·иЎҢ'

      </StepBox>

      <StepBox num="3" title={isHighIV ? 'дёӢе–®й ҶеәҸпјҲй«ҳ IV еҲҶж®өзүҲпјү' : 'дёӢе–®й ҶеәҸпјҲжөҒеӢ•жҖ§жңҖе·®е…ҲжҺӣпјү'}
               status={isHighIV ? 'warn' : null}>
        {dte != null && dte < 7 && !isFar && (
          <div style={{
            padding:'8px 12px', marginBottom:10,
            background:'#2a1408', borderLeft:'3px solid #fb923c', borderRadius:4,
            fontSize:11, color:'#fb923c'
          }}>
            вҡ пёҸ <b>DTE еҸӘеү© {dte} еӨ©пјҢдёӢж–№еұҘзҙ„еғ№дёҚйҒ©еҗҲж–°е»әеҖү</b>пјҲПғвҲҡT еӨӘе°ҸгҖҒи·қзҸҫеғ№йҒҺиҝ‘пјү<br />

          </div>
        )}
        {(() => {
          // в”Җв”Җ BS-derived еұҘзҙ„еғ№пјҲдҫқз•¶еүҚ IV / DTE иЁҲз®— target delta е°ҚжҮү strikeпјүв”Җв”Җ
          // жҜ”еҜ«жӯ»зҷҫеҲҶжҜ”жә–зўәеҫ—еӨҡпјҲе°Өе…¶й•· DTE / й«ҳ IV жҷӮе·®и·қеӨ§пјү
          const roundStrike = (v) => v != null ? Math.round(v / 100) * 100 : null;
          // z = ОҰвҒ»В№(1-Оҙ) for puts; z = ОҰвҒ»В№(1-Оҙ) for calls (deep OTM)
          // е°Қ OTM call: K = S Г— exp(z Г— ПғвҲҡT + ПғВІT/2)
          // е°Қ OTM put : K = S Г— exp(-z Г— ПғвҲҡT + ПғВІT/2)
          const Z_CALL_010 = 1.282;   // delta +0.10 call
          const Z_PUT_020  = 0.842;   // delta -0.20 put (long put)
          const Z_PUT_005  = 1.645;   // delta -0.05 put (short put)
          const Z_PUT_002  = 2.054;   // delta -0.02 put (disaster)
          const Z_PUT_010_SPREAD = 1.282;   // delta -0.10 put (bear put spread зҡ„иІ·еӣһи…і)
          const sigma = ivVal != null ? ivVal : 0.25;            // з”Ёи©ІжңҲ IV
          const T     = dte != null ? Math.max(dte, 1) / 252 : 30 / 252;
          const sigT  = sigma * Math.sqrt(T);
          const drift = sigma * sigma * T / 2;
          const callK = (z) => tx != null ? roundStrike(tx * Math.exp(z * sigT + drift)) : null;
          const putK  = (z) => tx != null ? roundStrike(tx * Math.exp(-z * sigT + drift)) : null;
          const kCall   = callK(Z_CALL_010);
          const kLongP  = putK(Z_PUT_020);
          const kShortP = putK(Z_PUT_005);
          const kDisP   = putK(Z_PUT_002);
          const kSpreadShort = putK(Z_PUT_010_SPREAD);
          // иЁҲз®—еҜҰйҡӣи·қзҸҫеғ№%пјҲйЎҜзӨәз”Ёпјү
          const pct = (k) => (k != null && tx != null) ? ((k - tx) / tx * 100) : null;
          const fmtPct = (v) => v == null ? '' : ` (${v >= 0 ? '+' : ''}${v.toFixed(1)}%)`;
          const Strike = ({ v }) => (
            <b style={{color: v != null ? '#fde047' : '#64748b'}}>
              {v != null ? v.toLocaleString() : 'вҖ”'}
            </b>
          );
          if (isHighIV) {
            return (
              <>
                <div style={{marginBottom:6, color:'#fb923c', fontSize:11}}>
                  вҡ  й«ҳ IV з’°еўғпјҡиіЈж–№и…іж¬ҠеҲ©йҮ‘й«ҳпјҲеҲ’з®—пјүгҖҒиІ·ж–№и…іжҲҗжң¬й«ҳпјҲдёҚеҲ’з®—пјүвҶ’ еҲҶж®өе»ә
                </div>
                <ol style={{margin:'4px 0', paddingLeft:20}}>
                  <li>
                    <b style={{color:'#86efac'}}>з«ӢеҚіе»әпјҲиіЈ vol еҲ’з®—пјүпјҡ</b>
                    <ul style={{paddingLeft:18, marginTop:2}}>
                      <li>иіЈ short call @ <Strike v={kCall} />{fmtPct(pct(kCall))}пјҲdelta +0.10пјү</li>
                      <li>иіЈ short put @ <Strike v={kShortP} />{fmtPct(pct(kShortP))}пјҲdelta -0.05пјү</li>
                    </ul>
                  </li>
                  <li style={{marginTop:6}}>
                    <b style={{color:'#fca5a5'}}>жҡ«з·©пјҲиІ· vol еӨӘиІҙпјүпјҡ</b>
                    <ul style={{paddingLeft:18, marginTop:2}}>
                      <li>long put @ <Strike v={kLongP} />{fmtPct(pct(kLongP))} вҖ” зӯү IV PR &lt; 50% жҲ– IV &lt; 25% еҶҚиІ·</li>
                      <li>зҒҪйӣЈ put @ <Strike v={kDisP} />{fmtPct(pct(kDisP))} вҖ” еҗҢдёҠ</li>
                    </ul>
                  </li>
                  <li style={{marginTop:6}}>
                    <b style={{color:'#fbbf24'}}>жӣҝд»Јж–№жЎҲпјҲдёҚжғізӯүпјүпјҡ</b>
                    з”Ё bear put spreadпјҡиІ· <Strike v={kLongP} /> + иіЈ <Strike v={kSpreadShort} />{fmtPct(pct(kSpreadShort))}пјҲж·ЁжҲҗжң¬з ҚеҚҠпјү
                  </li>
                </ol>
                <div style={{marginTop:4, fontSize:10, color:'#64748b'}}>
                  еұҘзҙ„еғ№д»Ҙ <b style={{color:'#94a3b8'}}>Black-Scholes target delta</b> з®—пјҲIV {(sigma*100).toFixed(1)}%, DTE {dte}пјү вҶ’ еҸ–жңҖжҺҘиҝ‘ 100 ж•ҙж•ёеҖҚ
                </div>
              </>
            );
          }
          return (
            <>
              <ol style={{margin:'4px 0', paddingLeft:20}}>
                <li>иІ·ж·ұ OTM зҒҪйӣЈ put @ <Strike v={kDisP} />{fmtPct(pct(kDisP))}пјҲdelta -0.02пјүвҖ” жөҒеӢ•жҖ§жңҖе·®пјҢжңҖе…ҲжҺӣйҷҗеғ№</li>
                <li>иіЈ OTM short put @ <Strike v={kShortP} />{fmtPct(pct(kShortP))}пјҲdelta -0.05пјү</li>
                <li>иІ· OTM long put @ <Strike v={kLongP} />{fmtPct(pct(kLongP))}пјҲdelta -0.20пјү</li>
                <li>иіЈ OTM short call @ <Strike v={kCall} />{fmtPct(pct(kCall))}пјҲdelta +0.10пјүвҖ” жңҖеҫҢиіЈ</li>
              </ol>
              <div style={{marginTop:4, fontSize:10, color:'#64748b'}}>
                еұҘзҙ„еғ№д»Ҙ <b style={{color:'#94a3b8'}}>Black-Scholes target delta</b> з®—пјҲTX {tx?.toFixed(0) ?? 'вҖ”'}, IV {(sigma*100).toFixed(1)}%, DTE {dte}пјүвҶ’ еҸ–жңҖжҺҘиҝ‘ 100 ж•ҙж•ёеҖҚгҖӮи·қзҸҫеғ№% йҡЁ IV/DTE иҮӘеӢ•иӘҝж•ҙгҖӮ
              </div>
            </>
          );
        })()}
      </StepBox>

      <StepBox num="4" title="жңҲе…§иӯ·ж¬„"
               status={callGuard || putGuard || ivAlert ? 'warn' : null}>
        <ul style={{margin:'4px 0', paddingLeft:18}}>
          <li style={{color: callGuard ? '#fb923c' : 'inherit'}}>
            <b>TX зӘҒз ҙ <span style={{color: callGuard ? '#fb923c' : '#fde047'}}>{callGuardLevel?.toLocaleString() ?? 'вҖ”'}</span></b> вҶ’ иІ·еӣһ 1-2 еҸЈ short callгҖҒroll up
            {callGuard && <span style={{color:'#fb923c', marginLeft:4}}>вҶҗ зҸҫеңЁи§ёзҷјпјҒ</span>}
          </li>
          <li style={{color: putGuard ? '#fb923c' : 'inherit'}}>
            <b>TX и·Ңз ҙ <span style={{color: putGuard ? '#fb923c' : '#fde047'}}>{putGuardLevel?.toLocaleString() ?? 'вҖ”'}</span></b> вҶ’ иІ·еӣһ 1-2 еҸЈ short put
            {putGuard && <span style={{color:'#fb923c', marginLeft:4}}>вҶҗ зҸҫеңЁи§ёзҷјпјҒ</span>}
          </li>
          <li style={{color: ivAlert ? '#fb923c' : 'inherit'}}>
            <b>IV йЈҶ &gt; 35%</b> вҶ’ е№іеҖүжүҖжңү short и…іпјҢonly long з•ҷи‘—
            {ivAlert && <span style={{color:'#fb923c', marginLeft:4}}>вҶҗ зҸҫеңЁи§ёзҷјпјҒ</span>}
          </li>
        </ul>
        <div style={{marginTop:4, fontSize:10, color:'#64748b'}}>
          иӯ·ж¬„еғ№йҡЁ TX <b style={{color:'#94a3b8'}}>{tx?.toFixed(0) ?? 'вҖ”'}</b> еҚіжҷӮиЁҲз®—пјҲcall иӯ·ж¬„ +2.9%гҖҒput иӯ·ж¬„ -9.0%пјү
        </div>
      </StepBox>

      <StepBox num="5" title="зөҗз®—еүҚ 1 еӨ© 100% е№іеҖү"
               status={isCloseoutDay ? 'alert' : null}>
        T-1 ж”¶зӣӨеүҚдё»еӢ•е№іеҖүжүҖжңү 4 legпјҢдёҚз•ҷзөҗз®—дәӨеүІгҖӮ
        {dte != null && (
          <div style={{marginTop:4, color: isCloseoutDay ? '#fca5a5' : '#64748b'}}>
            {isCloseoutDay ? `рҹ”ҙ зөҗз®—еү© ${dte} еӨ© вҶ’ д»ҠеӨ© / жҳҺеӨ©еүҚе№іеҖү` :
             dte <= 5 ? `вҡ  еү© ${dte} еӨ©пјҢжә–еӮҷе№іеҖү` : `еү© ${dte} еӨ©пјҢз„ЎйңҖеӢ•дҪң`}
          </div>
        )}
      </StepBox>

      <div style={{
        marginTop:12, padding:'8px 12px', background:'#070b15',
        borderLeft:'3px solid #475569', borderRadius:4,
        fontSize:10, color:'#64748b', lineHeight:1.5
      }}>
        рҹ’Ў <b>еҸЈж•ёе°Қз…§пјҲжҢүдҪ  long йғЁдҪҚпјү</b>пјҡ200иҗ¬ 1-1-1-1 В· 400иҗ¬ 2-1-2-2 В· 600иҗ¬ 3-2-4-3 В· 700иҗ¬ 4-2-4-3 В· 800иҗ¬ 4-2-5-4 В· 1000иҗ¬ 5-3-6-5пјҲC-P-P-Pпјү
        <br />
        вҡ  <b>жіЁж„Ҹ</b>пјҡеұҘзҙ„еғ№д»Ҙ TX 42,292 зӮәеҹәжә–пјӣTX и®ҠеӢ• &gt; 5% жҷӮж•ҙзө„иҰҒе№із§»
      </div>
    </div>
  );
}

function SectionMeta({ dte, dteTrading, iv, ivSource }) {
  const parts = [];
  if (dte != null) {
    parts.push(`DTE ${dte} еӨ©${dteTrading != null ? `пјҲдәӨжҳ“ж—Ҙ ${dteTrading}пјү` : ''}`);
  }
  if (iv != null) {
    const ivLabel = ivSource === 'atm_market' ? 'еёӮеғ№' : 'жӯ·еҸІ';
    parts.push(<>жіўеӢ•зҺҮ <span style={{color: ivSource === 'atm_market' ? '#fbbf24' : '#94a3b8'}}>{(iv*100).toFixed(1)}%</span><span style={{fontSize:'9px', color:'#64748b', marginLeft:'2px'}}>{ivLabel}</span></>);
  }
  return parts.length ? (
    <span style={{fontSize:'11px', fontWeight:400, color:'#94a3b8', marginLeft:'8px'}}>
      {parts.map((p, i) => <React.Fragment key={i}>{i > 0 && ' В· '}{p}</React.Fragment>)}
    </span>
  ) : null;
}

function SectionWeekly({ weekly, label, taiex, taiexHigh, taiexLow, price2330, price0050, hvVal }) {
  if (!weekly) return null;
  const { delivery_month, settlement_date, series, dte, dte_trading, iv_used, iv_source, selected_options, structures } = weekly;
  const fmt8 = d => d ? `${d.slice(0,4)}/${d.slice(4,6)}/${d.slice(6,8)}` : d;
  const origLabel = fmt8(delivery_month);
  const adjLabel  = settlement_date && settlement_date !== delivery_month ? fmt8(settlement_date) : null;
  return (
    <>
      <div className="section-divider weekly">
        <span className="section-title">
          {label} {series} В· {origLabel}{adjLabel ? ` вҶ’ зөҗз®— ${adjLabel}` : ''}
        </span>
        <SectionMeta dte={dte} dteTrading={dte_trading} iv={iv_used} ivSource={iv_source} />
      </div>
      <StrikeAlert selectedOptions={selected_options} taiex={taiex} dte={dte} />
      <HuiDistCheck selectedOptions={selected_options} taiex={taiex} />
      <div className="options-row">
        <OptionCard type="put"  data={selected_options?.put}  taiex={taiex} taiexHigh={taiexHigh} taiexLow={taiexLow} price2330={price2330} price0050={price0050} />
        <OptionCard type="call" data={selected_options?.call} taiex={taiex} taiexHigh={taiexHigh} taiexLow={taiexLow} price2330={price2330} price0050={price0050} />
      </div>

const PTR_THRESHOLD = 70;

function usePullToRefresh(onRefresh, enabled) {
  const startY   = React.useRef(null);
  const distRef  = React.useRef(0);
  const [pullDist, setPullDist] = React.useState(0);

  const cb = React.useRef(onRefresh);
  React.useEffect(() => { cb.current = onRefresh; }, [onRefresh]);

  React.useEffect(() => {
    if (!enabled) return;

    function onTouchStart(e) {
      startY.current = e.touches[0].clientY;   // ж°ёйҒ иЁҳйҢ„пјҢtouchmove еҶҚеҲӨж–·
    }
    function onTouchMove(e) {
      if (startY.current === null) return;
      const d = e.touches[0].clientY - startY.current;
      if (window.scrollY <= 0 && d > 0) {
        // й ҒйқўеңЁй ӮйғЁдё”еҫҖдёӢжӢүпјҡжҺҘз®ЎжүӢеӢў
        e.preventDefault();
        distRef.current = Math.min(d, PTR_THRESHOLD * 1.5);
        setPullDist(distRef.current);
      } else if (d <= 0 || window.scrollY > 0) {
        // еҫҖдёҠж»‘жҲ–дёҚеңЁй ӮйғЁпјҡж”ҫжЈ„иҝҪи№ӨпјҢи®“зҖҸиҰҪеҷЁжӯЈеёёжҚІеӢ•
        if (distRef.current > 0) { distRef.current = 0; setPullDist(0); }
        startY.current = null;
      }
    }
    function onTouchEnd() {
      if (distRef.current >= PTR_THRESHOLD) cb.current();
      distRef.current = 0;
      startY.current  = null;
      setPullDist(0);
    }

    document.addEventListener('touchstart', onTouchStart, { passive: true });
    document.addEventListener('touchmove',  onTouchMove,  { passive: false });
    document.addEventListener('touchend',   onTouchEnd);
    return () => {
      document.removeEventListener('touchstart', onTouchStart);
      document.removeEventListener('touchmove',  onTouchMove);
      document.removeEventListener('touchend',   onTouchEnd);
    };
  }, [enabled]);

  return pullDist;
}

class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { error: null, info: null }; }
  static getDerivedStateFromError(error) { return { error }; }
  componentDidCatch(error, info) { this.setState({ info }); console.error('App crash:', error, info); }
  render() {
    if (this.state.error) {
      return (
        <div style={{padding:'16px', background:'#1c1610', border:'1px solid #fca5a5', borderRadius:'6px', margin:'16px 0', color:'#fde68a', fontSize:'12px'}}>
          <div style={{fontSize:'14px', fontWeight:700, color:'#fca5a5', marginBottom:'6px'}}>вҡ пёҸ е…ғд»¶ crash</div>
          <div><b>Error:</b> {String(this.state.error?.message || this.state.error)}</div>
          {this.state.error?.stack && (
            <pre style={{fontSize:'10px', overflow:'auto', marginTop:'6px', whiteSpace:'pre-wrap', maxHeight:'200px'}}>
              {this.state.error.stack}
            </pre>
          )}
          <div style={{marginTop:'8px', fontSize:'10px', color:'#94a3b8'}}>
            жҲӘең–еӮізөҰ Claude зңӢйҢҜиӘӨиЁҠжҒҜд»Ҙдҝ®жӯЈ
          </div>
        </div>
      );
    }
    return this.props.children;
  }
}

            вҡ  TXO й ҳејҸе°ҚжІ–зҡ„жҳҜеҠ ж¬ҠжҢҮж•ёзі»зөұжҖ§йўЁйҡӘпјҢз„Ўжі•ж¶өи“ӢеҸ°з©Қйӣ»жҲ– 0050 зҡ„еҖӢиӮЎзү№е®ҡйўЁйҡӘгҖӮз•¶жЁҷзҡ„еӣ еҖӢеҲҘж¶ҲжҒҜеҠҮзғҲжіўеӢ•иҖҢеӨ§зӣӨжңӘеҗҢжӯҘдёӢи·ҢжҷӮпјҢPut дҝқиӯ·ж•ҲжһңжңүйҷҗгҖӮ
