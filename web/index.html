<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>2330 0050對應大盤選擇權領口策略</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { background: #0f1117; }
    body {
      background: #0f1117;
      color: #e2e8f0;
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 14px;
      min-height: 100vh;
      min-height: -webkit-fill-available;
      padding: 20px;
      padding-bottom: max(20px, calc(env(safe-area-inset-bottom) + 20px));
      overscroll-behavior-y: none;
    }
    @media (max-width: 600px) {
      body { padding: 12px 10px; font-size: 13px; }
    }

    .app { max-width: 900px; margin: 0 auto; }

    /* Header */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      padding: 12px 0 16px;
      border-bottom: 1px solid #1e2535;
      margin-bottom: 16px;
      gap: 8px;
    }
    .header h1 { font-size: 18px; color: #7dd3fc; letter-spacing: 0.05em; line-height: 1.3; }
    .header-right { display: flex; align-items: center; gap: 12px; color: #64748b; font-size: 12px; white-space: nowrap; }
    @media (max-width: 600px) {
      .header h1 { font-size: 15px; }
    }
    /* Market strip — 三區分組 */
    .market-wrapper { margin-bottom: 16px; display: flex; flex-direction: column; gap: 4px; }
    .market-group   { border-radius: 8px; overflow: hidden; border: 1px solid #1e2535; }
    .group-header   {
      background: #0d1220;
      padding: 4px 12px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.1em;
      color: #475569;
    }
    .group-header.spot    { color: #7dd3fc; }
    .group-header.futures { color: #c4b5fd; }
    .group-header.stock-f { color: #fcd34d; }
    .market-strip {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1px;
      background: #1e2535;
    }
    .market-strip.cols-3 { grid-template-columns: repeat(3, 1fr); }
    @media (max-width: 600px) {
      .market-strip        { grid-template-columns: repeat(2, 1fr); }
      .market-strip.cols-3 { grid-template-columns: repeat(3, 1fr); }
    }
    .market-cell {
      background: #13192a;
      padding: 10px 14px;
    }
    @media (max-width: 600px) {
      .market-cell { padding: 9px 11px; }
    }
    .market-cell .label { font-size: 10px; color: #475569; margin-bottom: 3px; }
    .market-cell .sub-label { font-size: 9px; color: #334155; margin-bottom: 2px; }
    .market-cell .value { font-size: 18px; font-weight: 600; color: #f1f5f9; }
    .market-cell .value.up   { color: #f87171; }
    .market-cell .value.down { color: #4ade80; }
    .market-cell .value.tag  { font-size: 13px; color: #7dd3fc; }
    .market-cell .value.na   { color: #334155; font-size: 14px; }
    .chg-label { font-size: 10px; margin-top: 2px; }
    .chg-label.up   { color: #f87171; }
    .chg-label.down { color: #4ade80; }
    @media (max-width: 600px) {
      .market-cell .value { font-size: 15px; }
      .market-cell .value.tag { font-size: 12px; }
    }

    /* Indicator bar */
    .indicator-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 1px;
      background: #1e2535;
      border-top: 1px solid #1e2535;
      overflow: hidden;
      margin-bottom: 0;
    }
    .ind-cell {
      background: #13192a;
      padding: 8px 14px;
      display: flex;
      flex-direction: column;
      gap: 3px;
      flex: 1;
      min-width: 72px;
    }
    @media (max-width: 600px) {
      .ind-cell { min-width: 60px; padding: 7px 10px; }
    }
    .ind-cell .ind-key { font-size: 10px; color: #475569; }
    .ind-cell .ind-val { font-size: 13px; color: #cbd5e1; font-weight: 600; }
    .ind-cell .ind-val.hi  { color: #86efac; }
    .ind-cell .ind-val.lo  { color: #fca5a5; }
    .ind-cell .ind-val.tag { color: #7dd3fc; }
    .ind-divider {
      width: 1px;
      background: #1e2535;
      align-self: stretch;
    }

    /* Options row */
    .options-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 16px;
    }
    @media (max-width: 480px) {
      .options-row { grid-template-columns: 1fr; }
    }
    .option-card {
      background: #13192a;
      border: 1px solid #1e2535;
      border-radius: 8px;
      padding: 12px 16px;
    }
    .option-card .opt-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }
    .opt-badge {
      font-size: 11px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 3px;
      letter-spacing: 0.05em;
    }
    .opt-badge.put { background: #7f1d1d; color: #fca5a5; }
    .opt-badge.call { background: #14532d; color: #86efac; }
    .opt-strike { font-size: 18px; font-weight: 700; }
    .opt-prices {
      display: flex;
      gap: 16px;
      font-size: 12px;
      color: #64748b;
    }
    .opt-prices span { display: flex; flex-direction: column; gap: 2px; }
    .opt-prices .pkey { font-size: 10px; color: #475569; }
    .opt-prices .pval { color: #cbd5e1; font-size: 13px; }
    .opt-symbol { font-size: 10px; color: #334155; margin-top: 6px; }
    .dist-badge {
      font-size: 11px;
      font-weight: 700;
      padding: 2px 7px;
      border-radius: 3px;
    }
    .dist-badge.put  { background: #7f1d1d55; color: #fca5a5; }
    .dist-badge.call { background: #14532d55; color: #86efac; }
    .spread-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid #1e2535;
      font-size: 11px;
      color: #475569;
    }
    .spread-val { font-weight: 700; font-size: 12px; }
    .spread-val.ok      { color: #64748b; }
    .spread-val.caution { color: #fb923c; }
    .spread-val.warn    { color: #f87171; }

    /* Structure cards */
    .structures { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 8px; }
    @media (max-width: 600px) {
      .structures { grid-template-columns: 1fr; }
      /* compact cards (週選/遠月/0050) 手機上 2欄 */
      .structures.compact-grid { grid-template-columns: repeat(2, 1fr); }
    }
    .struct-card {
      background: #13192a;
      border: 1px solid #1e2535;
      border-radius: 8px;
      padding: 16px;
      position: relative;
      transition: border-color 0.15s;
    }
    .struct-card:hover { border-color: #334155; }
    .struct-card.recommended { border-color: #1d4ed8; }
    .recommended-badge {
      position: absolute;
      top: -1px; right: 12px;
      background: #1d4ed8;
      color: #bfdbfe;
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 0 0 4px 4px;
    }
    .struct-name { font-size: 11px; color: #475569; margin-bottom: 4px; }
    .struct-desc { font-size: 13px; color: #94a3b8; margin-bottom: 12px; }
    .struct-legs {
      font-size: 20px;
      font-weight: 700;
      color: #f1f5f9;
      margin-bottom: 12px;
    }
    .struct-strikes { font-size: 11px; color: #475569; margin-bottom: 12px; line-height: 1.6; }
    .struct-net {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 4px;
    }
    @media (max-width: 600px) {
      .struct-net { font-size: 20px; }
      .struct-legs { font-size: 17px; }
    }
    .struct-net.credit { color: #4ade80; }
    .struct-net.debit { color: #f87171; }
    .struct-protection {
      height: 4px;
      background: #1e2535;
      border-radius: 2px;
      margin-bottom: 6px;
      overflow: hidden;
    }
    .struct-protection-fill {
      height: 100%;
      background: #3b82f6;
      border-radius: 2px;
      transition: width 0.4s ease;
    }
    .struct-pct-label { font-size: 11px; color: #64748b; }
    .credit-tag {
      display: inline-block;
      margin-top: 10px;
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 3px;
      background: #14532d;
      color: #86efac;
    }
    .debit-tag {
      display: inline-block;
      margin-top: 10px;
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 3px;
      background: #7f1d1d;
      color: #fca5a5;
    }

    /* States */
    .state-box {
      text-align: center;
      padding: 60px 20px;
      color: #475569;
    }
    .state-box .icon { font-size: 32px; margin-bottom: 12px; }
    .state-box p { font-size: 14px; }

    .spinner {
      width: 24px; height: 24px;
      border: 2px solid #1e2535;
      border-top-color: #3b82f6;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Pull-to-refresh indicator */
    .ptr-bar {
      position: fixed;
      top: 0; left: 0; right: 0;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding-bottom: 10px;
      background: #0f1117;
      z-index: 200;
      pointer-events: none;
      overflow: hidden;
    }
    .ptr-bar .ptr-spinner {
      width: 18px; height: 18px;
      border: 2px solid #1e2535;
      border-top-color: #3b82f6;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    .ptr-bar .ptr-text {
      font-size: 12px;
      transition: color 0.15s;
    }

    .error-box {
      background: #7f1d1d22;
      border: 1px solid #7f1d1d;
      border-radius: 8px;
      padding: 16px;
      color: #fca5a5;
      margin-bottom: 16px;
      font-size: 13px;
    }

    /* Market status badge */
    .market-status {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      padding: 3px 10px;
      border-radius: 20px;
      font-weight: 600;
      letter-spacing: 0.03em;
    }
    .market-status.open   { background: #14532d; color: #4ade80; }
    .market-status.after  { background: #422006; color: #fb923c; }
    .market-status.night  { background: #1e1b4b; color: #a5b4fc; }
    .market-status.closed { background: #1e2535; color: #475569; }
    .market-status .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
    }
    .market-status.open .dot   { background: #4ade80; animation: pulse 1.5s infinite; }
    .market-status.after .dot  { background: #fb923c; animation: pulse 1.5s infinite; }
    .market-status.night .dot  { background: #a5b4fc; animation: pulse 2s infinite; }
    .market-status.closed .dot { background: #475569; }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }

    /* Warning / notice banners */
    .banner {
      border-radius: 8px;
      padding: 10px 16px;
      margin-bottom: 12px;
      font-size: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .banner.dte-warn  { background: #422006; border: 1px solid #92400e; color: #fbbf24; }
    .banner.mkt-note  { background: #0f172a; border: 1px solid #1e2535; color: #475569; }

    /* Section divider */
    .section-divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 20px 0 14px;
    }
    .section-divider .section-title {
      font-size: 12px;
      color: #475569;
      white-space: nowrap;
      letter-spacing: 0.08em;
      font-weight: 600;
    }
    .section-divider::before, .section-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #1e2535;
    }
    /* 各區段色彩 */
    .section-divider.near    .section-title { color: #7dd3fc; }
    .section-divider.weekly  .section-title { color: #c4b5fd; }
    .section-divider.far     .section-title { color: #5eead4; }
    .section-divider.etf     .section-title { color: #fcd34d; }
    /* 緊湊結構卡（週選/遠月/0050 用） */
    .struct-card.compact .struct-strikes { display: none; }
    .struct-card.compact .struct-legs    { font-size: 15px; margin-bottom: 8px; }
    .struct-card.compact .struct-net     { font-size: 18px; margin-bottom: 4px; }
    .struct-card.compact .struct-protection { margin-bottom: 4px; }

    /* 0050 info bar */
    .info-bar-0050 {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 16px 20px;
      background: #13192a;
      border: 1px solid #1e2535;
      border-radius: 8px;
      padding: 10px 16px;
      margin-bottom: 12px;
      font-size: 12px;
    }
    .info-bar-0050 .ib-item { display: flex; flex-direction: column; gap: 2px; }
    .info-bar-0050 .ib-key { font-size: 10px; color: #475569; }
    .info-bar-0050 .ib-val { color: #f1f5f9; font-size: 15px; font-weight: 600; }
    .info-bar-0050 .ib-val.accent { color: #7dd3fc; }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const DATA_URL    = '/api/data';
const REFRESH_URL = '/api/refresh';
const REFRESH_MS  = 5 * 60 * 1000;   // 網頁開著時每 5 分鐘重抓

function fmt(n, dec = 0) {
  return Number(n).toLocaleString('zh-TW', { minimumFractionDigits: dec, maximumFractionDigits: dec });
}

function ChgLabel({ chg, chgpct, dec = 0 }) {
  if (chg == null) return null;
  const up  = chg >= 0;
  const cls = up ? 'up' : 'down';
  const sign = up ? '+' : '';
  return (
    <div className={`chg-label ${cls}`}>
      {sign}{fmt(chg, dec)} ({sign}{chgpct != null ? chgpct.toFixed(2) : '—'}%)
    </div>
  );
}

function fmtTime(iso) {
  if (!iso) return '—';
  return iso.slice(11, 19);
}

function fmtNet(n) {
  const wan = n / 10000;
  return (wan >= 0 ? '+' : '') + wan.toFixed(1) + '萬';
}

function getMarketStatus() {
  const now = new Date();
  const day  = now.getDay();
  const mins = now.getHours() * 60 + now.getMinutes();

  if (day === 0) return 'closed';                    // 週日全休
  if (day === 6) return mins < 5 * 60 ? 'night' : 'closed'; // 週六夜盤延續至 05:00

  // 週一～週五
  if (mins < 5 * 60)           return 'night';      // 00:00–05:00 夜盤延續
  if (mins < 9 * 60)           return 'closed';     // 05:00–09:00 休市
  if (mins <= 13 * 60 + 30)    return 'open';       // 09:00–13:30 日盤
  if (mins < 14 * 60)          return 'closed';     // 13:30–14:00 換盤空檔
  if (mins <= 14 * 60 + 30)    return 'after';      // 14:00–14:30 盤後
  if (mins < 15 * 60)          return 'closed';     // 14:30–15:00 空檔
  return 'night';                                    // 15:00–24:00 夜盤
}

const MarketStatusCtx = React.createContext('closed');

function MarketStatusProvider({ children }) {
  const [status, setStatus] = React.useState(getMarketStatus);
  React.useEffect(() => {
    const t = setInterval(() => setStatus(getMarketStatus()), 30000);
    return () => clearInterval(t);
  }, []);
  return <MarketStatusCtx.Provider value={status}>{children}</MarketStatusCtx.Provider>;
}

function MarketStatus() {
  const status = React.useContext(MarketStatusCtx);
  const labels = { open: '日盤', after: '盤後', night: '夜盤', closed: '休市' };
  return (
    <span className={`market-status ${status}`}>
      <span className="dot" />
      {labels[status]}
    </span>
  );
}

function DTEWarning({ dte }) {
  if (dte == null || dte >= 5) return null;
  return (
    <div className="banner dte-warn">
      ⚠ DTE（到期天數）{dte} 天，UI 已切換至次月計算。請確認現有月選倉位的平倉時機。
    </div>
  );
}

function MarketHoursNote() {
  const status = React.useContext(MarketStatusCtx);
  if (status === 'open') return null;
  const notes = {
    after:  '盤後交易中（14:00–14:30），選擇權報價為日盤最後成交',
    night:  '夜盤中（15:00–05:00），TXO 夜盤流動性低，報價僅供參考',
    closed: '休市中，報價為最近交易日收盤價',
  };
  return (
    <div className="banner mkt-note">
      {notes[status]}
    </div>
  );
}

function adxState(adx) {
  if (adx == null) return { color: '', label: '—' };
  const val = adx.toFixed(1);
  if (adx >= 25) return { color: 'hi', label: `${val} 趨勢` };
  if (adx >= 20) return { color: '',   label: `${val} 弱趨` };
  return            { color: 'lo', label: `${val} 盤整` };
}

function IndicatorBar({ indicators, targets, dec = 0 }) {
  if (!indicators) return null;
  const { atr, bb_upper, bb_lower, ma20, hv, hv_2330, hv_taiex, hv_source, adx } = indicators;
  const hvVal     = hv_taiex ?? hv ?? hv_2330;
  const hvLabel   = hv_source === 'tx_direct' ? 'HV（歷波）-TX'
                  : hv_taiex  ? 'HV（歷波）代理'
                  : 'HV（歷波）';
  const hvColor   = hv_source === 'tx_direct' ? '' : hv_taiex ? 'lo' : '';
  const hvDisplay = hvVal != null ? (hvVal * 100).toFixed(1) + '%' : '—';
  const putTarget  = targets?.target_put_strike  ?? indicators.target_put_strike;
  const callTarget = targets?.target_call_strike ?? indicators.target_call_strike;
  const method     = targets?.method ?? indicators.method;
  const { color: adxColor, label: adxLabel } = adxState(adx);
  const f = v => v?.toFixed(dec);
  return (
    <div className="indicator-bar">
      <div className="ind-cell" style={{background:'#0d1220', justifyContent:'center'}}>
        <span style={{fontSize:'9px', fontWeight:700, color:'#475569', letterSpacing:'0.08em'}}>日K</span>
      </div>
      <div className="ind-cell">
        <span className="ind-key">ATR(14)（均幅）</span>
        <span className="ind-val">{f(atr)}</span>
      </div>
      <div className="ind-cell">
        <span className="ind-key">BB 上軌</span>
        <span className="ind-val hi">{f(bb_upper)}</span>
      </div>
      <div className="ind-cell">
        <span className="ind-key">BB 中線</span>
        <span className="ind-val">{f(ma20)}</span>
      </div>
      <div className="ind-cell">
        <span className="ind-key">BB 下軌</span>
        <span className="ind-val lo">{f(bb_lower)}</span>
      </div>
      <div className="ind-cell">
        <span className="ind-key">{hvLabel}</span>
        <span className={`ind-val ${hvColor}`}>{hvDisplay}</span>
      </div>
      <div className="ind-cell">
        <span className="ind-key">ADX(14)（趨向）</span>
        <span className={`ind-val ${adxColor}`}>{adxLabel}</span>
      </div>
      <div className="ind-cell">
        <span className="ind-key">目標 Put</span>
        <span className="ind-val lo">{putTarget?.toLocaleString()}</span>
      </div>
      <div className="ind-cell">
        <span className="ind-key">目標 Call</span>
        <span className="ind-val hi">{callTarget?.toLocaleString()}</span>
      </div>
      <div className="ind-cell">
        <span className="ind-key">選法</span>
        <span className="ind-val tag">{method === 'bb_atr' ? 'BB+ATR（布林+均幅）' : '靜態'}</span>
      </div>
    </div>
  );
}

function MCell({ label, subLabel, price, chg, chgpct, dec = 0, tag = false, children }) {
  const cls = chg == null ? '' : chg > 0 ? 'up' : chg < 0 ? 'down' : '';
  return (
    <div className="market-cell">
      <div className="label">{label}</div>
      {subLabel && <div className="sub-label">{subLabel}</div>}
      {children || (
        price != null
          ? <div className={`value ${tag ? 'tag' : cls}`}>{tag ? price : fmt(price, dec)}</div>
          : <div className="value na">—</div>
      )}
      {!tag && !children && <ChgLabel chg={chg} chgpct={chgpct} dec={dec} />}
    </div>
  );
}

function fmtMonth(m) {
  if (!m || m.length < 6) return m || '—';
  return m.slice(0, 4) + '/' + m.slice(4, 6);
}

function MarketStrip({ market: m, txo_month, dte, indicators, targets, indicators0050 }) {
  if (!m) return null;
  const basis = m.tx_futures != null && m.taiex ? m.tx_futures - m.taiex : null;
  const basisStr = basis != null
    ? <span style={{marginLeft:'5px', fontSize:'9px', color: basis>=0?'#f87171':'#4ade80'}}>
        {basis>=0?'+':''}{basis.toFixed(0)}
      </span>
    : null;

  return (
    <div className="market-wrapper">

      {/* ── 排1：大盤指數 + 台指期 ──────────── */}
      <div className="market-group">
        <div className="group-header futures">大盤 · 台指期 TXF</div>
        <div className="market-strip">

          <MCell label="TX 遠月" subLabel={fmtMonth(m.tx_far_month)}

          <MCell label="股期 近" subLabel={fmtMonth(m.tf_near_month)}
                 price={m.tf_near} chg={m.chg_tf_near} chgpct={m.chgpct_tf_near} />
          <MCell label="股期 遠" subLabel={fmtMonth(m.tf_far_month)}
                 price={m.tf_far}  chg={m.chg_tf_far}  chgpct={m.chgpct_tf_far} />
        </div>
        <IndicatorBar indicators={indicators} targets={targets} />
      </div>

      {/* ── 排3：0050 現貨 + 股期近遠 ──────── */}
      <div className="market-group">
        <div className="group-header spot">元大台灣 0050</div>
        <div className="market-strip cols-3">
          <MCell label="現股" price={m.price_0050} chg={m.chg_0050} chgpct={m.chgpct_0050} dec={2} />
          <MCell label="股期 近" subLabel={fmtMonth(m.etf_near_month)}
                 price={m.etf_near} chg={m.chg_etf_near} chgpct={m.chgpct_etf_near} dec={2} />
          <MCell label="股期 遠" subLabel={fmtMonth(m.etf_far_month)}
                 price={m.etf_far}  chg={m.chg_etf_far}  chgpct={m.chgpct_etf_far} dec={2} />

function OptionCard({ type, data, taiex }) {
  if (!data) return null;
  const spread    = data.ask - data.bid;
  const spreadPct = data.mid > 0 ? spread / data.mid * 100 : 0;
  const spreadCls = spreadPct > 25 ? 'warn' : spreadPct > 15 ? 'caution' : 'ok';
  const dist      = taiex > 0 ? (data.strike - taiex) / taiex * 100 : null;
  return (
    <div className="option-card">
      <div className="opt-header">
        <span className={`opt-badge ${type}`}>{type.toUpperCase()}</span>
        <span className="opt-strike">{fmt(data.strike)}</span>
        {dist != null && (
          <span className={`dist-badge ${type}`}>
            {dist >= 0 ? '+' : ''}{dist.toFixed(1)}%
          </span>
        )}
      </div>
      <div className="opt-prices">
        <span><span className="pkey">ASK（賣）</span><span className="pval">{data.ask}</span></span>
        <span><span className="pkey">MID（中）</span><span className="pval">{data.mid}</span></span>
        <span><span className="pkey">BID（買）</span><span className="pval">{data.bid}</span></span>
        <span><span className="pkey">VOL（量）</span><span className="pval">{data.volume}</span></span>
        <span><span className="pkey">δ Delta</span><span className="pval">{data.delta != null ? data.delta.toFixed(3) : '—'}</span></span>
      </div>
      <div className="spread-row">
        <span>Bid-Ask Spread（買賣價差）</span>
        <span className={`spread-val ${spreadCls}`}>
          {spread} pts ({spreadPct.toFixed(0)}%){spreadPct > 25 ? ' ⚠' : ''}
        </span>
      </div>
      <div className="opt-symbol">{data.symbol}</div>
    </div>
  );
}

function StructCard({ s, isRecommended, taiex, compact = false }) {
  const pct     = Math.min(100, s.protection_pct);
  const putDist = s.puts > 0 && taiex > 0
    ? (s.put_strike - taiex) / taiex * 100
    : null;
  return (
    <div className={`struct-card ${isRecommended ? 'recommended' : ''} ${compact ? 'compact' : ''}`}>
      {isRecommended && <div className="recommended-badge">推薦</div>}
      <div className="struct-name">{s.name}</div>
      <div className="struct-desc">{s.desc}</div>
      <div className="struct-legs">{s.calls}C / {s.puts}P</div>
      <div className="struct-strikes">
        Call {fmt(s.call_strike)} @ {s.call_premium}<br/>
        Put &nbsp;{fmt(s.put_strike)} @ {s.put_premium}
      </div>
      <div className={`struct-net ${s.is_net_credit ? 'credit' : 'debit'}`}>
        {fmtNet(s.monthly_net)}
      </div>
      <div className="struct-protection">
        <div className="struct-protection-fill" style={{ width: `${pct}%` }} />
      </div>
      <div className="struct-pct-label">避險覆蓋 {pct.toFixed(0)}%</div>
      <div className="struct-pct-label" style={{marginTop:'3px'}}>
        {putDist != null
          ? <span style={{color:'#94a3b8'}}>Put 生效需跌 <span style={{color:'#fca5a5', fontWeight:700}}>{Math.abs(putDist).toFixed(1)}%</span></span>
          : <span style={{color:'#475569'}}>無下行保護</span>
        }
      </div>
      <div className={s.is_net_credit ? 'credit-tag' : 'debit-tag'}>
        {s.is_net_credit ? '✓ Credit（收）' : '✗ Debit（付）'}
      </div>
    </div>
  );
}

function SectionNear({ data, taiex }) {
  return (
    <>
      <div className="section-divider near">
        <span className="section-title">近月 {data.txo_month} · DTE {data.dte} 天</span>
      </div>
      <div className="options-row">
        <OptionCard type="put"  data={data.selected_options?.put}  taiex={taiex} />
        <OptionCard type="call" data={data.selected_options?.call} taiex={taiex} />
      </div>
      <div className="structures">
        {data.structures?.map((s, i) => (
          <StructCard key={s.name} s={s} isRecommended={i === 0} taiex={taiex} />
        ))}
      </div>
    </>
  );
}

function SectionWeekly({ weekly, label, taiex }) {
  if (!weekly) return null;
  const { delivery_month, settlement_date, series, dte, selected_options, structures } = weekly;
  const fmt8 = d => d ? `${d.slice(0,4)}/${d.slice(4,6)}/${d.slice(6,8)}` : d;
  const origLabel = fmt8(delivery_month);
  const adjLabel  = settlement_date && settlement_date !== delivery_month ? fmt8(settlement_date) : null;
  return (
    <>
      <div className="section-divider weekly">
        <span className="section-title">
          {label} {series} · {origLabel}{adjLabel ? ` → 結算 ${adjLabel}` : ''} · DTE {dte} 天
        </span>
      </div>
      <div className="options-row">
        <OptionCard type="put"  data={selected_options?.put}  taiex={taiex} />
        <OptionCard type="call" data={selected_options?.call} taiex={taiex} />
      </div>
      <div className="structures compact-grid">
        {structures?.map((s, i) => (
          <StructCard key={s.name} s={s} isRecommended={i === 0} taiex={taiex} compact />
        ))}
      </div>
    </>
  );
}

function SectionFarMonth({ farMonth, taiex }) {
  if (!farMonth) return null;

  return (

        <span className="section-title">遠月 {txo_month} · DTE {dte} 天 · 結算日換倉目標</span>
      </div>
      <div className="options-row">
        <OptionCard type="put"  data={selected_options?.put}  taiex={taiex} />
        <OptionCard type="call" data={selected_options?.call} taiex={taiex} />
      </div>
      <div className="structures compact-grid">
        {structures?.map((s, i) => (
          <StructCard key={s.name} s={s} isRecommended={i === 0} taiex={taiex} compact />
        ))}
      </div>
    </>
  );
}

function Section0050({ collar, taiex }) {
  if (!collar) return null;
  const { price_0050, chg_0050, chgpct_0050, lots, lot_size, notional, beta, beta_adj_ratio, recommended_contracts, structures } = collar;
  const chgCls = chg_0050 == null ? '' : chg_0050 > 0 ? 'up' : chg_0050 < 0 ? 'down' : '';
  return (
    <>
      <div className="section-divider etf">
        <span className="section-title">0050 股期 {lots} 口 對應台指選擇權領口</span>

      <div className="info-bar-0050">
        <div className="ib-item">
          <span className="ib-key">0050 現價</span>
          <span className={`ib-val ${chgCls}`} style={chg_0050 != null ? {color: chg_0050 > 0 ? '#f87171' : chg_0050 < 0 ? '#4ade80' : undefined} : {}}>
            {price_0050?.toFixed(2)}
          </span>
          {chg_0050 != null && (
            <span className={`chg-label ${chgCls}`} style={{color: chg_0050 > 0 ? '#f87171' : '#4ade80'}}>
              {chg_0050 >= 0 ? '+' : ''}{chg_0050.toFixed(2)} ({chg_0050 >= 0 ? '+' : ''}{chgpct_0050?.toFixed(2)}%)
            </span>
          )}
        </div>
        <div className="ib-item">
          <span className="ib-key">{lots}口名目（{lot_size.toLocaleString()}單位/口）</span>
          <span className="ib-val">{(notional / 10000).toFixed(0)} 萬</span>
        </div>
        <div className="ib-item">
          <span className="ib-key">Beta（貝塔）vs TAIEX</span>
          <span className="ib-val">{beta}</span>
        </div>
        <div className="ib-item">
          <span className="ib-key">Beta（貝塔）調整比例</span>

        ))}
      </div>
    </>
  );
}

const PTR_THRESHOLD = 70;

function usePullToRefresh(onRefresh, enabled) {
  const startY   = React.useRef(null);
  const distRef  = React.useRef(0);
  const [pullDist, setPullDist] = React.useState(0);

  const cb = React.useRef(onRefresh);
  React.useEffect(() => { cb.current = onRefresh; }, [onRefresh]);

  React.useEffect(() => {
    if (!enabled) return;

    function onTouchStart(e) {
      startY.current = e.touches[0].clientY;   // 永遠記錄，touchmove 再判斷
    }
    function onTouchMove(e) {
      if (startY.current === null) return;
      const d = e.touches[0].clientY - startY.current;
      if (window.scrollY <= 0 && d > 0) {
        // 頁面在頂部且往下拉：接管手勢
        e.preventDefault();
        distRef.current = Math.min(d, PTR_THRESHOLD * 1.5);
        setPullDist(distRef.current);
      } else if (d <= 0 || window.scrollY > 0) {
        // 往上滑或不在頂部：放棄追蹤，讓瀏覽器正常捲動
        if (distRef.current > 0) { distRef.current = 0; setPullDist(0); }
        startY.current = null;
      }
    }
    function onTouchEnd() {
      if (distRef.current >= PTR_THRESHOLD) cb.current();
      distRef.current = 0;
      startY.current  = null;
      setPullDist(0);
    }

    document.addEventListener('touchstart', onTouchStart, { passive: true });
    document.addEventListener('touchmove',  onTouchMove,  { passive: false });
    document.addEventListener('touchend',   onTouchEnd);
    return () => {
      document.removeEventListener('touchstart', onTouchStart);
      document.removeEventListener('touchmove',  onTouchMove);
      document.removeEventListener('touchend',   onTouchEnd);
    };
  }, [enabled]);

  return pullDist;
}

function App() {
  const [data, setData] = React.useState(null);
  const [error, setError] = React.useState(null);
  const [loading, setLoading] = React.useState(true);
  const [refreshing, setRefreshing] = React.useState(false);
  const countdownRef = React.useRef(null);

  async function fetchData() {
    try {
      const res = await fetch(DATA_URL);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const json = await res.json();
      setData(json);
      setError(null);
    } catch (e) {
      setError(e.message);
    } finally {
      setLoading(false);
    }
  }

  async function triggerRefresh() {
    setRefreshing(true);
    try {
      await fetch(REFRESH_URL);
    } catch (_) {}
    await fetchData();
    setRefreshing(false);
  }

  const pullDist = usePullToRefresh(triggerRefresh, !refreshing);
  const pulling  = pullDist > 0;
  const ready    = pullDist >= PTR_THRESHOLD;

  React.useEffect(() => {
    triggerRefresh();
    countdownRef.current = setInterval(triggerRefresh, REFRESH_MS);
    return () => clearInterval(countdownRef.current);
  }, []);

  return (
    <MarketStatusProvider>
    <div className="app">
      {/* Pull-to-refresh indicator */}
      {(pulling || refreshing) && (
        <div className="ptr-bar" style={{ height: refreshing ? '44px' : `${Math.min(pullDist, PTR_THRESHOLD)}px` }}>
          {refreshing
            ? <div className="ptr-spinner" />
            : <span className="ptr-text" style={{ color: ready ? '#4ade80' : '#475569' }}>
                {ready ? '↑ 放開更新' : '↓ 繼續下拉'}
              </span>
          }
        </div>
      )}

      <div className="header">
        <h1>2330 0050 選擇權策略</h1>
        <div className="header-right">
          {data && !refreshing && (
            <span style={{color:'#334155', fontSize:'11px'}}>
              資料 {fmtTime(data.timestamp)}
            </span>
          )}
          {refreshing && <span style={{color:'#475569'}}>更新中…</span>}
          <MarketStatus />
        </div>
      </div>

      {error && <div className="error-box">⚠ 載入失敗：{error}</div>}

      {loading && !data ? (
        <div className="state-box">
          <div className="spinner" />
          <p>{refreshing ? '向永豐抓取最新報價…' : '讀取本機資料…'}</p>
        </div>
      ) : data ? (
        <>
          <MarketStrip market={data.market} txo_month={data.txo_month} dte={data.dte}
                       indicators={data.indicators} targets={data.targets}
                       indicators0050={data.indicators_0050} />
          <DTEWarning dte={data.dte} />
          <MarketHoursNote />
          {(() => {
            const taiex = data.market?.taiex;
            const sections = [
              { dte: data.dte,                  key: 'near',      el: <SectionNear    data={data}                      taiex={taiex} /> },
              data.weekly_wed && { dte: data.weekly_wed.dte, key: 'weekly_wed', el: <SectionWeekly weekly={data.weekly_wed} label="週三週選" taiex={taiex} /> },
              data.weekly_fri && { dte: data.weekly_fri.dte, key: 'weekly_fri', el: <SectionWeekly weekly={data.weekly_fri} label="週五週選" taiex={taiex} /> },
              data.far_month  && { dte: data.far_month.dte,  key: 'far',        el: <SectionFarMonth farMonth={data.far_month}              taiex={taiex} /> },
            ].filter(Boolean).sort((a, b) => a.dte - b.dte);
            return sections.map(s => <React.Fragment key={s.key}>{s.el}</React.Fragment>);
          })()}
          <Section0050 collar={data.collar_0050} taiex={data.market?.taiex} />
          <div style={{
            marginTop:'24px', padding:'12px 0',
            borderTop:'1px solid #1e2535',
            fontSize:'11px', color:'#334155', lineHeight:'1.8',
          }}>
            ⚠ TXO 領式對沖的是加權指數系統性風險，無法涵蓋台積電或 0050 的個股特定風險。當標的因個別消息劇烈波動而大盤未同步下跌時，Put 保護效果有限。
          </div>
        </>
      ) : null}
    </div>
    </MarketStatusProvider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
