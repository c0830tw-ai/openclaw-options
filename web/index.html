<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>2330 0050е°ҚжҮүеӨ§зӣӨйҒёж“Үж¬Ҡй ҳеҸЈзӯ–з•Ҙ</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { background: #0f1117; }
    body {
      background: #0f1117;
      color: #e2e8f0;
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 14px;
      min-height: 100vh;
      min-height: -webkit-fill-available;
      padding: 20px;
      padding-bottom: max(20px, calc(env(safe-area-inset-bottom) + 20px));
      overscroll-behavior-y: none;
      /* з”ЁжҲ¶ 5/17 иҰҒжұӮеӯ—й«”ж”ҫеӨ§пјҲ49 жӯІзңјзқӣеҗғеҠӣпјүвҖ” е…Ёй Ғйқў zoom 1.15 */
      /* zoom еңЁ Safari/Chrome/iOS ж”ҜжҸҙпјӣFirefox дёҚж”ҜжҸҙдҪҶ fallback дёҚеҪұйҹҝеҠҹиғҪ */
      zoom: 1.15;
    }
    @media (max-width: 600px) {
      body { padding: 12px 10px; font-size: 13px; }
    }

    /* Mobile utility classes for new dashboard components */
    .ba-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
    }
    @media (max-width: 600px) {
      .ba-grid { grid-template-columns: 1fr; gap: 4px; }
    }
    .leg-form-row {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
      align-items: center;
    }
    @media (max-width: 600px) {
      .leg-form-row input, .leg-form-row select {
        font-size: 14px !important;
        padding: 5px 6px !important;
        min-height: 30px;
      }
      .leg-form-row button { min-height: 30px; padding: 4px 10px !important; }
      .leg-form-row > span { font-size: 11px !important; }
    }
    .metric-grid-6 {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 4px;
    }
    @media (max-width: 600px) {
      .metric-grid-6 { grid-template-columns: repeat(2, 1fr); }
    }
    .scenario-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    @media (max-width: 600px) {
      .scenario-grid > div { flex: 1 1 100% !important; }
    }
    .calendar-cell { min-height: 52px; padding: 3px 4px; }
    @media (max-width: 600px) {
      .calendar-cell { min-height: 44px; padding: 2px 3px; }
      .calendar-cell .mark-text { font-size: 7px !important; }
    }
    .preset-btn-row button {
      min-height: 28px;
    }
    @media (max-width: 600px) {
      .preset-btn-row button { min-height: 32px; padding: 4px 10px !important; font-size: 11px !important; }
    }

    /* Pastel palette overrides вҖ” softer red/green for long-session comfort */
    :root {
      --pastel-good:    #86efac;
      --pastel-good-d:  #4ade80;   /* deeper variant for emphasis */
      --pastel-bad:     #fca5a5;
      --pastel-bad-d:   #f87171;
      --pastel-warn:    #fcd34d;
      --pastel-info:    #93c5fd;
    }

    /* Primary metric emphasis вҖ” big numbers stand out */
    .metric-primary {
      font-size: 20px;
      font-weight: 700;
      color: #f1f5f9;
      letter-spacing: 0.02em;
    }
    .metric-primary.up   { color: var(--pastel-good); }
    .metric-primary.down { color: var(--pastel-bad);  }
    .metric-primary.neu  { color: #cbd5e1; }
    .metric-secondary {
      font-size: 10px;
      color: #64748b;
    }

    /* Subtle hover for interactive cards */
    .clickable-card { transition: border-color 0.15s, background 0.15s; }
    .clickable-card:hover {
      border-color: #475569 !important;
      background: #0d1325 !important;
    }

    /* === Mobile polish round 2 === */

    @media (max-width: 600px) {
      .header { flex-wrap: wrap; }
      .header-right { gap: 6px; flex-wrap: wrap; row-gap: 4px; }
      .header-right span { font-size: 10px !important; }
    }

    .leg-pair-grid {
      display: flex; gap: 6px; flex-wrap: wrap;
    }
    .leg-pair-grid > div { flex: 1 1 200px; }
    @media (max-width: 600px) {
      .leg-pair-grid > div { flex: 1 1 100% !important; min-width: 100% !important; }
    }

    .ladder-row {
      display: flex; gap: 4px; flex-wrap: wrap;
    }
    .ladder-row > div { flex: 1 1 100px; }
    @media (max-width: 600px) {
      .ladder-row > div {
        flex: 1 1 calc(33% - 4px) !important;
        min-width: 88px !important; padding: 6px 4px !important;
      }
      .ladder-row button { font-size: 10px !important; padding: 3px 4px !important; }
    }

    .greeks-3-grid {
      display: flex; gap: 8px; flex-wrap: wrap;
    }
    .greeks-3-grid > div { flex: 1 1 160px; }
    @media (max-width: 600px) {
      .greeks-3-grid > div { flex: 1 1 100% !important; }
    }

    .table-scroll-wrap {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }
    @media (max-width: 600px) {
      .table-scroll-wrap table { min-width: 480px; font-size: 10px; }
    }

    @media (max-width: 600px) {
      .health-4bar { gap: 3px !important; }
      .health-4bar > div { min-width: 0 !important; padding: 4px 3px !important; }
      .health-4bar > div > div:first-child { font-size: 8px !important; }
    }

    /* === еӯ—зҙҡйҡҺеұӨ polish === */
    /* Hero metric вҖ” жңҖеӨ§гҖҒжңҖйҮҚиҰҒзҡ„е–®дёҖж•ёеӯ—пјҲIV%гҖҒDD%гҖҒscoreгҖҒscenario P&Lпјү*/
    .hero-num {
      font-size: 24px;
      font-weight: 700;
      letter-spacing: 0.02em;
      line-height: 1.1;
    }
    @media (max-width: 600px) { .hero-num { font-size: 20px; } }

    /* Primary metric вҖ” ж¬ЎйҮҚиҰҒж•ёеӯ—пјҲО”/Оё/ОҪ ж•ёеҖјгҖҒcumulative breakdownпјү*/
    .primary-num {
      font-size: 17px;
      font-weight: 700;
      line-height: 1.15;
    }
    @media (max-width: 600px) { .primary-num { font-size: 15px; } }

    /* Section header bigger */
    .section-title {
      font-size: 13px !important;
      letter-spacing: 1px;
    }

    /* Card title slightly bigger */
    .card-title {
      font-size: 12px;
      font-weight: 700;
    }

    /* Footnote slightly bigger for readability */
    .footnote {
      font-size: 10px;
      color: #64748b;
    }

    .app { max-width: 900px; margin: 0 auto; }

    /* Header */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      padding: 12px 0 16px;
      border-bottom: 1px solid #1e2535;
      margin-bottom: 16px;
      gap: 8px;
    }
    .header h1 { font-size: 18px; color: #7dd3fc; letter-spacing: 0.05em; line-height: 1.3; }
    .header-right { display: flex; align-items: center; gap: 12px; color: #64748b; font-size: 12px; white-space: nowrap; }
    @media (max-width: 600px) {
      .header h1 { font-size: 15px; }
    }
    /* Market strip вҖ” дёүеҚҖеҲҶзө„ */
    .market-wrapper { margin-bottom: 16px; display: flex; flex-direction: column; gap: 4px; }
    .market-group   { border-radius: 8px; overflow: hidden; border: 1px solid #1e2535; }
    .group-header   {
      background: #0d1220;
      padding: 4px 12px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.1em;
      color: #475569;
    }
    .group-header.spot    { color: #7dd3fc; }
    .group-header.futures { color: #c4b5fd; }
    .group-header.stock-f { color: #fcd34d; }
    .market-strip {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1px;
      background: #1e2535;
    }
    .market-strip.cols-3 { grid-template-columns: repeat(3, 1fr); }
    @media (max-width: 600px) {
      .market-strip        { grid-template-columns: repeat(2, 1fr); }
      .market-strip.cols-3 { grid-template-columns: repeat(3, 1fr); }
    }
    .market-cell {
      background: #13192a;
      padding: 10px 14px;
    }
    @media (max-width: 600px) {
      .market-cell { padding: 9px 11px; }
    }
    .market-cell .label { font-size: 10px; color: #475569; margin-bottom: 3px; }
    .market-cell .sub-label { font-size: 9px; color: #334155; margin-bottom: 2px; }
    .market-cell .value { font-size: 18px; font-weight: 600; color: #f1f5f9; }
    .market-cell .value.up   { color: #f87171; }
    .market-cell .value.down { color: #4ade80; }
    .market-cell .value.tag  { font-size: 13px; color: #7dd3fc; }
    .market-cell .value.na   { color: #334155; font-size: 14px; }
    .chg-label { font-size: 10px; margin-top: 2px; }
    .chg-label.up   { color: #f87171; }
    .chg-label.down { color: #4ade80; }
    @media (max-width: 600px) {
      .market-cell .value { font-size: 15px; }
      .market-cell .value.tag { font-size: 12px; }
    }

    /* Indicator bar */
    .indicator-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 1px;
      background: #1e2535;
      border-top: 1px solid #1e2535;
      overflow: hidden;
      margin-bottom: 0;
    }
    .ind-cell {
      background: #13192a;
      padding: 8px 14px;
      display: flex;
      flex-direction: column;
      gap: 3px;
      flex: 1;
      min-width: 72px;
      border-left: 3px solid transparent;
      transition: background 0.2s, border-left-color 0.2s;
    }
    @media (max-width: 600px) {
      .ind-cell { min-width: 60px; padding: 7px 10px; }
    }
    .ind-cell.mood-good    { background: #091a0d; border-left-color: #22c55e; }
    .ind-cell.mood-caution { background: #17130a; border-left-color: #eab308; }
    .ind-cell.mood-warn    { background: #1a0e03; border-left-color: #f97316; }
    .ind-cell.mood-risk    { background: #1a0505; border-left-color: #ef4444; }
    .ind-cell .ind-key { font-size: 10px; color: #475569; white-space: nowrap; }
    .ind-cell .ind-key .ind-src { font-size: 9px; color: #334155; margin-left: 3px; }
    .ind-cell .ind-val { font-size: 13px; color: #cbd5e1; font-weight: 600; }
    .ind-cell .ind-val.hi  { color: #86efac; }
    .ind-cell .ind-val.lo  { color: #fca5a5; }
    .ind-cell .ind-val.tag { color: #7dd3fc; }
    .ind-cell .ind-badge { font-size: 10px; font-weight: 600; margin-top: 1px; }
    .ind-cell .ind-badge.hi  { color: #86efac; }
    .ind-cell .ind-badge.lo  { color: #fca5a5; }
    .ind-cell .ind-badge     { color: #94a3b8; }
    .ind-mood-dot {
      display: inline-block;
      width: 6px; height: 6px;
      border-radius: 50%;
      margin-left: 5px;
      vertical-align: middle;
      flex-shrink: 0;
    }
    .ind-verdict {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.04em;
      margin-top: 3px;
    }
    .ind-divider {
      width: 1px;
      background: #1e2535;
      align-self: stretch;
    }

    /* Options row */
    .options-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 16px;
    }
    @media (max-width: 480px) {
      .options-row { grid-template-columns: 1fr; }
    }
    .option-card {
      background: #13192a;
      border: 1px solid #1e2535;
      border-radius: 8px;
      padding: 12px 16px;
    }
    .option-card .opt-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }
    .opt-badge {
      font-size: 11px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 3px;
      letter-spacing: 0.05em;
    }
    .opt-badge.put { background: #7f1d1d; color: #fca5a5; }
    .opt-badge.call { background: #14532d; color: #86efac; }
    .opt-strike { font-size: 18px; font-weight: 700; }
    .opt-prices {
      display: flex;
      flex-wrap: wrap;
      gap: 10px 16px;
      font-size: 12px;
      color: #64748b;
    }
    .opt-prices span { display: flex; flex-direction: column; gap: 2px; min-width: 52px; }
    .opt-prices .pkey { font-size: 10px; color: #475569; }
    .opt-prices .pval { color: #cbd5e1; font-size: 13px; }
    .opt-prices .pval.pval-dim     { color: #475569; }
    .opt-prices .pval.pval-ok      { color: #4ade80; }
    .opt-prices .pval.pval-caution { color: #eab308; }
    .opt-prices .pval.pval-warn    { color: #f97316; }
    .opt-prices .pval.pval-risk    { color: #f87171; }
    .vol-warn { color: #f87171; }
    .vol-caution { color: #fb923c; }
    .opt-symbol { font-size: 10px; color: #334155; margin-top: 6px; }
    .opt-ref-row {
      display: flex;
      gap: 20px;
      font-size: 12px;
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid #1e2535;
    }
    .opt-ref-row span { display: flex; flex-direction: column; gap: 2px; }
    .opt-ref-row .rkey { font-size: 10px; color: #475569; }
    .opt-ref-row .rval { font-size: 13px; color: #94a3b8; font-weight: 600; }
    .dist-badge {
      font-size: 11px;
      font-weight: 700;
      padding: 2px 7px;
      border-radius: 3px;
    }
    .dist-badge.put  { background: #7f1d1d55; color: #fca5a5; }
    .dist-badge.call { background: #14532d55; color: #86efac; }
    .spread-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid #1e2535;
      font-size: 11px;
      color: #475569;
    }
    .spread-val { font-weight: 700; font-size: 12px; }
    .spread-val.ok      { color: #64748b; }
    .spread-val.caution { color: #fb923c; }
    .spread-val.warn    { color: #f87171; }

    /* Structure cards */
    .structures { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 8px; }
    @media (max-width: 600px) {
      .structures { grid-template-columns: 1fr; }
      /* compact cards (йҖұйҒё/йҒ жңҲ/0050) жүӢж©ҹдёҠ 2ж¬„ */
      .structures.compact-grid { grid-template-columns: repeat(2, 1fr); }
    }
    .struct-card {
      background: #13192a;
      border: 1px solid #1e2535;
      border-radius: 8px;
      padding: 16px;
      position: relative;
      transition: border-color 0.15s;
    }
    .struct-card:hover { border-color: #334155; }
    .struct-card.recommended { border-color: #1d4ed8; }
    .recommended-badge {
      position: absolute;
      top: -1px; right: 12px;
      background: #1d4ed8;
      color: #bfdbfe;
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 0 0 4px 4px;
    }
    .struct-name { font-size: 11px; color: #475569; margin-bottom: 4px; }
    .struct-desc { font-size: 13px; color: #94a3b8; margin-bottom: 12px; }
    .struct-legs {
      font-size: 20px;
      font-weight: 700;
      color: #f1f5f9;
      margin-bottom: 12px;
    }
    .struct-strikes { font-size: 11px; color: #475569; margin-bottom: 12px; line-height: 1.6; }
    .struct-net {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 4px;
    }
    @media (max-width: 600px) {
      .struct-net { font-size: 20px; }
      .struct-legs { font-size: 17px; }
    }
    .struct-net.credit { color: #4ade80; }
    .struct-net.debit { color: #f87171; }
    .struct-protection {
      height: 4px;
      background: #1e2535;
      border-radius: 2px;
      margin-bottom: 6px;
      overflow: hidden;
    }
    .struct-protection-fill {
      height: 100%;
      background: #3b82f6;
      border-radius: 2px;
      transition: width 0.4s ease;
    }
    .struct-pct-label { font-size: 11px; color: #64748b; }
    .credit-tag {
      display: inline-block;
      margin-top: 10px;
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 3px;
      background: #14532d;
      color: #86efac;
    }
    .debit-tag {
      display: inline-block;
      margin-top: 10px;
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 3px;
      background: #7f1d1d;
      color: #fca5a5;
    }

    /* Spread cards */
    .spread-section-title {
      font-size: 11px;
      font-weight: 700;
      color: #475569;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin: 18px 0 8px;
    }
    .spread-cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); gap: 8px; margin-bottom: 12px; }
    @media (max-width: 600px) { .spread-cards { grid-template-columns: repeat(2, 1fr); } }
    .spread-strat-card {
      background: #0d1220;
      border: 1px solid #1e2535;
      border-radius: 8px;
      padding: 12px 14px;
      position: relative;
    }
    .spread-strat-card.credit-card { border-color: #166534; }
    .spread-strat-card.debit-card  { border-color: #7c2d12; }
    .ssc-name  { font-size: 11px; font-weight: 700; color: #94a3b8; margin-bottom: 2px; }
    .ssc-desc  { font-size: 10px; color: #475569; margin-bottom: 6px; }
    .ssc-legs  { font-size: 11px; color: #94a3b8; margin-bottom: 6px; line-height: 1.6; }
    .ssc-net   { font-size: 22px; font-weight: 800; margin-bottom: 2px; }
    .ssc-net.credit { color: #4ade80; }
    .ssc-net.debit  { color: #f87171; }
    .ssc-unit  { font-size: 10px; color: #475569; margin-bottom: 8px; }
    .ssc-pnl   { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 6px; }
    .ssc-pnl-item { font-size: 11px; color: #64748b; }
    .ssc-pnl-item b { font-weight: 700; }
    .ssc-pnl-item.profit b { color: #4ade80; }
    .ssc-pnl-item.loss   b { color: #f87171; }
    .ssc-be    { font-size: 11px; color: #94a3b8; margin-bottom: 6px; }
    .ssc-be b  { color: #e2e8f0; }

    /* Roll panel */
    .roll-panel {
      background: #0d1220;
      border: 1px solid #1e2535;
      border-radius: 8px;
      padding: 12px 16px;
      margin-bottom: 16px;
    }
    .roll-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 5px;
    }
    .roll-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .roll-label { font-size: 13px; font-weight: 700; }
    .roll-month { font-size: 10px; color: #334155; margin-left: auto; }
    .roll-desc  { font-size: 12px; color: #64748b; line-height: 1.5; }
    .roll-actions {
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid #1e2535;
    }
    .roll-action { font-size: 11px; color: #94a3b8; line-height: 1.9; }
    .roll-action span { color: #cbd5e1; font-weight: 600; }

    /* Wheel / з©әжүӢеӣһиЈңйқўжқҝ */
    .wheel-panel {
      background: #080f1e;
      border: 1px solid #1e3a5f;
      border-left: 3px solid #3b82f6;
      border-radius: 10px;
      padding: 12px 14px;
      margin-bottom: 16px;
    }
    .wheel-header {
      font-size: 12px; font-weight: 700; color: #60a5fa;
      margin-bottom: 8px; display: flex; align-items: center; gap: 6px;
    }
    .wheel-rows { display: flex; flex-direction: column; gap: 6px; }
    .wheel-row  { display: flex; gap: 10px; align-items: center; font-size: 12px; flex-wrap: wrap; }
    .wheel-tag  {
      font-size: 10px; background: #1e3a5f; color: #93c5fd;
      padding: 1px 7px; border-radius: 4px; flex-shrink: 0; min-width: 32px; text-align: center;
    }
    .wheel-strike { color: #e2e8f0; font-weight: 600; }
    .wheel-dist   { color: #475569; font-size: 10px; }
    .wheel-note   {
      font-size: 10px; color: #334155; margin-top: 7px; line-height: 1.7;
      border-top: 1px solid #1e2535; padding-top: 6px;
    }
    .wheel-premium { font-size: 11px; color: #64748b; margin-top: 5px; }

    /* Strike proximity alert */
    .strike-alert {
      border-radius: 8px;
      padding: 10px 14px;
      margin-bottom: 10px;
      display: flex;
      align-items: flex-start;
      gap: 10px;
    }

    .section-divider.weekly  .section-title { color: #c4b5fd; }

    .info-bar-0050 .ib-val.accent { color: #7dd3fc; }

</head>
<body>
<div id="root"></div>

<script type="text/babel">
const DATA_URL    = '/api/data';
const REFRESH_URL = '/api/refresh';
function getRefreshMs() {
  const now = new Date();
  const day = now.getDay(); // 0=Sun, 6=Sat
  if (day === 0 || day === 6) return 5 * 60 * 1000;
  const h = now.getHours(), m = now.getMinutes();
  const mins = h * 60 + m;
  // ж—ҘзӣӨ 09:00вҖ“13:30
  if (mins >= 9*60 && mins < 13*60+30) return 60 * 1000;
  return 5 * 60 * 1000;
}

function fmt(n, dec = 0) {
  return Number(n).toLocaleString('zh-TW', { minimumFractionDigits: dec, maximumFractionDigits: dec });
}

function ChgLabel({ chg, chgpct, dec = 0 }) {
  if (chg == null) return null;
  const up  = chg >= 0;
  const cls = up ? 'up' : 'down';
  const sign = up ? '+' : '';
  return (
    <div className={`chg-label ${cls}`}>
      {sign}{fmt(chg, dec)} ({sign}{chgpct != null ? chgpct.toFixed(2) : 'вҖ”'}%)
    </div>
  );
}

function fmtTime(iso) {
  if (!iso) return 'вҖ”';
  return iso.slice(11, 19);
}

function fmtNet(n) {
  const wan = n / 10000;
  return (wan >= 0 ? '+' : '') + wan.toFixed(1) + 'иҗ¬';
}

function getMarketStatus() {
  const now = new Date();
  const day  = now.getDay();
  const mins = now.getHours() * 60 + now.getMinutes();

  if (day === 0) return 'closed';                    // йҖұж—Ҙе…Ёдј‘
  if (day === 6) return mins < 5 * 60 ? 'night' : 'closed'; // йҖұе…ӯеӨңзӣӨе»¶зәҢиҮі 05:00

  // йҖұдёҖпҪһйҖұдә”
  if (mins < 5 * 60)           return 'night';      // 00:00вҖ“05:00 еӨңзӣӨе»¶зәҢ
  if (mins < 9 * 60)           return 'closed';     // 05:00вҖ“09:00 дј‘еёӮ
  if (mins <= 13 * 60 + 30)    return 'open';       // 09:00вҖ“13:30 ж—ҘзӣӨ
  if (mins < 14 * 60)          return 'closed';     // 13:30вҖ“14:00 жҸӣзӣӨз©әжӘ”
  if (mins <= 14 * 60 + 30)    return 'after';      // 14:00вҖ“14:30 зӣӨеҫҢ
  if (mins < 15 * 60)          return 'closed';     // 14:30вҖ“15:00 з©әжӘ”
  return 'night';                                    // 15:00вҖ“24:00 еӨңзӣӨ
}

const MarketStatusCtx = React.createContext('closed');

function MarketStatusProvider({ children }) {
  const [status, setStatus] = React.useState(getMarketStatus);
  React.useEffect(() => {
    const t = setInterval(() => setStatus(getMarketStatus()), 30000);
    return () => clearInterval(t);
  }, []);
  return <MarketStatusCtx.Provider value={status}>{children}</MarketStatusCtx.Provider>;
}

function MarketStatus() {
  const status = React.useContext(MarketStatusCtx);
  const labels = { open: 'ж—ҘзӣӨ', after: 'зӣӨеҫҢ', night: 'еӨңзӣӨ', closed: 'дј‘еёӮ' };
  return (
    <span className={`market-status ${status}`}>
      <span className="dot" />
      {labels[status]}
    </span>
  );
}

function DTEWarning({ dte }) {
  if (dte == null || dte >= 5) return null;
  return (
    <div className="banner dte-warn">
      вҡ  DTEпјҲеҲ°жңҹеӨ©ж•ёпјү{dte} еӨ©пјҢUI е·ІеҲҮжҸӣиҮіж¬ЎжңҲиЁҲз®—гҖӮи«ӢзўәиӘҚзҸҫжңүжңҲйҒёеҖүдҪҚзҡ„е№іеҖүжҷӮж©ҹгҖӮ
    </div>
  );
}

function MarketHoursNote() {
  const status = React.useContext(MarketStatusCtx);
  if (status === 'open') return null;
  const notes = {
    after:  'зӣӨеҫҢдәӨжҳ“дёӯпјҲ14:00вҖ“14:30пјүпјҢйҒёж“Үж¬Ҡе ұеғ№зӮәж—ҘзӣӨжңҖеҫҢжҲҗдәӨ',
    night:  'еӨңзӣӨдёӯпјҲ15:00вҖ“05:00пјүпјҢTXO еӨңзӣӨжөҒеӢ•жҖ§дҪҺпјҢе ұеғ№еғ…дҫӣеҸғиҖғ',
    closed: 'дј‘еёӮдёӯпјҢе ұеғ№зӮәжңҖиҝ‘дәӨжҳ“ж—Ҙж”¶зӣӨеғ№',
  };
  return (
    <div className="banner mkt-note">
      {notes[status]}
    </div>
  );
}

// йҖҡз”Ёз·ҡең–пјҡseries = [{label, color, values:[{x, y, label?}]}, ...]
function LineChart({ series, height = 100, showZero = true, yLabel, dateLabels = true }) {
  if (!series || series.length === 0) return null;
  const allVals = series.flatMap(s => (s.values || []).map(p => p.y));
  if (allVals.length < 2) return null;

  let minY = Math.min(...allVals);
  let maxY = Math.max(...allVals);
  if (showZero) {
    if (minY > 0) minY = 0;
    if (maxY < 0) maxY = 0;
  }
  const rangeY = maxY - minY || 1;

  const w = 320, h = height;
  const padL = 40, padR = 8, padT = 8, padB = dateLabels ? 18 : 4;
  const innerW = w - padL - padR;
  const innerH = h - padT - padB;

  const allX = series.flatMap(s => s.values.map(p => p.x));
  const xMin = Math.min(...allX), xMax = Math.max(...allX);
  const rangeX = xMax - xMin || 1;

  const px = x => padL + ((x - xMin) / rangeX) * innerW;
  const py = y => padT + ((maxY - y) / rangeY) * innerH;
  const zeroY = py(0);

  const fmtY = v => {
    const a = Math.abs(v);
    if (a >= 1_000_000) return (v / 1_000_000).toFixed(1) + 'M';
    if (a >= 1000) return Math.round(v).toLocaleString();
    return v.toFixed(2);
  };

  return (
    <svg viewBox={`0 0 ${w} ${h}`} preserveAspectRatio="none"
         style={{width:'100%', height:`${h}px`, display:'block'}}>
      <text x="2" y={padT + 6} fontSize="9" fill="#64748b">{fmtY(maxY)}</text>
      <text x="2" y={h - padB} fontSize="9" fill="#64748b">{fmtY(minY)}</text>
      {yLabel && <text x="2" y={padT + 16} fontSize="8" fill="#475569">{yLabel}</text>}

      {showZero && minY < 0 && maxY > 0 && (
        <line x1={padL} y1={zeroY} x2={padL + innerW} y2={zeroY}
              stroke="#1e2535" strokeDasharray="2,2" strokeWidth="0.5" />
      )}
      <rect x={padL} y={padT} width={innerW} height={innerH}
            fill="none" stroke="#1e2535" strokeWidth="0.5" />

      {series.map((s, i) => {
        if (s.values.length < 2) return null;
        const points = s.values.map(p => `${px(p.x).toFixed(1)},${py(p.y).toFixed(1)}`).join(' ');
        return <polyline key={i} fill="none" stroke={s.color || '#60a5fa'}
                          strokeWidth="1.5" points={points} />;
      })}

      {dateLabels && series[0]?.values?.length >= 2 && (
        <>
          <text x={padL} y={h - 4} fontSize="8" fill="#64748b">{series[0].values[0].label || ''}</text>
          <text x={padL + innerW} y={h - 4} fontSize="8" fill="#64748b" textAnchor="end">
            {series[0].values[series[0].values.length - 1].label || ''}
          </text>
        </>
      )}
    </svg>
  );
}

function ChartLegend({ series }) {
  return (
    <div style={{display:'flex', gap:'12px', flexWrap:'wrap', fontSize:'9px', color:'#94a3b8',
                  marginTop:'2px', justifyContent:'center'}}>
      {series.map((s, i) => (
        <span key={i}>
          <span style={{display:'inline-block', width:'12px', height:'2px',
                         background: s.color, marginRight:'4px', verticalAlign:'middle'}} />
          {s.label}
        </span>
      ))}
    </div>
  );
}

function GreeksHistoryChart({ data }) {
  const gh = data?.greeks_history;
  if (!gh || !gh.history || gh.history.length < 2) return null;

  // е»ә 3 жўқ series
  const toX = (i) => i;
  const series = [
    {
      label: 'О” NT/1%TX', color: '#7dd3fc',
      values: gh.history.map((r, i) => ({
        x: toX(i), y: r.delta_ntd_per_1pct_tx || 0,
        label: i === 0 || i === gh.history.length - 1 ? r.date.slice(5) : '',
      })),
    },
    {
      label: 'Оё NT/еӨ©', color: '#fca5a5',
      values: gh.history.map((r, i) => ({
        x: toX(i), y: r.theta_ntd_per_day || 0, label: '',
      })),
    },
    {
      label: 'ОҪ NT/1%IV', color: '#86efac',
      values: gh.history.map((r, i) => ({
        x: toX(i), y: r.vega_ntd_per_pct_iv || 0, label: '',
      })),
    },
  ];

  return (
    <div style={{
      background:'#0a0e1c', border:'1px solid #1e2535',
      borderRadius:'6px', padding:'8px 12px', margin:'8px 0',
      fontSize:'11px', color:'#cbd5e1',
    }}>
      <div style={{display:'flex', justifyContent:'space-between', marginBottom:'4px'}}>
        <span style={{fontWeight:700, color:'#94a3b8'}}>рҹ“Ҳ Greeks иө°еӢўпјҲ{gh.snapshot_count} еӨ©пјү</span>
        <span style={{fontSize:'9px', color:'#64748b'}}>{gh.first_date} вҶ’ д»Ҡж—Ҙ</span>
      </div>
      <LineChart series={series} height={120} yLabel="NT$" />
      <ChartLegend series={series} />
    </div>
  );
}

function EquityChart({ data }) {
  const dd = data?.drawdown;
  if (!dd || !dd.series || dd.series.length < 2) return null;

  const baseEq = dd.series[0].equity;
  const baseTx = dd.series[0].tx;
  const equitySeries = {
    label: 'Equity', color: '#7dd3fc',
    values: dd.series.map((r, i) => ({
      x: i, y: r.equity,
      label: i === 0 || i === dd.series.length - 1 ? r.date.slice(5) : '',
    })),
  };
  // BenchmarkпјҡTX buy-and-holdпјҲnormalized еҲ° base equityпјү
  const hasBench = !!baseTx && dd.series.every(r => r.tx);
  const benchSeries = hasBench ? {
    label: 'TX Buy-Hold', color: '#a78bfa',
    values: dd.series.map((r, i) => ({
      x: i, y: baseEq * (r.tx / baseTx), label: '',
    })),
  } : null;

  // е ұй…¬жҜ”ијғ
  const lastEq = dd.series[dd.series.length - 1].equity;
  const eqRet = ((lastEq - baseEq) / baseEq * 100);
  const benchRet = hasBench ? ((dd.series[dd.series.length - 1].tx - baseTx) / baseTx * 100) : null;

  const ddSeries = {
    label: 'Drawdown %', color: '#fca5a5',
    values: dd.series.map((r, i) => ({ x: i, y: r.dd_pct, label: '' })),
  };

  const fmtPct = v => (v >= 0 ? '+' : '') + v.toFixed(2) + '%';
  const colN = v => v >= 0 ? '#86efac' : '#fca5a5';

  return (
    <div style={{
      background:'#0a0e1c', border:'1px solid #1e2535',
      borderRadius:'6px', padding:'8px 12px', margin:'8px 0',
      fontSize:'11px', color:'#cbd5e1',
    }}>
      <div style={{display:'flex', justifyContent:'space-between', marginBottom:'4px', flexWrap:'wrap'}}>
        <span style={{fontWeight:700, color:'#94a3b8'}}>рҹ’° Equity жӣІз·ҡпјҲ{dd.series.length} еӨ©пјү</span>
        <span style={{fontSize:'10px'}}>
          <b style={{color: colN(eqRet)}}>{fmtPct(eqRet)}</b>
          {benchRet != null && (
            <>
              <span style={{color:'#64748b', margin:'0 4px'}}>vs</span>
              <b style={{color: colN(benchRet)}}>TX {fmtPct(benchRet)}</b>
              <span style={{color:'#64748b', margin:'0 4px'}}>В·</span>
              <b style={{color: colN(eqRet - benchRet)}}>Оұ {fmtPct(eqRet - benchRet)}</b>
            </>
          )}
        </span>
      </div>
      <LineChart
        series={benchSeries ? [equitySeries, benchSeries] : [equitySeries]}
        height={100} showZero={false} yLabel="NT$"
      />
      {benchSeries && <ChartLegend series={[equitySeries, benchSeries]} />}
      <div style={{marginTop:'6px'}}>
        <div style={{fontSize:'9px', color:'#64748b', marginBottom:'2px'}}>Drawdown %</div>
        <LineChart series={[ddSeries]} height={70} dateLabels={false} yLabel="%" />
      </div>
    </div>
  );
}

function GroupDivider({ label, color = '#475569' }) {
  return (
    <div style={{
      display: 'flex', alignItems: 'center', gap: 10,
      margin: '20px 0 8px 0', padding: '0 4px',
    }}>
      <div style={{flex: 1, height: 1, background: `${color}33`}} />
      <span style={{
        fontSize: 11, fontWeight: 700, color: color,
        letterSpacing: '0.1em', textTransform: 'uppercase',
      }}>{label}</span>
      <div style={{flex: 1, height: 1, background: `${color}33`}} />
    </div>
  );
}

function Section({ title, defaultOpen = true, badge, accent = 'gray', children }) {
  const [open, setOpen] = React.useState(defaultOpen);
  const accentColors = {
    yellow: { line: '#fbbf2455', text: '#fcd34d', tint: '#fbbf2408' },
    green:  { line: '#86efac55', text: '#86efac', tint: '#86efac08' },
    blue:   { line: '#60a5fa55', text: '#7dd3fc', tint: '#60a5fa08' },
    gray:   { line: '#1e2535',   text: '#cbd5e1', tint: 'transparent' },

function DataAge({ timestamp }) {
  const [now, setNow] = React.useState(Date.now);
  React.useEffect(() => {
    const t = setInterval(() => setNow(Date.now()), 30000);
    return () => clearInterval(t);
  }, []);
  if (!timestamp) return null;
  const mins = Math.floor((now - new Date(timestamp)) / 60000);
  const stale = mins > 8;
  const label = mins < 1 ? 'еүӣжӣҙж–°' : `${mins} еҲҶйҗҳеүҚ`;
  return (
    <span style={{color: stale ? '#f97316' : '#334155', fontSize:'11px'}}>
      {stale ? 'вҡ  ' : ''}{label}
    </span>
  );
}

function hvMood(hv) {
  if (hv == null) return { cls: '', dot: '#475569', label: '' };
  if (hv < 0.15)  return { cls: 'mood-good',    dot: '#22c55e', label: 'дҪҺжіўеӢ•' };
  if (hv < 0.25)  return { cls: '',              dot: '#94a3b8', label: 'жӯЈеёё' };
  if (hv < 0.35)  return { cls: 'mood-caution',  dot: '#eab308', label: 'еҒҸй«ҳ' };
  return               { cls: 'mood-risk',    dot: '#ef4444', label: 'й«ҳжіўеӢ•' };
}

function adxMood(adx) {
  if (adx == null) return { cls: '', dot: '#475569', label: '' };
  if (adx < 20)    return { cls: 'mood-good',    dot: '#22c55e', label: 'зӣӨж•ҙ' };
  if (adx < 25)    return { cls: '',              dot: '#94a3b8', label: 'ејұи¶Ё' };
  if (adx < 35)    return { cls: 'mood-caution',  dot: '#eab308', label: 'и¶ЁеӢў' };
  return                { cls: 'mood-warn',    dot: '#f97316', label: 'еј·и¶Ё' };
}

function overallMood(hvVal, adx) {
  const hm = hvMood(hvVal);
  const am = adxMood(adx);
  const moodRank = { 'mood-risk': 4, 'mood-warn': 3, 'mood-caution': 2, 'mood-good': 1, '': 0 };
  const worst = Math.max(moodRank[hm.cls], moodRank[am.cls]);
  if (worst >= 4) return { label: 'й«ҳйўЁйҡӘ', color: '#ef4444' };
  if (worst === 3) return { label: 'дё»еӢ•з®ЎзҗҶ', color: '#f97316' };
  if (worst === 2) return { label: 'з•ҷж„Ҹ', color: '#eab308' };
  if (worst === 1) return { label: 'з©©еҒҘ', color: '#22c55e' };
  return              { label: 'вҖ”', color: '#475569' };
}

function hvPctMood(pct) {
  if (pct == null) return { color: '#475569', label: '' };
  if (pct >= 85)   return { color: '#f97316', label: `${pct.toFixed(0)}th%ile` };
  if (pct >= 65)   return { color: '#eab308', label: `${pct.toFixed(0)}th%ile` };
  if (pct >= 35)   return { color: '#94a3b8', label: `${pct.toFixed(0)}th%ile` };
  return               { color: '#4ade80', label: `${pct.toFixed(0)}th%ile` };
}

function huiSPZone(hvVal) {
  if (hvVal == null) return null;
  const hv = hvVal * 100;
  if (hv > 35) return { zone: '8вҖ“10%', color: '#ef4444' };
  if (hv > 20) return { zone: '5вҖ“8%',  color: '#f97316' };
  if (hv > 15) return { zone: '5%',    color: '#eab308' };
  return             { zone: '3вҖ“5%',  color: '#22c55e' };
}

function huiCapitalPct(dte) {
  if (dte == null) return null;
  if (dte <= 2)  return '80вҖ“100%';
  if (dte <= 7)  return '60вҖ“70%';
  if (dte <= 14) return '40вҖ“50%';
  if (dte <= 21) return '20вҖ“30%';
  return '10вҖ“15%';
}

function deltaCls(delta) {
  if (delta == null) return '';
  const abs = Math.abs(delta);
  if (abs < 0.005) return 'pval-dim';
  if (abs <= 0.08)  return 'pval-ok';
  if (abs <= 0.12)  return 'pval-caution';
  return 'pval-warn';
}

function fmtDelta(delta) {
  if (delta == null) return 'вҖ”';
  if (Math.abs(delta) < 0.0005) return 'вүҲ 0';
  return delta.toFixed(3);
}

function OptionCard({ type, data, taiex, taiexHigh, taiexLow, price2330, price0050 }) {
  if (!data) return null;
  const spread    = data.ask - data.bid;
  const spreadPct = data.mid > 0 ? spread / data.mid * 100 : 0;

function PayoffMini({ s, currentTX, height = 70 }) {
  if (!s || !currentTX) return null;
  const c = s.calls || 0, p = s.puts || 0;
  const cP = s.call_premium || 0, pP = s.put_premium || 0;
  const cK = s.call_strike, pK = s.put_strike;
  const M = 50;  // NTD per TX point
  const netPts = cP * c - pP * p;
  const pnl = S => {
    const callPay = c * Math.max(0, S - (cK || 0));
    const putPay  = p * Math.max(0, (pK || 0) - S);
    return (netPts + putPay - callPay) * M;
  };
  const xMin = currentTX * 0.85;
  const xMax = currentTX * 1.15;
  const N = 80, step = (xMax - xMin) / N;
  let pts = [], yMin = Infinity, yMax = -Infinity;
  for (let i = 0; i <= N; i++) {
    const S = xMin + i*step, y = pnl(S);
    pts.push([S, y]);
    if (y < yMin) yMin = y;
    if (y > yMax) yMax = y;
  }
  if (yMin === yMax) { yMin -= 1000; yMax += 1000; }
  const yPad = (yMax - yMin) * 0.12;
  yMin -= yPad; yMax += yPad;

  const W = 240, H = height, padL = 4, padR = 4, padT = 4, padB = 14;
  const xs = x => padL + ((x - xMin) / (xMax - xMin)) * (W - padL - padR);
  const ys = y => padT + (1 - (y - yMin) / (yMax - yMin)) * (H - padT - padB);
  const yZero = ys(0), xCur = xs(currentTX);

  const linePath = pts.map((q, i) => `${i===0?'M':'L'}${xs(q[0]).toFixed(2)},${ys(q[1]).toFixed(2)}`).join(' ');
  // еҚҖеҹҹеЎ«е……пјҡ>=0 з¶ гҖҒ<0 зҙ…
  const greenArea = `M${xs(xMin).toFixed(2)},${yZero} ` +
    pts.map(q => `L${xs(q[0]).toFixed(2)},${ys(Math.max(0, q[1])).toFixed(2)}`).join(' ') +
    ` L${xs(xMax).toFixed(2)},${yZero} Z`;
  const redArea = `M${xs(xMin).toFixed(2)},${yZero} ` +
    pts.map(q => `L${xs(q[0]).toFixed(2)},${ys(Math.min(0, q[1])).toFixed(2)}`).join(' ') +
    ` L${xs(xMax).toFixed(2)},${yZero} Z`;

  const fmtK = k => `${(Math.round(k/100)/10).toFixed(1)}k`;
  return (
    <svg width="100%" viewBox={`0 0 ${W} ${H}`} preserveAspectRatio="none"
         style={{display:'block', marginTop:8, background:'#040810', borderRadius:3}}>
      <path d={greenArea} fill="rgba(34,197,94,0.18)" />
      <path d={redArea}   fill="rgba(239,68,68,0.18)" />
      <line x1={padL} y1={yZero} x2={W-padR} y2={yZero} stroke="#475569" strokeWidth={0.5} strokeDasharray="2 2"/>
      <line x1={xCur} y1={padT} x2={xCur} y2={H-padB} stroke="#fbbf24" strokeWidth={1} />
      {pK && <line x1={xs(pK)} y1={padT} x2={xs(pK)} y2={H-padB} stroke="#86efac" strokeWidth={0.5} strokeDasharray="3 3"/>}
      {cK && <line x1={xs(cK)} y1={padT} x2={xs(cK)} y2={H-padB} stroke="#fca5a5" strokeWidth={0.5} strokeDasharray="3 3"/>}
      <path d={linePath} fill="none" stroke="#cbd5e1" strokeWidth={1.5} />
      <text x={xCur} y={H-3} fontSize="7" fill="#fbbf24" textAnchor="middle">зҸҫ</text>
      {pK && <text x={xs(pK)} y={H-3} fontSize="7" fill="#86efac" textAnchor="middle">{fmtK(pK)}</text>}
      {cK && <text x={xs(cK)} y={H-3} fontSize="7" fill="#fca5a5" textAnchor="middle">{fmtK(cK)}</text>}
    </svg>
  );
}

function RollPanel({ dte, selectedOptions, taiex, label }) {
  if (!taiex || dte == null) return null;
  const putStrike  = selectedOptions?.put?.strike;
  const callStrike = selectedOptions?.call?.strike;
  const putDist    = putStrike  ? (taiex - putStrike)  / taiex * 100 : null;
  const callDist   = callStrike ? (callStrike - taiex)  / taiex * 100 : null;

  let urgency = dte <= 2 ? 'now' : dte <= 5 ? 'urgent' : dte <= 10 ? 'suggest' : dte <= 14 ? 'watch' : 'hold';

  const anyItm   = (putDist  != null && putDist  < 0) || (callDist != null && callDist < 0);
  const anyClose = (putDist  != null && putDist  < 1.5) || (callDist != null && callDist < 1.5);
  if (anyItm) urgency = 'now';
  else if (anyClose) {
    const bump = { hold: 'watch', watch: 'suggest', suggest: 'urgent', urgent: 'urgent', now: 'now' };
    urgency = bump[urgency];
  }

  const CFG = {
    hold:    { dot: '#22c55e', color: '#22c55e', label: 'з№јзәҢжҢҒжңү' },
    watch:   { dot: '#eab308', color: '#eab308', label: 'й–Ӣе§Ӣй—ңжіЁ' },
    suggest: { dot: '#f97316', color: '#f97316', label: 'е»әиӯ°ж»ҫеҖү' },
    urgent:  { dot: '#ef4444', color: '#f97316', label: 'е„Әе…Ҳж»ҫеҖү' },
    now:     { dot: '#ef4444', color: '#ef4444', label: 'з«ӢеҚіиҷ•зҗҶ' },
  };
  const { dot, color, label: verdict } = CFG[urgency];

  const reasons = [];
  if (dte <= 14)    reasons.push(`DTE ${dte} еӨ©`);
  if (anyItm)       reasons.push('е·Іжңүи…ідҪҚз ҙдҪҚ');
  if (anyClose && !anyItm) reasons.push('еұҘзҙ„еғ№и·қйӣўеҒҸиҝ‘');

  const desc = urgency === 'hold'
    ? `DTE ${dte} еӨ©пјҢеұҘзҙ„еғ№и·қйӣўе®үе…ЁпјҢжҡ«з„Ўж“ҚдҪңйңҖжұӮ`
    : `${reasons.join('гҖҒ')}пјҢ${
        urgency === 'now'     ? 'йңҖз«ӢеҚіжұәе®ҡжҳҜеҗҰе№іеҖүжҲ–ж»ҫжңҲ' :
        urgency === 'urgent'  ? 'е»әиӯ°е„Әе…Ҳе®үжҺ’жҸӣеҖүж“ҚдҪң' :
        urgency === 'suggest' ? 'е»әиӯ°жң¬йҖұе…§и©•дј°жҸӣеҖүжҷӮж©ҹ' :
                                'еҸҜй–Ӣе§ӢиҰҸеҠғдёӢдёҖжңҲд»ҪеҖүдҪҚ'}`;

  const actions = urgency !== 'hold' ? [
    callStrike ? `Call еӣһиЈң ${fmt(callStrike)}пјҢиҰ–зӢҖжіҒиіЈеҮәж¬ЎжңҲжӣҙй«ҳеұҘзҙ„еғ№` : null,
    putStrike  ? `Put ж»ҫжңҲжҸӣеҖүпјҢе»¶зәҢдёӢиЎҢдҝқиӯ·жңҹ` : null,
  ].filter(Boolean) : [];

  return (
    <div className="roll-panel">
      <div className="roll-header">
        <span className="roll-dot" style={{background: dot}} />

        <span className="roll-month">{label} В· DTE {dte} еӨ©</span>
      </div>
      <div className="roll-desc">{desc}</div>
      {(() => {
        const pct = huiCapitalPct(dte);

        <div className="roll-actions">
          {actions.map((a, i) => <div key={i} className="roll-action">вҶ’ <span>{a}</span></div>)}
        </div>

  const suggestedCall = ok && callDist < putDist * 0.6 ? snap50(taiex * (1 + putDist / 100)) : null; // иӢҘ Call йҒҺиҝ‘пјҢжҸҗзӨәеҸҜжӢүйҒ 
  return (
    <div style={{

        {' вҖ” '}
        {ok

}

function WheelPanel({ selectedOptions, taiex, price2330, price0050, hvVal }) {
  if (!taiex || !price2330 || !price0050) return null;
  const snap50  = n => Math.round(n / 50) * 50;
  const est2330 = s => Math.round(price2330 * (s / taiex) / 5) * 5;
  const est0050 = s => (Math.round(price0050 * (s / taiex) * 10) / 10).toFixed(1);

  const hv = hvVal ? hvVal * 100 : 20;
  const range = hv > 35 ? [8, 10] : hv > 20 ? [5, 8] : hv > 15 ? [5, 5] : [3, 5];
  const rows = range[0] === range[1]
    ? [{ label: 'е»әиӯ°', pct: range[0] }]
    : [{ label: 'з©ҚжҘө', pct: range[0] }, { label: 'дҝқе®Ҳ', pct: range[1] }];

  const refPremium = selectedOptions?.put?.mid;

  return (
    <div className="wheel-panel">
      <div className="wheel-header">вҹі з©әжүӢеӣһиЈңпјҡе»әиӯ°иіЈ Put зӯүиІ·еӣһ</div>
      <div className="wheel-rows">
        {rows.map(r => {
          const strike = snap50(taiex * (1 - r.pct / 100));
          const netCost2330 = refPremium ? est2330(strike) - Math.round(refPremium * 50 / 2000) : null;
          const netCost0050 = refPremium ? (parseFloat(est0050(strike)) - Math.round(refPremium * 50 / 20000 * 10) / 10).toFixed(1) : null;
          return (
            <div key={r.label} className="wheel-row">
              <span className="wheel-tag">{r.label}</span>
              <span className="wheel-strike">Put {strike.toLocaleString()}</span>
              <span className="wheel-dist">пјҲвҲ’{r.pct}%пјү</span>
              <span style={{color:'#67e8f9'}}>2330 вүҲ {est2330(strike).toLocaleString()}{netCost2330 ? ` вҶ’ ж·Ё ${netCost2330}` : ''}</span>
              <span style={{color:'#a78bfa'}}>0050 вүҲ {est0050(strike)}{netCost0050 ? ` вҶ’ ж·Ё ${netCost0050}` : ''}</span>
            </div>
          );
        })}
      </div>
      {refPremium && (
        <div className="wheel-premium">еҸғиҖғ Put ж¬ҠеҲ©йҮ‘ ~{refPremium} ptпјҢж·ЁжҲҗжң¬пјқеұҘзҙ„е°ҚжҮүиӮЎеғ№ вҲ’ ж”¶еҲ°зҡ„жҷӮй–“еғ№еҖј</div>
      )}
      <div className="wheel-note">
        жөҒзЁӢпјҡиіЈ Put зӯүеӣһиЈң вҶ’ еҲ°жңҹз„ЎдәӢж”¶з§ҹ вҶ’ Put з©ҝеғ№д»ҘеұҘзҙ„еғ№иІ·еӣһжҢҒиӮЎ вҶ’ йҮҚе»ә Collar
      </div>
    </div>
  );
}

function StrikeAlert({ selectedOptions, taiex, dte }) {
  if (!taiex || !selectedOptions) return null;
  const putStrike  = selectedOptions.put?.strike;
  const callStrike = selectedOptions.call?.strike;

  function buildAlert(strike, isPut) {
    if (!strike) return null;
    const dist = isPut
      ? (taiex - strike) / taiex * 100   // positive = above put (safe)
      : (strike - taiex) / taiex * 100;  // positive = below call (safe)

    const dteUrgencyMult = dte != null && dte <= 5 ? 1.5 : 1;
    const warnThresh  = 2.5 * dteUrgencyMult;
    const urgThresh   = 1.0 * dteUrgencyMult;

    let urgency, icon, title, hint;
    if (dist < 0) {
      urgency = 'itm';
      icon    = isPut ? 'рҹ”ҙ' : 'рҹҹў';
      title   = isPut
        ? `Put е·Із ҙдҪҚ ${fmt(strike)}пјҲи·Ңе№… ${Math.abs(dist).toFixed(1)}%пјү`
        : `Call е·Іи§ёй Ӯ ${fmt(strike)}пјҲжјІе№… ${Math.abs(dist).toFixed(1)}%пјү`;
      hint    = isPut
        ? 'Put дҝқиӯ·з”ҹж•ҲдёӯпјҢи©•дј°жҳҜеҗҰиЎҢдҪҝжҲ–иӘҝж•ҙеҖүдҪҚ'
        : 'дёҠиЎҢз©әй–“е·ІеҸ—йҷҗпјҢиҖғж…®ж»ҫеҖүиҮіжӣҙй«ҳеұҘзҙ„еғ№';
    } else if (dist <= urgThresh) {
      urgency = 'urgent';
      icon    = isPut ? 'в¬Ү' : 'в¬Ҷ';
      title   = isPut
        ? `Put жҘөиҝ‘пјҡи·қ ${fmt(strike)} еғ…еү© ${dist.toFixed(1)}%`
        : `Call жҘөиҝ‘пјҡи·қ ${fmt(strike)} еғ…еү© ${dist.toFixed(1)}%`;
      hint    = isPut
        ? 'е»әиӯ°зўәиӘҚдҝқиӯ·еҖүдҪҚпјҢжҲ–иҖғж…®жҸӣжңҲж»ҫеҖү'
        : 'е»әиӯ°иҖғж…®иІ·еӣһ Call жҲ–ж»ҫеҖүпјҢдҝқз•ҷдёҠиЎҢз©әй–“';
    } else if (dist <= warnThresh) {
      urgency = 'warn';
      icon    = isPut ? 'в¬Ү' : 'в¬Ҷ';
      title   = isPut
        ? `Put жҺҘиҝ‘пјҡи·қ ${fmt(strike)} йӮ„жңү ${dist.toFixed(1)}%`
        : `Call жҺҘиҝ‘пјҡи·қ ${fmt(strike)} йӮ„жңү ${dist.toFixed(1)}%`;
      hint    = isPut
        ? 'з•ҷж„ҸдёӢиЎҢйўЁйҡӘпјҢзўәиӘҚдҝқиӯ·еҖүдҪҚжңүж•Ҳ'
        : 'з•ҷж„ҸдёҠиЎҢи§ёй ӮпјҢзўәиӘҚжҳҜеҗҰз№јзәҢжҢҒжңү';
    } else {
      return null;
    }

    const cls = `${isPut ? 'put' : 'call'}-${urgency}`;
    return (
      <div key={cls} className={`strike-alert ${cls}`}>
        <span className="strike-alert-icon">{icon}</span>
        <div>
          <div className="strike-alert-title">{title}</div>
          <div className="strike-alert-hint">{hint}</div>
        </div>
      </div>
    );
  }

  const putAlert  = buildAlert(putStrike,  true);
  const callAlert = buildAlert(callStrike, false);
  if (!putAlert && !callAlert) return null;
  return <div>{putAlert}{callAlert}</div>;
}

function SimTable({ structures, selectedOptions, taiex }) {
  const [open, setOpen] = React.useState(false);
  if (!structures?.length || !taiex) return null;
  const rec = structures[0];
  const { calls: nCalls, puts: nPuts,
          call_strike: Kc, put_strike: Kp,
          call_premium: cEntry, put_premium: pEntry } = rec;

  const callEntry = selectedOptions?.call?.mid ?? cEntry ?? 0;
  const putEntry  = selectedOptions?.put?.mid  ?? pEntry  ?? 0;

  const calcPnl = (S_T) => {
    const callPts = nCalls * (callEntry - Math.max(0, S_T - Kc));
    const putPts  = nPuts  * (Math.max(0, Kp - S_T) - putEntry);
    const netPts  = callPts + putPts;
    return { callWan: callPts * 50 / 10000, putWan: putPts * 50 / 10000, netWan: netPts * 50 / 10000 };
  };

  const snap50 = n => Math.round(n / 50) * 50;
  const rawScenarios = [
    { val: snap50(taiex * 0.95), label: '-5%', type: '' },
    Kp ? { val: Kp,  label: `Put ${fmt(Kp)}`,  type: 'put'     } : null,
    { val: Math.round(taiex),    label: `зҸҫ ${fmt(Math.round(taiex))}`, type: 'current' },
    Kc ? { val: Kc,  label: `Call ${fmt(Kc)}`, type: 'call'    } : null,
    { val: snap50(taiex * 1.05), label: '+5%', type: '' },
  ].filter(Boolean);
  const seen = new Set();
  const scenarios = rawScenarios
    .filter(s => { if (seen.has(s.val)) return false; seen.add(s.val); return true; })
    .sort((a, b) => a.val - b.val);

  const fmtPnl = (wan) => {
    if (Math.abs(wan) < 0.05) return <span className="sim-pnl-zero">вҖ”</span>;
    const s = (wan >= 0 ? '+' : '') + wan.toFixed(1) + 'иҗ¬';
    return <span className={wan > 0 ? 'sim-pnl-pos' : 'sim-pnl-neg'}>{s}</span>;
  };

  return (
    <div className="sim-wrap">
      <div className="sim-header" onClick={() => setOpen(o => !o)}>
        <span>еҲ°жңҹжҗҚзӣҠжЁЎж“¬ В· {rec.desc} В· д»Ҙ MID дј°з®—</span>
        <span className="sim-toggle">{open ? 'в–І ж”¶иө·' : 'в–ј еұ•й–Ӣ'}</span>
      </div>
      {open && (
        <table className="sim-table">
          <thead>
            <tr>
              <th>еҲ°жңҹй»һдҪҚ</th>
              {nCalls > 0 && <th>Call {nCalls}еҸЈ</th>}
              {nPuts  > 0 && <th>Put {nPuts}еҸЈ</th>}
              <th>йҒёж“Үж¬Ҡж·Ё</th>
              <th>зӢҖж…Ӣ</th>
            </tr>
          </thead>
          <tbody>
            {scenarios.map(sc => {
              const p    = calcPnl(sc.val);
              const dist = (sc.val - taiex) / taiex * 100;
              const below = Kp && sc.val <= Kp;
              const above = Kc && sc.val >= Kc;
              const rowCls = sc.type === 'current' ? 'sim-row-current'
                           : sc.type === 'put'     ? 'sim-row-put'
                           : sc.type === 'call'    ? 'sim-row-call' : '';
              const lblCls = sc.type === 'put' ? 'sim-label-put'
                           : sc.type === 'call' ? 'sim-label-call'
                           : sc.type === 'current' ? 'sim-label-curr' : '';
              const status    = below ? 'жңүдҝқиӯ·' : above ? 'и§ёй Ӯйҷҗ' : 'з·©иЎқдёӯ';
              const statusCls = below ? 'sim-status-protected' : above ? 'sim-status-capped' : 'sim-status-normal';
              return (
                <tr key={sc.val} className={rowCls}>
                  <td>
                    <span className={lblCls}>{sc.label}</span>
                    <span className="sim-dist">{dist >= 0 ? '+' : ''}{dist.toFixed(1)}%</span>
                  </td>
                  {nCalls > 0 && <td>{fmtPnl(p.callWan)}</td>}
                  {nPuts  > 0 && <td>{fmtPnl(p.putWan)}</td>}

// в”Җв”Җ Black-Scholes helpers (JS) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function _normCdf(x) {
  // Abramowitz approximation
  const a1=0.254829592,a2=-0.284496736,a3=1.421413741,a4=-1.453152027,a5=1.061405429,p=0.3275911;
  const sign = x < 0 ? -1 : 1;
  x = Math.abs(x) / Math.sqrt(2);
  const t = 1 / (1 + p * x);
  const y = 1 - (((((a5*t+a4)*t)+a3)*t+a2)*t+a1)*t*Math.exp(-x*x);
  return 0.5 * (1 + sign * y);
}

function _bsGreeks(S, K, T, sigma, isPut) {
  if (T <= 0 || sigma <= 0 || S <= 0 || K <= 0) {
    return { delta: 0, theta_per_day: 0, vega_per_pct: 0 };
  }
  const sqrtT = Math.sqrt(T);
  const d1 = (Math.log(S/K) + 0.5 * sigma * sigma * T) / (sigma * sqrtT);
  const phi = Math.exp(-d1*d1/2) / Math.sqrt(2 * Math.PI);
  const delta = isPut ? (_normCdf(d1) - 1) : _normCdf(d1);
  const thetaYear = -S * phi * sigma / (2 * sqrtT);
  return {
    delta,
    theta_per_day: thetaYear / 365,
    vega_per_pct:  S * phi * sqrtT / 100,
  };
}

function CalendarSpreadHelper({ data }) {
  const [open, setOpen] = React.useState(false);
  const [variant, setVariant] = React.useState('reverse');   // 'standard' / 'reverse'
  const [right, setRight] = React.useState('put');
  const [strike, setStrike] = React.useState(0);
  const [qty, setQty] = React.useState(1);

  const tx = data?.market?.tx_futures;
  const so = data?.selected_options || {};
  const wedSO = data?.weekly_wed?.selected_options || {};
  const friSO = data?.weekly_fri?.selected_options || {};

  // й җиЁӯеұҘзҙ„пјҡз”Ёиҝ‘жңҲ selected_options (дҫқ right еҲҮжҸӣ) вҖ” еҝ…й ҲеңЁ early return д№ӢеүҚ
  React.useEffect(() => {
    const k = right === 'put' ? so.put?.strike : so.call?.strike;
    if (k && !strike) setStrike(k);
  }, [right, so.put?.strike, so.call?.strike]);

  if (!tx) return null;

  // Near / Far жңҲд»Ҫпјҡ
  // standard: near = йҖұйҒё (W or F), far = иҝ‘жңҲ monthly
  // reverse:  near = йҖұдёү W2, far = йҖұдә”еҗҢжңҲйҒё / иҝ‘жңҲ
  // з°ЎеҢ–пјҡnear = йҖұдёү / far = йҖұдә”пјҲиӢҘйғҪжңүпјүпјӣеҗҰеүҮ fallback near = weekly / far = monthly
  const haveWed = !!data?.weekly_wed?.settlement_date;
  const haveFri = !!data?.weekly_fri?.settlement_date;
  const haveMonthly = !!data?.dte_trading;

  let nearLeg = null, farLeg = null;
  if (haveWed && haveFri) {
    nearLeg = { label: 'йҖұдёү W', month: data.weekly_wed.delivery_month || 'иҝ‘жңҲ', dte: data.weekly_wed.dte_trading || 3, iv: data.weekly_wed.iv_used || 0.20 };
    farLeg  = { label: 'йҖұдә” F', month: data.weekly_fri.delivery_month || 'иҝ‘жңҲ', dte: data.weekly_fri.dte_trading || 6, iv: data.weekly_fri.iv_used || 0.20 };
  } else if (haveFri && haveMonthly) {
    nearLeg = { label: 'йҖұдә” F', month: data.weekly_fri.delivery_month || 'иҝ‘йҖұ', dte: data.weekly_fri.dte_trading || 6, iv: data.weekly_fri.iv_used || 0.20 };
    farLeg  = { label: 'иҝ‘жңҲ M', month: data.txo_month, dte: data.dte_trading || 30, iv: data.iv_used || 0.20 };
  } else {
    // йҖҖеҢ–пјҡеҸӘжңүиҝ‘жңҲ + йҒ жңҲ
    farLeg = { label: 'йҒ жңҲ', month: data.far_month?.txo_month || '?', dte: data.far_month?.dte_trading || 60, iv: data.far_month?.iv_used || 0.20 };
    nearLeg = { label: 'иҝ‘жңҲ', month: data.txo_month, dte: data.dte_trading || 30, iv: data.iv_used || 0.20 };
  }

  // BS дј°еғ№
  const bsP = (K, T, iv, isPut) => {
    if (T <= 0 || iv <= 0 || K <= 0) return 0;
    const sqrtT = Math.sqrt(T);
    const d1 = (Math.log(tx/K) + 0.5 * iv*iv * T) / (iv * sqrtT);
    const d2 = d1 - iv*sqrtT;
    return isPut
      ? K * _normCdf(-d2) - tx * _normCdf(-d1)
      : tx * _normCdf(d1) - K * _normCdf(d2);
  };

  const K = parseFloat(strike) || 0;
  const isPut = right === 'put';
  const nearPx = bsP(K, nearLeg.dte/365, nearLeg.iv, isPut);
  const farPx  = bsP(K, farLeg.dte/365,  farLeg.iv,  isPut);

  // Standardпјҡbuy йҒ  + sell иҝ‘ вҶ’ debit
  // Reverse (ијқе“Ҙ)пјҡbuy иҝ‘ + sell йҒ  вҶ’ credit (еӣ йҒ жңҲ premium йҖҡеёёијғй«ҳ)
  const isReverse = variant === 'reverse';
  const TXO_MULT = 50;
  const Q = parseInt(qty) || 1;

  const buyLeg  = isReverse ? nearLeg : farLeg;
  const sellLeg = isReverse ? farLeg  : nearLeg;
  const buyPx   = isReverse ? nearPx  : farPx;
  const sellPx  = isReverse ? farPx   : nearPx;

  // Net cash = sell - buyпјҲper leg per lotпјү
  const netPerLot = sellPx - buyPx;
  const netCash = netPerLot * Q * TXO_MULT;

  const fmt = n => n == null ? 'вҖ”' : Math.round(n).toLocaleString();
  const month = data.txo_month || '202605';

  // Ladder
  const ladderBuy  = (mid) => ({ try1: Math.max(2, Math.round(mid * 0.97)), try2: Math.round(mid), try3: Math.round(mid * 1.05) });
  const ladderSell = (mid) => ({ try1: Math.round(mid * 1.05), try2: Math.round(mid), try3: Math.max(1, Math.round(mid * 0.95)) });

  const cmd = (side, lab, qq, price, leg, thesis) => {
    const sd = side === 'buy' ? 'buy_to_open' : 'sell_to_open';

    const book = side === 'buy' ? 'hedge' : 'trading';
    return `python3 add_trade.py add ${sd} "${inst}" ${qq} ${price} --book ${book} --thesis "${thesis}"`;
  };

  const copy = (s) => {
    navigator.clipboard?.writeText(s).then(() => alert('е·ІиӨҮиЈҪпјҡ\n' + s), () => alert('иӨҮиЈҪеӨұж•—'));

    : 'рҹ“… жЁҷжә–ж—ҘжӣҶпјҡиІ·йҒ  + иіЈиҝ‘пјҲиіә theta иЎ°йҖҖпјү';
  const thesisStr = isReverse
    ? `ијқе“ҘеҸҚеҗ‘ж—ҘжӣҶ ${nearLeg.label}иІ· / ${farLeg.label}иіЈ ${K}${right === 'put' ? 'P' : 'C'}`
    : `жЁҷжә–ж—ҘжӣҶ ${farLeg.label}иІ· / ${nearLeg.label}иіЈ ${K}${right === 'put' ? 'P' : 'C'}`;

  return (
    <div style={{
      background:'#0a0e1c', border:'1px solid #a78bfa44',
      borderRadius:'6px', padding:'8px 12px', margin:'8px 0',
      fontSize:'11px', color:'#cbd5e1',
    }}>
      <div onClick={() => setOpen(!open)} style={{
        display:'flex', justifyContent:'space-between', alignItems:'center',
        cursor:'pointer', userSelect:'none',
      }}>
        <span style={{fontWeight:700, color:'#a78bfa'}}>рҹ“җ ж°ҙе№іеғ№е·®пјҲCalendar Spreadпјү</span>
        <span style={{fontSize:'9px', color:'#64748b'}}>
          {variantLabel.split('пјҡ')[0]}гҖҖ{open ? 'в–І' : 'в–ј'}
        </span>
      </div>

      {open && (
        <>
          {/* Variant + form */}
          <div style={{display:'flex', gap:'4px', flexWrap:'wrap', marginTop:'6px'}}>
            <button onClick={(e) => {e.stopPropagation(); setVariant('reverse');}} style={{
              background: isReverse ? '#0f1828' : 'transparent',
              border: isReverse ? '1px solid #fbbf24' : '1px solid #334155',
              color: isReverse ? '#fbbf24' : '#94a3b8',
              padding:'2px 8px', borderRadius:'3px', cursor:'pointer', fontSize:'10px',
            }}>рҹҺ° ијқе“ҘеҸҚеҗ‘</button>
            <button onClick={(e) => {e.stopPropagation(); setVariant('standard');}} style={{
              background: !isReverse ? '#0f1828' : 'transparent',
              border: !isReverse ? '1px solid #60a5fa' : '1px solid #334155',
              color: !isReverse ? '#60a5fa' : '#94a3b8',
              padding:'2px 8px', borderRadius:'3px', cursor:'pointer', fontSize:'10px',
            }}>рҹ“… жЁҷжә–ж—ҘжӣҶ</button>
          </div>
          <div style={{fontSize:'10px', color:'#94a3b8', marginTop:'4px'}}>
            {variantLabel}
          </div>

          <div className="leg-form-row" style={{marginTop:'6px', padding:'6px',
                                                  background:'#070b15', borderRadius:'3px'}}>

                    style={{background:'#0a0e1c', color:'#cbd5e1', border:'1px solid #334155', padding:'2px 4px'}}>

function BuildPlanHelper({ data }) {
  const [open, setOpen] = React.useState(false);
  const [target, setTarget] = React.useState(5);
  const [weeks, setWeeks] = React.useState(4);

  if (!data) return null;
  const today = new Date();

  // 4 йҖұеҲҶжү№е»әеҖү schedule
  const perBatch = Math.ceil(target / weeks);
  const remainder = target - perBatch * weeks;
  const batches = [];
  let acc = 0;
  for (let i = 0; i < weeks; i++) {
    let qty = perBatch;
    if (remainder < 0 && i === weeks - 1) qty = target - acc;   // жңҖеҫҢдёҖйҖұеҗёж”¶йӨҳж•ё
    if (qty <= 0) qty = 1;
    acc += qty;
    const d = new Date(today);
    d.setDate(today.getDate() + i * 7);
    batches.push({
      week: i + 1,
      qty,
      date: d.toISOString().slice(0, 10),
      cumulative: acc,
    });
  }
  // дҝ®жӯЈ over-shoot
  if (acc > target) {
    const over = acc - target;
    batches[batches.length - 1].qty -= over;
    batches[batches.length - 1].cumulative -= over;
  }

  return (
    <div style={{
      background:'#0a0e1c', border:'1px solid #60a5fa44',
      borderRadius:'6px', padding:'8px 12px', margin:'8px 0',
      fontSize:'11px', color:'#cbd5e1',

          рҹ“… еҲҶжү№е»әеҖүеҠ©жүӢпјҲ{weeks} йҖұеқҮж”Өпјү

          зӣ®жЁҷ {target} еҸЈгҖҖ{open ? 'в–І' : 'в–ј'}
        </span>
      </div>

      {open && (
        <>
          <div style={{display:'flex', gap:'8px', marginTop:'6px', flexWrap:'wrap',
                        padding:'6px', background:'#070b15', borderRadius:'3px', alignItems:'center'}}>
            <span style={{fontSize:'10px', color:'#94a3b8'}}>зӣ®жЁҷзёҪеҸЈж•ё</span>
            <input type="number" value={target} min="1" max="20"
                   onChange={e => setTarget(Math.max(1, parseInt(e.target.value) || 1))}

function HuiRatioHelper({ data }) {
  const [open, setOpen] = React.useState(false);
  const [sets, setSets] = React.useState(1);              // е№ҫзө„пјҲ1 зө„ = 1Г—BP+2Г—SP+1Г—SCпјү
  const [spOffset, setSpOffset] = React.useState(500);    // SP еұҘзҙ„еғ№е·® BP дёӢж–№
  const so = data?.selected_options || {};
  const tx = data?.market?.tx_futures;
  if (!so.put?.strike || !tx) return null;

  const month = data?.txo_month || '202605';
  const dte = data?.dte_trading || 30;
  const iv  = data?.iv_used || 0.20;
  const T = dte / 365;

  const bpStrike = so.put.strike;
  const spStrike = bpStrike - parseInt(spOffset);
  const scStrike = so.call?.strike;

  // BS дј°еғ№
  const bsP = (K, isPut) => {
    const sqrtT = Math.sqrt(T);
    const d1 = (Math.log(tx/K) + 0.5 * iv*iv * T) / (iv * sqrtT);
    const d2 = d1 - iv*sqrtT;
    return isPut
      ? K * _normCdf(-d2) - tx * _normCdf(-d1)
      : tx * _normCdf(d1) - K * _normCdf(d2);
  };

  // Greeks per leg
  const legs = [
    {
      label: 'рҹ“Ҙ иІ· BPпјҲдҝқиӯ·и…іпјү', side: 'buy', right: 'put', strike: bpStrike,
      qty: 1 * sets, color: '#86efac', book: 'hedge',
      thesis: `ијқе“ҘжҜ”дҫӢејҸпјҡ1 BP дҝқиӯ· ${sets} зө„`,
      midPrice: bsP(bpStrike, true),
    },
    {
      label: 'рҹ“Ө иіЈ SPпјҲГ—2 ж”¶ creditпјү', side: 'sell', right: 'put', strike: spStrike,
      qty: 2 * sets, color: '#fca5a5', book: 'trading',
      thesis: `ијқе“ҘжҜ”дҫӢејҸпјҡ2 SP credit ${sets} зө„`,
      midPrice: bsP(spStrike, true),
    },
  ];
  if (scStrike) legs.push({
    label: 'рҹ“Ө иіЈ SCпјҲcovered callпјү', side: 'sell', right: 'call', strike: scStrike,
    qty: 1 * sets, color: '#fca5a5', book: 'trading',
    thesis: `ијқе“Ҙ covered call ${sets} зө„`,
    midPrice: bsP(scStrike, false),
  });

  // Net credit estimate
  const netCash = legs.reduce((sum, L) => {
    const sign = L.side === 'sell' ? 1 : -1;
    return sum + sign * L.midPrice * L.qty * 50;
  }, 0);

  // Max loss / breakeven for ratio
  // 1Г—BP_K1 + 2Г—SP_K2 (K1 > K2)
  // Max profit at TX = K2: profit = (K1-K2) - net_debit (if debit) or + net_credit (if credit)
  // Max loss: TX вҶ’ 0, lose 2Г—K2 - K1 + 2Г—TX_loss... actually unlimited downside
  const netCredit = netCash > 0 ? netCash : 0;
  const netDebit  = netCash < 0 ? -netCash : 0;
  // breakeven below: TX = SP - (BP-SP) - net_credit_per_set / 50
  const credit_pts = (legs[0].midPrice * -1) + (legs[1].midPrice * 2);
  const lower_be = spStrike - (bpStrike - spStrike) - credit_pts;

  const fmt = n => n == null ? 'вҖ”' : Math.round(n).toLocaleString();

  // Ladder for each leg
  const ladderBuy  = (mid) => ({ try1: Math.max(2, Math.round(mid * 0.97)), try2: Math.round(mid), try3: Math.round(mid * 1.05) });
  const ladderSell = (mid) => ({ try1: Math.round(mid * 1.05), try2: Math.round(mid), try3: Math.max(1, Math.round(mid * 0.95)) });

  const cmd = (leg, price) => {
    const sd = leg.side === 'buy' ? 'buy_to_open' : 'sell_to_open';
    const right = leg.right === 'put' ? 'P' : 'C';
    const inst = `TXO ${month} ${Math.round(leg.strike)}${right}`;
    return `python3 add_trade.py add ${sd} "${inst}" ${leg.qty} ${price} --book ${leg.book} --thesis "${leg.thesis}"`;
  };

  const copy = (s) => {
    navigator.clipboard?.writeText(s).then(
      () => alert('е·ІиӨҮиЈҪпјҡ\n' + s),
      () => alert('иӨҮиЈҪеӨұж•—'),
    );
  };

  return (
    <div style={{
      background:'#0a0e1c', border:'1px solid #fbbf2444',
      borderRadius:'6px', padding:'8px 12px', margin:'8px 0',
      fontSize:'11px', color:'#cbd5e1',
    }}>
      <div onClick={() => setOpen(!open)} style={{
        display:'flex', justifyContent:'space-between', alignItems:'center',
        cursor:'pointer', userSelect:'none',
      }}>
        <span style={{fontWeight:700, color:'#fbbf24'}}>
          рҹҺ° ијқе“ҘжҜ”дҫӢејҸеғ№е·® + Covered Call
        </span>
        <span style={{fontSize:'9px', color:'#64748b'}}>
          {legs.length} и…і Г— {sets} зө„гҖҖ{open ? 'в–І' : 'в–ј'}
        </span>
      </div>

      {open && (
        <>
          {/* иЁӯе®ҡ */}
          <div style={{display:'flex', gap:'8px', marginTop:'6px', flexWrap:'wrap', alignItems:'center',
                        padding:'6px', background:'#070b15', borderRadius:'3px'}}>
            <span style={{fontSize:'10px', color:'#94a3b8'}}>зө„ж•ё</span>
            <input type="number" value={sets} onChange={e => setSets(Math.max(1, parseInt(e.target.value)||1))} min="1" max="10"
                   style={{width:'50px', background:'#0a0e1c', color:'#cbd5e1', border:'1px solid #334155', padding:'2px 4px'}} />
            <span style={{fontSize:'10px', color:'#94a3b8'}}>SP и·қ BP дёӢж–№</span>
            <input type="number" value={spOffset} onChange={e => setSpOffset(parseInt(e.target.value)||500)} step="100" min="100"
                   style={{width:'70px', background:'#0a0e1c', color:'#cbd5e1', border:'1px solid #334155', padding:'2px 4px'}} />
            <span style={{fontSize:'10px', color:'#64748b'}}>й»һ</span>
          </div>

          {/* Summary */}
          <div style={{padding:'6px 8px', marginTop:'6px',
                        background:'#0f1828', borderRadius:'3px'}}>
            <div style={{fontSize:'10px', color:'#cbd5e1'}}>
              зөҗж§Ӣпјҡ1Г—BP {bpStrike} / 2Г—SP {spStrike}{scStrike ? ` / 1Г—SC ${scStrike}` : ''} Г— {sets} зө„
            </div>
            <div style={{fontSize:'10px', color:'#94a3b8', marginTop:'2px'}}>
              дј°з®—{netCash > 0 ? 'ж”¶ ' : 'д»ҳ '}
              <b style={{color: netCash > 0 ? '#86efac' : '#fca5a5'}}>NT$ {fmt(Math.abs(netCash))}</b>
              {' В· '}дёӢж–№жҗҚзӣҠе№іиЎЎ вүҲ <b>{Math.round(lower_be)}</b>
              <span style={{fontSize:'9px', color:'#64748b'}}>пјҲеҶҚдёӢи·ҢйҖІе…Ҙ Г—2 жҗҚеӨұеҚҖпјү</span>
            </div>
          </div>

          {/* Each leg with ladder */}
          {legs.map((leg, i) => {
            const ladder = leg.side === 'buy' ? ladderBuy(leg.midPrice) : ladderSell(leg.midPrice);

            вҡ  и·Ңз ҙдёӢж–№жҗҚзӣҠе№іиЎЎй»һ вүҲ {Math.round(lower_be)} еҫҢиҷ§жҗҚеҠ еҖҚгҖӮ

          { id: newId(), side: 'buy',  right: 'put',  strike: so.put.strike,        dte, iv, qty: 1 },
          { id: newId(), side: 'sell', right: 'put',  strike: so.put.strike - 500, dte, iv, qty: 2 },
          { id: newId(), side: 'sell', right: 'call', strike: so.call.strike,       dte, iv, qty: 1 },
        ];
      },
    },
    {
      label: 'еҜ¶е…ё 4 и…іе»әж§ӢејҸ (BP+SP+SC+BC)',
      desc:  'е®Ңж•ҙ 4 и…іе°ҚзЁұпјҡиІ·иӯ·и…і + иіЈ credit йӣҷеҗ‘пјҲйЎһ Iron Condor дҪҶжӣҙз©©еӣәпјү',
      build: () => {
        if (!so.put?.strike || !so.call?.strike) return null;
        const dte = data.dte_trading || 30;
        const iv  = data.iv_used || 0.20;
        const bpK = so.put.strike  + 200;     // BP з•Ҙ ATM й«ҳпјҲеј·дҝқиӯ·пјү
        const spK = so.put.strike  - 300;     // SP credit
        const scK = so.call.strike + 300;     // SC credit
        const bcK = so.call.strike - 200;     // BC з•Ҙ ATM дҪҺпјҲеј·дҝқиӯ·пјү
        return [
          { id: newId(), side: 'buy',  right: 'put',  strike: bpK, dte, iv, qty: 1 },
          { id: newId(), side: 'sell', right: 'put',  strike: spK, dte, iv, qty: 1 },
          { id: newId(), side: 'sell', right: 'call', strike: scK, dte, iv, qty: 1 },
          { id: newId(), side: 'buy',  right: 'call', strike: bcK, dte, iv, qty: 1 },
        ];
      },
    },
  ];

  const applyTemplate = (tpl) => {
    const newLegs = tpl.build();
    if (newLegs) setLegs(newLegs);
  };

  const updateLeg = (id, field, value) => {
    setLegs(legs.map(L => L.id === id ? { ...L, [field]: value } : L));
  };
  const addLeg = () => {
    setLegs([...legs, { id: newId(), side: 'buy', right: 'put', strike: 0, dte: 30, iv: 0.20, qty: 1 }]);
  };
  const removeLeg = (id) => {
    setLegs(legs.filter(L => L.id !== id));
  };

  // Compute combined Greeks across all legs
  let totalDelta = 0, totalTheta = 0, totalVega = 0, totalPutLotsDelta = 0;
  for (const L of legs) {
    const K = parseFloat(L.strike) || 0;
    const T = (parseInt(L.dte) || 0) / 365;
    const ivf = parseFloat(L.iv) || 0;
    const isPut = L.right === 'put';
    if (K <= 0 || T <= 0) continue;
    const g = _bsGreeks(S, K, T, ivf, isPut);
    const sign = (L.side === 'buy' ? 1 : -1) * (parseInt(L.qty) || 0);
    totalDelta += g.delta * sign * TXO_MULT * S * 0.01;
    totalTheta += g.theta_per_day * sign * TXO_MULT;
    totalVega  += g.vega_per_pct  * sign * TXO_MULT;
    if (isPut && sign > 0) totalPutLotsDelta += sign;       // еҠ  long put
    if (isPut && sign < 0) totalPutLotsDelta += sign;       // иіЈ put дёҚз®—е°ҚжІ–
  }

  const beforeDelta = t.delta_ntd_per_1pct_tx || 0;
  const beforeTheta = t.theta_ntd_per_day || 0;
  const beforeVega  = t.vega_ntd_per_pct_iv || 0;

  const afterDelta = beforeDelta + totalDelta;
  const afterTheta = beforeTheta + totalTheta;
  const afterVega  = beforeVega  + totalVega;

  const recLots = data?.portfolio?.totals?.recommended_put_lots || 0;
  const heldPuts = (data?.portfolio_greeks?.legs || [])
    .filter(L => L.right === 'put' && (L.qty_signed || 0) > 0)
    .reduce((sum, L) => sum + (L.qty_signed || 0), 0);
  const beforeGap = heldPuts - recLots;
  const afterGap  = (heldPuts + totalPutLotsDelta) - recLots;

  // дј° net debit/credit
  const netCashEst = legs.reduce((sum, L) => {
    const K = parseFloat(L.strike) || 0;
    const T = (parseInt(L.dte) || 0) / 365;
    const ivf = parseFloat(L.iv) || 0;
    if (K <= 0 || T <= 0) return sum;
    // BS price approximation
    const sqrtT = Math.sqrt(T);
    const d1 = (Math.log(S/K) + 0.5 * ivf * ivf * T) / (ivf * sqrtT);
    const d2 = d1 - ivf * sqrtT;
    const isPut = L.right === 'put';
    const price = isPut
      ? (K * _normCdf(-d2) - S * _normCdf(-d1))
      : (S * _normCdf(d1) - K * _normCdf(d2));
    const sign = (L.side === 'buy' ? -1 : 1) * (parseInt(L.qty) || 0);
    return sum + price * sign * TXO_MULT;
  }, 0);

  return (
    <div style={{
      background:'#0a0e1c', border:'1px solid #1e2535',
      borderRadius:'6px', padding:'8px 12px', margin:'8px 0',
      fontSize:'11px', color:'#cbd5e1',
    }}>
      <div onClick={() => setOpen(!open)} style={{
        display:'flex', justifyContent:'space-between', alignItems:'center',
        cursor:'pointer', userSelect:'none',
      }}>
        <span style={{fontWeight:700, color:'#94a3b8'}}>рҹ§Ә Pre-trade жЁЎж“¬еҷЁпјҲеӨҡи…іпјү</span>
        <span style={{fontSize:'9px', color:'#64748b'}}>
          {legs.length} и…ігҖҖ{open ? 'в–І' : 'в–ј й»һй–Ӣи©Ұз®—'}
        </span>
      </div>

      {open && (
        <>
          {/* жЁЎжқҝжҢүйҲ• */}
          <div style={{marginTop:'6px'}}>
            <div style={{fontSize:'9px', color:'#64748b', marginBottom:'2px'}}>рҹ“җ зөҗж§ӢжЁЎжқҝ</div>
            <div style={{display:'flex', flexWrap:'wrap', gap:'4px'}}>
              {templates.map((tpl, i) => (
                <button key={i} onClick={() => applyTemplate(tpl)} title={tpl.desc} style={{
                  background:'transparent', border:'1px solid #334155', color:'#94a3b8',
                  padding:'2px 8px', borderRadius:'3px', cursor:'pointer', fontSize:'10px',
                }}>{tpl.label}</button>
              ))}
            </div>
          </div>

          {/* еӨҡи…іеҲ—иЎЁ */}
          <div style={{marginTop:'6px'}}>
            {legs.map((L, idx) => (
              <div key={L.id} className="leg-form-row" style={{padding:'4px 6px',
                                        background:'#070b15', borderRadius:'3px',
                                        marginBottom:'3px'}}>
                <span style={{fontSize:'10px', color:'#64748b', minWidth:'18px'}}>#{idx+1}</span>
                <select value={L.side} onChange={e => updateLeg(L.id, 'side', e.target.value)}
                        style={{background:'#0a0e1c', color: L.side === 'buy' ? '#86efac' : '#fca5a5',
                                border:'1px solid #334155', padding:'1px 4px', fontSize:'10px'}}>
                  <option value="buy">иІ·</option>
                  <option value="sell">иіЈ</option>
                </select>
                <input type="number" value={L.qty} onChange={e => updateLeg(L.id, 'qty', e.target.value)} min="1"
                       style={{width:'40px', background:'#0a0e1c', color:'#cbd5e1', border:'1px solid #334155', padding:'1px 4px', fontSize:'10px'}} />
                <select value={L.right} onChange={e => updateLeg(L.id, 'right', e.target.value)}
                        style={{background:'#0a0e1c', color:'#cbd5e1', border:'1px solid #334155', padding:'1px 4px', fontSize:'10px'}}>
                  <option value="put">P</option>
                  <option value="call">C</option>
                </select>
                <input type="number" value={L.strike} onChange={e => updateLeg(L.id, 'strike', e.target.value)} placeholder="еұҘзҙ„"
                       style={{width:'70px', background:'#0a0e1c', color:'#cbd5e1', border:'1px solid #334155', padding:'1px 4px', fontSize:'10px'}} />
                <span style={{fontSize:'9px', color:'#64748b'}}>DTE</span>
                <input type="number" value={L.dte} onChange={e => updateLeg(L.id, 'dte', e.target.value)} min="1"
                       style={{width:'40px', background:'#0a0e1c', color:'#cbd5e1', border:'1px solid #334155', padding:'1px 4px', fontSize:'10px'}} />
                <span style={{fontSize:'9px', color:'#64748b'}}>IV</span>
                <input type="number" value={L.iv} onChange={e => updateLeg(L.id, 'iv', e.target.value)} step="0.01" min="0.05"
                       style={{width:'55px', background:'#0a0e1c', color:'#cbd5e1', border:'1px solid #334155', padding:'1px 4px', fontSize:'10px'}} />
                <button onClick={() => removeLeg(L.id)} style={{
                  background:'transparent', border:'1px solid #475569', color:'#94a3b8',
                  padding:'1px 6px', borderRadius:'2px', cursor:'pointer', fontSize:'10px',
                }}>вң•</button>
              </div>
            ))}
            <button onClick={addLeg} style={{
              background:'transparent', border:'1px dashed #475569', color:'#94a3b8',
              padding:'2px 10px', borderRadius:'3px', cursor:'pointer', fontSize:'10px',
              marginTop:'2px',
            }}>+ ж·»еҠ дёҖи…і</button>
          </div>

          {/* Before / After */}
          <div className="ba-grid" style={{marginTop:'8px'}}>
            {[
              { label: 'з•¶еүҚ (Before)', d: beforeDelta, t: beforeTheta, v: beforeVega, gap: beforeGap, dim: true },
              { label: 'еҠ еҖүеҫҢ (After)', d: afterDelta,  t: afterTheta,  v: afterVega,  gap: afterGap,  dim: false },
            ].map((col, i) => (
              <div key={i} style={{padding:'6px 8px', background:'#070b15', borderRadius:'4px',
                                    border: col.dim ? '1px solid #1e2535' : '1px solid #60a5fa'}}>
                <div style={{fontSize:'10px', color:'#94a3b8', marginBottom:'4px', fontWeight:700}}>{col.label}</div>
                <div style={{fontSize:'10px', display:'flex', justifyContent:'space-between'}}>
                  <span>О” NT/1%TX</span>
                  <b style={{color: colN(col.d)}}>{fmtS(col.d)}</b>
                </div>
                <div style={{fontSize:'10px', display:'flex', justifyContent:'space-between'}}>
                  <span>Оё NT/еӨ©</span>
                  <b style={{color: colN(col.t)}}>{fmtS(col.t)}</b>
                </div>
                <div style={{fontSize:'10px', display:'flex', justifyContent:'space-between'}}>
                  <span>ОҪ NT/1%IV</span>
                  <b style={{color: colN(col.v)}}>{fmtS(col.v)}</b>
                </div>
                <div style={{fontSize:'10px', display:'flex', justifyContent:'space-between',
                              borderTop:'1px solid #1e2535', marginTop:'2px', paddingTop:'2px'}}>
                  <span>200иҗ¬ gap</span>
                  <b style={{color: col.gap === 0 ? '#4ade80' : '#fbbf24'}}>
                    {col.gap > 0 ? '+' : ''}{col.gap}
                  </b>
                </div>
              </div>
            ))}
          </div>

          {/* и®ҠеӢ•ж‘ҳиҰҒ + дј°з®—зҸҫйҮ‘жөҒ */}
          <div style={{marginTop:'6px', padding:'4px 8px', background:'#0f1828', borderRadius:'3px',
                        fontSize:'10px', color:'#cbd5e1'}}>
            <div>
              <span style={{color:'#94a3b8'}}>еҗҲиЁҲи®ҠеҢ–пјҡ</span>
              О”О” <b style={{color: colN(totalDelta)}}>{fmtS(totalDelta)}</b>
              {' В· '}
              О”Оё <b style={{color: colN(totalTheta)}}>{fmtS(totalTheta)}</b>
              {' (жңҲ вүҲ '}<b style={{color: colN(totalTheta * 30)}}>{fmtS(totalTheta * 30)}</b>{')'}
              {' В· '}
              О”ОҪ <b style={{color: colN(totalVega)}}>{fmtS(totalVega)}</b>
            </div>

              <span style={{color:'#94a3b8'}}>дј°з®—зҸҫйҮ‘жөҒпјҡ</span>

function CollarDashboard({ data }) {
  const cd = data?.collar_dashboard;
  if (!cd) return null;

  const fmt = n => n == null ? 'вҖ”' : n.toLocaleString(undefined, {maximumFractionDigits: 0});

  const Leg = ({ title, side, leg }) => {

          ) : (
            <span style={{fontSize:'10px', color:'#64748b'}}>з„ЎйғЁдҪҚ</span>
          )}
        </div>
        {leg.has_position && (
          <div style={{fontSize:'10px', color:'#94a3b8', marginBottom:'4px'}}>
            и·қ TX {side === 'put' ? '-' : '+'}{Math.abs(leg.distance_pct)}%

            {leg.iv != null && ` В· IV ${(leg.iv * 100).toFixed(1)}%`}
          </div>
        )}
        {leg.triggers?.map((t, i) => (
          <div key={i} style={{fontSize:'10px', color: lvlColor(t.level), padding:'2px 0'}}>

  const rs = recommended_structure;

  return (

        <span style={{fontWeight:700, color:'#94a3b8'}}>рҹҺҜ Collar Dashboard</span>
        <span style={{fontSize:'9px', color:'#64748b'}}>per-leg и§ёзҷј + зөҗж§ӢжҺЁи–Ұ</span>
      </div>

      {/* Two-column: put leg | call leg */}
      <div className="leg-pair-grid">
        <Leg title="рҹ“ү Put legпјҲдҝқиӯ·пјү" side="put"  leg={put_leg} />
        <Leg title="рҹ“Ҳ Call legпјҲиіЈж–№пјү" side="call" leg={call_leg} />
      </div>

      {/* зөҗж§ӢжҺЁи–Ұ */}
      {rs && (
        <div style={{marginTop:'6px', padding:'6px 10px',
                      borderLeft:`3px solid ${confColor}`,
                      background:'#0f1828', borderRadius:'3px'}}>
