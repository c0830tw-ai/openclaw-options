<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>2330 0050對應大盤選擇權領口策略</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0f1117;
      color: #e2e8f0;
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 14px;
      min-height: 100vh;
      padding: 20px;
    }

    .app { max-width: 900px; margin: 0 auto; }

    /* Header */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 0 16px;
      border-bottom: 1px solid #1e2535;
      margin-bottom: 16px;
    }
    .header h1 { font-size: 18px; color: #7dd3fc; letter-spacing: 0.05em; }
    .header-right { display: flex; align-items: center; gap: 12px; color: #64748b; font-size: 12px; }
    /* Market strip */
    .market-strip {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 1px;
      background: #1e2535;
      border-radius: 8px;
      overflow: hidden;
      margin-bottom: 16px;
    }
    .market-cell {
      background: #13192a;
      padding: 12px 16px;
    }
    .market-cell .label { font-size: 11px; color: #475569; margin-bottom: 4px; }
    .market-cell .value { font-size: 20px; font-weight: 600; color: #f1f5f9; }
    .market-cell .value.down { color: #f87171; }
    .market-cell .value.tag { font-size: 14px; color: #7dd3fc; }

    /* Indicator bar */
    .indicator-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 1px;
      background: #1e2535;
      border-radius: 8px;
      overflow: hidden;
      margin-bottom: 12px;
    }
    .ind-cell {
      background: #13192a;
      padding: 8px 14px;
      display: flex;
      flex-direction: column;
      gap: 3px;
      flex: 1;
      min-width: 80px;
    }
    .ind-cell .ind-key { font-size: 10px; color: #475569; }
    .ind-cell .ind-val { font-size: 13px; color: #cbd5e1; font-weight: 600; }
    .ind-cell .ind-val.hi  { color: #86efac; }
    .ind-cell .ind-val.lo  { color: #fca5a5; }
    .ind-cell .ind-val.tag { color: #7dd3fc; }
    .ind-divider {
      width: 1px;
      background: #1e2535;
      align-self: stretch;
    }

    /* Options row */
    .options-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 16px;
    }
    .option-card {
      background: #13192a;
      border: 1px solid #1e2535;
      border-radius: 8px;
      padding: 12px 16px;
    }
    .option-card .opt-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }
    .opt-badge {
      font-size: 11px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 3px;
      letter-spacing: 0.05em;
    }
    .opt-badge.put { background: #7f1d1d; color: #fca5a5; }
    .opt-badge.call { background: #14532d; color: #86efac; }
    .opt-strike { font-size: 18px; font-weight: 700; }
    .opt-prices {
      display: flex;
      gap: 16px;
      font-size: 12px;
      color: #64748b;
    }
    .opt-prices span { display: flex; flex-direction: column; gap: 2px; }
    .opt-prices .pkey { font-size: 10px; color: #475569; }
    .opt-prices .pval { color: #cbd5e1; font-size: 13px; }
    .opt-symbol { font-size: 10px; color: #334155; margin-top: 6px; }
    .dist-badge {
      font-size: 11px;
      font-weight: 700;
      padding: 2px 7px;
      border-radius: 3px;
    }
    .dist-badge.put  { background: #7f1d1d55; color: #fca5a5; }
    .dist-badge.call { background: #14532d55; color: #86efac; }
    .spread-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid #1e2535;
      font-size: 11px;
      color: #475569;
    }
    .spread-val { font-weight: 700; font-size: 12px; }
    .spread-val.ok      { color: #64748b; }
    .spread-val.caution { color: #fb923c; }
    .spread-val.warn    { color: #f87171; }

    /* Structure cards */
    .structures { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .struct-card {
      background: #13192a;
      border: 1px solid #1e2535;
      border-radius: 8px;
      padding: 16px;
      position: relative;
      transition: border-color 0.15s;
    }
    .struct-card:hover { border-color: #334155; }
    .struct-card.recommended { border-color: #1d4ed8; }
    .recommended-badge {
      position: absolute;
      top: -1px; right: 12px;
      background: #1d4ed8;
      color: #bfdbfe;
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 0 0 4px 4px;
    }
    .struct-name { font-size: 11px; color: #475569; margin-bottom: 4px; }
    .struct-desc { font-size: 13px; color: #94a3b8; margin-bottom: 12px; }
    .struct-legs {
      font-size: 20px;
      font-weight: 700;
      color: #f1f5f9;
      margin-bottom: 12px;
    }
    .struct-strikes { font-size: 11px; color: #475569; margin-bottom: 12px; line-height: 1.6; }
    .struct-net {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 4px;
    }
    .struct-net.credit { color: #4ade80; }
    .struct-net.debit { color: #f87171; }
    .struct-protection {
      height: 4px;
      background: #1e2535;
      border-radius: 2px;
      margin-bottom: 6px;
      overflow: hidden;
    }
    .struct-protection-fill {
      height: 100%;
      background: #3b82f6;
      border-radius: 2px;
      transition: width 0.4s ease;
    }
    .struct-pct-label { font-size: 11px; color: #64748b; }
    .credit-tag {
      display: inline-block;
      margin-top: 10px;
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 3px;
      background: #14532d;
      color: #86efac;
    }
    .debit-tag {
      display: inline-block;
      margin-top: 10px;
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 3px;
      background: #7f1d1d;
      color: #fca5a5;
    }

    /* States */
    .state-box {
      text-align: center;
      padding: 60px 20px;
      color: #475569;
    }
    .state-box .icon { font-size: 32px; margin-bottom: 12px; }
    .state-box p { font-size: 14px; }

    .spinner {
      width: 24px; height: 24px;
      border: 2px solid #1e2535;
      border-top-color: #3b82f6;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .error-box {
      background: #7f1d1d22;
      border: 1px solid #7f1d1d;
      border-radius: 8px;
      padding: 16px;
      color: #fca5a5;
      margin-bottom: 16px;
      font-size: 13px;
    }

    /* Market status badge */
    .market-status {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      padding: 3px 10px;
      border-radius: 20px;
      font-weight: 600;
      letter-spacing: 0.03em;
    }
    .market-status.open   { background: #14532d; color: #4ade80; }
    .market-status.after  { background: #422006; color: #fb923c; }
    .market-status.night  { background: #1e1b4b; color: #a5b4fc; }
    .market-status.closed { background: #1e2535; color: #475569; }
    .market-status .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
    }
    .market-status.open .dot   { background: #4ade80; animation: pulse 1.5s infinite; }
    .market-status.after .dot  { background: #fb923c; animation: pulse 1.5s infinite; }
    .market-status.night .dot  { background: #a5b4fc; animation: pulse 2s infinite; }
    .market-status.closed .dot { background: #475569; }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }

    /* Warning / notice banners */
    .banner {
      border-radius: 8px;
      padding: 10px 16px;
      margin-bottom: 12px;
      font-size: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .banner.dte-warn  { background: #422006; border: 1px solid #92400e; color: #fbbf24; }
    .banner.mkt-note  { background: #0f172a; border: 1px solid #1e2535; color: #475569; }

    /* Section divider */
    .section-divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 20px 0 14px;
    }
    .section-divider .section-title {
      font-size: 12px;
      color: #475569;
      white-space: nowrap;
      letter-spacing: 0.08em;
    }
    .section-divider::before, .section-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #1e2535;
    }

    /* 0050 info bar */
    .info-bar-0050 {
      display: flex;
      align-items: center;
      gap: 20px;
      background: #13192a;
      border: 1px solid #1e2535;
      border-radius: 8px;
      padding: 10px 16px;
      margin-bottom: 12px;
      font-size: 12px;
    }
    .info-bar-0050 .ib-item { display: flex; flex-direction: column; gap: 2px; }
    .info-bar-0050 .ib-key { font-size: 10px; color: #475569; }
    .info-bar-0050 .ib-val { color: #f1f5f9; font-size: 15px; font-weight: 600; }
    .info-bar-0050 .ib-val.accent { color: #7dd3fc; }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const DATA_URL    = '/api/data';
const REFRESH_URL = '/api/refresh';
const REFRESH_MS  = 5 * 60 * 1000;   // 網頁開著時每 5 分鐘重抓

function fmt(n, dec = 0) {
  return Number(n).toLocaleString('zh-TW', { minimumFractionDigits: dec, maximumFractionDigits: dec });
}

function fmtTime(iso) {
  if (!iso) return '—';
  return iso.slice(11, 19);
}

function fmtNet(n) {
  const wan = n / 10000;
  return (wan >= 0 ? '+' : '') + wan.toFixed(1) + '萬';
}

function getMarketStatus() {
  const now = new Date();
  const day  = now.getDay();
  const mins = now.getHours() * 60 + now.getMinutes();

  if (day === 0) return 'closed';                    // 週日全休
  if (day === 6) return mins < 5 * 60 ? 'night' : 'closed'; // 週六夜盤延續至 05:00

  // 週一～週五
  if (mins < 5 * 60)           return 'night';      // 00:00–05:00 夜盤延續
  if (mins < 9 * 60)           return 'closed';     // 05:00–09:00 休市
  if (mins <= 13 * 60 + 30)    return 'open';       // 09:00–13:30 日盤
  if (mins < 14 * 60)          return 'closed';     // 13:30–14:00 換盤空檔
  if (mins <= 14 * 60 + 30)    return 'after';      // 14:00–14:30 盤後
  if (mins < 15 * 60)          return 'closed';     // 14:30–15:00 空檔
  return 'night';                                    // 15:00–24:00 夜盤
}

function MarketStatus() {
  const [status, setStatus] = React.useState(getMarketStatus);
  React.useEffect(() => {
    const t = setInterval(() => setStatus(getMarketStatus()), 30000);
    return () => clearInterval(t);
  }, []);
  const labels = { open: '日盤', after: '盤後', night: '夜盤', closed: '休市' };
  return (
    <span className={`market-status ${status}`}>
      <span className="dot" />
      {labels[status]}
    </span>
  );
}

function DTEWarning({ dte }) {
  if (dte == null || dte >= 5) return null;
  return (
    <div className="banner dte-warn">
      ⚠ DTE {dte} 天，UI 已切換至次月計算。請確認現有月選倉位的平倉時機。
    </div>
  );
}

function MarketHoursNote() {
  const [status, setStatus] = React.useState(getMarketStatus);
  React.useEffect(() => {
    const t = setInterval(() => setStatus(getMarketStatus()), 30000);
    return () => clearInterval(t);
  }, []);
  if (status === 'open') return null;
  const notes = {
    after:  '盤後交易中（14:00–14:30），選擇權報價為日盤最後成交',
    night:  '夜盤中（15:00–05:00），TXO 夜盤流動性低，報價僅供參考',
    closed: '休市中，報價為最近交易日收盤價',
  };
  return (
    <div className="banner mkt-note">
      {notes[status]}
    </div>
  );
}

function IndicatorBar({ indicators, targets, dte }) {
  if (!indicators) return null;
  const { atr, bb_upper, bb_lower, ma20, hv_2330, hv_taiex, hv_source } = indicators;
  const method    = targets?.method === 'bb_atr' ? 'BB+ATR' : '靜態';
  const hvLabel   = hv_source === 'tx_direct' ? 'HV-TX' : 'HV(代理)';
  const hvColor   = hv_source === 'tx_direct' ? '' : 'lo';
  const hvDisplay = hv_taiex ? (hv_taiex * 100).toFixed(1) + '%' : (hv_2330 ? (hv_2330 * 100).toFixed(1) + '%' : '—');
  return (
    <div className="indicator-bar">
      <div className="ind-cell">
        <span className="ind-key">ATR(14)</span>
        <span className="ind-val">{atr?.toFixed(1)}</span>
      </div>
      <div className="ind-cell">
        <span className="ind-key">BB 上軌</span>
        <span className="ind-val hi">{bb_upper?.toFixed(0)}</span>
      </div>
      <div className="ind-cell">
        <span className="ind-key">BB 中線</span>
        <span className="ind-val">{ma20?.toFixed(0)}</span>
      </div>
      <div className="ind-cell">
        <span className="ind-key">BB 下軌</span>
        <span className="ind-val lo">{bb_lower?.toFixed(0)}</span>
      </div>
      <div className="ind-cell">
        <span className="ind-key">{hvLabel}</span>
        <span className={`ind-val ${hvColor}`}>{hvDisplay}</span>
      </div>
      <div className="ind-cell">
        <span className="ind-key">DTE</span>
        <span className="ind-val">{dte ?? '—'} 天</span>
      </div>
      <div className="ind-cell">
        <span className="ind-key">目標 Put</span>
        <span className="ind-val lo">{targets?.target_put_strike?.toLocaleString()}</span>
      </div>
      <div className="ind-cell">
        <span className="ind-key">目標 Call</span>
        <span className="ind-val hi">{targets?.target_call_strike?.toLocaleString()}</span>
      </div>
      <div className="ind-cell">
        <span className="ind-key">選法</span>
        <span className="ind-val tag">{method}</span>
      </div>
    </div>
  );
}

function MarketStrip({ market, txo_month }) {
  const price = market?.price_2330;
  const open = market?.price_2330_open;
  const taiex = market?.taiex;
  const vol = market?.volume_2330;
  const isDown = open && price < open;

  return (
    <div className="market-strip">
      <div className="market-cell">
        <div className="label">台積電 2330</div>
        <div className={`value ${isDown ? 'down' : ''}`}>{price ? fmt(price) : '—'}</div>
      </div>
      <div className="market-cell">
        <div className="label">加權指數 TAIEX</div>
        <div className="value">{taiex ? fmt(taiex, 2) : '—'}</div>
      </div>
      <div className="market-cell">
        <div className="label">成交量（張）</div>
        <div className="value">{vol !== undefined ? fmt(vol) : '—'}</div>
      </div>
      <div className="market-cell">
        <div className="label">TXO 月份</div>
        <div className="value tag">{txo_month || '—'}</div>
      </div>
      <div className="market-cell" style={{display:'flex', alignItems:'center', justifyContent:'center'}}>
        <MarketStatus />
      </div>
    </div>
  );
}

function OptionCard({ type, data, taiex }) {
  if (!data) return null;
  const spread    = data.ask - data.bid;
  const spreadPct = data.mid > 0 ? spread / data.mid * 100 : 0;
  const spreadCls = spreadPct > 25 ? 'warn' : spreadPct > 15 ? 'caution' : 'ok';
  const dist      = taiex > 0 ? (data.strike - taiex) / taiex * 100 : null;
  return (
    <div className="option-card">
      <div className="opt-header">
        <span className={`opt-badge ${type}`}>{type.toUpperCase()}</span>
        <span className="opt-strike">{fmt(data.strike)}</span>
        {dist != null && (
          <span className={`dist-badge ${type}`}>
            {dist >= 0 ? '+' : ''}{dist.toFixed(1)}%
          </span>
        )}
      </div>
      <div className="opt-prices">
        <span><span className="pkey">ASK</span><span className="pval">{data.ask}</span></span>
        <span><span className="pkey">MID</span><span className="pval">{data.mid}</span></span>
        <span><span className="pkey">BID</span><span className="pval">{data.bid}</span></span>
        <span><span className="pkey">VOL</span><span className="pval">{data.volume}</span></span>
        <span><span className="pkey">δ</span><span className="pval">{data.delta != null ? data.delta.toFixed(3) : '—'}</span></span>
      </div>
      <div className="spread-row">
        <span>Bid-Ask Spread</span>
        <span className={`spread-val ${spreadCls}`}>
          {spread} pts ({spreadPct.toFixed(0)}%){spreadPct > 25 ? ' ⚠' : ''}
        </span>
      </div>
      <div className="opt-symbol">{data.symbol}</div>
    </div>
  );
}

function StructCard({ s, isRecommended, taiex }) {
  const pct     = Math.min(100, s.protection_pct);
  const putDist = s.puts > 0 && taiex > 0
    ? (s.put_strike - taiex) / taiex * 100
    : null;
  return (
    <div className={`struct-card ${isRecommended ? 'recommended' : ''}`}>
      {isRecommended && <div className="recommended-badge">推薦</div>}
      <div className="struct-name">{s.name}</div>
      <div className="struct-desc">{s.desc}</div>
      <div className="struct-legs">{s.calls}C / {s.puts}P</div>
      <div className="struct-strikes">
        Call {fmt(s.call_strike)} @ {s.call_premium}<br/>
        Put &nbsp;{fmt(s.put_strike)} @ {s.put_premium}
      </div>
      <div className={`struct-net ${s.is_net_credit ? 'credit' : 'debit'}`}>
        {fmtNet(s.monthly_net)}
      </div>
      <div className="struct-protection">
        <div className="struct-protection-fill" style={{ width: `${pct}%` }} />
      </div>
      <div className="struct-pct-label">避險覆蓋 {pct.toFixed(0)}%</div>
      <div className="struct-pct-label" style={{marginTop:'3px'}}>
        {putDist != null
          ? <span style={{color:'#94a3b8'}}>Put 生效需跌 <span style={{color:'#fca5a5', fontWeight:700}}>{Math.abs(putDist).toFixed(1)}%</span></span>
          : <span style={{color:'#475569'}}>無下行保護</span>
        }
      </div>
      <div className={s.is_net_credit ? 'credit-tag' : 'debit-tag'}>
        {s.is_net_credit ? '✓ Credit' : '✗ Debit'}
      </div>
    </div>
  );
}

function Section0050({ collar, taiex }) {
  if (!collar) return null;
  const { price_0050, lots, lot_size, notional, beta, beta_adj_ratio, recommended_contracts, structures } = collar;
  return (
    <>
      <div className="section-divider">
        <span className="section-title">0050 股期 {lots} 口 對應台指選擇權領口</span>
      </div>
      <div className="info-bar-0050">
        <div className="ib-item">
          <span className="ib-key">0050 現價</span>
          <span className="ib-val">{price_0050?.toFixed(2)}</span>
        </div>
        <div className="ib-item">
          <span className="ib-key">{lots}口名目（{lot_size.toLocaleString()}單位/口）</span>
          <span className="ib-val">{(notional / 10000).toFixed(0)} 萬</span>
        </div>
        <div className="ib-item">
          <span className="ib-key">Beta vs TAIEX</span>
          <span className="ib-val">{beta}</span>
        </div>
        <div className="ib-item">
          <span className="ib-key">Beta 調整比例</span>
          <span className="ib-val">{beta_adj_ratio?.toFixed(2)}</span>
        </div>
        <div className="ib-item">
          <span className="ib-key">建議 TXO 口數</span>
          <span className="ib-val accent">{recommended_contracts} 口</span>
        </div>
      </div>
      <div className="structures">
        {structures?.map((s, i) => (
          <StructCard key={s.name} s={s} isRecommended={i === 0} taiex={taiex} />
        ))}
      </div>
    </>
  );
}

function App() {
  const [data, setData] = React.useState(null);
  const [error, setError] = React.useState(null);
  const [loading, setLoading] = React.useState(true);
  const [refreshing, setRefreshing] = React.useState(false);
  const countdownRef = React.useRef(null);

  async function fetchData() {
    try {
      const res = await fetch(DATA_URL);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const json = await res.json();
      setData(json);
      setError(null);
    } catch (e) {
      setError(e.message);
    } finally {
      setLoading(false);
    }
  }

  async function triggerRefresh() {
    setRefreshing(true);
    try {
      await fetch(REFRESH_URL);   // 等 shioaji_collar.py 跑完（約 5s）
    } catch (_) {}               // 若非 server.py 啟動，靜默跳過
    await fetchData();
    setRefreshing(false);
  }

  React.useEffect(() => {
    triggerRefresh();
    countdownRef.current = setInterval(triggerRefresh, REFRESH_MS);
    return () => clearInterval(countdownRef.current);
  }, []);

  return (
    <div className="app">
      <div className="header">
        <h1>2330 0050對應大盤選擇權領口策略</h1>
        <div className="header-right">
          {data && !refreshing && (
            <span style={{color:'#334155', fontSize:'11px'}}>
              資料 {fmtTime(data.timestamp)}
            </span>
          )}
          {refreshing && <span style={{color:'#475569'}}>更新中…</span>}
        </div>
      </div>

      {error && <div className="error-box">⚠ 載入失敗：{error}</div>}

      {loading && !data ? (
        <div className="state-box">
          <div className="spinner" />
          <p>{refreshing ? '向永豐抓取最新報價…' : '連接 Firebase…'}</p>
        </div>
      ) : data ? (
        <>
          <MarketStrip market={data.market} txo_month={data.txo_month} />
          <DTEWarning dte={data.dte} />
          <IndicatorBar indicators={data.indicators} targets={data.targets} dte={data.dte} />
          <MarketHoursNote />
          <div className="options-row">
            <OptionCard type="put" data={data.selected_options?.put} taiex={data.market?.taiex} />
            <OptionCard type="call" data={data.selected_options?.call} taiex={data.market?.taiex} />
          </div>
          <div className="structures">
            {data.structures?.map((s, i) => (
              <StructCard key={s.name} s={s} isRecommended={i === 0} taiex={data.market?.taiex} />
            ))}
          </div>
          <Section0050 collar={data.collar_0050} taiex={data.market?.taiex} />
          <div style={{
            marginTop:'24px', padding:'12px 0',
            borderTop:'1px solid #1e2535',
            fontSize:'11px', color:'#334155', lineHeight:'1.8',
          }}>
            ⚠ TXO 領式對沖的是加權指數系統性風險，無法涵蓋台積電或 0050 的個股特定風險。當標的因個別消息劇烈波動而大盤未同步下跌時，Put 保護效果有限。
          </div>
        </>
      ) : null}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
