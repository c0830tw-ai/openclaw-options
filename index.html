function CollarDashboard({ data }) {
  const cd = data?.collar_dashboard;
  if (!cd) return null;
  const { put_leg, call_leg, recommended_structure } = cd;
  const fmt = n => n == null ? '—' : n.toLocaleString(undefined, {maximumFractionDigits: 0});
  const lvlColor = l =>
    l === 'high' ? '#f87171' :
    l === 'medium' ? '#fbbf24' :
    l === 'ok' ? '#4ade80' : '#94a3b8';

  const Leg = ({ title, side, leg }) => {
    if (!leg) return null;
    const borderColor = leg.has_position
      ? lvlColor(leg.triggers?.[0]?.level || 'ok')
      : '#475569';
    return (
      <div style={{flex:'1 1 200px', padding:'8px 10px',
                    border:`1px solid ${borderColor}`, borderRadius:'4px',
                    background:'#070b15'}}>
        <div style={{display:'flex', justifyContent:'space-between', alignItems:'baseline', marginBottom:'4px'}}>

function CalendarView({ data }) {
  const [monthOffset, setMonthOffset] = React.useState(0);
  const today = new Date();
  const target = new Date(today.getFullYear(), today.getMonth() + monthOffset, 1);
  const yr = target.getFullYear(), mo = target.getMonth();
  const daysInMonth = new Date(yr, mo + 1, 0).getDate();
  const firstDow = new Date(yr, mo, 1).getDay();   // 0=Sun

  // 收集 markers from latest data
  const markers = {};   // 'YYYY-MM-DD' → [{type, label, color}, ...]
  const addMarker = (date, type, label, color) => {
    if (!markers[date]) markers[date] = [];
    markers[date].push({ type, label, color });
  };

  // Events (upcoming)
  (data?.upcoming_events || []).forEach(ev => {
    const c = ev.impact === 'high' ? '#fb923c' : '#fbbf24';
    addMarker(ev.date, ev.type, ev.name, c);
  });

  // Past events with TX impact (from event_history)
  const pastEvents = data?.event_history?.events || [];
  pastEvents.forEach(ev => {
    const t = ev.tx_change_T_pct;
    // 顯示 TX% 變動為 label，色按方向
    const c = t == null ? '#64748b' :
              t >= 1   ? '#86efac' :
              t <= -1  ? '#fca5a5' :
                         '#94a3b8';
    const label = t != null ? `${t >= 0 ? '+' : ''}${t.toFixed(1)}% ${ev.name}` : ev.name;
    addMarker(ev.date, `past_${ev.type}`, label, c);
  });

  // TXO 月選結算（從 data.settlement_date 或近月）
  const fmt8to10 = s => s && s.length === 8 ? `${s.slice(0,4)}-${s.slice(4,6)}-${s.slice(6,8)}` : s;
  // far month
  if (data?.far_month?.settlement_date) {
    addMarker(fmt8to10(data.far_month.settlement_date), 'monthly', '遠月 TXO 結算', '#fca5a5');
  }
  // 週三週選
  if (data?.weekly_wed?.settlement_date) {
    addMarker(fmt8to10(data.weekly_wed.settlement_date), 'weekly_wed', '週三週選結算', '#86efac');
  }
  if (data?.weekly_fri?.settlement_date) {
    addMarker(fmt8to10(data.weekly_fri.settlement_date), 'weekly_fri', '週五週選結算', '#60a5fa');
  }
  // 近月（current TXO month）— 用 3rd Wed of month 近似
  // current month settlement
  const _3rdWed = (y, m) => {
    const first = new Date(y, m, 1).getDay(); // 0=Sun
    let firstWed = (3 - first + 7) % 7 + 1;   // Wed = 3
    return firstWed + 14;
  };
  // mark current TXO month settlement (current viewing month)
  addMarker(`${yr}-${String(mo+1).padStart(2,'0')}-${String(_3rdWed(yr, mo)).padStart(2,'0')}`,
            'monthly', 'TXO 月選結算', '#fca5a5');

  // 渲染
  const cells = [];
  // padding for first row
  for (let i = 0; i < firstDow; i++) cells.push({ pad: true, key: `pad-${i}` });
  for (let d = 1; d <= daysInMonth; d++) {
    const ds = `${yr}-${String(mo+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const dow = new Date(yr, mo, d).getDay();
    const isToday = ds === today.toISOString().slice(0, 10);
    const isWeekend = dow === 0 || dow === 6;
    cells.push({ ds, d, dow, isToday, isWeekend, marks: markers[ds] || [], key: ds });
  }

  const monthLabel = `${yr} 年 ${mo + 1} 月`;
  return (
    <div style={{
      background:'#0a0e1c', border:'1px solid #1e2535',
      borderRadius:'6px', padding:'8px 12px', margin:'8px 0',
      fontSize:'11px', color:'#cbd5e1',
    }}>
      <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'6px'}}>
        <span style={{fontWeight:700, color:'#94a3b8'}}>📅 行事曆</span>
        <div style={{display:'flex', gap:'4px', alignItems:'center'}}>
          <button onClick={() => setMonthOffset(monthOffset - 1)}
                  style={{background:'transparent', border:'1px solid #334155', color:'#94a3b8',
                          padding:'1px 8px', borderRadius:'3px', cursor:'pointer', fontSize:'10px'}}>‹</button>
          <span style={{fontSize:'12px', minWidth:'80px', textAlign:'center', color:'#cbd5e1'}}>{monthLabel}</span>
          <button onClick={() => setMonthOffset(monthOffset + 1)}
                  style={{background:'transparent', border:'1px solid #334155', color:'#94a3b8',
                          padding:'1px 8px', borderRadius:'3px', cursor:'pointer', fontSize:'10px'}}>›</button>
          <button onClick={() => setMonthOffset(0)}
                  style={{background:'transparent', border:'1px solid #334155', color:'#94a3b8',
                          padding:'1px 8px', borderRadius:'3px', cursor:'pointer', fontSize:'10px',
                          marginLeft:'4px'}}>今</button>
        </div>
      </div>

      {/* Day-of-week header */}
      <div style={{display:'grid', gridTemplateColumns:'repeat(7, 1fr)', gap:'2px', marginBottom:'2px'}}>
        {['日', '一', '二', '三', '四', '五', '六'].map(d => (
          <div key={d} style={{fontSize:'9px', color:'#64748b', textAlign:'center', padding:'2px 0'}}>{d}</div>
        ))}
      </div>

      {/* Calendar grid */}
      <div style={{display:'grid', gridTemplateColumns:'repeat(7, 1fr)', gap:'2px'}}>
        {cells.map(c => {
          if (c.pad) return <div key={c.key} />;
          const bg = c.isToday ? '#0f1828' : c.isWeekend ? '#070b15' : 'transparent';
          const dimColor = c.isWeekend ? '#475569' : '#cbd5e1';
          return (
            <div key={c.key} className="calendar-cell" style={{
              background: bg,
              border: c.isToday ? '1px solid #60a5fa' : '1px solid #1e2535',
              borderRadius: '3px',
            }}>
              <div style={{fontSize:'10px', color: dimColor, fontWeight: c.isToday ? 700 : 400}}>
                {c.d}
                {c.isToday && <span style={{fontSize:'8px', color:'#60a5fa', marginLeft:'2px'}}>今</span>}
              </div>
              {c.marks.length > 0 && (
                <div style={{marginTop:'2px', display:'flex', flexDirection:'column', gap:'1px'}}>
                  {c.marks.slice(0, 3).map((mk, i) => (
                    <div key={i} className="mark-text" title={mk.label} style={{
                      fontSize:'8px', color: mk.color,
                      borderLeft: `2px solid ${mk.color}`, paddingLeft:'3px',
                      whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis',
                    }}>
                      {mk.label.slice(0, 8)}
                    </div>
                  ))}
                </div>
              )}
            </div>
          );
        })}
      </div>

      {/* 圖例 */}
      <div style={{display:'flex', gap:'10px', flexWrap:'wrap', marginTop:'6px',
                    fontSize:'9px', color:'#64748b'}}>
        <span><span style={{color:'#fca5a5'}}>━</span> TXO 月選結算</span>
        <span><span style={{color:'#86efac'}}>━</span> 週三週選</span>
        <span><span style={{color:'#60a5fa'}}>━</span> 週五週選</span>
        <span><span style={{color:'#fb923c'}}>━</span> 未來高影響事件</span>
        <span><span style={{color:'#86efac'}}>+%</span> / <span style={{color:'#fca5a5'}}>-%</span> 過去事件 TX 變動</span>
      </div>
    </div>
  );
}

function IVPercentile({ data }) {
  const ivp = data?.iv_percentile;
  if (!ivp || !ivp.enough_data) return null;
  const pct = ivp.percentile;
  const color = pct >= 85 ? '#fb923c' :
                pct >= 70 ? '#fbbf24' :
                pct >= 30 ? '#94a3b8' :
                pct >= 15 ? '#60a5fa' : '#a78bfa';
  // bar visualization
  const bars = [];
  for (let i = 0; i < 10; i++) {
    const lo = i * 10, hi = (i + 1) * 10;
    const filled = pct >= hi || (pct > lo && pct < hi);
    bars.push(
      <div key={i} style={{
        flex: 1, height: '8px', borderRadius: '1px',
        background: pct > lo && pct < hi ? color : (pct >= hi ? `${color}66` : '#1e2535'),
      }} />
    );
  }
  return (
    <div style={{
      background:'#0a0e1c', border:`1px solid ${color}33`,
      borderRadius:'6px', padding:'8px 12px', margin:'8px 0',
      fontSize:'11px', color:'#cbd5e1',
    }}>
      <div style={{display:'flex', justifyContent:'space-between', alignItems:'baseline', marginBottom:'4px'}}>
        <span style={{fontWeight:700, color:'#94a3b8'}}>📊 IV 百分位（過去 {ivp.lookback_days}d）</span>
        <span style={{fontSize:'9px', color:'#64748b'}}>n={ivp.history_n}</span>
      </div>
      <div style={{display:'flex', alignItems:'baseline', gap:'12px', marginBottom:'4px'}}>
        <span className="hero-num" style={{color}}>
          {ivp.current_iv_pct.toFixed(1)}%
        </span>
        <span className="primary-num" style={{color}}>
          @ {pct.toFixed(0)} pctile
        </span>
        <span style={{fontSize:'11px', color, padding:'1px 6px',
                      background:`${color}20`, border:`1px solid ${color}`, borderRadius:'3px'}}>
          {ivp.label}
        </span>
        <span style={{flex:1, fontSize:'10px', color:'#94a3b8', textAlign:'right'}}>
          {ivp.view}
        </span>
      </div>
      {/* 10 段水平 bar */}
      <div style={{display:'flex', gap:'2px'}}>{bars}</div>
      {/* min/median/max 標尺 */}
      <div style={{display:'flex', justifyContent:'space-between', fontSize:'9px', color:'#64748b', marginTop:'2px'}}>
        <span>最低 {ivp.min_pct.toFixed(1)}%</span>
        <span>中位 {ivp.median_pct.toFixed(1)}%</span>
        <span>最高 {ivp.max_pct.toFixed(1)}%</span>
      </div>
    </div>
  );
}

    { label: '法說 miss',      emoji: '📉', tx: -8,  iv: -10, d: 1,
      note: '財報差於預期，TX 跌但 IV crush' },
    { label: 'FOMC 意外',      emoji: '🏦', tx: -3,  iv: 20,  d: 1,
      note: '鷹派意外：TX 軟 + IV spike' },
    { label: '盤整漂移',       emoji: '😴', tx: 0,   iv: -5,  d: 14,

  const calc = (s) => {

          💥 Stress Test 情境庫

          {results.length} 情境　{open ? '▲ 收起' : '▼ 展開試算'}
        </span>
      </div>

      {open && (
        <>
          <div style={{display:'flex', flexWrap:'wrap', gap:'6px', marginTop:'6px'}}>
            {results.map((s, i) => (
              <div key={i} style={{
                flex:'1 1 200px', minWidth:'180px',
                padding:'8px 10px',
                borderLeft: `3px solid ${colN(s.total)}`,

                <div style={{display:'flex', justifyContent:'space-between', alignItems:'baseline'}}>
                  <span style={{fontSize:'12px', fontWeight:700}}>
                    {s.emoji} {s.label}
                  </span>
                  <span style={{fontSize:'9px', color:'#64748b'}}>
                    {s.tx >= 0 ? '+' : ''}{s.tx}% TX
                    {' · '}{s.iv >= 0 ? '+' : ''}{s.iv}pp IV
                    {' · '}{s.d}d
                  </span>
                </div>
                <div className="hero-num" style={{color: colN(s.total), marginTop:'2px'}}>
                  {fmtS(s.total)}
                  <span style={{fontSize:'10px', color:'#64748b', marginLeft:'4px'}}>NT$</span>
                </div>
                <div style={{fontSize:'9px', color:'#64748b', marginTop:'2px', display:'flex', gap:'8px', flexWrap:'wrap'}}>
                  <span>Δ {fmtS(s.delta_pl)}</span>
                  <span>θ {fmtS(s.theta_pl)}</span>

                </div>
                <div style={{fontSize:'9px', color:'#475569', marginTop:'2px'}}>

        </>

  );
}

function PortfolioGreeks({ data }) {
  const [open, setOpen]    = React.useState(false);
  const [whatIf, setWhatIf] = React.useState(false);
  const [txPct, setTxPct]  = React.useState(-3);
  const [ivPp,  setIvPp]   = React.useState(5);
  const [days,  setDays]   = React.useState(7);
  const pg = data?.portfolio_greeks;
  if (!pg || !pg.totals) return null;
  const t = pg.totals;
  const gh = data?.greeks_history;
  const fmt  = n => n == null ? '—' : n.toLocaleString(undefined, {maximumFractionDigits: 0});
  const fmtS = n => n == null ? '—' : (n > 0 ? '+' : '') + fmt(n);
  const colN = n => n > 0 ? '#86efac' : n < 0 ? '#fca5a5' : '#94a3b8';

  // Mini sparkline for theta history
  const Sparkline = ({ values, w = 80, h = 18, color = '#64748b' }) => {
    if (!values || values.length < 2) return null;
    const min = Math.min(...values), max = Math.max(...values);
    const range = max - min || 1;
    const pts = values.map((v, i) => {
      const x = (i / (values.length - 1)) * w;
      const y = h - ((v - min) / range) * h;
      return `${x.toFixed(1)},${y.toFixed(1)}`;
    }).join(' ');
    const zeroY = h - ((0 - min) / range) * h;
    return (
      <svg width={w} height={h} style={{verticalAlign:'middle'}}>
        {(min < 0 && max > 0) && (
          <line x1="0" y1={zeroY} x2={w} y2={zeroY} stroke="#1e2535" strokeWidth="0.5" />
        )}
        <polyline fill="none" stroke={color} strokeWidth="1.2" points={pts} />
      </svg>
    );
  };

  return (
    <div style={{
      background: '#0a0e1c', border: '1px solid #1e2535',
      borderRadius: '6px', padding: '6px 12px', margin: '8px 0',
      fontSize: '11px', color: '#cbd5e1',
    }}>
      <div onClick={() => setOpen(!open)} style={{
        display:'flex', justifyContent:'space-between', alignItems:'center',
        cursor:'pointer', userSelect:'none',
      }}>
        <span style={{fontWeight:700, color:'#94a3b8'}}>
          🧮 Portfolio Greeks（選擇權整體曝險）
        </span>
        <span style={{fontSize:'9px', color:'#64748b'}}>
          {pg.legs?.length || 0} 腳　{open ? '▲ 收起' : '▼ 展開明細'}
        </span>
      </div>

      {/* What-if 情境計算機 */}
      <div style={{marginTop:'6px', borderTop:'1px solid #1e2535', paddingTop:'6px'}}>
        <div onClick={(e)=>{e.stopPropagation(); setWhatIf(!whatIf);}}
             style={{display:'flex', justifyContent:'space-between', alignItems:'center',
                     cursor:'pointer', userSelect:'none'}}>
          <span style={{fontSize:'10px', color:'#94a3b8'}}>🎯 What-if 情境</span>
          <span style={{fontSize:'9px', color:'#64748b'}}>{whatIf ? '▲' : '▼ 點開試算'}</span>
        </div>
        {whatIf && (() => {
          const deltaPL = (t.delta_ntd_per_1pct_tx || 0) * txPct;
          const thetaPL = (t.theta_ntd_per_day      || 0) * days;
          const vegaPL  = (t.vega_ntd_per_pct_iv    || 0) * ivPp;
          const total   = deltaPL + thetaPL + vegaPL;
          const Slider = ({label, value, onChange, min, max, step, suffix}) => (
            <div style={{flex:'1 1 200px', padding:'4px 8px'}}>
              <div style={{fontSize:'10px', color:'#94a3b8', display:'flex', justifyContent:'space-between'}}>
                <span>{label}</span>
                <b style={{color:'#cbd5e1'}}>{value > 0 ? '+' : ''}{value}{suffix}</b>
              </div>
              <input type="range" min={min} max={max} step={step} value={value}
                     onChange={e => onChange(parseFloat(e.target.value))}
                     style={{width:'100%', accentColor:'#60a5fa'}} />
            </div>
          );
          const Cell = ({label, value}) => (
            <div style={{flex:'1 1 90px', textAlign:'center', padding:'4px 8px',
                         background: value === total ? '#0f1828' : 'transparent',
                         borderRadius: '4px'}}>
              <div style={{fontSize:'9px', color:'#64748b'}}>{label}</div>
              <div style={{fontSize: value === total ? '14px' : '12px',
                           fontWeight: value === total ? 700 : 400,
                           color: colN(value), marginTop:'2px'}}>{fmtS(Math.round(value))}</div>
            </div>
          );
          return (
            <div style={{marginTop:'4px'}}>
              <div style={{display:'flex', flexWrap:'wrap'}}>
                <Slider label="TX 變動 %"   value={txPct} onChange={setTxPct} min={-15} max={15} step={0.5} suffix="%" />
                <Slider label="IV 變動 pp"  value={ivPp}  onChange={setIvPp}  min={-30} max={30} step={1}   suffix="pp" />
                <Slider label="持有天數"    value={days}  onChange={setDays}  min={0}   max={45} step={1}   suffix="d" />
              </div>
              <div style={{display:'flex', flexWrap:'wrap', marginTop:'6px',
                           background:'#070b15', borderRadius:'4px', padding:'4px 0'}}>
                <Cell label="Δ × TX"     value={deltaPL} />
                <Cell label="θ × 天"     value={thetaPL} />
                <Cell label="ν × IV"     value={vegaPL} />
                <Cell label="合計 P&L"   value={total} />
              </div>
              <div style={{fontSize:'9px', color:'#64748b', marginTop:'4px'}}>
                線性近似（Black-76 一階）；大幅 TX 變動時實際 P&L 因 gamma 略有偏差
              </div>
            </div>
          );
        })()}
      </div>

      <div className="greeks-3-grid" style={{marginTop:'6px'}}>
        <div style={{padding:'6px 10px', borderLeft:`3px solid ${colN(t.delta_ntd_per_1pct_tx)}`}}>
          <div style={{fontSize:'10px', color:'#94a3b8'}}>淨 Delta（方向）</div>
          <div className="primary-num" style={{marginTop:'2px'}}>
            <b style={{color: colN(t.delta_ntd_per_1pct_tx)}}>{fmtS(t.delta_ntd_per_1pct_tx)}</b>
            <span style={{fontSize:'10px', color:'#64748b'}}> NT$ / 1% TX</span>
          </div>
          <div style={{fontSize:'9px', color:'#64748b', marginTop:'2px'}}>
            原始 Δ = {t.net_delta?.toFixed(2)}（TX@{fmt(t.reference_tx)}）
          </div>
        </div>
        <div style={{flex:'1 1 160px', padding:'6px 10px', borderLeft:`3px solid ${colN(t.theta_ntd_per_day)}`}}>
          <div style={{display:'flex', justifyContent:'space-between', alignItems:'center'}}>
            <div style={{fontSize:'10px', color:'#94a3b8'}}>每日 Theta（時間）</div>
            {gh?.history?.length >= 2 && (
              <Sparkline values={gh.history.map(h => h.theta_ntd_per_day || 0)}
                         color={colN(t.theta_ntd_per_day)} />
            )}
          </div>
          <div className="primary-num" style={{marginTop:'2px'}}>
            <b style={{color: colN(t.theta_ntd_per_day)}}>{fmtS(t.theta_ntd_per_day)}</b>
            <span style={{fontSize:'10px', color:'#64748b'}}> NT$ / 天</span>
          </div>
          {gh?.cumulative ? (
            <div style={{fontSize:'9px', color:'#64748b', marginTop:'2px'}}>
              累積 7d <b style={{color: colN(gh.cumulative.last_7d)}}>{fmtS(gh.cumulative.last_7d)}</b>
              {' · '}30d <b style={{color: colN(gh.cumulative.last_30d)}}>{fmtS(gh.cumulative.last_30d)}</b>
              {' · '}lifetime <b style={{color: colN(gh.cumulative.lifetime)}}>{fmtS(gh.cumulative.lifetime)}</b>
            </div>
          ) : (
            <div style={{fontSize:'9px', color:'#64748b', marginTop:'2px'}}>
              {t.theta_ntd_per_day >= 0 ? '賣方部位每日收 theta' : '長部位每日付 theta（hedge 成本）'}
            </div>
          )}
        </div>
        <div style={{flex:'1 1 160px', padding:'6px 10px', borderLeft:`3px solid ${colN(t.vega_ntd_per_pct_iv)}`}}>
          <div style={{fontSize:'10px', color:'#94a3b8'}}>淨 Vega（波動率）</div>
          <div className="primary-num" style={{marginTop:'2px'}}>
            <b style={{color: colN(t.vega_ntd_per_pct_iv)}}>{fmtS(t.vega_ntd_per_pct_iv)}</b>
            <span style={{fontSize:'10px', color:'#64748b'}}> NT$ / 1% IV</span>
          </div>
          <div style={{fontSize:'9px', color:'#64748b', marginTop:'2px'}}>
            {t.vega_ntd_per_pct_iv >= 0 ? 'IV 漲對你有利' : 'IV 漲虧錢（賣方曝險）'}
          </div>
        </div>
      </div>

      {open && pg.legs && pg.legs.length > 0 && (
        <div style={{marginTop:'8px', borderTop:'1px solid #1e2535', paddingTop:'6px'}}>
          <table style={{width:'100%', fontSize:'10px', borderCollapse:'collapse'}}>
            <thead>
              <tr style={{color:'#64748b', textAlign:'right'}}>
                <th style={{textAlign:'left', padding:'2px 4px'}}>合約</th>
                <th>口數</th><th>DTE</th><th>IV</th>
                <th>Δ</th><th>θ/天</th><th>ν/1%</th>
              </tr>
            </thead>
            <tbody>
              {pg.legs.map((L, i) => (
                <tr key={i} style={{textAlign:'right', color:'#cbd5e1'}}>
                  <td style={{textAlign:'left', padding:'2px 4px', color:'#94a3b8'}}>
                    {L.code} <span style={{fontSize:'9px', color:'#475569'}}>{L.right === 'put' ? 'P' : 'C'}{fmt(L.strike)}</span>
                  </td>
                  <td style={{color: L.qty_signed > 0 ? '#86efac' : '#fca5a5'}}>{fmtS(L.qty_signed)}</td>
                  <td>{L.dte}</td>
                  <td>{(L.iv * 100).toFixed(1)}%</td>
                  <td style={{color: colN(L.pos_delta)}}>{L.pos_delta?.toFixed(2)}</td>
                  <td style={{color: colN(L.pos_theta_per_day)}}>{L.pos_theta_per_day?.toFixed(2)}</td>
                  <td style={{color: colN(L.pos_vega_per_pct)}}>{L.pos_vega_per_pct?.toFixed(2)}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      )}
    </div>
  );
}

function WeeklyOpportunities({ data }) {
  // 兼容舊版單一 dict / 新版 list
  const raw = data?.weekly_opportunities;
  const wos = !raw ? null : Array.isArray(raw) ? raw : [raw];
  if (!wos || wos.length === 0) return null;

  const fmt  = n => n == null ? '—' : n.toLocaleString(undefined, {maximumFractionDigits: 0});
  const fmt8 = d => d ? `${d.slice(4,6)}/${d.slice(6,8)}` : d;

  const copyCmd = (cmd) => {
    navigator.clipboard?.writeText(cmd).then(
      () => alert('已複製到剪貼簿：\n' + cmd),
      () => alert('複製失敗（瀏覽器不支援 clipboard）'),
    );
  };

  const Card = ({ title, color, children, copyText, viable }) => (
    <div style={{
      flex: '1 1 280px',
      background: viable === false ? '#1a1a1a' : '#0a0e1c',
      border: `1px solid ${viable === false ? '#475569' : color}`,
      opacity: viable === false ? 0.5 : 1,
      borderRadius: '6px', padding: '8px 12px',
      fontSize: '11px', color: '#cbd5e1',
      position: 'relative',
    }}>
      <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'4px'}}>
        <span style={{fontWeight:700, color}}>{title}</span>
        {viable === false ? (
          <span style={{fontSize:'9px', color:'#94a3b8'}}>市場不利</span>
        ) : copyText ? (
          <button onClick={() => copyCmd(copyText)} style={{
            background:'transparent', border:'1px solid #334155', borderRadius:'4px',
            color:'#94a3b8', fontSize:'9px', padding:'2px 6px', cursor:'pointer',
          }} title="複製 add_trade.py 命令">📋 複製</button>
        ) : null}
      </div>
      {children}
    </div>
  );

  const SectionForOpp = ({ wo }) => {
    const settle = fmt8(wo.settlement_date);
    const ivStr  = `${(wo.iv * 100).toFixed(1)}%`;
    const sc = wo.sell_call;
    const bp = wo.bull_put_spread;
    const bc = wo.bear_call_spread;
    const monthCode = wo.settlement_date?.slice(0, 6) || '202605';

    const scCmd = `python3 add_trade.py add sell_to_open "TXO ${monthCode} ${sc.strike?.toFixed(0)}C" 1 ${sc.premium} --book trading`;
    const bpCmd = `# Bull Put Spread (組合單下，這是 2 條獨立紀錄)
python3 add_trade.py add sell_to_open "TXO ${monthCode} ${bp.sell_strike?.toFixed(0)}P" 1 ${bp.sell_premium} --book trading
python3 add_trade.py add buy_to_open  "TXO ${monthCode} ${bp.buy_strike?.toFixed(0)}P"  1 ${bp.buy_premium} --book trading`;
    const bcCmd = `# Bear Call Spread
python3 add_trade.py add sell_to_open "TXO ${monthCode} ${bc.sell_strike?.toFixed(0)}C" 1 ${bc.sell_premium} --book trading
python3 add_trade.py add buy_to_open  "TXO ${monthCode} ${bc.buy_strike?.toFixed(0)}C"  1 ${bc.buy_premium} --book trading`;

    return (
      <div style={{marginBottom:'10px'}}>
        <div style={{fontSize:'11px', color:'#94a3b8', marginBottom:'4px', borderLeft:'3px solid #fbbf24', paddingLeft:'6px'}}>
          <b>{wo.weekday_label}週選 {wo.series}</b>　·　結算 {settle}　·　剩 {wo.dte_trading} 個交易日　·　波動率 {ivStr}
        </div>
        <div style={{display:'flex', gap:'8px', flexWrap:'wrap'}}>
          <Card title="📞 賣 Call（收 premium）" color="#86efac" copyText={scCmd} viable={sc.viable}>
            <div>履約 <b style={{color:'#86efac'}}>{fmt(sc.strike)}</b> @ {sc.premium} 點</div>
            <div style={{marginTop:'2px'}}>每口收 <b>NT$ {fmt(sc.income_ntd)}</b>　距現價 +{sc.distance_pct}%</div>
            <div style={{fontSize:'9px', color:'#64748b', marginTop:'2px'}}>適用：你看不漲、想吃 theta</div>
          </Card>

          <Card title="📈 Bull Put Spread（看不跌）" color="#60a5fa" copyText={bpCmd} viable={bp.viable}>
            <div>賣 <b style={{color:'#fca5a5'}}>{fmt(bp.sell_strike)}</b> bid {bp.sell_premium}/mid {bp.sell_mid} ／ 買 <b style={{color:'#86efac'}}>{fmt(bp.buy_strike)}</b> ask {bp.buy_premium}/mid {bp.buy_mid}
              <span style={{fontSize:'9px', color: bp.buy_premium_source?.startsWith('real') ? '#4ade80' : '#fbbf24', marginLeft:'4px'}}>
                {bp.buy_premium_source === 'real_ask' ? '[真實 ask]' :
                 bp.buy_premium_source === 'real_mid' ? '[真實 mid]' :
                 bp.buy_premium_source === 'bs_estimate_skew' ? '[BS+skew]' :
                 '[BS 估算]'}
              </span>
            </div>
            <div style={{marginTop:'2px'}}>
              淨收 <b style={{color:'#4ade80'}}>{bp.net_credit}</b> 點（組合單預期）
              <span style={{fontSize:'9px', color:'#94a3b8', marginLeft:'6px'}}>保守底 {bp.worst_credit}</span>
            </div>
            <div style={{marginTop:'2px'}}>最大賺 <b style={{color:'#4ade80'}}>NT$ {fmt(bp.max_profit)}</b> / 最大賠 <b style={{color:'#f87171'}}>NT$ {fmt(bp.max_loss)}</b></div>
            <div style={{marginTop:'2px'}}>損益平衡 <b>{fmt(bp.breakeven)}</b>　距現價 -{bp.distance_pct}%</div>
          </Card>

          <Card title="📉 Bear Call Spread（看不漲）" color="#fb923c" copyText={bcCmd} viable={bc.viable}>
            <div>賣 <b style={{color:'#fca5a5'}}>{fmt(bc.sell_strike)}</b> bid {bc.sell_premium}/mid {bc.sell_mid} ／ 買 <b style={{color:'#86efac'}}>{fmt(bc.buy_strike)}</b> ask {bc.buy_premium}/mid {bc.buy_mid}
              <span style={{fontSize:'9px', color: bc.buy_premium_source?.startsWith('real') ? '#4ade80' : '#fbbf24', marginLeft:'4px'}}>
                {bc.buy_premium_source === 'real_ask' ? '[真實 ask]' :
                 bc.buy_premium_source === 'real_mid' ? '[真實 mid]' :
                 bc.buy_premium_source === 'bs_estimate_skew' ? '[BS+skew]' :
                 '[BS 估算]'}
              </span>
            </div>
            <div style={{marginTop:'2px'}}>
              淨收 <b style={{color:'#4ade80'}}>{bc.net_credit}</b> 點（組合單預期）
              <span style={{fontSize:'9px', color:'#94a3b8', marginLeft:'6px'}}>保守底 {bc.worst_credit}</span>
            </div>
            <div style={{marginTop:'2px'}}>最大賺 <b style={{color:'#4ade80'}}>NT$ {fmt(bc.max_profit)}</b> / 最大賠 <b style={{color:'#f87171'}}>NT$ {fmt(bc.max_loss)}</b></div>
            <div style={{marginTop:'2px'}}>損益平衡 <b>{fmt(bc.breakeven)}</b>　距現價 +{bc.distance_pct}%</div>
          </Card>
        </div>
      </div>
    );
  };

  return (
    <div style={{
      background: '#0d1424', border: '1px solid #334155',
      borderRadius: '8px', padding: '10px 14px', margin: '8px 0',
    }}>
      <div style={{fontWeight:700, color:'#fbbf24', fontSize:'13px', marginBottom:'8px'}}>
        🗓 本週機會（週三 + 週五，按 DTE 升序）
      </div>

      {wos.map((wo, i) => <SectionForOpp key={i} wo={wo} />)}

      <div style={{fontSize:'9px', color:'#475569', marginTop:'6px'}}>
        ※「真實 ask」= 即時券商報價（最準）；「BS+skew」= 沒成交資料時用 skew 內插的 IV 估算（已修正 vol skew，較準）；「BS 估算」= 純 ATM IV 估算（會低估）。「市場不利」= 信用價差太薄不值得做。
      </div>
    </div>
  );
}

function RollSuggestions({ data }) {
  const sugs = data?.roll_suggestions;
  if (!sugs || !sugs.length) return null;
  const fmt = n => n == null ? '—' : n.toLocaleString(undefined, {maximumFractionDigits: 0});
  const colorFor = p => p === 'high' ? '#fb923c' : '#fbbf24';
  const priorityLabel = p => p === 'high' ? '緊急' : p === 'medium' ? '中等' : p;
  const actionLabel = a => ({
    roll_to_monthly:        '換到月選',
    roll_to_far_month:      '換到下個月選',
    roll_up_call:           '把賣 Call 換到更高履約',
    reinforce_or_roll_down: '加買保護或下調履約',
  })[a] || a;
  return (
    <div style={{margin:'8px 0'}}>
      {sugs.map((s, i) => (
        <div key={i} style={{
          background: '#1c1610', border: `1px solid ${colorFor(s.priority)}`,
          borderRadius: '6px', padding: '8px 12px', marginBottom: '6px',
          fontSize: '11px', color: '#fde68a',
        }}>
          <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'4px'}}>
            <span style={{fontWeight:700, color: colorFor(s.priority)}}>
              🔧 換倉建議 [{priorityLabel(s.priority)}]
            </span>
            <span style={{fontSize:'10px', color:'#94a3b8'}}>{actionLabel(s.action)}</span>
          </div>
          <div style={{color:'#e2e8f0', marginBottom:'4px'}}>{s.reason}</div>
          {s.instructions?.length > 0 && (
            <ul style={{margin:'4px 0 4px 16px', padding:0, color:'#cbd5e1'}}>
              {s.instructions.map((ins, j) => <li key={j} style={{fontSize:'10px'}}>{ins}</li>)}
            </ul>
          )}
          {s.estimates?.net_debit !== undefined ? (
            <div style={{fontSize:'10px', color:'#94a3b8', marginTop:'4px'}}>
              平倉收 NT$ {fmt(s.estimates.close_credit_per_lot * s.estimates.qty)} ／
              開倉付 NT$ {fmt(s.estimates.open_cost_per_lot * s.estimates.qty)} ／
              <b style={{color: s.estimates.net_debit > 0 ? '#fca5a5' : '#86efac'}}>
                淨{s.estimates.net_debit > 0 ? '付' : '收'} NT$ {fmt(Math.abs(s.estimates.net_debit))}
              </b>
              {s.estimates.replacement_iv ? ` · 波動率 ${(s.estimates.replacement_iv*100).toFixed(1)}%` : ''}
              {s.estimates.replacement_dte_trading ? ` · 新部位剩 ${s.estimates.replacement_dte_trading} 個交易日` : ''}
            </div>
          ) : s.estimates?.total_cost ? (
            <div style={{fontSize:'10px', color:'#94a3b8', marginTop:'4px'}}>
              預估成本 ≈ NT$ {fmt(s.estimates.total_cost)}
              {s.estimates.replacement_iv ? ` · 波動率 ${(s.estimates.replacement_iv*100).toFixed(1)}%` : ''}
            </div>
          ) : null}
        </div>
      ))}
    </div>
  );
}

function TrendStrip({ data }) {
  const tr = data?.trend;
  if (!tr) return null;
  const ch = tr.changes || {};
  const fmt = n => n == null ? '—' : n.toLocaleString(undefined, {maximumFractionDigits: 0});
  const sign = n => n == null ? '—' : (n >= 0 ? '+' : '') + fmt(n);
  const pctSign = n => n == null ? '—' : (n >= 0 ? '+' : '') + n.toFixed(2) + '%';
  const pnlColor = n => n == null ? '#64748b' : (n >= 0 ? '#4ade80' : '#f87171');

  const Cell = ({ label, delta }) => {
    if (!delta) return (
      <div style={{flex:1, padding:'4px 8px', textAlign:'center', color:'#475569'}}>
        <div style={{fontSize:'9px'}}>{label}</div>
        <div style={{fontSize:'10px'}}>—</div>
      </div>
    );
    return (
      <div style={{flex:1, padding:'4px 8px', textAlign:'center'}}>
        <div style={{fontSize:'9px', color:'#64748b'}}>{label}（{delta.base_date}）</div>
        <div style={{fontSize:'11px', color:'#cbd5e1', marginTop:'2px'}}>
          TX <b style={{color: pnlColor(delta.tx_delta_pct)}}>{pctSign(delta.tx_delta_pct)}</b>
          <span style={{margin:'0 4px', color:'#1e2535'}}>·</span>
          浮 <b style={{color: pnlColor(delta.unrealized_delta)}}>{sign(delta.unrealized_delta)}</b>
        </div>
      </div>
    );
  };

  return (
    <div style={{
      background: '#0a0e1c', border: '1px solid #1e2535',
      borderRadius: '6px', padding: '6px 12px', margin: '8px 0',
      fontSize: '11px',
    }}>
      <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'4px'}}>
        <span style={{fontWeight:700, color:'#94a3b8'}}>📈 每日趨勢</span>
        <span style={{fontSize:'9px', color:'#64748b'}}>
          {tr.snapshot_count} 筆紀錄 · 起算日 {tr.first_date}
        </span>
      </div>
      <div style={{display:'flex', justifyContent:'space-between', borderTop:'1px solid #1e2535'}}>
        <Cell label="vs 昨日"   delta={ch.vs_yesterday} />
        <Cell label="vs 一週前" delta={ch.vs_week_ago} />
        <Cell label="vs 月初"   delta={ch.vs_month_start} />
      </div>
    </div>
  );
}

  return (
    <div style={{

function DrawdownPanel({ data }) {
  const dd = data?.drawdown;
  if (!dd) return null;
  const cur = dd.current_dd_pct || 0;
  const sev = dd.severity || 'ok';
  const color = sev === 'critical' ? '#dc2626' :
                sev === 'high'     ? '#fb923c' :
                sev === 'medium'   ? '#fbbf24' :
                sev === 'low'      ? '#94a3b8' : '#4ade80';

  // Mini sparkline of equity DD% (last 30 days)
  const series = dd.series || [];
  const Sparkline = () => {
    if (series.length < 2) return null;
    const vals = series.map(s => s.dd_pct);
    const min = Math.min(...vals, -2);   // floor at -2 to keep some scale
    const max = Math.max(...vals, 0);
    const range = max - min || 1;
    const w = 120, h = 24;
    const pts = vals.map((v, i) => {
      const x = (i / (vals.length - 1)) * w;
      const y = h - ((v - min) / range) * h;
      return `${x.toFixed(1)},${y.toFixed(1)}`;
    }).join(' ');
    const zeroY = h - ((0 - min) / range) * h;
    return (
      <svg width={w} height={h} style={{verticalAlign:'middle'}}>
        <line x1="0" y1={zeroY} x2={w} y2={zeroY} stroke="#1e2535" strokeWidth="0.5" />
        <polyline fill="none" stroke={color} strokeWidth="1.2" points={pts} />
      </svg>
    );
  };

  // DD bar (visual: -20% scale)
  const barFill = Math.min(100, Math.abs(cur) / 20 * 100);

  const fmt = n => n == null ? '—' : n.toLocaleString();
  return (
    <div style={{
      background:'#0a0e1c', border:`1px solid ${color}33`,
      borderRadius:'6px', padding:'8px 12px', margin:'8px 0',
      fontSize:'11px', color:'#cbd5e1',
    }}>
      <div style={{display:'flex', justifyContent:'space-between', alignItems:'baseline', marginBottom:'4px'}}>
        <span style={{fontWeight:700, color}}>📉 Drawdown 追蹤</span>
        <span style={{fontSize:'9px', color:'#64748b'}}>n={dd.snapshot_count}</span>
      </div>

      <div style={{display:'flex', alignItems:'baseline', gap:'12px', marginBottom:'4px', flexWrap:'wrap'}}>
        <span className="hero-num" style={{color}}>
          {cur >= 0 ? '+' : ''}{cur.toFixed(2)}%
        </span>
        <span style={{fontSize:'10px', color:'#94a3b8'}}>
          {dd.days_in_dd} 天從 peak
        </span>
        <span style={{flex:1, fontSize:'10px', color, textAlign:'right'}}>
          {dd.severity_msg}
        </span>
      </div>

      {/* DD bar */}
      <div style={{position:'relative', height:'8px', background:'#1e2535', borderRadius:'2px', overflow:'hidden'}}>
        <div style={{position:'absolute', right:'50%', top:0, height:'100%', width: `${barFill / 2}%`, background: color}} />
        {/* zero marker */}
        <div style={{position:'absolute', left:'50%', top:0, width:'1px', height:'100%', background:'#475569'}} />
      </div>
      <div style={{display:'flex', justifyContent:'space-between', fontSize:'9px', color:'#64748b', marginTop:'2px'}}>
        <span>-20%</span>
        <span>0%</span>
      </div>

      <div style={{display:'flex', gap:'12px', flexWrap:'wrap', marginTop:'6px',
                    fontSize:'10px', color:'#94a3b8'}}>
        <span>Peak {fmt(dd.peak_value)} <span style={{color:'#64748b'}}>({dd.peak_date})</span></span>
        <span>當前 {fmt(dd.current_value)}</span>
        <span style={{color: '#fca5a5'}}>歷史 max DD {dd.max_dd_pct}%</span>
        <span style={{flex:1, textAlign:'right'}}><Sparkline /></span>
      </div>
    </div>
  );
}

function IVSmile({ data }) {
  const tx = data?.market?.tx_futures;
  const skewWed = (data?.weekly_wed?.skew || []).slice().sort((a,b) => a.strike - b.strike);
  const skewFri = (data?.weekly_fri?.skew || []).slice().sort((a,b) => a.strike - b.strike);
  if (!tx || (skewWed.length < 3 && skewFri.length < 3)) return null;

  // 持倉履約
  const holdings = ((data?.portfolio_greeks?.legs) || [])
    .filter(L => L.right === 'put' || L.right === 'call')
    .map(L => ({ strike: L.strike, qty: L.qty_signed, right: L.right }));

  const allStrikes = [...skewWed.map(s => s.strike), ...skewFri.map(s => s.strike)];
  const xMin = Math.min(...allStrikes, tx - 200);
  const xMax = Math.max(...allStrikes, tx + 200);
  const allIvs = [...skewWed.map(s => s.iv), ...skewFri.map(s => s.iv)];
  const yMin = Math.min(...allIvs) * 100 - 1;
  const yMax = Math.max(...allIvs) * 100 + 1;
  const xRange = xMax - xMin;
  const yRange = yMax - yMin || 1;

  const W = 320, H = 160;
  const padL = 36, padR = 12, padT = 12, padB = 22;
  const innerW = W - padL - padR, innerH = H - padT - padB;
  const px = (s) => padL + ((s - xMin) / xRange) * innerW;
  const py = (iv_pct) => padT + ((yMax - iv_pct) / yRange) * innerH;

  const polyOf = (skew, color) => {
    if (skew.length < 2) return null;
    const pts = skew.map(s => `${px(s.strike).toFixed(1)},${py(s.iv * 100).toFixed(1)}`).join(' ');
    return <polyline fill="none" stroke={color} strokeWidth="1.5" points={pts} />;
  };

  return (
    <div style={{
      background:'#0a0e1c', border:'1px solid #1e2535',
      borderRadius:'6px', padding:'8px 12px', margin:'8px 0',
      fontSize:'11px', color:'#cbd5e1',
    }}>
      <div style={{display:'flex', justifyContent:'space-between', alignItems:'baseline', marginBottom:'4px'}}>
        <span style={{fontWeight:700, color:'#94a3b8'}}>😊 IV Smile</span>
        <span style={{fontSize:'9px', color:'#64748b'}}>
          ATM TX {Math.round(tx).toLocaleString()}
        </span>
      </div>
      <svg viewBox={`0 0 ${W} ${H}`} preserveAspectRatio="none"
           style={{width:'100%', height:`${H}px`, display:'block'}}>
        {/* Y axis labels */}
        <text x="2" y={padT + 6} fontSize="9" fill="#64748b">{yMax.toFixed(0)}%</text>
        <text x="2" y={H - padB} fontSize="9" fill="#64748b">{yMin.toFixed(0)}%</text>
        {/* Border */}
        <rect x={padL} y={padT} width={innerW} height={innerH} fill="none" stroke="#1e2535" strokeWidth="0.5" />
        {/* ATM vertical line */}
        <line x1={px(tx)} y1={padT} x2={px(tx)} y2={padT + innerH}
              stroke="#fbbf24" strokeWidth="0.8" strokeDasharray="3,3" />
        <text x={px(tx) + 2} y={padT + 10} fontSize="9" fill="#fbbf24">ATM</text>
        {/* Smile curves */}
        {polyOf(skewWed, '#86efac')}
        {polyOf(skewFri, '#7dd3fc')}
        {/* Holding markers */}
        {holdings.map((h, i) => {
          // 找 skew 內插的 IV 標位置
          const skew = skewWed.length >= 2 ? skewWed : skewFri;
          if (skew.length < 2) return null;
          let iv = skew[0].iv;
          if (h.strike <= skew[0].strike) iv = skew[0].iv;
          else if (h.strike >= skew[skew.length-1].strike) iv = skew[skew.length-1].iv;
          else for (let j = 0; j < skew.length - 1; j++) {
            const a = skew[j], b = skew[j+1];
            if (h.strike >= a.strike && h.strike <= b.strike && b.strike > a.strike) {
              iv = a.iv + (h.strike - a.strike)/(b.strike - a.strike) * (b.iv - a.iv);
              break;
            }
          }
          const cx = px(h.strike), cy = py(iv * 100);
          const color = h.qty > 0 ? '#86efac' : '#fca5a5';
          return (
            <g key={i}>
              <circle cx={cx} cy={cy} r="3.5" fill={color} stroke="#0a0e1c" strokeWidth="1" />
              <text x={cx} y={cy - 6} fontSize="8" fill={color} textAnchor="middle">
                {h.qty > 0 ? '+' : ''}{h.qty}
              </text>
            </g>
          );
        })}
        {/* X axis labels */}
        <text x={padL} y={H - 6} fontSize="9" fill="#64748b">{Math.round(xMin).toLocaleString()}</text>
        <text x={padL + innerW} y={H - 6} fontSize="9" fill="#64748b" textAnchor="end">{Math.round(xMax).toLocaleString()}</text>
      </svg>
      <div style={{display:'flex', gap:'12px', flexWrap:'wrap', fontSize:'9px', color:'#94a3b8',
                    marginTop:'2px', justifyContent:'center'}}>
        {skewWed.length >= 2 && (
          <span><span style={{display:'inline-block', width:'12px', height:'2px',
                              background:'#86efac', marginRight:'4px', verticalAlign:'middle'}} />
                週三週選 (n={skewWed.length})</span>
        )}
        {skewFri.length >= 2 && (
          <span><span style={{display:'inline-block', width:'12px', height:'2px',
                              background:'#7dd3fc', marginRight:'4px', verticalAlign:'middle'}} />
                週五週選 (n={skewFri.length})</span>
        )}
        {holdings.length > 0 && (
          <span><span style={{display:'inline-block', width:'8px', height:'8px',
                              background:'#86efac', borderRadius:'50%', marginRight:'4px',
                              verticalAlign:'middle'}} />
                持倉 {holdings.length} 腳</span>
        )}
      </div>
      <div style={{fontSize:'9px', color:'#64748b', marginTop:'2px'}}>
        左下傾斜 = put 高 vol（典型台股 skew）；右上凹 = call 高 vol；對稱 = U 型 smile
      </div>
    </div>
  );
}

function TxoChainGrid({ data }) {
  const [open, setOpen] = React.useState(false);
  const tx  = data?.market?.tx_futures;
  const dte = data?.dte_trading || 30;
  const iv  = data?.iv_used || 0.20;
  if (!tx) return null;

  const T = dte / 365;
  const sqrtT = Math.sqrt(T);
  const atm = Math.round(tx / 100) * 100;

  // 用近月 / 週選 skew 內插 IV（fallback 到 ATM IV）
  const skew = (data?.weekly_wed?.skew || data?.weekly_fri?.skew || []).slice().sort((a,b) => a.strike - b.strike);
  const interpIV = (K) => {
    if (skew.length === 0) return iv;
    if (K <= skew[0].strike) return skew[0].iv;
    if (K >= skew[skew.length - 1].strike) return skew[skew.length - 1].iv;
    for (let i = 0; i < skew.length - 1; i++) {
      const a = skew[i], b = skew[i + 1];
      if (K >= a.strike && K <= b.strike && b.strike > a.strike) {
        const t = (K - a.strike) / (b.strike - a.strike);
        return a.iv + t * (b.iv - a.iv);
      }
    }
    return iv;
  };

  // 持倉 mapping
  const legs = (data?.portfolio_greeks?.legs) || [];
  const holdings = {};
  for (const L of legs) {
    if ((L.right === 'put' || L.right === 'call') && L.strike) {
      holdings[`${L.right}_${L.strike}`] = (holdings[`${L.right}_${L.strike}`] || 0) + (L.qty_signed || 0);
    }
  }

  const N = 10;
  const putStrikes  = []; for (let i = N; i >= 1; i--) putStrikes.push(atm - i * 100);
  const callStrikes = []; for (let i = 1; i <= N; i++) callStrikes.push(atm + i * 100);

  const computeRow = (K, isPut) => {
    const ivK = interpIV(K);
    const d1 = (Math.log(tx / K) + 0.5 * ivK * ivK * T) / (ivK * sqrtT);
    const d2 = d1 - ivK * sqrtT;
    const delta = isPut ? (_normCdf(d1) - 1) : _normCdf(d1);
    const price = isPut
      ? K * _normCdf(-d2) - tx * _normCdf(-d1)
      : tx * _normCdf(d1) - K * _normCdf(d2);
    const held = holdings[`${isPut ? 'put' : 'call'}_${K}`] || 0;
    return { K, delta, price, ivK, held };
  };

  const Row = ({ row, isPut }) => {
    const c = isPut ? '#fca5a5' : '#86efac';
    const heldStr = row.held ? `${row.held > 0 ? '+' : ''}${row.held}口` : '';
    const heldColor = row.held > 0 ? '#86efac' : row.held < 0 ? '#fca5a5' : '';
    return (
      <tr style={{
        background: row.held ? '#0f1828' : 'transparent',
        borderBottom: '1px solid #1e2535',
      }}>
        <td style={{padding:'2px 6px', color:'#cbd5e1', fontWeight: row.held ? 700 : 400}}>
          {row.K} {row.held ? '★' : ''}
        </td>
        <td style={{padding:'2px 6px', textAlign:'right', color: c}}>
          {row.delta.toFixed(2)}
        </td>
        <td style={{padding:'2px 6px', textAlign:'right', color:'#cbd5e1'}}>
          {Math.round(row.price)}
        </td>
        <td style={{padding:'2px 6px', textAlign:'right', color:'#64748b', fontSize:'9px'}}>
          {(row.ivK * 100).toFixed(1)}%
        </td>
        <td style={{padding:'2px 6px', textAlign:'right', color: heldColor, fontSize:'10px', minWidth:'40px'}}>
          {heldStr}
        </td>
      </tr>
    );
  };

  return (
    <div style={{
      background:'#0a0e1c', border:'1px solid #1e2535',
      borderRadius:'6px', padding:'8px 12px', margin:'8px 0',
      fontSize:'11px', color:'#cbd5e1',
    }}>
      <div onClick={() => setOpen(!open)} style={{
        display:'flex', justifyContent:'space-between', alignItems:'center',
        cursor:'pointer', userSelect:'none',
      }}>
        <span style={{fontWeight:700, color:'#94a3b8'}}>
          🔗 TXO 履約鏈（ATM ±{N} 檔）
        </span>
        <span style={{fontSize:'9px', color:'#64748b'}}>
          ATM {atm} · DTE {dte}d · {open ? '▲' : '▼'}
        </span>
      </div>

      {open && (
        <>
          <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:'8px', marginTop:'6px'}}>
            <div>
              <div style={{fontSize:'10px', color:'#fca5a5', fontWeight:700, marginBottom:'2px'}}>
                📉 OTM Put（履約 &lt; TX）
              </div>
              <table style={{width:'100%', borderCollapse:'collapse', fontSize:'10px'}}>
                <thead>
                  <tr style={{color:'#64748b', textAlign:'right', fontSize:'9px'}}>
                    <th style={{textAlign:'left', padding:'2px 6px'}}>履約</th>
                    <th>Δ</th><th>價</th><th>IV</th><th>持倉</th>
                  </tr>
                </thead>
                <tbody>
                  {putStrikes.map(K => <Row key={K} row={computeRow(K, true)} isPut={true} />)}
                </tbody>
              </table>
            </div>
            <div>
              <div style={{fontSize:'10px', color:'#86efac', fontWeight:700, marginBottom:'2px'}}>
                📈 OTM Call（履約 &gt; TX）
              </div>
              <table style={{width:'100%', borderCollapse:'collapse', fontSize:'10px'}}>
                <thead>
                  <tr style={{color:'#64748b', textAlign:'right', fontSize:'9px'}}>
                    <th style={{textAlign:'left', padding:'2px 6px'}}>履約</th>
                    <th>Δ</th><th>價</th><th>IV</th><th>持倉</th>
                  </tr>
                </thead>
                <tbody>
                  {callStrikes.map(K => <Row key={K} row={computeRow(K, false)} isPut={false} />)}
                </tbody>
              </table>
            </div>
          </div>
          <div style={{textAlign:'center', fontSize:'10px', color:'#fbbf24', marginTop:'6px',
                        padding:'4px', background:'#0f1828', borderRadius:'3px'}}>
            ─── ATM TX {tx?.toFixed(0)} ───
          </div>
          <div style={{fontSize:'9px', color:'#64748b', marginTop:'4px'}}>
            BS 估價（用 skew 內插的 IV，非真實 quote）；★ 標記持倉
          </div>
        </>
      )}
    </div>
  );
}

const PTR_THRESHOLD = 70;

function usePullToRefresh(onRefresh, enabled) {
  const startY   = React.useRef(null);
  const distRef  = React.useRef(0);
  const [pullDist, setPullDist] = React.useState(0);

  const cb = React.useRef(onRefresh);
  React.useEffect(() => { cb.current = onRefresh; }, [onRefresh]);

  React.useEffect(() => {
    if (!enabled) return;

    function onTouchStart(e) {
      startY.current = e.touches[0].clientY;   // 永遠記錄，touchmove 再判斷
    }
    function onTouchMove(e) {
      if (startY.current === null) return;
      const d = e.touches[0].clientY - startY.current;
      if (window.scrollY <= 0 && d > 0) {
        // 頁面在頂部且往下拉：接管手勢
        e.preventDefault();
        distRef.current = Math.min(d, PTR_THRESHOLD * 1.5);
        setPullDist(distRef.current);
      } else if (d <= 0 || window.scrollY > 0) {
        // 往上滑或不在頂部：放棄追蹤，讓瀏覽器正常捲動
        if (distRef.current > 0) { distRef.current = 0; setPullDist(0); }
        startY.current = null;
      }
    }
    function onTouchEnd() {
      if (distRef.current >= PTR_THRESHOLD) cb.current();
      distRef.current = 0;
      startY.current  = null;
      setPullDist(0);
    }

    document.addEventListener('touchstart', onTouchStart, { passive: true });
    document.addEventListener('touchmove',  onTouchMove,  { passive: false });
    document.addEventListener('touchend',   onTouchEnd);
    return () => {
      document.removeEventListener('touchstart', onTouchStart);
      document.removeEventListener('touchmove',  onTouchMove);
      document.removeEventListener('touchend',   onTouchEnd);
    };
  }, [enabled]);

  return pullDist;
}

function App() {
  const [data, setData] = React.useState(null);
  const [error, setError] = React.useState(null);
  const [loading, setLoading] = React.useState(true);
  const [refreshing, setRefreshing] = React.useState(false);
  const countdownRef = React.useRef(null);

  async function fetchData() {
    try {
      const res = await fetch(DATA_URL);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const json = await res.json();
      setData(json);
      setError(null);
    } catch (e) {
      setError(e.message);
    } finally {
      setLoading(false);
    }
  }

  async function triggerRefresh() {
    setRefreshing(true);
    try {
      await fetch(REFRESH_URL);
    } catch (_) {}
    await fetchData();
    setRefreshing(false);
  }

  const pullDist = usePullToRefresh(triggerRefresh, !refreshing);
  const pulling  = pullDist > 0;
  const ready    = pullDist >= PTR_THRESHOLD;

  React.useEffect(() => {
    triggerRefresh();
    function schedule() {
      countdownRef.current = setTimeout(() => {
        triggerRefresh();
        schedule();
      }, getRefreshMs());
    }
    schedule();
    return () => clearTimeout(countdownRef.current);
  }, []);

  return (
    <MarketStatusProvider>
    <div className="app">
      {/* Pull-to-refresh indicator */}
      {(pulling || refreshing) && (
        <div className="ptr-bar" style={{ height: refreshing ? '44px' : `${Math.min(pullDist, PTR_THRESHOLD)}px` }}>
          {refreshing
            ? <div className="ptr-spinner" />
            : <span className="ptr-text" style={{ color: ready ? '#4ade80' : '#475569' }}>
                {ready ? '↑ 放開更新' : '↓ 繼續下拉'}
              </span>
          }
        </div>
      )}

      <div className="header">
        <h1>2330 0050 選擇權策略</h1>
        <div className="header-right">
          {data && !refreshing && (
            <>
              <span style={{color:'#1e2535', fontSize:'11px'}}>{fmtTime(data.timestamp)}</span>
              <DataAge timestamp={data.timestamp} />
            </>
          )}
          {refreshing && <span style={{color:'#475569'}}>更新中…</span>}
          <MarketStatus />
        </div>
      </div>

      {/* 引擎狀態（資料新鮮度）保留在最頂 */}
      <EngineStatus data={data} />

      {/* 🎯 今日行動 — 看完即決定要不要動手 */}
      <Section title="🎯 今日行動" defaultOpen={true} accent="yellow"
               badge={[
                 data?.upcoming_events?.length ? `${data.upcoming_events.length} 事件` : null,
                 data?.roll_suggestions?.length ? `${data.roll_suggestions.length} 換倉` : null,
               ].filter(Boolean).join(' · ') || null}>
        <CalendarView data={data} />
        <UpcomingEvents data={data} />
        <RegimeAdvisor data={data} />
        <CollarDashboard data={data} />
        <OrderHelper data={data} />
        <PretradeSimulator data={data} />
        <RollSuggestions data={data} />
      </Section>

      {/* 🛡️ 部位健康 — 一眼看出現在的曝險 */}
      <Section title="🛡️ 部位健康" defaultOpen={true} accent="green"
               badge={[
                 data?.iv_percentile?.enough_data ? `IV ${data.iv_percentile.percentile.toFixed(0)} pctile` : null,
                 data?.health_check ? `${data.health_check.overall_score}/100 ${data.health_check.grade}` : null,
               ].filter(Boolean).join(' · ') || null}>
        <IVPercentile data={data} />
        <DrawdownPanel data={data} />
        <RiskLimits data={data} />
        <HealthCheck data={data} />
        <PortfolioGreeks data={data} />
        <StressTest data={data} />
      </Section>

      {/* 💡 市場機會 — 想加倉時看 */}
      <Section title="💡 市場機會" defaultOpen={false} accent="blue"
               badge={data?.weekly_opportunities?.length ? `${data.weekly_opportunities.length} 週` : null}>
        <IndicatorGrid data={data} />
        <IVSmile data={data} />
        <TxoChainGrid data={data} />
        <WeeklyOpportunities data={data} />
      </Section>

      {/* 📋 持倉明細 — 對帳/檢查用 */}
      <Section title="📋 持倉明細" defaultOpen={false} accent="gray"
               badge={data?.broker?.total_positions ? `${data.broker.total_positions} 筆` : null}>
        <BrokerPositions data={data} />
        <PortfolioBreakdown data={data} />
      </Section>

      {/* 📈 績效追蹤 — 月底看 */}
      <Section title="📈 績效追蹤" defaultOpen={false} accent="purple"
               badge={[
                 data?.trade_journal?.total_trades ? `${data.trade_journal.total_trades} 日記` : null,
                 data?.event_history ? `${data.event_history.event_count} 歷史事件` : null,
               ].filter(Boolean).join(' · ') || null}>
        <EquityChart data={data} />
        <GreeksHistoryChart data={data} />

        <PastEventImpact data={data} />
        <TrendStrip data={data} />
        <TradingLedger data={data} />
      </Section>

      {error && <div className="error-box">⚠ 載入失敗：{error}</div>}
      {data?.quotes_source === 'bs_estimate' && (
        <div className="error-box" style={{background:'#17130a', borderColor:'#ca8a04', color:'#fde68a'}}>
          ⚠ 無即時報價：選擇權報價為 Black-Scholes 理論估算，與實際市價可能有大幅落差。下次有真實報價時將自動更新。
        </div>
      )}
      {data?.market_session === 'night' && data?.quotes_source === 'live' && (
        <div className="error-box" style={{background:'#0f1828', borderColor:'#3b82f6', color:'#bfdbfe'}}>
          🌙 夜盤時段（15:00–05:00）：TXO 報價為夜盤即時行情，流動性可能低於日盤。
        </div>
      )}

      {loading && !data ? (
        <div className="state-box">
          <div className="spinner" />
          <p>{refreshing ? '向永豐抓取最新報價…' : '讀取本機資料…'}</p>
        </div>
      ) : data ? (
        <>
          <MarketStrip market={data.market} txo_month={data.txo_month} dte={data.dte}
                       indicators={data.indicators} targets={data.targets}
                       indicators0050={data.indicators_0050}
                       iv={data.iv_used} ivSource={data.iv_source} />
          <DTEWarning dte={data.dte} />
          <MarketHoursNote />
          {(() => {
            const taiex     = data.market?.taiex;
            const taiexHigh = data.market?.taiex_high;
            const taiexLow  = data.market?.taiex_low;
            const price2330 = data.market?.price_2330;
            const price0050 = data.market?.price_0050;
            const hvVal     = data.indicators?.hv_taiex ?? data.indicators?.hv ?? data.indicators?.hv_2330;
            const stockProps = { taiex, taiexHigh, taiexLow, price2330, price0050, hvVal };
            const sections = [
              { dte: data.dte,                  key: 'near',      el: <SectionNear    data={data}                      {...stockProps} /> },
              data.weekly_wed && { dte: data.weekly_wed.dte, key: 'weekly_wed', el: <SectionWeekly weekly={data.weekly_wed} label="週三週選" {...stockProps} /> },
              data.weekly_fri && { dte: data.weekly_fri.dte, key: 'weekly_fri', el: <SectionWeekly weekly={data.weekly_fri} label="週五週選" {...stockProps} /> },
              data.far_month  && { dte: data.far_month.dte,  key: 'far',        el: <SectionFarMonth farMonth={data.far_month}              {...stockProps} /> },
            ].filter(Boolean).sort((a, b) => a.dte - b.dte);
            return sections.map(s => <React.Fragment key={s.key}>{s.el}</React.Fragment>);
          })()}
          <Section0050 collar={data.collar_0050} taiex={data.market?.taiex} />
          <div style={{
            marginTop:'24px', padding:'12px 0',
            borderTop:'1px solid #1e2535',
            fontSize:'11px', color:'#334155', lineHeight:'1.8',
          }}>
            ⚠ TXO 領式對沖的是加權指數系統性風險，無法涵蓋台積電或 0050 的個股特定風險。當標的因個別消息劇烈波動而大盤未同步下跌時，Put 保護效果有限。
          </div>
        </>
      ) : null}
    </div>
    </MarketStatusProvider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
