<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>2330 0050對應大盤選擇權領口策略</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { background: #0f1117; }
    body {
      background: #0f1117;
      color: #e2e8f0;
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 14px;
      min-height: 100vh;
      min-height: -webkit-fill-available;
      padding: 20px;
      padding-bottom: max(20px, calc(env(safe-area-inset-bottom) + 20px));
      overscroll-behavior-y: none;
    }
    @media (max-width: 600px) {
      body { padding: 12px 10px; font-size: 13px; }
    }

    .app { max-width: 900px; margin: 0 auto; }

    /* Header */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      padding: 12px 0 16px;
      border-bottom: 1px solid #1e2535;
      margin-bottom: 16px;
      gap: 8px;
    }
    .header h1 { font-size: 18px; color: #7dd3fc; letter-spacing: 0.05em; line-height: 1.3; }
    .header-right { display: flex; align-items: center; gap: 12px; color: #64748b; font-size: 12px; white-space: nowrap; }
    @media (max-width: 600px) {
      .header h1 { font-size: 15px; }
    }
    /* Market strip — 三區分組 */
    .market-wrapper { margin-bottom: 16px; display: flex; flex-direction: column; gap: 4px; }
    .market-group   { border-radius: 8px; overflow: hidden; border: 1px solid #1e2535; }
    .group-header   {
      background: #0d1220;
      padding: 4px 12px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.1em;
      color: #475569;
    }
    .group-header.spot    { color: #7dd3fc; }
    .group-header.futures { color: #c4b5fd; }
    .group-header.stock-f { color: #fcd34d; }
    .market-strip {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1px;
      background: #1e2535;
    }
    .market-strip.cols-3 { grid-template-columns: repeat(3, 1fr); }
    @media (max-width: 600px) {
      .market-strip        { grid-template-columns: repeat(2, 1fr); }
      .market-strip.cols-3 { grid-template-columns: repeat(3, 1fr); }
    }
    .market-cell {
      background: #13192a;
      padding: 10px 14px;
    }
    @media (max-width: 600px) {
      .market-cell { padding: 9px 11px; }
    }
    .market-cell .label { font-size: 10px; color: #475569; margin-bottom: 3px; }
    .market-cell .sub-label { font-size: 9px; color: #334155; margin-bottom: 2px; }
    .market-cell .value { font-size: 18px; font-weight: 600; color: #f1f5f9; }
    .market-cell .value.up   { color: #f87171; }
    .market-cell .value.down { color: #4ade80; }
    .market-cell .value.tag  { font-size: 13px; color: #7dd3fc; }
    .market-cell .value.na   { color: #334155; font-size: 14px; }
    .chg-label { font-size: 10px; margin-top: 2px; }
    .chg-label.up   { color: #f87171; }
    .chg-label.down { color: #4ade80; }
    @media (max-width: 600px) {
      .market-cell .value { font-size: 15px; }
      .market-cell .value.tag { font-size: 12px; }
    }

    /* Indicator bar */
    .indicator-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 1px;
      background: #1e2535;
      border-top: 1px solid #1e2535;
      overflow: hidden;
      margin-bottom: 0;
    }
    .ind-cell {
      background: #13192a;
      padding: 8px 14px;
      display: flex;
      flex-direction: column;
      gap: 3px;
      flex: 1;
      min-width: 72px;
      border-left: 3px solid transparent;
      transition: background 0.2s, border-left-color 0.2s;
    }
    @media (max-width: 600px) {
      .ind-cell { min-width: 60px; padding: 7px 10px; }
    }
    .ind-cell.mood-good    { background: #091a0d; border-left-color: #22c55e; }
    .ind-cell.mood-caution { background: #17130a; border-left-color: #eab308; }
    .ind-cell.mood-warn    { background: #1a0e03; border-left-color: #f97316; }
    .ind-cell.mood-risk    { background: #1a0505; border-left-color: #ef4444; }
    .ind-cell .ind-key { font-size: 10px; color: #475569; white-space: nowrap; }
    .ind-cell .ind-key .ind-src { font-size: 9px; color: #334155; margin-left: 3px; }
    .ind-cell .ind-val { font-size: 13px; color: #cbd5e1; font-weight: 600; }
    .ind-cell .ind-val.hi  { color: #86efac; }
    .ind-cell .ind-val.lo  { color: #fca5a5; }
    .ind-cell .ind-val.tag { color: #7dd3fc; }
    .ind-cell .ind-badge { font-size: 10px; font-weight: 600; margin-top: 1px; }
    .ind-cell .ind-badge.hi  { color: #86efac; }
    .ind-cell .ind-badge.lo  { color: #fca5a5; }
    .ind-cell .ind-badge     { color: #94a3b8; }
    .ind-mood-dot {
      display: inline-block;
      width: 6px; height: 6px;
      border-radius: 50%;
      margin-left: 5px;
      vertical-align: middle;
      flex-shrink: 0;
    }
    .ind-verdict {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.04em;
      margin-top: 3px;
    }
    .ind-divider {
      width: 1px;
      background: #1e2535;
      align-self: stretch;
    }

    /* Options row */
    .options-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 16px;
    }
    @media (max-width: 480px) {
      .options-row { grid-template-columns: 1fr; }
    }
    .option-card {
      background: #13192a;
      border: 1px solid #1e2535;
      border-radius: 8px;
      padding: 12px 16px;
    }
    .option-card .opt-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }
    .opt-badge {
      font-size: 11px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 3px;
      letter-spacing: 0.05em;
    }
    .opt-badge.put { background: #7f1d1d; color: #fca5a5; }
    .opt-badge.call { background: #14532d; color: #86efac; }
    .opt-strike { font-size: 18px; font-weight: 700; }
    .opt-prices {
      display: flex;
      flex-wrap: wrap;
      gap: 10px 16px;
      font-size: 12px;
      color: #64748b;
    }
    .opt-prices span { display: flex; flex-direction: column; gap: 2px; min-width: 52px; }
    .opt-prices .pkey { font-size: 10px; color: #475569; }
    .opt-prices .pval { color: #cbd5e1; font-size: 13px; }
    .opt-prices .pval.pval-dim     { color: #475569; }
    .opt-prices .pval.pval-ok      { color: #4ade80; }
    .opt-prices .pval.pval-caution { color: #eab308; }
    .opt-prices .pval.pval-warn    { color: #f97316; }
    .opt-prices .pval.pval-risk    { color: #f87171; }
    .vol-warn { color: #f87171; }
    .vol-caution { color: #fb923c; }
    .opt-symbol { font-size: 10px; color: #334155; margin-top: 6px; }
    .opt-ref-row {
      display: flex;
      gap: 20px;
      font-size: 12px;
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid #1e2535;
    }
    .opt-ref-row span { display: flex; flex-direction: column; gap: 2px; }
    .opt-ref-row .rkey { font-size: 10px; color: #475569; }
    .opt-ref-row .rval { font-size: 13px; color: #94a3b8; font-weight: 600; }
    .dist-badge {
      font-size: 11px;
      font-weight: 700;
      padding: 2px 7px;
      border-radius: 3px;
    }
    .dist-badge.put  { background: #7f1d1d55; color: #fca5a5; }
    .dist-badge.call { background: #14532d55; color: #86efac; }
    .spread-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid #1e2535;
      font-size: 11px;
      color: #475569;
    }
    .spread-val { font-weight: 700; font-size: 12px; }
    .spread-val.ok      { color: #64748b; }
    .spread-val.caution { color: #fb923c; }
    .spread-val.warn    { color: #f87171; }

    /* Structure cards */
    .structures { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 8px; }
    @media (max-width: 600px) {
      .structures { grid-template-columns: 1fr; }
      /* compact cards (週選/遠月/0050) 手機上 2欄 */
      .structures.compact-grid { grid-template-columns: repeat(2, 1fr); }
    }
    .struct-card {
      background: #13192a;
      border: 1px solid #1e2535;
      border-radius: 8px;
      padding: 16px;
      position: relative;
      transition: border-color 0.15s;
    }
    .struct-card:hover { border-color: #334155; }
    .struct-card.recommended { border-color: #1d4ed8; }
    .recommended-badge {
      position: absolute;
      top: -1px; right: 12px;
      background: #1d4ed8;
      color: #bfdbfe;
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 0 0 4px 4px;
    }
    .struct-name { font-size: 11px; color: #475569; margin-bottom: 4px; }
    .struct-desc { font-size: 13px; color: #94a3b8; margin-bottom: 12px; }
    .struct-legs {
      font-size: 20px;
      font-weight: 700;
      color: #f1f5f9;
      margin-bottom: 12px;
    }
    .struct-strikes { font-size: 11px; color: #475569; margin-bottom: 12px; line-height: 1.6; }
    .struct-net {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 4px;
    }
    @media (max-width: 600px) {
      .struct-net { font-size: 20px; }
      .struct-legs { font-size: 17px; }
    }
    .struct-net.credit { color: #4ade80; }
    .struct-net.debit { color: #f87171; }
    .struct-protection {
      height: 4px;
      background: #1e2535;
      border-radius: 2px;
      margin-bottom: 6px;
      overflow: hidden;
    }
    .struct-protection-fill {
      height: 100%;
      background: #3b82f6;
      border-radius: 2px;
      transition: width 0.4s ease;
    }
    .struct-pct-label { font-size: 11px; color: #64748b; }
    .credit-tag {
      display: inline-block;
      margin-top: 10px;
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 3px;
      background: #14532d;
      color: #86efac;
    }
    .debit-tag {
      display: inline-block;
      margin-top: 10px;
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 3px;
      background: #7f1d1d;
      color: #fca5a5;
    }

    /* Spread cards */
    .spread-section-title {
      font-size: 11px;
      font-weight: 700;
      color: #475569;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin: 18px 0 8px;
    }
    .spread-cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); gap: 8px; margin-bottom: 12px; }
    @media (max-width: 600px) { .spread-cards { grid-template-columns: repeat(2, 1fr); } }
    .spread-strat-card {
      background: #0d1220;
      border: 1px solid #1e2535;
      border-radius: 8px;
      padding: 12px 14px;
      position: relative;
    }
    .spread-strat-card.credit-card { border-color: #166534; }
    .spread-strat-card.debit-card  { border-color: #7c2d12; }
    .ssc-name  { font-size: 11px; font-weight: 700; color: #94a3b8; margin-bottom: 2px; }
    .ssc-desc  { font-size: 10px; color: #475569; margin-bottom: 6px; }
    .ssc-legs  { font-size: 11px; color: #94a3b8; margin-bottom: 6px; line-height: 1.6; }
    .ssc-net   { font-size: 22px; font-weight: 800; margin-bottom: 2px; }
    .ssc-net.credit { color: #4ade80; }
    .ssc-net.debit  { color: #f87171; }
    .ssc-unit  { font-size: 10px; color: #475569; margin-bottom: 8px; }
    .ssc-pnl   { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 6px; }
    .ssc-pnl-item { font-size: 11px; color: #64748b; }
    .ssc-pnl-item b { font-weight: 700; }
    .ssc-pnl-item.profit b { color: #4ade80; }
    .ssc-pnl-item.loss   b { color: #f87171; }
    .ssc-be    { font-size: 11px; color: #94a3b8; margin-bottom: 6px; }
    .ssc-be b  { color: #e2e8f0; }

    /* Roll panel */
    .roll-panel {
      background: #0d1220;
      border: 1px solid #1e2535;
      border-radius: 8px;
      padding: 12px 16px;
      margin-bottom: 16px;
    }
    .roll-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 5px;
    }
    .roll-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .roll-label { font-size: 13px; font-weight: 700; }
    .roll-month { font-size: 10px; color: #334155; margin-left: auto; }
    .roll-desc  { font-size: 12px; color: #64748b; line-height: 1.5; }
    .roll-actions {
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid #1e2535;
    }
    .roll-action { font-size: 11px; color: #94a3b8; line-height: 1.9; }
    .roll-action span { color: #cbd5e1; font-weight: 600; }

    /* Wheel / 空手回補面板 */
    .wheel-panel {
      background: #080f1e;
      border: 1px solid #1e3a5f;
      border-left: 3px solid #3b82f6;
      border-radius: 10px;
      padding: 12px 14px;
      margin-bottom: 16px;
    }
    .wheel-header {
      font-size: 12px; font-weight: 700; color: #60a5fa;
      margin-bottom: 8px; display: flex; align-items: center; gap: 6px;
    }
    .wheel-rows { display: flex; flex-direction: column; gap: 6px; }
    .wheel-row  { display: flex; gap: 10px; align-items: center; font-size: 12px; flex-wrap: wrap; }
    .wheel-tag  {
      font-size: 10px; background: #1e3a5f; color: #93c5fd;
      padding: 1px 7px; border-radius: 4px; flex-shrink: 0; min-width: 32px; text-align: center;
    }
    .wheel-strike { color: #e2e8f0; font-weight: 600; }
    .wheel-dist   { color: #475569; font-size: 10px; }
    .wheel-note   {
      font-size: 10px; color: #334155; margin-top: 7px; line-height: 1.7;
      border-top: 1px solid #1e2535; padding-top: 6px;
    }
    .wheel-premium { font-size: 11px; color: #64748b; margin-top: 5px; }

    /* Strike proximity alert */
    .strike-alert {
      border-radius: 8px;
      padding: 10px 14px;
      margin-bottom: 10px;
      display: flex;
      align-items: flex-start;
      gap: 10px;
    }
    .strike-alert-icon { font-size: 15px; flex-shrink: 0; margin-top: 1px; }
    .strike-alert-title { font-size: 12px; font-weight: 700; margin-bottom: 2px; }
    .strike-alert-hint  { font-size: 11px; color: #475569; }
    .strike-alert.put-warn   { background: #1a0b04; border: 1px solid #78350f; }
    .strike-alert.put-urgent { background: #1a0505; border: 1px solid #991b1b; }
    .strike-alert.put-itm    { background: #1a0505; border: 1px solid #dc2626; }
    .strike-alert.call-warn   { background: #04140a; border: 1px solid #14532d; }
    .strike-alert.call-urgent { background: #04140a; border: 1px solid #15803d; }
    .strike-alert.call-itm    { background: #04140a; border: 1px solid #16a34a; }
    .put-warn   .strike-alert-title { color: #fb923c; }
    .put-urgent .strike-alert-title { color: #f87171; }
    .put-itm    .strike-alert-title { color: #fca5a5; }
    .call-warn   .strike-alert-title { color: #34d399; }
    .call-urgent .strike-alert-title { color: #4ade80; }
    .call-itm    .strike-alert-title { color: #86efac; }

    /* Sim table */
    .sim-wrap {
      background: #0d1220;
      border: 1px solid #1e2535;
      border-radius: 8px;
      overflow: hidden;
      margin-bottom: 16px;
    }
    .sim-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 14px;
      background: #0a0f1a;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: #475569;
      cursor: pointer;
      user-select: none;
    }
    .sim-header:hover { color: #64748b; }
    .sim-header .sim-toggle { font-size: 9px; color: #334155; }
    .sim-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 11px;
    }
    .sim-table th {
      padding: 5px 12px;
      text-align: right;
      background: #0a0f1a;
      color: #334155;
      font-weight: 600;
      border-bottom: 1px solid #1e2535;
    }
    .sim-table th:first-child { text-align: left; }
    .sim-table td {
      padding: 7px 12px;
      text-align: right;
      border-bottom: 1px solid #131b28;
      color: #64748b;
    }
    .sim-table td:first-child { text-align: left; }
    .sim-table tr:last-child td { border-bottom: none; }
    .sim-row-put     td { background: #160c0c; }
    .sim-row-call    td { background: #0c160c; }
    .sim-row-current td { background: #13192a; }
    .sim-label-put  { color: #fca5a5; font-weight: 600; }
    .sim-label-call { color: #86efac; font-weight: 600; }
    .sim-label-curr { color: #f1f5f9; font-weight: 600; }
    .sim-pnl-pos  { color: #4ade80; font-weight: 700; }
    .sim-pnl-neg  { color: #f87171; font-weight: 700; }
    .sim-pnl-zero { color: #334155; }
    .sim-status-protected { color: #fca5a5; font-weight: 600; font-size: 10px; }
    .sim-status-capped    { color: #86efac; font-weight: 600; font-size: 10px; }
    .sim-status-normal    { color: #475569; font-size: 10px; }
    .sim-dist { font-size: 9px; color: #334155; margin-left: 4px; }

    /* States */
    .state-box {
      text-align: center;
      padding: 60px 20px;
      color: #475569;
    }
    .state-box .icon { font-size: 32px; margin-bottom: 12px; }
    .state-box p { font-size: 14px; }

    .spinner {
      width: 24px; height: 24px;
      border: 2px solid #1e2535;
      border-top-color: #3b82f6;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Pull-to-refresh indicator */
    .ptr-bar {
      position: fixed;
      top: 0; left: 0; right: 0;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding-bottom: 10px;
      background: #0f1117;
      z-index: 200;
      pointer-events: none;
      overflow: hidden;
    }
    .ptr-bar .ptr-spinner {
      width: 18px; height: 18px;
      border: 2px solid #1e2535;
      border-top-color: #3b82f6;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    .ptr-bar .ptr-text {
      font-size: 12px;
      transition: color 0.15s;
    }

    .error-box {
      background: #7f1d1d22;
      border: 1px solid #7f1d1d;
      border-radius: 8px;
      padding: 16px;
      color: #fca5a5;
      margin-bottom: 16px;
      font-size: 13px;
    }

    /* Market status badge */
    .market-status {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      padding: 3px 10px;
      border-radius: 20px;
      font-weight: 600;
      letter-spacing: 0.03em;
    }
    .market-status.open   { background: #14532d; color: #4ade80; }
    .market-status.after  { background: #422006; color: #fb923c; }
    .market-status.night  { background: #1e1b4b; color: #a5b4fc; }
    .market-status.closed { background: #1e2535; color: #475569; }
    .market-status .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
    }
    .market-status.open .dot   { background: #4ade80; animation: pulse 1.5s infinite; }
    .market-status.after .dot  { background: #fb923c; animation: pulse 1.5s infinite; }
    .market-status.night .dot  { background: #a5b4fc; animation: pulse 2s infinite; }
    .market-status.closed .dot { background: #475569; }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }

    /* Warning / notice banners */
    .banner {
      border-radius: 8px;
      padding: 10px 16px;
      margin-bottom: 12px;
      font-size: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .banner.dte-warn  { background: #422006; border: 1px solid #92400e; color: #fbbf24; }
    .banner.mkt-note  { background: #0f172a; border: 1px solid #1e2535; color: #475569; }

    /* Section divider */
    .section-divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 20px 0 14px;
    }
    .section-divider .section-title {
      font-size: 12px;
      color: #475569;
      white-space: nowrap;
      letter-spacing: 0.08em;
      font-weight: 600;
    }
    .section-divider::before, .section-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #1e2535;
    }
    /* 各區段色彩 */
    .section-divider.near    .section-title { color: #7dd3fc; }
    .section-divider.weekly  .section-title { color: #c4b5fd; }
    .section-divider.far     .section-title { color: #5eead4; }
    .section-divider.etf     .section-title { color: #fcd34d; }
    /* 緊湊結構卡（週選/遠月/0050 用） */
    .struct-card.compact .struct-strikes { display: none; }
    .struct-card.compact .struct-legs    { font-size: 15px; margin-bottom: 8px; }
    .struct-card.compact .struct-net     { font-size: 18px; margin-bottom: 4px; }
    .struct-card.compact .struct-protection { margin-bottom: 4px; }

    /* 0050 info bar */
    .info-bar-0050 {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 16px 20px;
      background: #13192a;
      border: 1px solid #1e2535;
      border-radius: 8px;
      padding: 10px 16px;
      margin-bottom: 12px;
      font-size: 12px;
    }
    .info-bar-0050 .ib-item { display: flex; flex-direction: column; gap: 2px; }
    .info-bar-0050 .ib-key { font-size: 10px; color: #475569; }
    .info-bar-0050 .ib-val { color: #f1f5f9; font-size: 15px; font-weight: 600; }
    .info-bar-0050 .ib-val.accent { color: #7dd3fc; }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const DATA_URL    = '/api/collar/data';
const REFRESH_URL = '/api/collar/refresh';
function getRefreshMs() {
  const now = new Date();
  const day = now.getDay(); // 0=Sun, 6=Sat
  if (day === 0 || day === 6) return 5 * 60 * 1000;
  const h = now.getHours(), m = now.getMinutes();
  const mins = h * 60 + m;
  // 日盤 09:00–13:30
  if (mins >= 9*60 && mins < 13*60+30) return 60 * 1000;
  return 5 * 60 * 1000;
}

function fmt(n, dec = 0) {
  return Number(n).toLocaleString('zh-TW', { minimumFractionDigits: dec, maximumFractionDigits: dec });
}

function ChgLabel({ chg, chgpct, dec = 0 }) {
  if (chg == null) return null;
  const up  = chg >= 0;
  const cls = up ? 'up' : 'down';
  const sign = up ? '+' : '';
  return (
    <div className={`chg-label ${cls}`}>
      {sign}{fmt(chg, dec)} ({sign}{chgpct != null ? chgpct.toFixed(2) : '—'}%)
    </div>
  );
}

function fmtTime(iso) {
  if (!iso) return '—';
  return iso.slice(11, 19);
}

function fmtNet(n) {
  const wan = n / 10000;
  return (wan >= 0 ? '+' : '') + wan.toFixed(1) + '萬';
}

function getMarketStatus() {
  const now = new Date();
  const day  = now.getDay();
  const mins = now.getHours() * 60 + now.getMinutes();

  if (day === 0) return 'closed';                    // 週日全休
  if (day === 6) return mins < 5 * 60 ? 'night' : 'closed'; // 週六夜盤延續至 05:00

  // 週一～週五
  if (mins < 5 * 60)           return 'night';      // 00:00–05:00 夜盤延續
  if (mins < 9 * 60)           return 'closed';     // 05:00–09:00 休市
  if (mins <= 13 * 60 + 30)    return 'open';       // 09:00–13:30 日盤
  if (mins < 14 * 60)          return 'closed';     // 13:30–14:00 換盤空檔
  if (mins <= 14 * 60 + 30)    return 'after';      // 14:00–14:30 盤後
  if (mins < 15 * 60)          return 'closed';     // 14:30–15:00 空檔
  return 'night';                                    // 15:00–24:00 夜盤
}

const MarketStatusCtx = React.createContext('closed');

function MarketStatusProvider({ children }) {
  const [status, setStatus] = React.useState(getMarketStatus);
  React.useEffect(() => {
    const t = setInterval(() => setStatus(getMarketStatus()), 30000);
    return () => clearInterval(t);
  }, []);
  return <MarketStatusCtx.Provider value={status}>{children}</MarketStatusCtx.Provider>;
}

function MarketStatus() {
  const status = React.useContext(MarketStatusCtx);
  const labels = { open: '日盤', after: '盤後', night: '夜盤', closed: '休市' };
  return (
    <span className={`market-status ${status}`}>
      <span className="dot" />
      {labels[status]}
    </span>
  );
}

function DTEWarning({ dte }) {
  if (dte == null || dte >= 5) return null;
  return (
    <div className="banner dte-warn">
      ⚠ DTE（到期天數）{dte} 天，UI 已切換至次月計算。請確認現有月選倉位的平倉時機。
    </div>
  );
}

function MarketHoursNote() {
  const status = React.useContext(MarketStatusCtx);
  if (status === 'open') return null;
  const notes = {
    after:  '盤後交易中（14:00–14:30），選擇權報價為日盤最後成交',
    night:  '夜盤中（15:00–05:00），TXO 夜盤流動性低，報價僅供參考',
    closed: '休市中，報價為最近交易日收盤價',
  };
  return (
    <div className="banner mkt-note">
      {notes[status]}
    </div>
  );
}

function DataAge({ timestamp }) {
  const [now, setNow] = React.useState(Date.now);
  React.useEffect(() => {
    const t = setInterval(() => setNow(Date.now()), 30000);
    return () => clearInterval(t);
  }, []);
  if (!timestamp) return null;
  const mins = Math.floor((now - new Date(timestamp)) / 60000);
  const stale = mins > 8;
  const label = mins < 1 ? '剛更新' : `${mins} 分鐘前`;
  return (
    <span style={{color: stale ? '#f97316' : '#334155', fontSize:'11px'}}>
      {stale ? '⚠ ' : ''}{label}
    </span>
  );
}

function hvMood(hv) {
  if (hv == null) return { cls: '', dot: '#475569', label: '' };
  if (hv < 0.15)  return { cls: 'mood-good',    dot: '#22c55e', label: '低波動' };
  if (hv < 0.25)  return { cls: '',              dot: '#94a3b8', label: '正常' };
  if (hv < 0.35)  return { cls: 'mood-caution',  dot: '#eab308', label: '偏高' };
  return               { cls: 'mood-risk',    dot: '#ef4444', label: '高波動' };
}

function adxMood(adx) {
  if (adx == null) return { cls: '', dot: '#475569', label: '' };
  if (adx < 20)    return { cls: 'mood-good',    dot: '#22c55e', label: '盤整' };
  if (adx < 25)    return { cls: '',              dot: '#94a3b8', label: '弱趨' };
  if (adx < 35)    return { cls: 'mood-caution',  dot: '#eab308', label: '趨勢' };
  return                { cls: 'mood-warn',    dot: '#f97316', label: '強趨' };
}

function overallMood(hvVal, adx) {
  const hm = hvMood(hvVal);
  const am = adxMood(adx);
  const moodRank = { 'mood-risk': 4, 'mood-warn': 3, 'mood-caution': 2, 'mood-good': 1, '': 0 };
  const worst = Math.max(moodRank[hm.cls], moodRank[am.cls]);
  if (worst >= 4) return { label: '高風險', color: '#ef4444' };
  if (worst === 3) return { label: '主動管理', color: '#f97316' };
  if (worst === 2) return { label: '留意', color: '#eab308' };
  if (worst === 1) return { label: '穩健', color: '#22c55e' };
  return              { label: '—', color: '#475569' };
}

function hvPctMood(pct) {
  if (pct == null) return { color: '#475569', label: '' };
  if (pct >= 85)   return { color: '#f97316', label: `${pct.toFixed(0)}th%ile` };
  if (pct >= 65)   return { color: '#eab308', label: `${pct.toFixed(0)}th%ile` };
  if (pct >= 35)   return { color: '#94a3b8', label: `${pct.toFixed(0)}th%ile` };
  return               { color: '#4ade80', label: `${pct.toFixed(0)}th%ile` };
}

function huiSPZone(hvVal) {
  if (hvVal == null) return null;
  const hv = hvVal * 100;
  if (hv > 35) return { zone: '8–10%', color: '#ef4444' };
  if (hv > 20) return { zone: '5–8%',  color: '#f97316' };
  if (hv > 15) return { zone: '5%',    color: '#eab308' };
  return             { zone: '3–5%',  color: '#22c55e' };
}

function huiCapitalPct(dte) {
  if (dte == null) return null;
  if (dte <= 2)  return '80–100%';
  if (dte <= 7)  return '60–70%';
  if (dte <= 14) return '40–50%';
  if (dte <= 21) return '20–30%';
  return '10–15%';
}

function IndicatorBar({ indicators, targets, iv, ivSource, dec = 0 }) {
  if (!indicators) return null;
  const { atr, bb_upper, bb_lower, ma20, hv, hv_2330, hv_taiex, hv_source, adx, hv_pct } = indicators;
  const hvVal     = hv_taiex ?? hv ?? hv_2330;
  const hvSrc     = hv_source === 'tx_direct' ? 'TX' : hv_taiex ? '代理' : '';
  const hvColor   = hv_source === 'tx_direct' ? '' : hv_taiex ? 'lo' : '';
  const hvDisplay = hvVal != null ? (hvVal * 100).toFixed(1) + '%' : '—';
  const ivDisplay = iv != null ? (iv * 100).toFixed(1) + '%' : null;
  const ivLive    = ivSource === 'atm_market';
  const putTarget  = targets?.target_put_strike  ?? indicators.target_put_strike;
  const callTarget = targets?.target_call_strike ?? indicators.target_call_strike;
  const method     = targets?.method ?? indicators.method;
  const adxRegime  = targets?.adx_regime ?? indicators.adx_regime;
  // 顯示 method 標籤
  const methodLabel = (
    method === 'static_fallback' ? '靜態' :
    method?.startsWith('bb_atr')  ? 'BB+ATR' :
    method ?? '—'
  );
  const regimeBadge = (
    adxRegime === 'trend'   ? { text: '趨勢', color: '#fb923c' } :
    adxRegime === 'range'   ? { text: '盤整', color: '#60a5fa' } :
    adxRegime === 'neutral' ? { text: '中性', color: '#94a3b8' } : null
  );
  const hvm     = hvMood(hvVal);
  const adxm    = adxMood(adx);
  const overall = overallMood(hvVal, adx);
  const f = v => v?.toFixed(dec);
  return (
    <div className="indicator-bar">
      <div className="ind-cell" style={{background:'#0d1220', justifyContent:'center', alignItems:'center'}}>
        <span style={{fontSize:'9px', fontWeight:700, color:'#475569', letterSpacing:'0.08em'}}>日K</span>
        <span className="ind-verdict" style={{color: overall.color}}>{overall.label}</span>
      </div>
      <div className="ind-cell">
        <span className="ind-key" title="平均真實波幅 14 日">ATR</span>
        <span className="ind-val">{f(atr)}</span>
      </div>
      <div className="ind-cell">
        <span className="ind-key">BB ↑</span>
        <span className="ind-val hi">{f(bb_upper)}</span>
      </div>
      <div className="ind-cell">
        <span className="ind-key">BB ─</span>
        <span className="ind-val">{f(ma20)}</span>
      </div>
      <div className="ind-cell">
        <span className="ind-key">BB ↓</span>
        <span className="ind-val lo">{f(bb_lower)}</span>
      </div>
      {ivDisplay && (
        <div className="ind-cell" title={ivSource === 'atm_market' ? '從近月平價 Call/Put 市場成交價反推的隱含波動率' : '無成交價可用，退回歷史波動率估算'}>
          <span className="ind-key">波動率<span className="ind-src">{ivLive ? '市價' : '歷史'}</span></span>
          <span className="ind-val" style={{color: ivLive ? '#fbbf24' : '#94a3b8'}}>{ivDisplay}</span>
          {ivLive && <span className="ind-badge" style={{color:'#fbbf24'}}>即時</span>}
        </div>
      )}
      <div className={`ind-cell ${hvm.cls}`}>
        <span className="ind-key">HV{hvSrc && <span className="ind-src">{hvSrc}</span>}</span>
        <span className={`ind-val ${hvm.cls ? '' : hvColor}`}>
          {hvDisplay}
          {hvm.dot && <span className="ind-mood-dot" style={{background: hvm.dot}} />}
        </span>
        {hvm.label && <span className="ind-badge" style={{color: hvm.dot}}>{hvm.label}</span>}
        {(() => { const p = hvPctMood(hv_pct); return p.label
          ? <span className="ind-badge" style={{color: p.color, marginTop:'1px'}}>{p.label}</span>
          : null; })()}
      </div>
      {(() => {
        const sp = huiSPZone(hvVal);
        return sp ? (
          <div className="ind-cell">
            <span className="ind-key" title="輝哥：依當前 HV 建議的 SP 落點">輝 SP 區</span>
            <span className="ind-val" style={{color: sp.color}}>{sp.zone}</span>
            <span className="ind-badge" style={{color:'#475569'}}>之外</span>
          </div>
        ) : null;
      })()}
      <div className={`ind-cell ${adxm.cls}`}>
        <span className="ind-key" title="趨向強度 14 日">ADX</span>
        <span className="ind-val">
          {adx?.toFixed(1) ?? '—'}
          {adxm.dot && adx != null && <span className="ind-mood-dot" style={{background: adxm.dot}} />}
        </span>
        {regimeBadge && <span className="ind-badge" style={{color: regimeBadge.color}}>{regimeBadge.text}</span>}
        {!regimeBadge && adxm.label && <span className="ind-badge" style={{color: adxm.dot}}>{adxm.label}</span>}
      </div>
      <div className="ind-cell">
        <span className="ind-key">Put 目標</span>
        <span className="ind-val lo">{putTarget?.toLocaleString()}</span>
      </div>
      <div className="ind-cell">
        <span className="ind-key">Call 目標</span>
        <span className="ind-val hi">{callTarget?.toLocaleString()}</span>
      </div>
      <div className="ind-cell">
        <span className="ind-key">選法</span>
        <span className="ind-val tag">{methodLabel}</span>
      </div>
    </div>
  );
}

function MCell({ label, subLabel, price, chg, chgpct, dec = 0, tag = false, children }) {
  const cls = chg == null ? '' : chg > 0 ? 'up' : chg < 0 ? 'down' : '';
  return (
    <div className="market-cell">
      <div className="label">{label}</div>
      {subLabel && <div className="sub-label">{subLabel}</div>}
      {children || (
        price != null
          ? <div className={`value ${tag ? 'tag' : cls}`}>{tag ? price : fmt(price, dec)}</div>
          : <div className="value na">—</div>
      )}
      {!tag && !children && <ChgLabel chg={chg} chgpct={chgpct} dec={dec} />}
    </div>
  );
}

function fmtMonth(m) {
  if (!m || m.length < 6) return m || '—';
  return m.slice(0, 4) + '/' + m.slice(4, 6);
}

function MarketStrip({ market: m, txo_month, dte, indicators, targets, indicators0050, iv, ivSource }) {
  if (!m) return null;
  const basis = m.tx_futures != null && m.taiex ? m.tx_futures - m.taiex : null;
  const basisStr = basis != null
    ? <span style={{marginLeft:'5px', fontSize:'9px', color: basis>=0?'#f87171':'#4ade80'}}>
        {basis>=0?'+':''}{basis.toFixed(0)}
      </span>
    : null;

  return (
    <div className="market-wrapper">

      {/* ── 排1：大盤指數 + 台指期 ──────────── */}
      <div className="market-group">
        <div className="group-header futures">大盤 · 台指期 TXF</div>
        <div className="market-strip">
          <MCell label="加權指數 TAIEX" price={m.taiex}       chg={m.chg_taiex}   chgpct={m.chgpct_taiex}   dec={2} />
          <MCell label="櫃買指數 OTC"   price={m.otc}         chg={m.chg_otc}     chgpct={m.chgpct_otc}     dec={2} />
          <MCell label={<>TX 近月 {basisStr}</>} subLabel={fmtMonth(m.tx_near_month)}
                 price={m.tx_futures} chg={m.chg_tx}     chgpct={m.chgpct_tx}     dec={2} />
          <MCell label="TX 遠月" subLabel={fmtMonth(m.tx_far_month)}
                 price={m.tx_far}     chg={m.chg_tx_far} chgpct={m.chgpct_tx_far} dec={2} />
        </div>
      </div>

      {/* ── 排2：台積電現貨 + 股期近遠 ─────── */}
      <div className="market-group">
        <div className="group-header stock-f">台積電 2330</div>
        <div className="market-strip cols-3">
          <MCell label="現股" price={m.price_2330} chg={m.chg_2330} chgpct={m.chgpct_2330} />
          <MCell label="股期 近" subLabel={fmtMonth(m.tf_near_month)}
                 price={m.tf_near} chg={m.chg_tf_near} chgpct={m.chgpct_tf_near} />
          <MCell label="股期 遠" subLabel={fmtMonth(m.tf_far_month)}
                 price={m.tf_far}  chg={m.chg_tf_far}  chgpct={m.chgpct_tf_far} />
        </div>
        <IndicatorBar indicators={indicators} targets={targets} iv={iv} ivSource={ivSource} />
      </div>

      {/* ── 排3：0050 現貨 + 股期近遠 ──────── */}
      <div className="market-group">
        <div className="group-header spot">元大台灣 0050</div>
        <div className="market-strip cols-3">
          <MCell label="現股" price={m.price_0050} chg={m.chg_0050} chgpct={m.chgpct_0050} dec={2} />
          <MCell label="股期 近" subLabel={fmtMonth(m.etf_near_month)}
                 price={m.etf_near} chg={m.chg_etf_near} chgpct={m.chgpct_etf_near} dec={2} />
          <MCell label="股期 遠" subLabel={fmtMonth(m.etf_far_month)}
                 price={m.etf_far}  chg={m.chg_etf_far}  chgpct={m.chgpct_etf_far} dec={2} />
        </div>
        <IndicatorBar indicators={indicators0050} dec={2} />
      </div>

    </div>
  );
}

function deltaCls(delta) {
  if (delta == null) return '';
  const abs = Math.abs(delta);
  if (abs < 0.005) return 'pval-dim';
  if (abs <= 0.08)  return 'pval-ok';
  if (abs <= 0.12)  return 'pval-caution';
  return 'pval-warn';
}

function fmtDelta(delta) {
  if (delta == null) return '—';
  if (Math.abs(delta) < 0.0005) return '≈ 0';
  return delta.toFixed(3);
}

function OptionCard({ type, data, taiex, taiexHigh, taiexLow, price2330, price0050 }) {
  if (!data) return null;
  const spread    = data.ask - data.bid;
  const spreadPct = data.mid > 0 ? spread / data.mid * 100 : 0;
  const spreadCls = spreadPct > 25 ? 'warn' : spreadPct > 15 ? 'caution' : 'ok';
  const dist      = taiex > 0 ? (data.strike - taiex) / taiex * 100 : null;
  const snap50    = n => Math.round(n / 50) * 50;
  const distPct   = taiex > 0 ? (data.strike - taiex) / taiex : null;
  const refHigh   = distPct != null && taiexHigh ? snap50(taiexHigh * (1 + distPct)) : null;
  const refLow    = distPct != null && taiexLow  ? snap50(taiexLow  * (1 + distPct)) : null;
  const ratio     = taiex > 0 && data.strike > 0 ? data.strike / taiex : null;
  const est2330   = ratio != null && price2330 ? Math.round(price2330 * ratio / 5) * 5 : null;
  const est0050   = ratio != null && price0050 ? Math.round(price0050 * ratio * 10) / 10 : null;
  const vol       = data.volume ?? 0;
  const volCls    = vol < 5 ? 'vol-warn' : vol < 20 ? 'vol-caution' : '';
  const dCls      = deltaCls(data.delta);
  return (
    <div className="option-card">
      <div className="opt-header">
        <span className={`opt-badge ${type}`}>{type.toUpperCase()}</span>
        <span className="opt-strike">{fmt(data.strike)}</span>
        {dist != null && (
          <span className={`dist-badge ${type}`}>
            {dist >= 0 ? '+' : ''}{dist.toFixed(1)}%
          </span>
        )}
      </div>
      <div className="opt-prices">
        <span><span className="pkey">ASK（賣）</span><span className="pval">{data.ask}</span></span>
        <span><span className="pkey">MID（中）</span><span className="pval">{data.mid}</span></span>
        <span><span className="pkey">BID（買）</span><span className="pval">{data.bid}</span></span>
        <span>
          <span className="pkey">VOL（量）{vol < 5 ? ' ⚠' : ''}</span>
          <span className={`pval ${volCls}`}>{vol}</span>
        </span>
        <span>
          <span className="pkey">δ Delta</span>
          <span className={`pval ${dCls}`}>{fmtDelta(data.delta)}</span>
        </span>
      </div>
      <div className="spread-row">
        <span>Bid-Ask Spread（買賣價差）</span>
        <span className={`spread-val ${spreadCls}`}>
          {spread} pts ({spreadPct.toFixed(0)}%){spreadPct > 25 ? ' ⚠' : ''}
        </span>
      </div>
      {(refHigh != null || refLow != null) && (
        <div className="opt-ref-row">
          {refHigh != null && <span><span className="rkey">今日高（{fmt(taiexHigh)}）</span><span className="rval">{fmt(refHigh)}</span></span>}
          {refLow  != null && <span><span className="rkey">今日低（{fmt(taiexLow)}）</span><span className="rval">{fmt(refLow)}</span></span>}
        </div>
      )}
      {(est2330 != null || est0050 != null) && (
        <div className="opt-ref-row">
          {est2330 != null && <span><span className="rkey">2330 推估</span><span className="rval" style={{color:'#67e8f9'}}>{est2330.toLocaleString()}</span></span>}
          {est0050 != null && <span><span className="rkey">0050 推估</span><span className="rval" style={{color:'#a78bfa'}}>{est0050.toFixed(1)}</span></span>}

}

function RollPanel({ dte, selectedOptions, taiex, label }) {
  if (!taiex || dte == null) return null;
  const putStrike  = selectedOptions?.put?.strike;
  const callStrike = selectedOptions?.call?.strike;
  const putDist    = putStrike  ? (taiex - putStrike)  / taiex * 100 : null;
  const callDist   = callStrike ? (callStrike - taiex)  / taiex * 100 : null;

  let urgency = dte <= 2 ? 'now' : dte <= 5 ? 'urgent' : dte <= 10 ? 'suggest' : dte <= 14 ? 'watch' : 'hold';

  const anyItm   = (putDist  != null && putDist  < 0) || (callDist != null && callDist < 0);
  const anyClose = (putDist  != null && putDist  < 1.5) || (callDist != null && callDist < 1.5);
  if (anyItm) urgency = 'now';
  else if (anyClose) {
    const bump = { hold: 'watch', watch: 'suggest', suggest: 'urgent', urgent: 'urgent', now: 'now' };
    urgency = bump[urgency];
  }

  const CFG = {
    hold:    { dot: '#22c55e', color: '#22c55e', label: '繼續持有' },
    watch:   { dot: '#eab308', color: '#eab308', label: '開始關注' },
    suggest: { dot: '#f97316', color: '#f97316', label: '建議滾倉' },
    urgent:  { dot: '#ef4444', color: '#f97316', label: '優先滾倉' },
    now:     { dot: '#ef4444', color: '#ef4444', label: '立即處理' },
  };
  const { dot, color, label: verdict } = CFG[urgency];

  const reasons = [];
  if (dte <= 14)    reasons.push(`DTE ${dte} 天`);
  if (anyItm)       reasons.push('已有腳位破位');
  if (anyClose && !anyItm) reasons.push('履約價距離偏近');

  const desc = urgency === 'hold'
    ? `DTE ${dte} 天，履約價距離安全，暫無操作需求`
    : `${reasons.join('、')}，${
        urgency === 'now'     ? '需立即決定是否平倉或滾月' :
        urgency === 'urgent'  ? '建議優先安排換倉操作' :
        urgency === 'suggest' ? '建議本週內評估換倉時機' :
                                '可開始規劃下一月份倉位'}`;

  const actions = urgency !== 'hold' ? [
    callStrike ? `Call 回補 ${fmt(callStrike)}，視狀況賣出次月更高履約價` : null,
    putStrike  ? `Put 滾月換倉，延續下行保護期` : null,
  ].filter(Boolean) : [];

  return (
    <div className="roll-panel">
      <div className="roll-header">
        <span className="roll-dot" style={{background: dot}} />
        <span className="roll-label" style={{color}}>{verdict}</span>
        <span className="roll-month">{label} · DTE {dte} 天</span>
      </div>
      <div className="roll-desc">{desc}</div>
      {(() => {
        const pct = huiCapitalPct(dte);
        return pct ? (
          <div className="roll-desc" style={{color:'#64748b', marginTop:'2px'}}>
            輝哥建議資金使用率：<span style={{color:'#94a3b8', fontWeight:600}}>{pct}</span>
          </div>
        ) : null;
      })()}
      {actions.length > 0 && (
        <div className="roll-actions">
          {actions.map((a, i) => <div key={i} className="roll-action">→ <span>{a}</span></div>)}
        </div>
      )}
    </div>
  );
}

function HuiDistCheck({ selectedOptions, taiex }) {
  if (!taiex || !selectedOptions) return null;
  const putDist  = selectedOptions.put?.strike  ? (taiex - selectedOptions.put.strike)  / taiex * 100 : null;
  const callDist = selectedOptions.call?.strike ? (selectedOptions.call.strike - taiex) / taiex * 100 : null;
  if (putDist == null || callDist == null) return null;
  const snap50 = n => Math.round(n / 50) * 50;
  const ok = callDist <= putDist;
  // 建議價：不符合時，對稱另一腳的距離
  const suggestedPut  = !ok ? snap50(taiex * (1 - callDist / 100)) : null;  // Put 拉到 callDist 的對稱點
  const suggestedCall = ok && callDist < putDist * 0.6 ? snap50(taiex * (1 + putDist / 100)) : null; // 若 Call 過近，提示可拉遠
  return (
    <div style={{
      fontSize:'11px', padding:'3px 12px 5px',
      color: ok ? '#4ade80' : '#fb923c',
      display:'flex', gap:'5px', alignItems:'flex-start',
      flexWrap:'wrap',
    }}>
      <span style={{flexShrink:0}}>{ok ? '✓' : '!'}</span>
      <span>
        Call {callDist.toFixed(1)}% / Put {putDist.toFixed(1)}%
        {' — '}
        {ok
          ? `符合 Call 近 Put 遠原則${suggestedCall ? `（Call 空間充裕，可考慮移至 ${suggestedCall.toLocaleString()}）` : ''}`
          : `Put 建議拉遠至 ${suggestedPut?.toLocaleString()}（與 Call 對稱 ${callDist.toFixed(1)}%）`
        }
      </span>
    </div>
  );
}

function WheelPanel({ selectedOptions, taiex, price2330, price0050, hvVal }) {
  if (!taiex || !price2330 || !price0050) return null;
  const snap50  = n => Math.round(n / 50) * 50;

  const est0050 = s => (Math.round(price0050 * (s / taiex) * 10) / 10).toFixed(1);

  const hv = hvVal ? hvVal * 100 : 20;
  const range = hv > 35 ? [8, 10] : hv > 20 ? [5, 8] : hv > 15 ? [5, 5] : [3, 5];

    ? [{ label: '建議', pct: range[0] }]

      <div className="wheel-rows">
        {rows.map(r => {
          const strike = snap50(taiex * (1 - r.pct / 100));
          const netCost2330 = refPremium ? est2330(strike) - Math.round(refPremium * 50 / 2000) : null;
          const netCost0050 = refPremium ? (parseFloat(est0050(strike)) - Math.round(refPremium * 50 / 20000 * 10) / 10).toFixed(1) : null;

              <span style={{color:'#a78bfa'}}>0050 ≈ {est0050(strike)}{netCost0050 ? ` → 淨 ${netCost0050}` : ''}</span>
            </div>
          );
        })}
      </div>
      {refPremium && (

      )}
      <div className="wheel-note">
        流程：賣 Put 等回補 → 到期無事收租 → Put 穿價以履約價買回持股 → 重建 Collar
      </div>
    </div>
  );
}

function StrikeAlert({ selectedOptions, taiex, dte }) {
  if (!taiex || !selectedOptions) return null;
  const putStrike  = selectedOptions.put?.strike;
  const callStrike = selectedOptions.call?.strike;

  function buildAlert(strike, isPut) {
    if (!strike) return null;
    const dist = isPut
      ? (taiex - strike) / taiex * 100   // positive = above put (safe)
      : (strike - taiex) / taiex * 100;  // positive = below call (safe)

    const dteUrgencyMult = dte != null && dte <= 5 ? 1.5 : 1;
    const warnThresh  = 2.5 * dteUrgencyMult;
    const urgThresh   = 1.0 * dteUrgencyMult;

    let urgency, icon, title, hint;
    if (dist < 0) {
      urgency = 'itm';
      icon    = isPut ? '🔴' : '🟢';
      title   = isPut
        ? `Put 已破位 ${fmt(strike)}（跌幅 ${Math.abs(dist).toFixed(1)}%）`
        : `Call 已觸頂 ${fmt(strike)}（漲幅 ${Math.abs(dist).toFixed(1)}%）`;
      hint    = isPut
        ? 'Put 保護生效中，評估是否行使或調整倉位'
        : '上行空間已受限，考慮滾倉至更高履約價';
    } else if (dist <= urgThresh) {
      urgency = 'urgent';
      icon    = isPut ? '⬇' : '⬆';
      title   = isPut
        ? `Put 極近：距 ${fmt(strike)} 僅剩 ${dist.toFixed(1)}%`
        : `Call 極近：距 ${fmt(strike)} 僅剩 ${dist.toFixed(1)}%`;
      hint    = isPut
        ? '建議確認保護倉位，或考慮換月滾倉'
        : '建議考慮買回 Call 或滾倉，保留上行空間';
    } else if (dist <= warnThresh) {
      urgency = 'warn';
      icon    = isPut ? '⬇' : '⬆';
      title   = isPut
        ? `Put 接近：距 ${fmt(strike)} 還有 ${dist.toFixed(1)}%`
        : `Call 接近：距 ${fmt(strike)} 還有 ${dist.toFixed(1)}%`;
      hint    = isPut
        ? '留意下行風險，確認保護倉位有效'
        : '留意上行觸頂，確認是否繼續持有';
    } else {
      return null;
    }

    const cls = `${isPut ? 'put' : 'call'}-${urgency}`;
    return (
      <div key={cls} className={`strike-alert ${cls}`}>
        <span className="strike-alert-icon">{icon}</span>
        <div>
          <div className="strike-alert-title">{title}</div>
          <div className="strike-alert-hint">{hint}</div>
        </div>
      </div>
    );
  }

  const putAlert  = buildAlert(putStrike,  true);
  const callAlert = buildAlert(callStrike, false);
  if (!putAlert && !callAlert) return null;
  return <div>{putAlert}{callAlert}</div>;
}

function SimTable({ structures, selectedOptions, taiex }) {
  const [open, setOpen] = React.useState(false);
  if (!structures?.length || !taiex) return null;
  const rec = structures[0];
  const { calls: nCalls, puts: nPuts,
          call_strike: Kc, put_strike: Kp,
          call_premium: cEntry, put_premium: pEntry } = rec;

  const callEntry = selectedOptions?.call?.mid ?? cEntry ?? 0;
  const putEntry  = selectedOptions?.put?.mid  ?? pEntry  ?? 0;

  const calcPnl = (S_T) => {
    const callPts = nCalls * (callEntry - Math.max(0, S_T - Kc));
    const putPts  = nPuts  * (Math.max(0, Kp - S_T) - putEntry);
    const netPts  = callPts + putPts;
    return { callWan: callPts * 50 / 10000, putWan: putPts * 50 / 10000, netWan: netPts * 50 / 10000 };
  };

  const snap50 = n => Math.round(n / 50) * 50;
  const rawScenarios = [
    { val: snap50(taiex * 0.95), label: '-5%', type: '' },
    Kp ? { val: Kp,  label: `Put ${fmt(Kp)}`,  type: 'put'     } : null,
    { val: Math.round(taiex),    label: `現 ${fmt(Math.round(taiex))}`, type: 'current' },
    Kc ? { val: Kc,  label: `Call ${fmt(Kc)}`, type: 'call'    } : null,
    { val: snap50(taiex * 1.05), label: '+5%', type: '' },
  ].filter(Boolean);
  const seen = new Set();
  const scenarios = rawScenarios
    .filter(s => { if (seen.has(s.val)) return false; seen.add(s.val); return true; })
    .sort((a, b) => a.val - b.val);

  const fmtPnl = (wan) => {
    if (Math.abs(wan) < 0.05) return <span className="sim-pnl-zero">—</span>;
    const s = (wan >= 0 ? '+' : '') + wan.toFixed(1) + '萬';
    return <span className={wan > 0 ? 'sim-pnl-pos' : 'sim-pnl-neg'}>{s}</span>;
  };

  return (
    <div className="sim-wrap">
      <div className="sim-header" onClick={() => setOpen(o => !o)}>
        <span>到期損益模擬 · {rec.desc} · 以 MID 估算</span>
        <span className="sim-toggle">{open ? '▲ 收起' : '▼ 展開'}</span>
      </div>
      {open && (
        <table className="sim-table">
          <thead>
            <tr>
              <th>到期點位</th>
              {nCalls > 0 && <th>Call {nCalls}口</th>}
              {nPuts  > 0 && <th>Put {nPuts}口</th>}
              <th>選擇權淨</th>
              <th>狀態</th>
            </tr>
          </thead>
          <tbody>
            {scenarios.map(sc => {
              const p    = calcPnl(sc.val);
              const dist = (sc.val - taiex) / taiex * 100;
              const below = Kp && sc.val <= Kp;
              const above = Kc && sc.val >= Kc;
              const rowCls = sc.type === 'current' ? 'sim-row-current'
                           : sc.type === 'put'     ? 'sim-row-put'
                           : sc.type === 'call'    ? 'sim-row-call' : '';
              const lblCls = sc.type === 'put' ? 'sim-label-put'
                           : sc.type === 'call' ? 'sim-label-call'
                           : sc.type === 'current' ? 'sim-label-curr' : '';
              const status    = below ? '有保護' : above ? '觸頂限' : '緩衝中';
              const statusCls = below ? 'sim-status-protected' : above ? 'sim-status-capped' : 'sim-status-normal';
              return (
                <tr key={sc.val} className={rowCls}>
                  <td>
                    <span className={lblCls}>{sc.label}</span>
                    <span className="sim-dist">{dist >= 0 ? '+' : ''}{dist.toFixed(1)}%</span>
                  </td>
                  {nCalls > 0 && <td>{fmtPnl(p.callWan)}</td>}
                  {nPuts  > 0 && <td>{fmtPnl(p.putWan)}</td>}
                  <td>{fmtPnl(p.netWan)}</td>
                  <td><span className={statusCls}>{status}</span></td>
                </tr>
              );
            })}
          </tbody>
        </table>
      )}
    </div>
  );
}

function BrokerPositions({ data }) {
  const b = data?.broker;
  if (!b || !b.positions?.length) return null;

function EngineStatus({ data }) {
  if (!data) return null;
  const b = data.betas;
  const p = data.positions;
  const cells = [];
  if (b && (b.beta_2330 != null || b.beta_0050 != null)) {
    const fmtSrc = s => !s ? '' : s === 'computed_60d' ? '✓' : s.startsWith('config_default') ? '預設' : s;
    cells.push(
      <span key="b" title="2330 / 0050 對 TX 期貨 60 日迴歸 beta">
        β <b style={{color:'#fbbf24'}}>{b.beta_2330?.toFixed(2) ?? '—'}</b>
        <span style={{color:'#64748b'}}>{fmtSrc(b.beta_2330_source)}</span>
        <span style={{color:'#1e2535', margin:'0 4px'}}>·</span>
        <b style={{color:'#fbbf24'}}>{b.beta_0050?.toFixed(2) ?? '—'}</b>
        <span style={{color:'#64748b'}}>{fmtSrc(b.beta_0050_source)}</span>
      </span>
    );
  }
  if (p && (p.large_futures_lots != null || p.lots_0050 != null)) {
    const isFile = p.source === 'positions_file';
    cells.push(
      <span key="p" title={isFile ? '從 positions.json 讀取' : '使用程式內建預設'}>
        持倉 <b style={{color: isFile ? '#4ade80' : '#94a3b8'}}>
          {p.large_futures_lots ?? '?'}口大台 · {p.lots_0050 ?? '?'}口 0050 股期
        </b>
        <span style={{color: isFile ? '#4ade80' : '#64748b', marginLeft:'4px'}}>
          {isFile ? '✓ 自訂' : '預設'}
        </span>
      </span>
    );
  }
  if (data.market_session) {
    const sess = data.market_session;
    const sessLabel = sess === 'day' ? '🌞 日盤' : sess === 'night' ? '🌙 夜盤' : '🌑 收市';
    cells.push(<span key="s" style={{color:'#94a3b8'}}>{sessLabel}</span>);
  }
  if (cells.length === 0) return null;
  return (
    <div style={{
      display:'flex', flexWrap:'wrap', gap:'14px',
      fontSize:'10px', color:'#64748b', padding:'6px 14px',
      background:'#0a0e1c', borderBottom:'1px solid #1e2535',
    }}>
      {cells.map((c, i) => <React.Fragment key={i}>{c}</React.Fragment>)}
    </div>
  );
}

function SectionMeta({ dte, dteTrading, iv, ivSource }) {
  const parts = [];
  if (dte != null) {
    parts.push(`DTE ${dte} 天${dteTrading != null ? `（交易日 ${dteTrading}）` : ''}`);
  }
  if (iv != null) {
    const ivLabel = ivSource === 'atm_market' ? '市價' : '歷史';
    parts.push(<>波動率 <span style={{color: ivSource === 'atm_market' ? '#fbbf24' : '#94a3b8'}}>{(iv*100).toFixed(1)}%</span><span style={{fontSize:'9px', color:'#64748b', marginLeft:'2px'}}>{ivLabel}</span></>);
  }
  return parts.length ? (
    <span style={{fontSize:'11px', fontWeight:400, color:'#94a3b8', marginLeft:'8px'}}>
      {parts.map((p, i) => <React.Fragment key={i}>{i > 0 && ' · '}{p}</React.Fragment>)}

  ) : null;

const PTR_THRESHOLD = 70;

function usePullToRefresh(onRefresh, enabled) {
  const startY   = React.useRef(null);
  const distRef  = React.useRef(0);
  const [pullDist, setPullDist] = React.useState(0);

  const cb = React.useRef(onRefresh);
  React.useEffect(() => { cb.current = onRefresh; }, [onRefresh]);

  React.useEffect(() => {
    if (!enabled) return;

    function onTouchStart(e) {
      startY.current = e.touches[0].clientY;   // 永遠記錄，touchmove 再判斷
    }
    function onTouchMove(e) {
      if (startY.current === null) return;
      const d = e.touches[0].clientY - startY.current;
      if (window.scrollY <= 0 && d > 0) {
        // 頁面在頂部且往下拉：接管手勢
        e.preventDefault();
        distRef.current = Math.min(d, PTR_THRESHOLD * 1.5);
        setPullDist(distRef.current);
      } else if (d <= 0 || window.scrollY > 0) {
        // 往上滑或不在頂部：放棄追蹤，讓瀏覽器正常捲動
        if (distRef.current > 0) { distRef.current = 0; setPullDist(0); }
        startY.current = null;
      }
    }
    function onTouchEnd() {
      if (distRef.current >= PTR_THRESHOLD) cb.current();
      distRef.current = 0;
      startY.current  = null;
      setPullDist(0);
    }

    document.addEventListener('touchstart', onTouchStart, { passive: true });
    document.addEventListener('touchmove',  onTouchMove,  { passive: false });
    document.addEventListener('touchend',   onTouchEnd);
    return () => {
      document.removeEventListener('touchstart', onTouchStart);
      document.removeEventListener('touchmove',  onTouchMove);
      document.removeEventListener('touchend',   onTouchEnd);
    };
  }, [enabled]);

  return pullDist;
}

function App() {
  const [data, setData] = React.useState(null);
  const [error, setError] = React.useState(null);
  const [loading, setLoading] = React.useState(true);
  const [refreshing, setRefreshing] = React.useState(false);
  const countdownRef = React.useRef(null);

  async function fetchData() {
    try {
      const res = await fetch(DATA_URL);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const json = await res.json();
      setData(json);
      setError(null);
    } catch (e) {
      setError(e.message);
    } finally {
      setLoading(false);
    }
  }

  async function triggerRefresh() {
    setRefreshing(true);
    try {
      await fetch(REFRESH_URL);
    } catch (_) {}
    await fetchData();
    setRefreshing(false);
  }

  const pullDist = usePullToRefresh(triggerRefresh, !refreshing);
  const pulling  = pullDist > 0;
  const ready    = pullDist >= PTR_THRESHOLD;

  React.useEffect(() => {
    triggerRefresh();
    function schedule() {
      countdownRef.current = setTimeout(() => {
        triggerRefresh();
        schedule();
      }, getRefreshMs());
    }
    schedule();
    return () => clearTimeout(countdownRef.current);
  }, []);

  return (
    <MarketStatusProvider>
    <div className="app">
      {/* Pull-to-refresh indicator */}
      {(pulling || refreshing) && (
        <div className="ptr-bar" style={{ height: refreshing ? '44px' : `${Math.min(pullDist, PTR_THRESHOLD)}px` }}>
          {refreshing
            ? <div className="ptr-spinner" />
            : <span className="ptr-text" style={{ color: ready ? '#4ade80' : '#475569' }}>
                {ready ? '↑ 放開更新' : '↓ 繼續下拉'}
              </span>
          }
        </div>
      )}

      <div className="header">
        <h1>2330 0050 選擇權策略</h1>
        <div className="header-right">
          {data && !refreshing && (
            <>
              <span style={{color:'#1e2535', fontSize:'11px'}}>{fmtTime(data.timestamp)}</span>
              <DataAge timestamp={data.timestamp} />
            </>
          )}
          {refreshing && <span style={{color:'#475569'}}>更新中…</span>}
          <MarketStatus />
        </div>
      </div>

      <EngineStatus data={data} />
      <RollSuggestions data={data} />
      <IntradayBB data={data} />
      <WeeklyOpportunities data={data} />
      <BrokerPositions data={data} />
      <PortfolioBreakdown data={data} />
      <TrendStrip data={data} />
      <TradingLedger data={data} />

      {error && <div className="error-box">⚠ 載入失敗：{error}</div>}
      {data?.quotes_source === 'bs_estimate' && (
        <div className="error-box" style={{background:'#17130a', borderColor:'#ca8a04', color:'#fde68a'}}>
          ⚠ 無即時報價：選擇權報價為 Black-Scholes 理論估算，與實際市價可能有大幅落差。下次有真實報價時將自動更新。
        </div>
      )}
      {data?.market_session === 'night' && data?.quotes_source === 'live' && (
        <div className="error-box" style={{background:'#0f1828', borderColor:'#3b82f6', color:'#bfdbfe'}}>
          🌙 夜盤時段（15:00–05:00）：TXO 報價為夜盤即時行情，流動性可能低於日盤。
        </div>
      )}

      {loading && !data ? (
        <div className="state-box">
          <div className="spinner" />
          <p>{refreshing ? '向永豐抓取最新報價…' : '讀取本機資料…'}</p>
        </div>
      ) : data ? (
        <>
          <MarketStrip market={data.market} txo_month={data.txo_month} dte={data.dte}
                       indicators={data.indicators} targets={data.targets}
                       indicators0050={data.indicators_0050}
                       iv={data.iv_used} ivSource={data.iv_source} />
          <DTEWarning dte={data.dte} />
          <MarketHoursNote />
          {(() => {
            const taiex     = data.market?.taiex;
            const taiexHigh = data.market?.taiex_high;
            const taiexLow  = data.market?.taiex_low;
            const price2330 = data.market?.price_2330;
            const price0050 = data.market?.price_0050;
            const hvVal     = data.indicators?.hv_taiex ?? data.indicators?.hv ?? data.indicators?.hv_2330;
            const stockProps = { taiex, taiexHigh, taiexLow, price2330, price0050, hvVal };
            const sections = [
              { dte: data.dte,                  key: 'near',      el: <SectionNear    data={data}                      {...stockProps} /> },
              data.weekly_wed && { dte: data.weekly_wed.dte, key: 'weekly_wed', el: <SectionWeekly weekly={data.weekly_wed} label="週三週選" {...stockProps} /> },
              data.weekly_fri && { dte: data.weekly_fri.dte, key: 'weekly_fri', el: <SectionWeekly weekly={data.weekly_fri} label="週五週選" {...stockProps} /> },
              data.far_month  && { dte: data.far_month.dte,  key: 'far',        el: <SectionFarMonth farMonth={data.far_month}              {...stockProps} /> },
            ].filter(Boolean).sort((a, b) => a.dte - b.dte);
            return sections.map(s => <React.Fragment key={s.key}>{s.el}</React.Fragment>);
          })()}
          <Section0050 collar={data.collar_0050} taiex={data.market?.taiex} />
          <div style={{
            marginTop:'24px', padding:'12px 0',
            borderTop:'1px solid #1e2535',
            fontSize:'11px', color:'#334155', lineHeight:'1.8',
          }}>
            ⚠ TXO 領式對沖的是加權指數系統性風險，無法涵蓋台積電或 0050 的個股特定風險。當標的因個別消息劇烈波動而大盤未同步下跌時，Put 保護效果有限。
          </div>
        </>
      ) : null}
    </div>
    </MarketStatusProvider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
