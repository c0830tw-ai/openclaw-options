function IVHeatmap({ data }) {
  const [open, setOpen] = React.useState(false);
  const [metric, setMetric] = React.useState('iv');     // 'iv' / 'theta' / 'vega'
  const [side, setSide] = React.useState('put');        // theta/vega 須指定 put or call
  const tx = data?.market?.tx_futures;
  if (!tx) return null;

  // 建 columns（每月份/週選）
  const cols = [];
  if (data.weekly_wed) cols.push({
    label: `週三 ${data.weekly_wed.series || ''}`,
    dte:   data.weekly_wed.dte_trading || 5,
    iv:    data.weekly_wed.iv_used || 0.20,
    skew:  data.weekly_wed.skew || [],
  });
  if (data.weekly_fri) cols.push({
    label: `週五 ${data.weekly_fri.series || ''}`,
    dte:   data.weekly_fri.dte_trading || 8,
    iv:    data.weekly_fri.iv_used || 0.20,
    skew:  data.weekly_fri.skew || [],
  });
  cols.push({
    label: `近月 ${data.txo_month || ''}`,
    dte:   data.dte_trading || 30,
    iv:    data.iv_used || 0.20,
    skew:  [],
  });
  if (data.far_month) cols.push({
    label: `遠月 ${data.far_month.txo_month || ''}`,
    dte:   data.far_month.dte_trading || 60,
    iv:    data.far_month.iv_used || 0.20,
    skew:  [],
  });

  // strike rows
  const atm = Math.round(tx / 100) * 100;
  const strikes = [];
  for (let i = 8; i >= -8; i--) strikes.push(atm - i * 100);   // top = highest strike
  // strikes[0] = atm + 800（call OTM）, strikes[16] = atm - 800（put OTM）

  // IV per col
  const interpIV = (col, K) => {
    const skew = (col.skew || []).slice().sort((a, b) => a.strike - b.strike);
    if (skew.length === 0) return col.iv;
    if (K <= skew[0].strike) return skew[0].iv;
    if (K >= skew[skew.length - 1].strike) return skew[skew.length - 1].iv;
    for (let i = 0; i < skew.length - 1; i++) {
      const a = skew[i], b = skew[i + 1];
      if (K >= a.strike && K <= b.strike && b.strike > a.strike) {
        const t = (K - a.strike) / (b.strike - a.strike);
        return a.iv + t * (b.iv - a.iv);
      }
    }
    return col.iv;
  };

  // 計算 cell value 依 metric
  const cellValue = (col, K) => {
    const iv = interpIV(col, K);
    if (metric === 'iv') return iv * 100;
    const T = Math.max(1, col.dte) / 365;
    const isPut = side === 'put';
    const g = _bsGreeks(tx, K, T, iv, isPut);
    if (metric === 'theta') return g.theta_per_day * 50;   // NT$/day per contract
    if (metric === 'vega')  return g.vega_per_pct  * 50;   // NT$/1%IV per contract
    return 0;
  };

  const matrix = strikes.map(K => cols.map(c => cellValue(c, K)));
  const allVals = matrix.flat();
  let minV = Math.min(...allVals);
  let maxV = Math.max(...allVals);

  // For theta/vega: include 0 in scale to make sign visible
  if (metric !== 'iv') {
    if (minV > 0) minV = 0;
    if (maxV < 0) maxV = 0;
  }

  const fmtCell = (v) => {
    if (metric === 'iv') return v.toFixed(1);
    if (Math.abs(v) >= 1000) return Math.round(v).toLocaleString();
    return v.toFixed(0);
  };

  // 顏色函式
  const cellColor = (v) => {
    if (metric === 'iv') {
      const t = (v - minV) / (maxV - minV || 1);
      if (t < 0.5) {
        const u = t * 2;
        return `rgba(${96+u*155},${165+u*26},${250+u*-214},0.5)`;
      } else {
        const u = (t - 0.5) * 2;
        return `rgba(251,${191+u*-45},${36+u*24},${0.5+u*0.3})`;
      }
    }
    // theta / vega: 紅藍兩極（負紅、正綠/藍），0 = 灰
    const range = Math.max(Math.abs(minV), Math.abs(maxV)) || 1;
    const t = v / range;   // -1 to 1
    if (t < 0) {
      const u = -t;   // 0..1
      return `rgba(252,165,165,${0.2 + u * 0.6})`;   // 紅色強度
    }
    const u = t;
    return `rgba(134,239,172,${0.2 + u * 0.6})`;   // 綠色強度
  };

  // 持倉
  const holdings = ((data?.portfolio_greeks?.legs) || []).reduce((m, L) => {
    if (L.right === 'put' || L.right === 'call') {
      const k = Math.round(L.strike / 100) * 100;
      m[k] = (m[k] || 0) + (L.qty_signed || 0);
    }
    return m;
  }, {});

  return (
    <div style={{
      background:'#0a0e1c', border:'1px solid #1e2535',
      borderRadius:'6px', padding:'8px 12px', margin:'8px 0',
      fontSize:'11px', color:'#cbd5e1',
    }}>
      <div onClick={() => setOpen(!open)} style={{
        display:'flex', justifyContent:'space-between', alignItems:'center',
        cursor:'pointer', userSelect:'none',
      }}>
        <span style={{fontWeight:700, color:'#94a3b8'}}>
          🌡️ Greeks 熱圖（strike × 月份）
        </span>
        <span style={{fontSize:'9px', color:'#64748b'}}>
          {metric.toUpperCase()}{metric !== 'iv' ? ` · ${side}` : ''}　{open ? '▲' : '▼'}
        </span>
      </div>

      {open && (
        <>
          {/* Metric toggle */}
          <div style={{display:'flex', gap:'4px', marginTop:'6px', flexWrap:'wrap'}}>
            {['iv', 'theta', 'vega'].map(m => (
              <button key={m} onClick={(e) => {e.stopPropagation(); setMetric(m);}} style={{
                background: metric === m ? '#0f1828' : 'transparent',
                border: metric === m ? '1px solid #60a5fa' : '1px solid #334155',
                color: metric === m ? '#60a5fa' : '#94a3b8',
                padding:'2px 10px', borderRadius:'3px', cursor:'pointer', fontSize:'10px',
              }}>{m === 'iv' ? 'IV %' : m === 'theta' ? 'θ NT/天' : 'ν NT/1%IV'}</button>
            ))}
            {metric !== 'iv' && (
              <>
                <span style={{padding:'2px 4px', color:'#64748b', fontSize:'10px'}}>|</span>
                {['put', 'call'].map(s => (
                  <button key={s} onClick={(e) => {e.stopPropagation(); setSide(s);}} style={{
                    background: side === s ? '#0f1828' : 'transparent',
                    border: side === s ? `1px solid ${s === 'put' ? '#fca5a5' : '#86efac'}` : '1px solid #334155',
                    color: side === s ? (s === 'put' ? '#fca5a5' : '#86efac') : '#94a3b8',
                    padding:'2px 10px', borderRadius:'3px', cursor:'pointer', fontSize:'10px',
                  }}>{s === 'put' ? 'Put' : 'Call'}</button>
                ))}
              </>
            )}
          </div>
          <div style={{overflowX:'auto', marginTop:'6px'}}>
            <table style={{width:'100%', borderCollapse:'collapse', fontSize:'10px', minWidth:'320px'}}>
              <thead>
                <tr style={{color:'#94a3b8'}}>
                  <th style={{padding:'4px 6px', textAlign:'left'}}>履約</th>
                  {cols.map((c, i) => (
                    <th key={i} style={{padding:'4px 6px', textAlign:'center'}}>
                      <div>{c.label}</div>
                      <div style={{fontSize:'8px', color:'#64748b', fontWeight:400}}>
                        {c.dte}d · ATM {(c.iv * 100).toFixed(1)}%
                      </div>
                    </th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {strikes.map((K, ri) => {
                  const isAtm = K === atm;
                  const held = holdings[K];
                  return (
                    <tr key={K} style={{borderBottom:'1px solid #1e2535'}}>
                      <td style={{padding:'3px 6px', fontWeight: isAtm ? 700 : 400,
                                   color: isAtm ? '#fbbf24' : '#cbd5e1'}}>
                        {K}
                        {held ? <span style={{marginLeft:'4px',
                                                color: held > 0 ? '#86efac' : '#fca5a5'}}>
                          ★{held > 0 ? '+' : ''}{held}
                        </span> : null}
                        {isAtm && <span style={{marginLeft:'4px', fontSize:'8px', color:'#fbbf24'}}>ATM</span>}
                      </td>
                      {cols.map((c, ci) => {
                        const v = matrix[ri][ci];
                        return (
                          <td key={ci} style={{
                            padding:'3px 6px', textAlign:'center',
                            background: cellColor(v),
                            color: '#0a0e1c', fontWeight:600,
                          }}>
                            {fmtCell(v)}
                          </td>
                        );
                      })}
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>

          {/* color legend */}
          <div style={{display:'flex', alignItems:'center', gap:'4px', marginTop:'6px', justifyContent:'center'}}>
            <span style={{fontSize:'9px', color:'#64748b'}}>
              {metric === 'iv' ? `低 ${minV.toFixed(1)}%` : fmtCell(minV)}
            </span>
            <div style={{display:'flex', height:'8px', flex:'1 1 200px', maxWidth:'200px'}}>
              {Array.from({length: 20}, (_, i) => {
                const v = minV + (i / 19) * (maxV - minV);
                return <div key={i} style={{flex:1, background: cellColor(v)}} />;
              })}
            </div>
            <span style={{fontSize:'9px', color:'#64748b'}}>
              {metric === 'iv' ? `高 ${maxV.toFixed(1)}%` : fmtCell(maxV)}
            </span>
          </div>

          <div style={{fontSize:'9px', color:'#64748b', marginTop:'4px'}}>
            {metric === 'iv'
              ? '單元格 IV%；週選有 skew 內插，月選用 ATM IV 平攤'
              : metric === 'theta'
                ? `單元格 θ NT$/天 per ${side === 'put' ? 'Put' : 'Call'} 1 口（負=長部位耗損；BS 估算）`
                : `單元格 ν NT$ per 1% IV per ${side === 'put' ? 'Put' : 'Call'} 1 口（BS 估算）`}
            。★ 持倉履約，TX 整百行（{atm}）標 ATM
          </div>
        </>
      )}
    </div>
  );
}

function IVSmile({ data }) {
  const tx = data?.market?.tx_futures;
  const skewWed = (data?.weekly_wed?.skew || []).slice().sort((a,b) => a.strike - b.strike);
  const skewFri = (data?.weekly_fri?.skew || []).slice().sort((a,b) => a.strike - b.strike);
  if (!tx || (skewWed.length < 3 && skewFri.length < 3)) return null;

  // 持倉履約
  const holdings = ((data?.portfolio_greeks?.legs) || [])
    .filter(L => L.right === 'put' || L.right === 'call')
    .map(L => ({ strike: L.strike, qty: L.qty_signed, right: L.right }));

  const allStrikes = [...skewWed.map(s => s.strike), ...skewFri.map(s => s.strike)];
  const xMin = Math.min(...allStrikes, tx - 200);
  const xMax = Math.max(...allStrikes, tx + 200);
  const allIvs = [...skewWed.map(s => s.iv), ...skewFri.map(s => s.iv)];
  const yMin = Math.min(...allIvs) * 100 - 1;
  const yMax = Math.max(...allIvs) * 100 + 1;
  const xRange = xMax - xMin;
  const yRange = yMax - yMin || 1;

  const W = 320, H = 160;
  const padL = 36, padR = 12, padT = 12, padB = 22;
  const innerW = W - padL - padR, innerH = H - padT - padB;
  const px = (s) => padL + ((s - xMin) / xRange) * innerW;
  const py = (iv_pct) => padT + ((yMax - iv_pct) / yRange) * innerH;

  const polyOf = (skew, color) => {
    if (skew.length < 2) return null;
    const pts = skew.map(s => `${px(s.strike).toFixed(1)},${py(s.iv * 100).toFixed(1)}`).join(' ');
    return <polyline fill="none" stroke={color} strokeWidth="1.5" points={pts} />;
  };

  return (
    <div style={{
      background:'#0a0e1c', border:'1px solid #1e2535',
      borderRadius:'6px', padding:'8px 12px', margin:'8px 0',
      fontSize:'11px', color:'#cbd5e1',
    }}>
      <div style={{display:'flex', justifyContent:'space-between', alignItems:'baseline', marginBottom:'4px'}}>
        <span style={{fontWeight:700, color:'#94a3b8'}}>😊 IV Smile</span>
        <span style={{fontSize:'9px', color:'#64748b'}}>
          ATM TX {Math.round(tx).toLocaleString()}
        </span>
      </div>
      <svg viewBox={`0 0 ${W} ${H}`} preserveAspectRatio="none"
           style={{width:'100%', height:`${H}px`, display:'block'}}>
        {/* Y axis labels */}
        <text x="2" y={padT + 6} fontSize="9" fill="#64748b">{yMax.toFixed(0)}%</text>
        <text x="2" y={H - padB} fontSize="9" fill="#64748b">{yMin.toFixed(0)}%</text>
        {/* Border */}
        <rect x={padL} y={padT} width={innerW} height={innerH} fill="none" stroke="#1e2535" strokeWidth="0.5" />
        {/* ATM vertical line */}
        <line x1={px(tx)} y1={padT} x2={px(tx)} y2={padT + innerH}
              stroke="#fbbf24" strokeWidth="0.8" strokeDasharray="3,3" />
        <text x={px(tx) + 2} y={padT + 10} fontSize="9" fill="#fbbf24">ATM</text>
        {/* Smile curves */}
        {polyOf(skewWed, '#86efac')}
        {polyOf(skewFri, '#7dd3fc')}
        {/* Holding markers */}
        {holdings.map((h, i) => {
          // 找 skew 內插的 IV 標位置
          const skew = skewWed.length >= 2 ? skewWed : skewFri;
          if (skew.length < 2) return null;
          let iv = skew[0].iv;
          if (h.strike <= skew[0].strike) iv = skew[0].iv;
          else if (h.strike >= skew[skew.length-1].strike) iv = skew[skew.length-1].iv;
          else for (let j = 0; j < skew.length - 1; j++) {
            const a = skew[j], b = skew[j+1];
            if (h.strike >= a.strike && h.strike <= b.strike && b.strike > a.strike) {
              iv = a.iv + (h.strike - a.strike)/(b.strike - a.strike) * (b.iv - a.iv);
              break;
            }
          }
          const cx = px(h.strike), cy = py(iv * 100);
          const color = h.qty > 0 ? '#86efac' : '#fca5a5';
          return (
            <g key={i}>
              <circle cx={cx} cy={cy} r="3.5" fill={color} stroke="#0a0e1c" strokeWidth="1" />
              <text x={cx} y={cy - 6} fontSize="8" fill={color} textAnchor="middle">
                {h.qty > 0 ? '+' : ''}{h.qty}
              </text>
            </g>
          );
        })}
        {/* X axis labels */}
        <text x={padL} y={H - 6} fontSize="9" fill="#64748b">{Math.round(xMin).toLocaleString()}</text>
        <text x={padL + innerW} y={H - 6} fontSize="9" fill="#64748b" textAnchor="end">{Math.round(xMax).toLocaleString()}</text>
      </svg>
      <div style={{display:'flex', gap:'12px', flexWrap:'wrap', fontSize:'9px', color:'#94a3b8',
                    marginTop:'2px', justifyContent:'center'}}>
        {skewWed.length >= 2 && (
          <span><span style={{display:'inline-block', width:'12px', height:'2px',
                              background:'#86efac', marginRight:'4px', verticalAlign:'middle'}} />
                週三週選 (n={skewWed.length})</span>
        )}
        {skewFri.length >= 2 && (
          <span><span style={{display:'inline-block', width:'12px', height:'2px',
                              background:'#7dd3fc', marginRight:'4px', verticalAlign:'middle'}} />
                週五週選 (n={skewFri.length})</span>
        )}
        {holdings.length > 0 && (
          <span><span style={{display:'inline-block', width:'8px', height:'8px',
                              background:'#86efac', borderRadius:'50%', marginRight:'4px',
                              verticalAlign:'middle'}} />
                持倉 {holdings.length} 腳</span>
        )}
      </div>
      <div style={{fontSize:'9px', color:'#64748b', marginTop:'2px'}}>
        左下傾斜 = put 高 vol（典型台股 skew）；右上凹 = call 高 vol；對稱 = U 型 smile
      </div>
    </div>
  );
}

function TxoChainGrid({ data }) {
  const [open, setOpen] = React.useState(false);
  const tx  = data?.market?.tx_futures;
  const dte = data?.dte_trading || 30;
  const iv  = data?.iv_used || 0.20;
  if (!tx) return null;

  const T = dte / 365;
  const sqrtT = Math.sqrt(T);
  const atm = Math.round(tx / 100) * 100;

  // 用近月 / 週選 skew 內插 IV（fallback 到 ATM IV）
  const skew = (data?.weekly_wed?.skew || data?.weekly_fri?.skew || []).slice().sort((a,b) => a.strike - b.strike);
  const interpIV = (K) => {
    if (skew.length === 0) return iv;
    if (K <= skew[0].strike) return skew[0].iv;
    if (K >= skew[skew.length - 1].strike) return skew[skew.length - 1].iv;
    for (let i = 0; i < skew.length - 1; i++) {
      const a = skew[i], b = skew[i + 1];
      if (K >= a.strike && K <= b.strike && b.strike > a.strike) {
        const t = (K - a.strike) / (b.strike - a.strike);
        return a.iv + t * (b.iv - a.iv);
      }
    }
    return iv;
  };

  // 持倉 mapping
  const legs = (data?.portfolio_greeks?.legs) || [];
  const holdings = {};
  for (const L of legs) {
    if ((L.right === 'put' || L.right === 'call') && L.strike) {
      holdings[`${L.right}_${L.strike}`] = (holdings[`${L.right}_${L.strike}`] || 0) + (L.qty_signed || 0);
    }
  }

  const N = 10;
  const putStrikes  = []; for (let i = N; i >= 1; i--) putStrikes.push(atm - i * 100);
  const callStrikes = []; for (let i = 1; i <= N; i++) callStrikes.push(atm + i * 100);

  const computeRow = (K, isPut) => {
    const ivK = interpIV(K);
    const d1 = (Math.log(tx / K) + 0.5 * ivK * ivK * T) / (ivK * sqrtT);
    const d2 = d1 - ivK * sqrtT;
    const delta = isPut ? (_normCdf(d1) - 1) : _normCdf(d1);
    const price = isPut
      ? K * _normCdf(-d2) - tx * _normCdf(-d1)
      : tx * _normCdf(d1) - K * _normCdf(d2);
    const held = holdings[`${isPut ? 'put' : 'call'}_${K}`] || 0;
    return { K, delta, price, ivK, held };
  };

  const Row = ({ row, isPut }) => {
    const c = isPut ? '#fca5a5' : '#86efac';
    const heldStr = row.held ? `${row.held > 0 ? '+' : ''}${row.held}口` : '';
    const heldColor = row.held > 0 ? '#86efac' : row.held < 0 ? '#fca5a5' : '';
    return (
      <tr style={{
        background: row.held ? '#0f1828' : 'transparent',
        borderBottom: '1px solid #1e2535',
      }}>
        <td style={{padding:'2px 6px', color:'#cbd5e1', fontWeight: row.held ? 700 : 400}}>
          {row.K} {row.held ? '★' : ''}
        </td>
        <td style={{padding:'2px 6px', textAlign:'right', color: c}}>
          {row.delta.toFixed(2)}
        </td>
        <td style={{padding:'2px 6px', textAlign:'right', color:'#cbd5e1'}}>
          {Math.round(row.price)}
        </td>
        <td style={{padding:'2px 6px', textAlign:'right', color:'#64748b', fontSize:'9px'}}>
          {(row.ivK * 100).toFixed(1)}%
        </td>
        <td style={{padding:'2px 6px', textAlign:'right', color: heldColor, fontSize:'10px', minWidth:'40px'}}>
          {heldStr}
        </td>
      </tr>
    );
  };

  return (
    <div style={{
      background:'#0a0e1c', border:'1px solid #1e2535',
      borderRadius:'6px', padding:'8px 12px', margin:'8px 0',
      fontSize:'11px', color:'#cbd5e1',
    }}>
      <div onClick={() => setOpen(!open)} style={{
        display:'flex', justifyContent:'space-between', alignItems:'center',
        cursor:'pointer', userSelect:'none',
      }}>
        <span style={{fontWeight:700, color:'#94a3b8'}}>
          🔗 TXO 履約鏈（ATM ±{N} 檔）
        </span>
        <span style={{fontSize:'9px', color:'#64748b'}}>
          ATM {atm} · DTE {dte}d · {open ? '▲' : '▼'}
        </span>
      </div>

      {open && (
        <>
          <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:'8px', marginTop:'6px'}}>
            <div>
              <div style={{fontSize:'10px', color:'#fca5a5', fontWeight:700, marginBottom:'2px'}}>
                📉 OTM Put（履約 &lt; TX）
              </div>
              <table style={{width:'100%', borderCollapse:'collapse', fontSize:'10px'}}>
                <thead>
                  <tr style={{color:'#64748b', textAlign:'right', fontSize:'9px'}}>
                    <th style={{textAlign:'left', padding:'2px 6px'}}>履約</th>
                    <th>Δ</th><th>價</th><th>IV</th><th>持倉</th>
                  </tr>
                </thead>
                <tbody>
                  {putStrikes.map(K => <Row key={K} row={computeRow(K, true)} isPut={true} />)}
                </tbody>
              </table>
            </div>
            <div>
              <div style={{fontSize:'10px', color:'#86efac', fontWeight:700, marginBottom:'2px'}}>
                📈 OTM Call（履約 &gt; TX）
              </div>
              <table style={{width:'100%', borderCollapse:'collapse', fontSize:'10px'}}>
                <thead>
                  <tr style={{color:'#64748b', textAlign:'right', fontSize:'9px'}}>
                    <th style={{textAlign:'left', padding:'2px 6px'}}>履約</th>
                    <th>Δ</th><th>價</th><th>IV</th><th>持倉</th>
                  </tr>
                </thead>
                <tbody>
                  {callStrikes.map(K => <Row key={K} row={computeRow(K, false)} isPut={false} />)}
                </tbody>
              </table>
            </div>
          </div>
          <div style={{textAlign:'center', fontSize:'10px', color:'#fbbf24', marginTop:'6px',
                        padding:'4px', background:'#0f1828', borderRadius:'3px'}}>
            ─── ATM TX {tx?.toFixed(0)} ───
          </div>
          <div style={{fontSize:'9px', color:'#64748b', marginTop:'4px'}}>
            BS 估價（用 skew 內插的 IV，非真實 quote）；★ 標記持倉
          </div>
        </>
      )}
    </div>
  );
}

function PutRefsBar({ price, refs }) {
  if (!price || !refs) return null;
  const items = [];
  if (refs.bb_d_low   != null) items.push({ name:'日下',  v:refs.bb_d_low,   c:'#10b981' });
  if (refs.bb_60m_low != null) items.push({ name:'60M下', v:refs.bb_60m_low, c:'#22c55e' });
  if (refs.bb_30m_low != null) items.push({ name:'30M下', v:refs.bb_30m_low, c:'#86efac' });
  if (refs.ma10       != null) items.push({ name:'10日',  v:refs.ma10,        c:'#94a3b8' });
  if (refs.bb_30m_mid != null) items.push({ name:'30M中', v:refs.bb_30m_mid, c:'#fbbf24' });
  if (refs.bb_60m_mid != null) items.push({ name:'60M中', v:refs.bb_60m_mid, c:'#fb923c' });
  if (refs.bb_d_mid   != null) items.push({ name:'日中',  v:refs.bb_d_mid,   c:'#f97316' });
  if (items.length === 0) return null;
  items.forEach(i => { i.pct = (i.v - price) / price * 100; });
  items.push({ name:'現價', v:price, pct:0, c:'#fde047', big:true });

  const pcts = items.map(i => i.pct);
  const minP = Math.min(...pcts), maxP = Math.max(...pcts);
  const pad = ((maxP - minP) || 2) * 0.2;
  const aMin = minP - pad, aMax = maxP + pad;
  const x = p => ((p - aMin) / (aMax - aMin)) * 100;

  // 標籤防撞：同 side+row 內若 x 距離 < LABEL_W 視為重疊，往下一個 row 推
  const LABEL_W = 16; // 估每個標籤約佔容器 16%
  const sorted = [...items].map(it => ({...it, xp: x(it.pct)})).sort((a,b) => a.xp - b.xp);
  sorted.forEach((it, idx) => {
    const preferred = idx % 2 === 0 ? ['above','below'] : ['below','above'];
    let placed = false;
    for (let row = 0; row < 6 && !placed; row++) {
      for (const side of preferred) {
        const overlap = sorted.some(o => o !== it && o.side != null
          && o.side === side && o.row === row
          && Math.abs(o.xp - it.xp) < LABEL_W);
        if (!overlap) { it.side = side; it.row = row; placed = true; break; }
      }
    }
    if (!placed) { it.side = 'above'; it.row = 0; }
  });
  const maxRow = Math.max(...sorted.map(it => it.row));
  const ROW_H = 22;            // 每 row 高度（px）
  const AXIS_GAP = 10;         // 中軸到第一個 row 的距離
  const halfH = AXIS_GAP + (maxRow + 1) * ROW_H + 4;
  const totalH = halfH * 2;

  const fmtV = v => Number.isInteger(v) ? v.toLocaleString() : Math.round(v).toLocaleString();

  return (
    <div style={{padding:'8px 12px 12px', marginTop:'6px', background:'#070b15', borderRadius:4, borderLeft:'3px solid #60a5fa'}}>
      <div style={{display:'flex', alignItems:'baseline', gap:8, marginBottom:4}}>
        <span style={{color:'#60a5fa', fontWeight:700, fontSize:12}}>📉 Put 進場參考線</span>
        <span style={{color:'#64748b', fontSize:10}}>TX {fmtV(price)} · 越近現價越偏空</span>
      </div>
      <div style={{position:'relative', height: totalH, marginTop:4, marginBottom:4}}>
        <div style={{position:'absolute', left:0, right:0, top:'50%', height:1, background:'#1e293b'}} />
        <div style={{position:'absolute', left:`${x(0)}%`, top:`calc(50% - 8px)`, height:'16px', width:1, background:'#475569'}} />
        {sorted.map((it, idx) => {
          const isAbove = it.side === 'above';
          const offset = AXIS_GAP + it.row * ROW_H;
          const labelStyle = {
            position:'absolute',
            [isAbove ? 'bottom' : 'top']: `calc(50% + ${offset}px)`,
            textAlign:'center', whiteSpace:'nowrap',
            transform:'translateX(-50%)', left:'50%'
          };
          // 連接線：從圓點延伸到 label，方便辨認屬於哪個點
          const connectorStyle = {
            position:'absolute',
            left:'50%',
            width:1,
            background:`${it.c}55`,
            [isAbove ? 'bottom' : 'top']: `calc(50% + ${it.big ? 5 : 4}px)`,
            height: `${offset - (it.big ? 5 : 4)}px`,
            transform:'translateX(-50%)'
          };
          return (
            <div key={idx} style={{position:'absolute', left:`${it.xp}%`, top:0, bottom:0, transform:'translateX(-50%)'}}>
              {it.row > 0 && <div style={connectorStyle} />}
              <div style={labelStyle}>
                <div style={{fontSize:9, color:it.c, fontWeight: it.big?700:500, lineHeight:1.2}}>{it.name}</div>
                <div style={{fontSize:8, color:'#64748b', lineHeight:1.2}}>
                  {fmtV(it.v)}{!it.big && <span style={{color:it.pct>=0?'#fca5a5':'#86efac', marginLeft:2}}>({it.pct>=0?'+':''}{it.pct.toFixed(2)}%)</span>}
                </div>
              </div>
              <div style={{width:it.big?10:7, height:it.big?10:7, borderRadius:'50%', background:it.c,
                           boxShadow: it.big ? `0 0 0 2px ${it.c}40` : 'none',
                           position:'absolute', top:'50%', left:'50%', transform:'translate(-50%,-50%)'}}/>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function RangeThermometer({ label, accent, price, ind, tx, putStrike, callStrike, futNear, futNearMonth, isStock = false }) {
  if (!price || !ind) return null;
  const items = [];
  if (ind.bb_lower != null) items.push({ name:'BB↓',  v:ind.bb_lower, pct:(ind.bb_lower-price)/price*100, c:'#22c55e' });
  if (ind.ma20     != null) items.push({ name:'MA20', v:ind.ma20,     pct:(ind.ma20    -price)/price*100, c:'#94a3b8' });
  if (ind.bb_upper != null) items.push({ name:'BB↑',  v:ind.bb_upper, pct:(ind.bb_upper-price)/price*100, c:'#ef4444' });
  // strikes 是 TX 點位，用 tx 當基準
  if (putStrike  != null && tx) items.push({ name:'Put',  v:putStrike,  pct:(putStrike -tx)/tx*100, c:'#86efac' });
  if (callStrike != null && tx) items.push({ name:'Call', v:callStrike, pct:(callStrike-tx)/tx*100, c:'#fbbf24' });
  // 期貨近月（跟現股同單位，直接拿 price 比）
  if (futNear != null) {
    const futLabel = futNearMonth ? `期${String(futNearMonth).slice(4,6)}` : '期近';
    items.push({ name: futLabel, v: futNear, pct: (futNear - price) / price * 100, c: '#38bdf8' });
  }
  items.push({ name:'現價', v:price, pct:0, c:'#fbbf24', big:true });
  if (items.length <= 1) return null;

  const pcts = items.map(i => i.pct);
  const minP = Math.min(...pcts), maxP = Math.max(...pcts);
  const pad = ((maxP - minP) || 4) * 0.15;
  const aMin = minP - pad, aMax = maxP + pad;
  const x = p => ((p - aMin) / (aMax - aMin)) * 100;

  // 標籤防撞：同 side+row 內若 x 距離 < LABEL_W 視為重疊，往下一個 row 推
  const LABEL_W = 14;
  const sorted = [...items].map(it => ({...it, xp: x(it.pct)})).sort((a,b) => a.xp - b.xp);
  sorted.forEach((it, idx) => {
    const preferred = idx % 2 === 0 ? ['above','below'] : ['below','above'];
    let placed = false;
    for (let row = 0; row < 6 && !placed; row++) {
      for (const side of preferred) {
        const overlap = sorted.some(o => o !== it && o.side != null
          && o.side === side && o.row === row
          && Math.abs(o.xp - it.xp) < LABEL_W);
        if (!overlap) { it.side = side; it.row = row; placed = true; break; }
      }
    }
    if (!placed) { it.side = 'above'; it.row = 0; }
  });
  const maxRow = Math.max(...sorted.map(it => it.row));
  const ROW_H = 24;
  const AXIS_GAP = 12;
  const halfH = AXIS_GAP + (maxRow + 1) * ROW_H + 4;
  const totalH = halfH * 2;
  const fmtV = v => Number.isInteger(v) ? v.toLocaleString() : v.toFixed(2);

  return (
    <div style={{padding:'10px 14px 14px', borderLeft:`3px solid ${accent}`, marginBottom:'10px', background:'#070b15', borderRadius:4}}>
      <div style={{display:'flex', alignItems:'baseline', gap:8, marginBottom:6}}>
        <span style={{color: accent, fontWeight:700, fontSize:13}}>{label}</span>
        <span style={{color:'#94a3b8', fontSize:12}}>現價 {fmtV(price)}</span>
        {tx && !isStock && <span style={{color:'#475569', fontSize:10, marginLeft:'auto'}}>strike vs TX {Math.round(tx).toLocaleString()}</span>}
        {tx &&  isStock && <span style={{color:'#475569', fontSize:10, marginLeft:'auto'}}>strike vs TX {Math.round(tx).toLocaleString()}</span>}
      </div>
      <div style={{position:'relative', height: totalH, marginTop:6, marginBottom:6}}>
        <div style={{position:'absolute', left:0, right:0, top:'50%', height:2, background:'#1e293b', borderRadius:1}} />
        <div style={{position:'absolute', left:`${x(0)}%`, top:`calc(50% - 8px)`, height:'16px', width:1, background:'#475569'}} />
        {sorted.map((it, idx) => {
          const isAbove = it.side === 'above';
          const offset = AXIS_GAP + it.row * ROW_H;
          const labelStyle = {
            position:'absolute',
            [isAbove ? 'bottom' : 'top']: `calc(50% + ${offset}px)`,
            textAlign:'center', whiteSpace:'nowrap',
            transform:'translateX(-50%)', left:'50%'
          };
          const connectorStyle = {
            position:'absolute',
            left:'50%',
            width:1,
            background:`${it.c}55`,
            [isAbove ? 'bottom' : 'top']: `calc(50% + ${it.big ? 6 : 5}px)`,
            height: `${offset - (it.big ? 6 : 5)}px`,
            transform:'translateX(-50%)'
          };
          return (
            <div key={idx} style={{position:'absolute', left:`${it.xp}%`, top:0, bottom:0, transform:'translateX(-50%)'}}>
              {it.row > 0 && <div style={connectorStyle} />}
              <div style={labelStyle}>
                <div style={{fontSize:10, color:it.c, fontWeight: it.big ? 700 : 500, lineHeight:1.2}}>{it.name}</div>
                <div style={{fontSize:9, color:'#94a3b8', lineHeight:1.2}}>
                  {fmtV(it.v)}
                  {!it.big && <span style={{color:it.pct>=0?'#fca5a5':'#86efac', marginLeft:3}}>({it.pct>=0?'+':''}{it.pct.toFixed(1)}%)</span>}
                </div>
              </div>
              <div style={{width: it.big?12:9, height: it.big?12:9, borderRadius:'50%', background:it.c,
                           boxShadow: it.big ? `0 0 0 3px ${it.c}40` : 'none', position:'absolute', top:'50%', left:'50%', transform:'translate(-50%,-50%)'}}/>
            </div>
          );
        })}
      </div>
      {/* HV / ADX 摘要 */}
      <div style={{display:'flex', gap:14, fontSize:11, color:'#64748b', marginTop:4}}>
        {ind.hv != null && <span>HV <span style={{color:'#cbd5e1', fontWeight:600}}>{(ind.hv*100).toFixed(1)}%</span></span>}
        {ind.adx != null && <span>ADX <span style={{color:'#cbd5e1', fontWeight:600}}>{ind.adx.toFixed(1)}</span></span>}
        {ind.atr != null && <span>ATR <span style={{color:'#cbd5e1', fontWeight:600}}>{Math.round(ind.atr).toLocaleString()}</span></span>}
      </div>
    </div>
  );
}

function TrimAddSOP({ s }) {
  if (!s || s.price == null) return <div style={{padding:'12px', color:'#94a3b8', fontSize:11}}>資料不足（需 60 日 K）</div>;

  const trimDist     = s.recent_high ? ((s.trim_threshold - s.price) / s.price) * 100 : null;
  const addDist      = s.add_level ? ((s.add_level - s.price) / s.price) * 100 : null;
  const trimReleased = s.lot_size * (s.lots_held * 0.5) * s.price;
  const fullNotional = s.lot_size * s.lots_held * s.price;
  const pnlPerLot    = s.cost_basis ? (s.price - s.cost_basis) * s.lot_size : null;
  const totalPnl     = pnlPerLot != null ? pnlPerLot * s.lots_held : null;

  // 動作判定（add 訊號：cross_up 或已在 add_level 上方 — 顯示為 active）
  const addActive = s.cross_up || s.above_add_level;
  const action = s.trim_triggered ? 'TRIM' : (addActive && pnlPerLot != null ? 'HOLD' : 'WATCH');
  // 注意：如果還沒砍，above_add_level=true 是「正常持有狀態」不是 add-back 訊號
  // 真正的 add-back 訊號只有在 trim 後才有意義；這裡簡化處理顯示為 HOLD
  const actionColor = s.trim_triggered ? '#ef4444' : '#475569';
  const actionLabel = s.trim_triggered
    ? `🔴 觸發 Trim — 砍 ${Math.round(s.lots_held*0.5)}-${Math.ceil(s.lots_held*0.5)} 口`
    : '✓ 維持持倉、等訊號';

  const Row = ({ label, value, hint, color }) => (
    <div style={{display:'flex', justifyContent:'space-between', padding:'4px 0',
                 borderBottom:'1px dashed #1e293b', fontSize:11}}>
      <span style={{color:'#94a3b8'}}>{label}</span>
      <span style={{color: color || '#e2e8f0', fontWeight: 600}}>
        {value}
        {hint && <span style={{color:'#64748b', fontSize:10, marginLeft:6}}>{hint}</span>}
      </span>
    </div>
  );

  return (
    <div style={{padding:'4px 0'}}>
      {/* 標題 + 規則 */}
      <div style={{fontSize:11, color:'#94a3b8', marginBottom:8, paddingLeft:4}}>
        <b style={{color:'#e2e8f0'}}>{s.name} ({s.ticker})</b>
        <span style={{marginLeft:8, color:'#64748b'}}>規則：{s.rule}</span>
      </div>

      {/* 動作大字 */}
      <div style={{
        padding:'14px 16px', marginBottom:12, borderRadius:6,
        background: s.trim_triggered ? '#2a0e0e' : '#0a0f1a',
        borderLeft: `4px solid ${actionColor}`,
        display:'flex', justifyContent:'space-between', alignItems:'center'
      }}>
        <div>
          <div style={{fontSize:11, color:'#64748b', marginBottom:2}}>當前訊號</div>
          <div style={{fontSize:16, fontWeight:700, color: actionColor}}>{actionLabel}</div>
        </div>
        <div style={{textAlign:'right'}}>
          <div style={{fontSize:11, color:'#64748b'}}>現價 → 60 日高</div>
          <div style={{fontSize:14, color: '#e2e8f0', fontWeight:600}}>
            {s.price?.toFixed(2)} → {s.recent_high?.toFixed(2)}
          </div>
          <div style={{fontSize:11, color: s.dd_from_high_pct < -s.trim_pct/2 ? '#fb923c' : '#86efac'}}>
            DD {s.dd_from_high_pct?.toFixed(2)}%
          </div>
        </div>
      </div>

      {/* 進出觸發點 */}
      <div style={{
        padding:'10px 14px', marginBottom:10, background:'#070b15', borderRadius:4,
        borderLeft:'3px solid #475569'
      }}>
        <div style={{fontSize:12, fontWeight:600, color:'#e2e8f0', marginBottom:6}}>📍 進出場觸發點</div>
        <Row label={`Trim 觸發 (-${s.trim_pct}% from high)`}
             value={s.trim_threshold?.toFixed(2)}
             hint={trimDist != null ? `距現價 ${trimDist >= 0 ? '+' : ''}${trimDist.toFixed(2)}%` : ''}
             color={s.trim_triggered ? '#ef4444' : '#94a3b8'} />
        <Row label={`Add-back (${s.add_signal})`}
             value={s.add_level?.toFixed(2)}
             hint={addDist != null ? `距現價 ${addDist >= 0 ? '+' : ''}${addDist.toFixed(2)}%` : ''}
             color={s.above_add_level ? '#86efac' : '#fca5a5'} />
      </div>

      {/* 持倉與釋出 */}
      <div style={{
        padding:'10px 14px', marginBottom:10, background:'#070b15', borderRadius:4,
        borderLeft:'3px solid #60a5fa'
      }}>
        <div style={{fontSize:12, fontWeight:600, color:'#e2e8f0', marginBottom:6}}>💼 目前持倉</div>
        <Row label={s.futures_name} value={`${s.lots_held} 口`}
             hint={`每口 ${s.lot_size?.toLocaleString()} ${s.lot_unit_label}`} />
        <Row label="進場均價"
             value={s.cost_basis?.toFixed(2)} />
        <Row label="目前 notional"
             value={`${(fullNotional / 10000).toFixed(0)} 萬`} />
        {totalPnl != null && (
          <Row label="未實現 P&L"
               value={`${totalPnl >= 0 ? '+' : ''}${Math.round(totalPnl).toLocaleString()}`}
               color={totalPnl >= 0 ? '#86efac' : '#fca5a5'} />
        )}
      </div>

      {/* 觸發後動作模擬 */}
      <div style={{
        padding:'10px 14px', marginBottom:10, background:'#070b15', borderRadius:4,
        borderLeft:'3px solid #fbbf24'
      }}>
        <div style={{fontSize:12, fontWeight:600, color:'#e2e8f0', marginBottom:6}}>🎯 觸發時動作</div>
        <Row label="Trim 動作"
             value={`砍 ${Math.round(s.lots_held * 0.5)}-${Math.ceil(s.lots_held * 0.5)} 口`}
             hint={`釋出 ~${(trimReleased / 10000).toFixed(0)} 萬`} />
        <Row label="Add-back 動作"
             value={`加回到 ${s.lots_held} 口滿倉`}
             hint={`當 ${s.ticker} 收盤站上 ${s.add_level_label}`} />
      </div>

      {/* 規則說明 */}
      <div style={{
        marginTop:12, padding:'8px 12px', background:'#070b15',
        borderLeft:'3px solid #475569', borderRadius:4,
        fontSize:10, color:'#64748b', lineHeight:1.5
      }}>
        💡 {s.note}<br />
        ⚠ Sample 偏多頭，極端長熊（如 -50%）下未驗證
      </div>
    </div>
  );
}

function MonthlyStrategySOP({ data, mode = 'near' }) {
  // mode: 'near' = 近月（預設） / 'far' = 次月
  const isFar  = mode === 'far';
  const src    = isFar ? (data?.far_month || {}) : data;
  const tx     = data?.market?.tx_futures;
  const dte    = isFar ? src.dte         : data?.dte;
  const dteT   = isFar ? src.dte_trading : data?.dte_trading;
  const ivPctile = isFar ? null : data?.iv_percentile?.current_pct;
  const ivVal    = isFar ? src.iv_used   : data?.iv_used;
  const monthLabel = isFar ? src.txo_month : data?.txo_month;
  const iv       = ivVal != null ? (ivVal * 100).toFixed(1) : null;

  // Step 1：判斷今天是不是「結算翌日」可建倉時機
  const isBuildDay = dte != null && dte >= 25 && dte <= 32;  // 月選結算後 ~30 天
  // Step 2：IV PR 分支判斷
  const ivBranch = ivPctile == null ? null
    : ivPctile > 60 ? 'high'
    : ivPctile >= 30 ? 'mid'
    : 'low';
  // Step 4：護欄狀態（依當前 TX 即時計算）
  const roundStrike = (v) => v != null ? Math.round(v / 100) * 100 : null;
  const callGuardLevel = roundStrike(tx != null ? tx * 1.029 : null);    // +2.9% from TX（短 call strike - 300）
  const putGuardLevel  = roundStrike(tx != null ? tx * 0.910 : null);    // -9.0% from TX（短 put strike - 500）
  const callGuard = tx != null && callGuardLevel != null && tx >= callGuardLevel;
  const putGuard  = tx != null && putGuardLevel  != null && tx <= putGuardLevel;
  const ivAlert   = ivVal != null && ivVal > 0.35;
  // Step 5：結算前 1 天平倉
  const isCloseoutDay = dte != null && dte <= 1;

  const StepBox = ({ num, title, status, children }) => (
    <div style={{
      background: '#0a0f1a', border: '1px solid #1e293b', borderLeft: `3px solid ${
        status === 'now' ? '#22c55e' :
        status === 'warn' ? '#f97316' :
        status === 'alert' ? '#ef4444' : '#475569'}`,
      padding: '10px 14px', marginBottom: '8px', borderRadius: 4
    }}>
      <div style={{display:'flex', alignItems:'baseline', marginBottom:6}}>
        <span style={{
          background: status === 'now' ? '#22c55e' :
                      status === 'warn' ? '#f97316' :
                      status === 'alert' ? '#ef4444' : '#1e293b',
          color: status ? '#0a0f1a' : '#94a3b8',
          width: 20, height: 20, borderRadius: 4,
          display: 'inline-flex', alignItems: 'center', justifyContent: 'center',

const PTR_THRESHOLD = 70;

function usePullToRefresh(onRefresh, enabled) {
  const startY   = React.useRef(null);
  const distRef  = React.useRef(0);
  const [pullDist, setPullDist] = React.useState(0);

  const cb = React.useRef(onRefresh);
  React.useEffect(() => { cb.current = onRefresh; }, [onRefresh]);

  React.useEffect(() => {
    if (!enabled) return;

    function onTouchStart(e) {
      startY.current = e.touches[0].clientY;   // 永遠記錄，touchmove 再判斷
    }
    function onTouchMove(e) {
      if (startY.current === null) return;
      const d = e.touches[0].clientY - startY.current;
      if (window.scrollY <= 0 && d > 0) {
        // 頁面在頂部且往下拉：接管手勢
        e.preventDefault();
        distRef.current = Math.min(d, PTR_THRESHOLD * 1.5);
        setPullDist(distRef.current);
      } else if (d <= 0 || window.scrollY > 0) {
        // 往上滑或不在頂部：放棄追蹤，讓瀏覽器正常捲動
        if (distRef.current > 0) { distRef.current = 0; setPullDist(0); }
        startY.current = null;
      }
    }
    function onTouchEnd() {
      if (distRef.current >= PTR_THRESHOLD) cb.current();
      distRef.current = 0;
      startY.current  = null;
      setPullDist(0);
    }

    document.addEventListener('touchstart', onTouchStart, { passive: true });
    document.addEventListener('touchmove',  onTouchMove,  { passive: false });
    document.addEventListener('touchend',   onTouchEnd);
    return () => {
      document.removeEventListener('touchstart', onTouchStart);
      document.removeEventListener('touchmove',  onTouchMove);
      document.removeEventListener('touchend',   onTouchEnd);
    };
  }, [enabled]);

  return pullDist;
}

class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { error: null, info: null }; }
  static getDerivedStateFromError(error) { return { error }; }
  componentDidCatch(error, info) { this.setState({ info }); console.error('App crash:', error, info); }
  render() {
    if (this.state.error) {
      return (
        <div style={{padding:'16px', background:'#1c1610', border:'1px solid #fca5a5', borderRadius:'6px', margin:'16px 0', color:'#fde68a', fontSize:'12px'}}>
          <div style={{fontSize:'14px', fontWeight:700, color:'#fca5a5', marginBottom:'6px'}}>⚠️ 元件 crash</div>
          <div><b>Error:</b> {String(this.state.error?.message || this.state.error)}</div>
          {this.state.error?.stack && (
            <pre style={{fontSize:'10px', overflow:'auto', marginTop:'6px', whiteSpace:'pre-wrap', maxHeight:'200px'}}>
              {this.state.error.stack}
            </pre>
          )}
          <div style={{marginTop:'8px', fontSize:'10px', color:'#94a3b8'}}>
            截圖傳給 Claude 看錯誤訊息以修正
          </div>
        </div>
      );
    }
    return this.props.children;
  }
}

function App() {
  const [data, setData] = React.useState(null);
  const [error, setError] = React.useState(null);
  const [loading, setLoading] = React.useState(true);
  const [refreshing, setRefreshing] = React.useState(false);
  const countdownRef = React.useRef(null);

  async function fetchData() {
    try {
      const res = await fetch(DATA_URL);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const json = await res.json();
      setData(json);
      setError(null);
    } catch (e) {
      setError(e.message);
    } finally {
      setLoading(false);
    }
  }

  async function triggerRefresh() {
    setRefreshing(true);
    try {
      await fetch(REFRESH_URL);
    } catch (_) {}
    await fetchData();
    setRefreshing(false);
  }

  const pullDist = usePullToRefresh(triggerRefresh, !refreshing);
  const pulling  = pullDist > 0;
  const ready    = pullDist >= PTR_THRESHOLD;

  React.useEffect(() => {
    triggerRefresh();
    function schedule() {
      countdownRef.current = setTimeout(() => {
        triggerRefresh();
        schedule();
      }, getRefreshMs());
    }
    schedule();
    return () => clearTimeout(countdownRef.current);
  }, []);

  return (
    <MarketStatusProvider>
    <div className="app">
      {/* Pull-to-refresh indicator */}
      {(pulling || refreshing) && (
        <div className="ptr-bar" style={{ height: refreshing ? '44px' : `${Math.min(pullDist, PTR_THRESHOLD)}px` }}>
          {refreshing
            ? <div className="ptr-spinner" />
            : <span className="ptr-text" style={{ color: ready ? '#4ade80' : '#475569' }}>
                {ready ? '↑ 放開更新' : '↓ 繼續下拉'}
              </span>
          }
        </div>
      )}

      <div className="header">
        <h1>2330 0050 選擇權策略</h1>
        <div className="header-right">
          {data && !refreshing && (
            <>
              <span style={{color:'#1e2535', fontSize:'11px'}}>{fmtTime(data.timestamp)}</span>
              <DataAge timestamp={data.timestamp} />
            </>
          )}
          {refreshing && <span style={{color:'#475569'}}>更新中…</span>}
          <MarketStatus />
        </div>
      </div>

      {/* 💡 市場機會 — 想加倉時看 */}
      <Section title="💡 市場機會" defaultOpen={false} accent="blue"
               badge={data?.weekly_opportunities?.length ? `${data.weekly_opportunities.length} 週` : null}>
        <WeeklyOpportunities data={data} />
      </Section>

      {/* 📉 動態管理 SOP — 三個資產的 trim & add-back */}
      <Section title="📉 動態管理 SOP" defaultOpen={false} accent="green"
               badge={(() => {
                 const triggers = [];
                 [data?.trim_add_0050, data?.trim_add_2330, data?.trim_add_00679b].forEach(s => {
                   if (!s) return;
                   if (s.trim_triggered) triggers.push(`${s.ticker} 🔴`);
                 });
                 if (triggers.length) return triggers.join(' ');
                 const dds = [];
                 [data?.trim_add_0050, data?.trim_add_2330, data?.trim_add_00679b].forEach(s => {
                   if (s && s.dd_from_high_pct != null && s.dd_from_high_pct < -5) {
                     dds.push(`${s.ticker} ${s.dd_from_high_pct.toFixed(1)}%`);
                   }
                 });
                 return dds.length ? dds.join(' · ') : null;
               })()}>
        <TrimAddSOP s={data?.trim_add_0050} />
        <div style={{marginTop:16}} />
        <TrimAddSOP s={data?.trim_add_2330} />
        <div style={{marginTop:16}} />
        <TrimAddSOP s={data?.trim_add_00679b} />
      </Section>

      {/* 📘 月選策略 SOP — 近月 + 次月 4-leg 結構執行流程 */}
      <Section title="📘 月選策略 SOP" defaultOpen={false} accent="blue"
               badge={(() => {
                 const dte = data?.dte;
                 const tx = data?.market?.tx_futures;
                 const farDte = data?.far_month?.dte;
                 const alerts = [];
                 if (dte != null && dte >= 25 && dte <= 32) alerts.push('建倉時機');
                 if (farDte != null && farDte >= 25 && farDte <= 35) alerts.push('次月可建');
                 if (tx != null) {
                   const callG = Math.round(tx * 1.029 / 100) * 100;
                   const putG  = Math.round(tx * 0.910 / 100) * 100;
                   if (tx >= callG) alerts.push('TX↑ 護欄');
                   if (tx <= putG)  alerts.push('TX↓ 護欄');
                 }
                 if (dte != null && dte <= 1) alerts.push('平倉日 🔴');
                 return alerts.length ? alerts.join(' · ') : null;
               })()}>
        <MonthlyStrategySOP data={data} mode="near" />
        <div style={{
          margin:'16px 0 12px 0', borderTop:'1px dashed #334155',
          paddingTop:12, fontSize:10, color:'#64748b', textAlign:'center'
        }}>
          ── 次月預覽 ──
        </div>
        <MonthlyStrategySOP data={data} mode="far" />
      </Section>

      {error && <div className="error-box">⚠ 載入失敗：{error}</div>}
      {data?.quotes_source === 'bs_estimate' && (
        <div className="error-box" style={{background:'#17130a', borderColor:'#ca8a04', color:'#fde68a'}}>
          ⚠ 無即時報價：選擇權報價為 Black-Scholes 理論估算，與實際市價可能有大幅落差。下次有真實報價時將自動更新。
        </div>
      )}
      {data?.market_session === 'night' && data?.quotes_source === 'live' && (
        <div className="error-box" style={{background:'#0f1828', borderColor:'#3b82f6', color:'#bfdbfe'}}>
          🌙 夜盤時段（15:00–05:00）：TXO 報價為夜盤即時行情，流動性可能低於日盤。
        </div>
      )}

      {loading && !data ? (
        <div className="state-box">
          <div className="spinner" />
          <p>{refreshing ? '向永豐抓取最新報價…' : '讀取本機資料…'}</p>
        </div>
      ) : data ? (
        <>
          <MarketStrip market={data.market} txo_month={data.txo_month} dte={data.dte}
                       indicators={data.indicators} targets={data.targets}
                       indicators0050={data.indicators_0050}
                       indicators00679b={data.indicators_00679b}
                       holding00679b={data.holding_00679b}
                       iv={data.iv_used} ivSource={data.iv_source} />
          <DTEWarning dte={data.dte} />
          <MarketHoursNote />
          {(() => {
            const taiex     = data.market?.taiex;
            const taiexHigh = data.market?.taiex_high;
            const taiexLow  = data.market?.taiex_low;
            const price2330 = data.market?.price_2330;
            const price0050 = data.market?.price_0050;
            const hvVal     = data.indicators?.hv_taiex ?? data.indicators?.hv ?? data.indicators?.hv_2330;
            const stockProps = { taiex, taiexHigh, taiexLow, price2330, price0050, hvVal };
            const sections = [
              { dte: data.dte,                  key: 'near',      el: <SectionNear    data={data}                      {...stockProps} /> },
              data.weekly_wed && { dte: data.weekly_wed.dte, key: 'weekly_wed', el: <SectionWeekly weekly={data.weekly_wed} label="週三週選" {...stockProps} /> },
              data.weekly_fri && { dte: data.weekly_fri.dte, key: 'weekly_fri', el: <SectionWeekly weekly={data.weekly_fri} label="週五週選" {...stockProps} /> },
              data.far_month  && { dte: data.far_month.dte,  key: 'far',        el: <SectionFarMonth farMonth={data.far_month}              {...stockProps} /> },
            ].filter(Boolean).sort((a, b) => a.dte - b.dte);
            return sections.map(s => <React.Fragment key={s.key}>{s.el}</React.Fragment>);
          })()}
          <Section0050 collar={data.collar_0050} taiex={data.market?.taiex} />

          {/* 📋 持倉明細 — 對帳/檢查用 */}
          <Section title="📋 持倉明細" defaultOpen={false} accent="gray"
                   badge={data?.broker?.total_positions ? `${data.broker.total_positions} 筆` : null}>
            <BrokerPositions data={data} />
            <PortfolioBreakdown data={data} />
          </Section>

          {/* 📈 績效追蹤 — 月底看 */}
          <Section title="📈 績效追蹤" defaultOpen={false} accent="purple"
                   badge={[
                     data?.trade_journal?.total_trades ? `${data.trade_journal.total_trades} 日記` : null,
                     data?.event_history ? `${data.event_history.event_count} 歷史事件` : null,
                   ].filter(Boolean).join(' · ') || null}>
            <PerformanceMetrics data={data} />
            <EquityChart data={data} />
            <RollingMetricsChart data={data} />
            <TradeJournalPanel data={data} />
            <TrendStrip data={data} />
            <TradingLedger data={data} />
          </Section>

          <div style={{
            marginTop:'24px', padding:'12px 0',
            borderTop:'1px solid #1e2535',
            fontSize:'11px', color:'#334155', lineHeight:'1.8',
          }}>
            ⚠ TXO 領式對沖的是加權指數系統性風險，無法涵蓋台積電或 0050 的個股特定風險。當標的因個別消息劇烈波動而大盤未同步下跌時，Put 保護效果有限。
          </div>
        </>
      ) : null}
    </div>
    </MarketStatusProvider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<ErrorBoundary><App /></ErrorBoundary>);
</script>
</body>
</html>
